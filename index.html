function saveChEdit(id) {
  var c = DATA.changes.find(function(x){ return x.id===id; });
  if (!c) return;
  var title = document.getElementById('chEditTitle').value.trim();
  var type = document.getElementById('chEditType').value;
  var before = document.getElementById('chEditBefore').value.trim();
  var after = document.getElementById('chEditAfter').value.trim();
  if (!title || !after) { showToast('\uC81C\uBAA9\uACFC \uBCC0\uACBD \uD6C4 \uB0B4\uC6A9\uC740 \uD544\uC218\uC785\uB2C8\uB2E4', 'err'); return; }

  c.title = title; c.type = type; c.before = before; c.after = after;
  fsSave('changes', c);
  showToast('&#10003; \uC218\uC815\uB418\uC5C8\uC2B5\uB2C8\uB2E4', 'ok');
  closeMod();
  renderPage('changes');
}

function deleteChItem(id) {
  var c = DATA.changes.find(function(x){ return x.id===id; });
  if (!c) return;
  if (!confirm('\'' + c.title + '\' \uBCC0\uACBD\uC0AC\uD56D\uC744 \uC0AD\uC81C\uD558\uC2DC\uACA0\uC2B5\uB2C8\uAE4C?')) return;

  DATA.changes = DATA.changes.filter(function(x){ return x.id !== id; });
  fsDelete('changes', id);
  showToast('&#10003; \uC0AD\uC81C\uB418\uC5C8\uC2B5\uB2C8\uB2E4', 'ok');
  renderPage('changes');
}

// 카테고리별로 매뉴얼 그룹화 (검색/카테고리 필터 동시 적용)
function getGroupedManuals() {
  var cats = DATA.cats.map(function(c){ return c.name; });
  var grouped = {};
  cats.forEach(function(c){ grouped[c] = []; });
  DATA.manuals.forEach(function(m){
    if (!grouped[m.cat]) grouped[m.cat] = [];
    grouped[m.cat].push(m);
  });
  // 정렬 적용
  Object.keys(grouped).forEach(function(c){
    var list = grouped[c];
    if (manualSort==='views') list.sort(function(a,b){return b.views-a.views;});
    else if (manualSort==='alpha') list.sort(function(a,b){return a.title.localeCompare(b.title,'ko');});
    else if (manualSort==='review') list.sort(function(a,b){return new Date(a.updatedAt)-new Date(b.updatedAt);});
    else list.sort(function(a,b){return new Date(b.updatedAt)-new Date(a.updatedAt);});
  });
  return grouped;
}

function manualPartChangeCount(m) {
  if (!m.parts) return 0;
  return m.parts.reduce(function(s,p){return s+(p.changeLog?p.changeLog.length:0);},0);
}

// ============ PC: 좌측 트리 네비게이션 ============

              ? '<span style="font-size:13px;color:'+(isSelected?'var(--pr)':'var(--t3)')+';width:10px">'+(isSelected?'&#9989;':'&#9744;')+'</span>'
              : (hasParts?'<span style="font-size:10px;color:var(--t3);width:10px">'+(docOpen?'&#9660;':'&#9654;')+'</span>':'<span style="width:10px"></span>'))
            + '<span style="font-size:12px;flex:1;color:'+(isDocSelected?'var(--pr)':'var(--t1)')+'">'+esc(m.title)+'</span>'
            + (docComments>0?'<span title="댓글 '+docComments+'개" style="font-size:10px;color:var(--t3)">&#128172;'+docComments+'</span>':'')
            + (docChanges>0?'<span style="font-size:10px;color:var(--pr)">&middot;'+docChanges+'</span>':'')
            + '</div>';
          if (!MANUAL_SELECT_MODE && hasParts && docOpen) {
            row += m.parts.map(function(p){
              var isPartSelected = MTREE.manualId===m.id && MTREE.partId===p.id;
              var pc = p.changeLog?p.changeLog.length:0;
              return '<div style="padding:5px 8px 5px 44px;border-radius:var(--rs);cursor:pointer;font-size:11.5px;display:flex;justify-content:space-between;gap:4px;color:'+(isPartSelected?'var(--pr)':'var(--t2)')+';background:'+(isPartSelected?'var(--pr-l)':'transparent')+'" onclick="event.stopPropagation();mtreeSelectPart('+m.id+',\''+p.id+'\')">'
                + '<span>'+esc(p.name||'(이름 없음)')+'</span>'
                + (pc>0?'<span>&middot;'+pc+'</span>':'')
                + '</div>';
            }).join('');
          }
          return row;
        }).join('');
      }
    }
    return html;
  }).join('');
}

function buildMTreeContent() {
  if (!MTREE.manualId) {

      + '<div style="font-size:36px;margin-bottom:10px">&#128193;</div>'

// 파트 하나만 인쇄
function printSinglePart(manualId, partId) {
  var m = DATA.manuals.find(function(x){return x.id===manualId;});
  if (!m) return;
  var part = (m.parts||[]).find(function(p){return p.id===partId;});
  if (!part) return;
  var html = '<html><head><meta charset="utf-8"><title>'+esc(part.name)+'</title>'
    + '<style>body{font-family:sans-serif;padding:30px;max-width:720px;margin:0 auto;color:#222}'
    + 'h1{font-size:18px;margin-bottom:4px}.meta{font-size:12px;color:#888;margin-bottom:20px}'
    + '.lbl{font-size:11px;font-weight:bold;color:#666;margin:10px 0 4px}'
    + '.principle{font-size:13px;line-height:1.7;white-space:pre-wrap}'
    + '.cp{font-size:13px;line-height:1.8}.script{font-size:13px;font-style:italic;background:#f5f5f5;padding:8px 10px;border-radius:6px;white-space:pre-wrap}'
    + '.exc{font-size:13px;line-height:1.7;background:#fff8e6;padding:8px 10px;border-radius:6px;margin-bottom:6px}'
    + '</style></head><body>'
    + '<h1>'+esc(part.name)+'</h1>'
    + '<div class="meta">'+esc(m.title)+'</div>'
    + (part.principle?'<div class="principle">'+esc(part.principle)+'</div>':'')
    + (part.checkpoints&&part.checkpoints.length?'<div class="lbl">확인 항목</div><div class="cp">'+part.checkpoints.map(function(c){return '&middot; '+esc(c)+'<br>';}).join('')+'</div>':'')
    + (part.script?'<div class="lbl">실제 사용 멘트</div><div class="script">'+esc(part.script)+'</div>':'')
    + (part.exceptions&&part.exceptions.length?'<div class="lbl">예외 / 특수 케이스</div>'+part.exceptions.map(function(e){return '<div class="exc">'+esc(e)+'</div>';}).join(''):'')
    + '</body></html>';
  var w = window.open('', '_blank');
  if (!w) { showToast('팝업이 차단되었습니다. 팝업 허용 후 다시 시도해주세요.', 'err'); return; }
  w.document.write(html);
  w.document.close();
  setTimeout(function(){ w.print(); }, 300);
}

// 두 매뉴얼 간 유사도 점수 계산 (0~100)
function manualSimilarity(a, b) {
  if (a.id === b.id) return 0;
  var score = 0;

  // 제목 단어 겹침
  var aWords = (a.title||'').split(/\s+/).filter(function(w){return w.length>=2;});
  var bTitle = b.title||'';
  aWords.forEach(function(w){ if (bTitle.indexOf(w)>=0) score += 12; });

  // 태그 겹침
  var aTags = a.tags||[], bTags = b.tags||[];
  var tagOverlap = aTags.filter(function(t){ return bTags.indexOf(t)>=0; }).length;
  score += tagOverlap * 10;

  // 카테고리/세부분류 일치
  if (a.cat === b.cat) score += 8;
  if (a.cat2 && a.cat2 === b.cat2) score += 6;
  if (a.cat3 && a.cat3 === b.cat3) score += 6;

  // 키워드 겹침
  var aKw = a.keywords||[], bKw = b.keywords||[];
  var kwOverlap = aKw.filter(function(k){ return bKw.indexOf(k)>=0; }).length;
  score += kwOverlap * 8;

  // 요약 문장 단어 겹침 (간단 토큰 비교)
  var aSumWords = (a.summary||'').split(/[\s,.]+/).filter(function(w){return w.length>=2;});
  var bSummary = b.summary||'';
  var sumOverlap = aSumWords.filter(function(w){ return bSummary.indexOf(w)>=0; }).length;
  score += Math.min(sumOverlap * 3, 15);

  // steps 문장 겹침 (제목 키워드 기반 약식 비교)
  var aSteps = (a.steps||[]).join(' ');
  var bSteps = (b.steps||[]).join(' ');
  var stepWords = aSteps.split(/[\s,.]+/).filter(function(w){return w.length>=3;});
  var stepOverlap = stepWords.filter(function(w){ return bSteps.indexOf(w)>=0; }).length;
  score += Math.min(stepOverlap * 2, 20);

  return Math.min(Math.round(score), 100);
}

// 전체 매뉴얼 쌍별 중복 검사 (50% 이상만 반환)
function findDuplicateManuals() {
  var pairs = [];
  var manuals = DATA.manuals;
  for (var i = 0; i < manuals.length; i++) {
    for (var j = i+1; j < manuals.length; j++) {
      var score = manualSimilarity(manuals[i], manuals[j]);
      if (score >= 50) {
        pairs.push({ a: manuals[i], b: manuals[j], score: score });
      }
    }
  }
  pairs.sort(function(x,y){ return y.score - x.score; });
  return pairs;
}

var DUP_IGNORED = []; // 세션 내 무시한 쌍 (id1-id2)
var DUP_RESULTS = null;

function dupPairKey(a, b) {
  return [a.id, b.id].sort().join('-');
}

function runDuplicateCheck() {
  DUP_RESULTS = findDuplicateManuals().filter(function(p) {
    return DUP_IGNORED.indexOf(dupPairKey(p.a, p.b)) < 0;
  });
  renderPage('review');
}

function dupIgnorePair(aId, bId) {
  var a = DATA.manuals.find(function(m){return m.id===aId;});
  var b = DATA.manuals.find(function(m){return m.id===bId;});
  if (a && b) DUP_IGNORED.push(dupPairKey(a,b));
  DUP_RESULTS = (DUP_RESULTS||[]).filter(function(p){ return !(p.a.id===aId && p.b.id===bId); });
  renderPage('review');
  showToast('\uc774 \uc30d\uc744 \ubb34\uc2dc\ud588\uc2b5\ub2c8\ub2e4', '');
}

// 변경사항/퀴즈/제보의 manualId 참조를 이전
function reassignManualRefs(oldId, newId) {
  (DATA.changes||[]).forEach(function(c) {
    if (c.affectedManuals && c.affectedManuals.indexOf(oldId) >= 0) {
      c.affectedManuals = c.affectedManuals.map(function(id){ return id===oldId?newId:id; });
      fsSave('changes', c);
    }
  });
  (DATA.quizzes||[]).forEach(function(q) {
    if (q.manualId === oldId) { q.manualId = newId; fsSave('quizzes', q); }
  });
  (DATA.feedback||[]).forEach(function(f) {
    if (f.manualId === oldId) { f.manualId = newId; fsSave('feedback', f); }
  });
}

  if (!key) { showToast('Gemini API \ud0a4\uac00 \ud544\uc694\ud569\ub2c8\ub2e4', 'err'); return; }

  showToast('&#10022; AI\uac00 \ub450 \ub9e4\ub274\uc5bc\uc744 \ud558\ub098\ub85c \ud569\uce58\ub294 \uc911...', '');

  var prompt = '\uc544\ub798 \ub450 \uac1c\uc758 \uc57d\uad6d \uc5c5\ubb34 \ub9e4\ub274\uc5bc\uc740 \ub0b4\uc6a9\uc774 \uacb9\uce69\ub2c8\ub2e4. \uc911\ubcf5\uc744 \uc81c\uac70\ud558\uace0 \ud558\ub098\uc758 \uc644\uc131\ub3c4 \ub192\uc740 \ub9e4\ub274\uc5bc\ub85c \ud569\uccd0\uc8fc\uc138\uc694. \uacb0\uacfc\ub294 \ud30c\ud2b8(\uc18c\ud56d\ubaa9) \ub2e8\uc704\ub85c \uad6c\uc131\ud558\uc138\uc694.\n\n'

// dupMergeManuals의 무음 버전 (토스트/모달 전환 없이 결과만 반환) - 일괄 처리용
async function dupMergeManualsSilent(aId, bId) {
  var a = DATA.manuals.find(function(m){return m.id===aId;});
  var b = DATA.manuals.find(function(m){return m.id===bId;});
  if (!a || !b) return false;

  var key = S.gemKey || localStorage.getItem('gmKey') || '';
  if (!key) return false;

  var prompt = '\uc544\ub798 \ub450 \uac1c\uc758 \uc57d\uad6d \uc5c5\ubb34 \ub9e4\ub274\uc5bc\uc740 \ub0b4\uc6a9\uc774 \uacb9\uce69\ub2c8\ub2e4. \uc911\ubcf5\uc744 \uc81c\uac70\ud558\uace0 \ud558\ub098\uc758 \uc644\uc131\ub3c4 \ub192\uc740 \ub9e4\ub274\uc5bc\ub85c \ud569\uccd0\uc8fc\uc138\uc694. \uacb0\uacfc\ub294 \ud30c\ud2b8(\uc18c\ud56d\ubaa9) \ub2e8\uc704\ub85c \uad6c\uc131\ud558\uc138\uc694.\n\n'
    + '=== \ub9e4\ub274\uc5bc A: ' + a.title + ' ===\n' + manualMergeText(a) + '\n\n'
    + '=== \ub9e4\ub274\uc5bc B: ' + b.title + ' ===\n' + manualMergeText(b) + '\n\n'
    + 'JSON\ub9cc \ubc18\ud658(\ubc31\ud2f1\uc5c6\uc774): {"title":"","parts":[{"name":"","principle":"","checkpoints":[],"script":"","exceptions":[]}],"tags":[]}';

  var result = await callGem(prompt);
  var merged = null;
  if (result) {
    try {
      var clean = result.replace(/```json|```/g,'').trim();
      var m = clean.match(/\{[\s\S]*\}/);
      if (m) merged = JSON.parse(m[0]);
    } catch(e) {}
  }
  if (!merged) return false;

  var nm = buildPartManualObject({
    id: Date.now() + Math.floor(Math.random()*1000),
    title: merged.title || a.title,
    cat: a.cat, cat2: a.cat2 || b.cat2, cat3: a.cat3 || b.cat3,
    keywords: Array.from(new Set((a.keywords||[]).concat(b.keywords||[]).concat(merged.tags||[]))),
    tags: Array.from(new Set((a.tags||[]).concat(b.tags||[]).concat(merged.tags||[]))),
    parts: merged.parts
  });
  nm.views = (a.views||0)+(b.views||0);
  nm.history = (a.history||[]).concat(b.history||[]);

  DATA.manuals.unshift(nm);
  fsSave('manuals', nm);
  reassignManualRefs(aId, nm.id);
  reassignManualRefs(bId, nm.id);
  DATA.manuals = DATA.manuals.filter(function(m){ return m.id !== aId && m.id !== bId; });
  fsDelete('manuals', aId);
  fsDelete('manuals', bId);

  return true;
}

          // 버그5 fix: 정답 표시 제거 (직원 모드에서는 숨김, 관리자는 표시)
          var showAnswer = S.role==='admin';
          return '<div class="qopt" data-qi="'+qi+'" data-oi="'+oi+'" data-ans="'+q.ans+'" onclick="answerQ(this)">'
            +'<div class="qnum">'+(oi+1)+'</div><span>'+opt+'</span>'
            +(showAnswer && oi===q.ans?'<span style="margin-left:auto;font-size:11px;color:var(--ac);font-weight:700">&#10003; 정답</span>':'')
            +'</div>';
        }).join('')+'</div></div>';
    }).join('')
    +'</div>'
    +'<div class="card"><div class="chd"><div class="ctitle">&#128101; 응시 현황</div></div>'
    +DATA.staff.map(function(s){
      var sc = quiz.scores ? quiz.scores[s.id] : null;
      return '<div class="rvi"><div class="ava" style="width:28px;height:28px;font-size:12px">'+s.ava+'</div>'
        +'<div class="rvi-info"><div style="font-size:13px;font-weight:600">'+s.name+'</div></div>'
        +(sc!=null?'<span style="font-weight:700;color:'+(sc>=90?'var(--ac)':'var(--wn)')+'">'+sc+'점</span>':'<span style="font-size:12px;color:var(--t3)">미응시</span>')
        +'</div>';
    }).join('')
    +'</div></div></div>';

function answerQ(el) {
  var qi=parseInt(el.dataset.qi), oi=parseInt(el.dataset.oi), ans=parseInt(el.dataset.ans);
  var container=el.closest('.qopts');
  container.querySelectorAll('.qopt').forEach(function(o){
    var thisOi=parseInt(o.dataset.oi);
    o.classList.remove('correct','wrong');
    if(thisOi===ans) o.classList.add('correct');
    else if(thisOi===oi && oi!==ans) o.classList.add('wrong');
    o.onclick=null;
  });
  // 버그13 fix: 직원 모드에서 퀴즈 점수 저장
  if (S.currentStaff) {
    var staffId = S.currentStaff.id;
    var quiz = DATA.quizzes[0];
    if (quiz) {
      // 첫 번째 퀴즈 기준 점수 계산
      if (!quiz._answers) quiz._answers = {};
      quiz._answers[qi] = oi;
      // 모든 문제 답변 완료 시 점수 기록
      var allAnswered = quiz.questions.every(function(q,i){ return quiz._answers[i] !== undefined; });
      if (allAnswered) {
        var correct = quiz.questions.filter(function(q,i){ return quiz._answers[i]===q.ans; }).length;
        var score = Math.round(correct/quiz.questions.length*100);
        if (!quiz.scores) quiz.scores = {};
        quiz.scores[staffId] = score;
        fsSave('quizzes', quiz);
        showToast('퀴즈 완료! '+score+'점', score>=90?'ok':'');
      }
    }
  }
}

// 유효기간 앱의 teams/{code}/drugs 컬렉션에서 pinned(먼저)된 약품만 가져오기
async function loadPinnedExpiry(callback) {
  var code = localStorage.getItem('expiryTeamCode');
  if (!code || !FB_OK || !db) { if (callback) callback(false, 0); return; }

  try {
    var fs = window._fs;
    var snap = await fs.getDocs(fs.collection(db, 'teams', code, 'drugs'));
    var all = [];
    snap.forEach(function(d) { all.push(Object.assign({ id: d.id }, d.data())); });
    EXPIRY_PINNED = all.filter(function(d){ return d.pinned; })
      .sort(function(a,b){ return new Date(a.exp) - new Date(b.exp); });
    if (callback) callback(true, EXPIRY_PINNED.length);
    if (S.page === 'dashboard') renderPage('dashboard');
  } catch (e) {
    console.warn('\uC720\ud6a8\uae30\uac04 \uc571 \uC5F0\uacb0 \uc2e4\ud328:', e);
    EXPIRY_PINNED = [];
    if (callback) callback(false, 0);
  }
}

function expiryDaysLeft(expDate) {
  var exp = new Date(expDate); exp.setHours(23,59,59,0);
  var now = new Date(); now.setHours(0,0,0,0);
  return Math.ceil((exp - now) / 86400000);
}

// 전체 매뉴얼 Firebase 강제 업로드 (덮어쓰기)
async function forceSyncAllManuals() {
  if (!FB_OK) { showToast('Firebase에 먼저 연결해주세요', 'err'); return; }
  if (!confirm('코드에 들어있는 매뉴얼 ' + SEED_MANUALS.length + '개를 Firebase에 최신 내용으로 모두 업로드하시겠습니까?\n(Firebase에 저장된 해당 매뉴얼들의 기존 내용은 사라집니다. 새로고침 여부와 상관없이 항상 코드 안의 최신 내용 기준으로 업로드됩니다.)')) return;
  showToast('업로드 중...', '');
  var fs = window._fs;
  var ok = 0, fail = 0;
  for (var i = 0; i < SEED_MANUALS.length; i++) {
    var seed = JSON.parse(JSON.stringify(SEED_MANUALS[i]));
    seed.updatedAt = new Date();
    try {
      await fs.setDoc(fs.doc(db, 'pharmacy_manuals', String(seed.id)), toFS(seed));
      // 메모리상의 DATA.manuals도 함께 갱신 (즉시 화면 반영용)
      var idx = DATA.manuals.findIndex(function(m){ return m.id === seed.id; });
      if (idx >= 0) DATA.manuals[idx] = seed; else DATA.manuals.push(seed);
      ok++;
    } catch(e) { fail++; console.warn('업로드 실패:', seed.title); }
  }
  showToast('&#10024; ' + ok + '개 업로드 완료' + (fail ? ' (' + fail + '개 실패)' : ''), 'ok');
  renderPage(S.page);
}

// 콘텐츠 이관용: 코드 안에 보존된 시드 데이터로 특정 매뉴얼 1개만 강제 리셋
// (Firebase의 예전 데이터가 코드 수정사항을 항상 덮어쓰는 문제를 우회)
async function forceResetManualFromSeed() {
  if (!FB_OK) { showToast('Firebase에 먼저 연결해주세요', 'err'); return; }
  var sel = document.getElementById('seedResetSel');
  if (!sel) return;
  var targetId = Number(sel.value);
  var seed = SEED_MANUALS.find(function(m){ return m.id === targetId; });
  if (!seed) { showToast('해당 매뉴얼을 코드에서 찾을 수 없습니다', 'err'); return; }
  if (!confirm('"'+seed.title+'" 매뉴얼을 코드 안의 최신 내용으로 완전히 덮어쓰시겠습니까?\n(현재 Firebase에 저장된 이 매뉴얼의 내용은 사라집니다)')) return;
  var fresh = JSON.parse(JSON.stringify(seed));
  fresh.updatedAt = new Date();
  fresh.views = 0;
  fresh.history = [];
  try {
    var fs = window._fs;
    await fs.setDoc(fs.doc(db, 'pharmacy_manuals', String(targetId)), toFS(fresh));
    // 메모리상의 DATA.manuals도 즉시 갱신
    var idx = DATA.manuals.findIndex(function(m){ return m.id === targetId; });
    if (idx >= 0) DATA.manuals[idx] = fresh; else DATA.manuals.push(fresh);
    showToast('&#10024; "'+seed.title+'" 매뉴얼이 최신 내용으로 갱신되었습니다', 'ok');
    renderPage(S.page);
  } catch(e) {
    console.error(e);
    showToast('갱신 실패: '+e.message, 'err');
  }
}

}

// 중요 변경사항: 숙지 확인 모달 (간단 체크 질문 1개 포함)
async function openCriticalConfirm(changeId) {
  var c = DATA.changes.find(function(x){ return x.id===changeId; });
  if (!c) return;

  openMod('&#9888;&#65039; 숙지 확인',
    '<div style="text-align:center;padding:10px 0">'
    + '<div class="ai-spin" style="margin:0 auto 14px"></div>'
    + '<div style="font-size:13px;color:var(--t3)">\ud655\uc778 \uc9c8\ubb38\uc744 \uc900\ube44\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4...</div>'
    + '</div>', '');

  // AI로 변경사항 기반 간단 OX/객관식 질문 생성 (실패 시 기본 질문 사용)
  var key = S.gemKey || localStorage.getItem('gmKey') || '';
  var question = null;
  if (key) {
    var prompt = '\ub2e4\uc74c \uc57d\uad6d \uc5c5\ubb34 \ubcc0\uacbd\uc0ac\ud56d\uc744 \uc9c1\uc6d0\uc774 \uc81c\ub300\ub85c \uc219\uc9c0\ud588\ub294\uc9c0 \ud655\uc778\ud558\ub294 \uac04\ub2e8\ud55c \uac1d\uad00\uc2dd \ubb38\uc81c 1\uac1c\ub97c \ub9cc\ub4e4\uc5b4\uc8fc\uc138\uc694.\n'
      + '\ubcc0\uacbd\uc0ac\ud56d: ' + c.title + '\n\ubcc0\uacbd \uc804: ' + c.before + '\n\ubcc0\uacbd \ud6c4: ' + c.after + '\n\n'
      + 'JSON\ub9cc \ubc18\ud658(\ubc31\ud2f1\uc5c6\uc774): {"q":"\uc9c8\ubb38","opts":["\ubcf4\uae301","\ubcf4\uae302","\ubcf4\uae303"],"ans":0}';
    var result = await callGem(prompt);
    if (result) {
      try {
        var clean = result.replace(/```json|```/g,'').trim();
        var m = clean.match(/\{[\s\S]*\}/);
        if (m) question = JSON.parse(m[0]);
      } catch(e) {}
    }
  }

  // AI 실패 시 기본 질문(변경 후 내용 그대로 보여주고 정답 인지)
  if (!question || !question.opts || question.opts.length < 2) {
    question = {
      q: '\ubcc0\uacbd\ub41c \ub0b4\uc6a9\uc73c\ub85c \uc62c\ubc14\ub978 \uac83\uc740?',
      opts: [c.after, c.before || '\uc774\uc804\uacfc \ub3d9\uc77c\ud568'],
      ans: 0
    };
  }

  CRITICAL_CONFIRM = { changeId: changeId, question: question, selected: null };
  renderCriticalConfirmModal();
}

var CRITICAL_CONFIRM = null;

function renderCriticalConfirmModal() {
  var cc = CRITICAL_CONFIRM;
  if (!cc) return;
  var c = DATA.changes.find(function(x){ return x.id===cc.changeId; });
  if (!c) return;

  var body = '<div>'
    + '<div style="background:var(--dn-l);border-radius:var(--rs);padding:12px 14px;margin-bottom:14px">'
    + '<div style="font-size:13px;font-weight:700;margin-bottom:6px">' + c.title + '</div>'
    + '<div class="diff"><div class="db"><div class="dlbl">\ubcc0\uacbd \uc804</div>' + c.before + '</div>'
    + '<div class="da"><div class="dlbl">\ubcc0\uacbd \ud6c4</div>' + c.after + '</div></div>'
    + '</div>'
    + '<div style="font-size:13px;font-weight:700;margin-bottom:10px">&#10067; ' + cc.question.q + '</div>'
    + cc.question.opts.map(function(opt, i) {
        var sel = cc.selected === i;
        return '<div onclick="CRITICAL_CONFIRM.selected=' + i + ';renderCriticalConfirmModal()" style="padding:11px 14px;border:1.5px solid ' + (sel?'var(--pr)':'var(--bd)') + ';background:' + (sel?'var(--pr-l)':'transparent') + ';border-radius:var(--rs);margin-bottom:8px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:8px">'
          + '<span style="width:18px;height:18px;border-radius:50%;border:2px solid ' + (sel?'var(--pr)':'var(--bd)') + ';display:inline-flex;align-items:center;justify-content:center;flex-shrink:0">' + (sel?'<span style="width:9px;height:9px;border-radius:50%;background:var(--pr)"></span>':'') + '</span>'
          + opt + '</div>';
      }).join('')
    + '</div>';

  var foot = '<button class="btn bs" onclick="closeMod()">\ub098\uc911\uc5d0</button>'
    + '<button class="btn bp" ' + (cc.selected===null?'disabled':'') + ' onclick="submitCriticalConfirm()">\uc81c\ucd9c</button>';

  var bodyEl = document.getElementById('mBody');
  var footEl = document.getElementById('mFoot');
  if (bodyEl) bodyEl.innerHTML = body;
  if (footEl) footEl.innerHTML = foot;
}

function submitCriticalConfirm() {
  var cc = CRITICAL_CONFIRM;
  if (!cc || cc.selected === null) return;
  var correct = cc.selected === cc.question.ans;

  if (correct) {
    staffConfirmRead(cc.changeId);
    closeMod();
    showToast('&#10003; \uc219\uc9c0 \ud655\uc778 \uc644\ub8cc!', 'ok');
  } else {
    showToast('\ub2e4\uc2dc \ud55c\ubc88 \ud655\uc778\ud574\uc8fc\uc138\uc694', 'err');

function startSimFromSel() {
  var sel = document.getElementById('simManualSel');

function startSim(manualId) {
  if (!manualId) return;
  SIM.manualId = parseInt(manualId);
  var m = DATA.manuals.find(function(x){return x.id===SIM.manualId;});
  if (!m) return;
  var scenario = m.warnings[0] || m.checklist[0] || '제품 불만';
  SIM.msgs = [{role:'ai', text:'안녕하세요! 저는 '+m.title+' 관련으로 문의 드립니다. 궁금한 점이 있어서요. 상황: "'+scenario+'" 에 대해 직원분한테 문의하려고 하는데 맞나요?'}];
  renderPage('ai-sim');
  setTimeout(function(){ var c=document.getElementById('simChat'); if(c) c.scrollTop=c.scrollHeight; var inp=document.getElementById('simInput'); if(inp) inp.focus(); },80);
}

async function sendSim() {
  var inp = document.getElementById('simInput');
  var text = inp ? inp.value.trim() : '';
  if (!text || SIM.busy) return;
  if (!S.gemKey && !localStorage.getItem('gmKey')) {
    // 버그12 fix: API키 없으면 명확한 안내
    showToast('⚠️ Gemini API 키를 먼저 설정해주세요 (설정 메뉴)','err');
    return;
  }
  var m = DATA.manuals.find(function(x){return x.id===SIM.manualId;});
  if (!m) return;

  // 버그3 fix: input 값 먼저 지우고 메시지 추가
  inp.value = '';
  SIM.msgs.push({role:'user', text:text});
  SIM.busy = true;

  // DOM만 업데이트 (전체 재렌더링 없음)
  var chatEl = document.getElementById('simChat');
  if (chatEl) {
    var userDiv = document.createElement('div');
    userDiv.className = 'sim-msg user';
    userDiv.innerHTML = '<div class="sim-bubble">'+text+'</div>'
      +'<div class="ava" style="width:28px;height:28px;font-size:12px;flex-shrink:0;background:linear-gradient(135deg,var(--ac),#6B8EF5)">'+(S.currentStaff?S.currentStaff.ava:'우')+'</div>';
    chatEl.appendChild(userDiv);
    var thinkDiv = document.createElement('div');
    thinkDiv.className='sim-msg ai'; thinkDiv.id='simThinking';
    thinkDiv.innerHTML='<div class="ava" style="width:28px;height:28px;font-size:12px;flex-shrink:0">&#129302;</div><div class="sim-bubble" style="color:var(--t3)">&#8943;</div>';
    chatEl.appendChild(thinkDiv);
    chatEl.scrollTop = chatEl.scrollHeight;
    // 입력 비활성화
    var sendBtn = inp.nextElementSibling;
    inp.disabled=true; if(sendBtn) sendBtn.disabled=true;
  }

  var prompt = '당신은 약국의 조금 어려운 고객 역할입니다. 1-2문장으로 간결하게 응답하세요.\n매뉴얼: '+m.title+'\n매뉴얼 요약: '+manualSummaryText(m)+'\n직원 응답: "'+text+'"\n이에 대해 어려운 고객 역할로 답하세요.';
  var resp = await callGem(prompt);
  SIM.busy = false;
  var replyText = resp || ('아, 그렇군요. 혼란스럽지만 고객입장에서 생각해보면 일리가 있는 요쫐이라고 생각합니다. 더 자세한 안내를 부탁드립니다!');
  SIM.msgs.push({role:'ai', text:replyText});

  if (chatEl) {
    var tk = document.getElementById('simThinking');
    if (tk) tk.remove();
    var aiDiv = document.createElement('div');
    aiDiv.className='sim-msg ai';
    aiDiv.innerHTML='<div class="ava" style="width:28px;height:28px;font-size:12px;flex-shrink:0">&#129302;</div><div class="sim-bubble">'+replyText+'</div>';
    chatEl.appendChild(aiDiv);
    chatEl.scrollTop=chatEl.scrollHeight;
    inp.disabled=false;
    var sendBtn2=inp.nextElementSibling; if(sendBtn2) sendBtn2.disabled=false;
    inp.focus();
  }
}

function openAddCatModal() {
  openMod('카테고리 추가',
    '<div><div class="fg"><div class="fl">이름</div><input class="fi" id="nc-name" placeholder="예: 주사제"></div>'
    +'<div class="fg"><div class="fl">이모지</div><input class="fi" id="nc-emoji" placeholder="예: &#128137;" maxlength="2"></div></div>',
    '<button class="btn bs" onclick="closeMod()">취소</button>'
    +'<button class="btn bp" onclick="addCat()">추가</button>');
}

function addCat() {
  var name=document.getElementById('nc-name').value.trim();
  var emoji=document.getElementById('nc-emoji').value.trim()||'&#128196;';
  if(!name){showToast('이름을 입력해주세요','err');return;}
  var newCat={id:'c'+Date.now(),emoji:emoji,name:name};
  DATA.cats.push(newCat);
  fsSave('cats', newCat);
  closeMod();showToast('카테고리가 추가되었습니다!','ok');go('cat-manage');
}

function openEditCatModal(idx) {
  var c=DATA.cats[idx];if(!c)return;
  openMod('카테고리 수정',
    '<div><div class="fg"><div class="fl">이름</div><input class="fi" id="ec-name" value="'+esc(c.name)+'"></div>'
    +'<div class="fg"><div class="fl">이모지</div><input class="fi" id="ec-emoji" value="'+c.emoji+'" maxlength="2"></div></div>',
    '<button class="btn bs" onclick="closeMod()">취소</button>'
    +'<button class="btn bp" onclick="saveCat('+idx+')">저장</button>');
}

function saveCat(idx) {
  var c=DATA.cats[idx];if(!c)return;
  var newName=document.getElementById('ec-name').value.trim();
  var newEmoji=document.getElementById('ec-emoji').value.trim()||c.emoji;
  if(!newName){showToast('이름을 입력해주세요','err');return;}
  if(newName!==c.name) DATA.manuals.forEach(function(m){if(m.cat===c.name)m.cat=newName;});
  DATA.cats[idx].name=newName; DATA.cats[idx].emoji=newEmoji;
  fsSave('cats', DATA.cats[idx]);
  closeMod();showToast('저장되었습니다!','ok');go('cat-manage');
}

function deleteCat(idx) {
  var c=DATA.cats[idx];
  if(!c||!confirm(c.name+' 카테고리를 삭제하시겠습니까?'))return;
  fsDelete('cats', c.id);
  DATA.cats.splice(idx,1);
  showToast('삭제되었습니다','ok');go('cat-manage');
}

// 파트형 문서 본문 렌더링 (목차 + 파트별 섹션)
function buildPartsBody(m) {
  var parts = m.parts || [];
  var toc = '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px">'
    + parts.map(function(p, i) {
        return '<a href="#mpart-'+p.id+'" onclick="event.preventDefault();document.getElementById(\'mpart-'+p.id+'\').scrollIntoView({behavior:\'smooth\',block:\'start\'})" '
          + 'style="font-size:12px;padding:5px 10px;border-radius:14px;border:1px solid var(--bd);color:var(--t2);text-decoration:none;background:var(--s2)">'
          + (i+1)+'. '+esc(p.name)
          + (p.changeLog&&p.changeLog.length?' <span style="color:var(--pr);font-weight:700">&middot;'+p.changeLog.length+'</span>':'')
          + '</a>';
      }).join('')
    + '</div>';

  var sections = parts.map(function(p, i) {
    var hasRecentChange = p.changeLog && p.changeLog.length > 0;
    return '<div id="mpart-'+p.id+'" style="margin-bottom:28px;padding:16px 18px;border-left:3px solid '+(hasRecentChange?'var(--pr)':'var(--bd)')+';background:'+(hasRecentChange?'var(--pr-l)':'transparent')+';border-radius:0 var(--rs) var(--rs) 0">'
      + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'
      + '<div style="font-size:15px;font-weight:700;color:'+(hasRecentChange?'var(--pr)':'var(--t1)')+'">'+(i+1)+'. '+esc(p.name)+'</div>'
      + (hasRecentChange?'<span style="font-size:11px;background:var(--bg);color:var(--pr);padding:2px 8px;border-radius:10px;border:1px solid var(--pr)">최근 변경 '+p.changeLog.length+'건</span>':'')
      + '</div>'
      + (p.principle ? '<div style="font-size:13px;line-height:1.7;color:var(--t1);margin-bottom:14px;white-space:pre-wrap">'+esc(p.principle)+'</div>' : '')
      + (p.checkpoints && p.checkpoints.length
          ? '<div style="font-size:12px;font-weight:700;color:var(--t2);margin-bottom:6px">&#128221; 확인 항목</div>'
            +'<div style="font-size:13px;line-height:1.9;color:var(--t1);margin-bottom:14px">'
            +p.checkpoints.map(function(c){return '<div>&middot; '+esc(c)+'</div>';}).join('')
            +'</div>'
          : '')
      + (p.script
          ? '<div style="font-size:12px;font-weight:700;color:var(--t2);margin-bottom:6px">&#128172; 실제 사용 멘트</div>'
            +'<div style="background:var(--s2);border-radius:var(--rs);padding:10px 12px;font-size:13px;font-style:italic;color:var(--t1);margin-bottom:14px;white-space:pre-wrap">'+esc(p.script)+'</div>'
          : '')
      + (p.exceptions && p.exceptions.length
          ? '<div style="font-size:12px;font-weight:700;color:var(--wn);margin-bottom:6px">&#9888;&#65039; 예외 / 특수 케이스</div>'
            +'<div style="background:var(--wn-l);border-radius:var(--rs);padding:10px 12px">'
            +p.exceptions.map(function(e){return '<div style="font-size:13px;line-height:1.7;color:var(--t1);margin-bottom:8px">'+esc(e)+'</div>';}).join('')
            +'</div>'
          : '')
      + '</div>';
  }).join('');

  return toc + sections;
}

// 파트형 매뉴얼 인쇄 (새 창으로 깨끗한 문서 출력)

// 인쇄 공용 스타일

  + '.principle{font-size:13px;line-height:1.7;white-space:pre-wrap}'
  + '.cp{font-size:13px;line-height:1.8}.script{font-size:13px;font-style:italic;background:#f5f5f5;padding:8px 10px;border-radius:6px;white-space:pre-wrap}'

// 매뉴얼 1개(파트형/카드형 모두 지원)를 인쇄용 HTML 섹션으로 변환
function buildManualPrintSection(m, idx) {
  var hasParts = m.parts && m.parts.length;
  var head = '<div class="doc-h">'+(idx?idx+'. ':'')+esc(m.title)+'</div>'
    + '<div class="doc-meta">'+esc(m.cat)+(m.cat2?' / '+esc(m.cat2):'')+'</div>';
  if (hasParts) {
    return '<div class="doc">' + head
      + m.parts.map(function(p,i){
          return '<div class="part"><div class="part-t">'+(i+1)+'. '+esc(p.name||'')+'</div>'
            + (p.principle?'<div class="principle">'+esc(p.principle)+'</div>':'')
            + (p.checkpoints&&p.checkpoints.length?'<div class="lbl">확인 항목</div><div class="cp">'+p.checkpoints.map(function(c){return '&middot; '+esc(c)+'<br>';}).join('')+'</div>':'')
            + (p.script?'<div class="lbl">실제 사용 멘트</div><div class="script">'+esc(p.script)+'</div>':'')
            + (p.exceptions&&p.exceptions.length?'<div class="lbl">예외 / 특수 케이스</div>'+p.exceptions.map(function(e){return '<div class="exc">'+esc(e)+'</div>';}).join(''):'')
            + '</div>';
        }).join('')
      + '</div>';
  }
  // 카드형(레거시) 매뉴얼
  return '<div class="doc">' + head
    + (m.summary?'<div class="lbl">한줄 핵심</div><div class="legacy">'+esc(m.summary)+'</div>':'')
    + (m.steps&&m.steps.length?'<div class="lbl">단계별 절차</div><div class="legacy">'+m.steps.map(function(s){return '&middot; '+esc(s)+'<br>';}).join('')+'</div>':'')
    + (m.customerScript?'<div class="lbl">고객에게 말할 멘트</div><div class="script">'+esc(m.customerScript)+'</div>':'')
    + (m.warnings&&m.warnings.length?'<div class="lbl">주의사항</div><div class="legacy">'+m.warnings.map(function(w){return '<div class="exc">'+esc(w)+'</div>';}).join('')+'</div>':'')
    + (m.checklist&&m.checklist.length?'<div class="lbl">체크리스트</div><div class="legacy">'+m.checklist.map(function(c){return '&middot; '+esc(c)+'<br>';}).join('')+'</div>':'')
    + '</div>';
}

// 새 창 띄우고 인쇄 (팝업 차단 시 안내)
function openPrintWindow(html) {
  var w = window.open('', '_blank');
  if (!w) { showToast('팝업이 차단되었습니다. 팝업 허용 후 다시 시도해주세요.', 'err'); return; }
  w.document.write(html);
  w.document.close();
  setTimeout(function(){ w.print(); }, 300);
}

// 카테고리 전체 인쇄 (해당 카테고리에 속한 모든 매뉴얼을 한 문서로)
function printCategoryManuals(catName) {
  var list = DATA.manuals.filter(function(m){ return m.cat===catName; });
  if (!list.length) { showToast('이 카테고리에 매뉴얼이 없습니다', 'err'); return; }
  var toc = '<div class="toc"><div class="toc-t">'+esc(catName)+' 매뉴얼 모음 ('+list.length+'건)</div>'
    + list.map(function(m,i){ return (i+1)+'. '+esc(m.title)+'<br>'; }).join('') + '</div>';
  var html = '<html><head><meta charset="utf-8"><title>'+esc(catName)+' 매뉴얼 모음</title>'
    + '<style>'+PRINT_CSS+'</style></head><body>'
    + toc
    + list.map(function(m,i){ return buildManualPrintSection(m, i+1); }).join('')
    + '</body></html>';
  openPrintWindow(html);
}

// 전체 매뉴얼 인쇄 (모든 카테고리, 모든 매뉴얼을 카테고리 순서대로 한 문서로)
function printAllManuals() {
  if (!DATA.manuals.length) { showToast('인쇄할 매뉴얼이 없습니다', 'err'); return; }
  if (!confirm('전체 매뉴얼 ' + DATA.manuals.length + '개를 한 번에 인쇄하시겠습니까?\n분량이 많아 다소 시간이 걸릴 수 있습니다.')) return;
  var grouped = getGroupedManuals();
  var orderedCats = DATA.cats.map(function(c){ return c.name; });
  var allList = [];
  orderedCats.forEach(function(catName){
    (grouped[catName]||[]).forEach(function(m){ allList.push(m); });
  });
  var toc = '<div class="toc"><div class="toc-t">전체 매뉴얼 목차 ('+allList.length+'건)</div>'
    + orderedCats.map(function(catName){
        var list = grouped[catName]||[];
        if (!list.length) return '';
        return '<div style="margin-top:10px;font-weight:bold">'+esc(catName)+'</div>'
          + list.map(function(m){ return '&middot; '+esc(m.title)+'<br>'; }).join('');
      }).join('') + '</div>';
  var html = '<html><head><meta charset="utf-8"><title>전체 매뉴얼 모음</title>'
    + '<style>'+PRINT_CSS+'</style></head><body>'
    + toc
    + allList.map(function(m,i){ return buildManualPrintSection(m, i+1); }).join('')
    + '</body></html>';

// 관리자: 직원 댓글을 AI로 변경사항(after) 내용에 반영 제안
async function reflectCommentToChange(changeId, commentIdx) {
  var c = DATA.changes.find(function(x){ return x.id===changeId; });
  if (!c) return;
  var comment = (c.comments||[])[commentIdx];
  if (!comment) return;

  var key = S.gemKey || localStorage.getItem('gmKey') || '';
  if (!key) { showToast('AI 반영을 위해서는 설정에서 Gemini API 키를 등록해주세요', 'err'); return; }

  showToast('&#10022; AI가 반영 내용을 작성 중입니다...', '');
  var prompt = '약국 업무 변경사항에 직원이 남긴 댓글을 반영하려 합니다.\n변경사항 제목: '+c.title
    + '\n현재 내용: '+(c.after||'')
    + '\n\n직원 댓글: '+comment.text
    + '\n\n[작성 규칙] 현재 내용을 그대로 유지한 상태에서 댓글의 새로운 정보만 자연스럽게 덧붙이세요. 절대로 기존 문장을 삭제하거나 요약하거나 축약하지 마세요. 댓글 내용이 기존 내용과 사실상 100% 동일할 때만 중복 문장을 자연스럽게 하나로 합치고, 그 외에는 모두 추가만 하세요.'
    + '\n\n갱신된 전체 내용만 답하세요. 다른 설명이나 따옴표 없이 텍스트만 출력하세요.';
  var result = await callGem(prompt);
  if (!result) { showToast('AI 응답을 받지 못했습니다', 'err'); return; }

  _pendingChgCommentUpdate = { changeId: c.id, commentIdx: commentIdx, newAfter: result.trim() };

  openMod('&#10022; 댓글 반영 제안',
    '<div>'
    +'<div style="font-size:13px;color:var(--t2);margin-bottom:10px">직원 댓글: <strong>'+esc(comment.text)+'</strong> ('+esc(comment.author)+')</div>'
    +'<div class="diff" style="margin-bottom:10px">'
    +'<div class="db"><div class="dlbl">변경 전 (현재 내용)</div>'+esc(c.after||'(내용 없음)')+'</div>'
    +'<div class="da"><div class="dlbl">변경 후 (적용 시 대체될 내용)</div>'
    +'<textarea id="chgCommentApplyTa" class="fi" rows="8" style="font-size:13px;line-height:1.6;width:100%;resize:vertical" oninput="_pendingChgCommentUpdate.newAfter=this.value">'+esc(result.trim())+'</textarea>'
    +'</div></div>'
    +'</div>',
    '<button class="btn bs" onclick="closeMod();_pendingChgCommentUpdate=null">나중에</button>'
    +'<button class="btn bp" onclick="applyChgCommentUpdate()">&#10003; 지금 반영</button>');
}

var _pendingChgCommentUpdate = null;

async function applyChgCommentUpdate() {
  if (!_pendingChgCommentUpdate) return;
  var c = DATA.changes.find(function(x){ return x.id===_pendingChgCommentUpdate.changeId; });
  if (!c) { closeMod(); _pendingChgCommentUpdate=null; return; }
  c.after = _pendingChgCommentUpdate.newAfter;
  if (c.comments && c.comments[_pendingChgCommentUpdate.commentIdx]) {
    c.comments[_pendingChgCommentUpdate.commentIdx].applied = true;
  }
  closeMod();
  showToast('&#10003; 변경사항에 반영되었습니다!', 'ok');
  await fsSave('changes', c);
  _pendingChgCommentUpdate = null;
  renderPage(S.page);
}

// 관리자: 직원 코멘트를 AI로 매뉴얼 본문에 반영 제안
async function reflectCommentToManual(manualId, commentIdx) {
  var m = DATA.manuals.find(function(x){return x.id===manualId;});
  if (!m) return;
  var comment = (m.comments||[])[commentIdx];

      +'</div>',

      +'<button class="btn bp" onclick="applyCommentUpdate()">&#10003; 지금 반영</button>');

async function suggestPartUpdateFromComment(comment, m, commentIdx) {
  var partList = m.parts.map(function(p,i){ return (i+1)+'. '+p.name+'\n   기존 원칙: '+(p.principle||'없음'); }).join('\n\n');
  var prompt = '약국 매뉴얼에 직원이 남긴 현장 코멘트를 반영하려 합니다. 아래는 "'+m.title+'" 문서의 파트 목록과 각 파트의 전체 원칙 내용입니다.\n\n'+partList
    + '\n\n직원 코멘트: '+comment.text
    + '\n\n[파트 선택 규칙] 위 파트들 중 이 코멘트와 내용상 가장 직접적으로 관련된 파트 하나만 정확히 골라주세요. 막연히 비슷하거나 카테고리만 같다는 이유로 고르지 말고, 코멘트가 실제로 설명하는 업무·상황과 가장 밀접하게 일치하는 파트를 선택하세요. 애매하면 가장 구체적으로 일치하는 파트를 우선하세요.'
    + '\n\n[내용 작성 규칙] 선택한 파트의 "기존 원칙" 전체 텍스트를 그대로 유지한 상태에서, 코멘트의 새로운 정보만 자연스럽게 덧붙이세요. 절대로 기존 문장을 삭제하거나 요약하거나 축약하지 마세요. 기존 내용과 코멘트 내용이 사실상 동일한 내용(100% 중복)일 때만 중복된 문장을 자연스럽게 하나로 합치고, 그 외의 모든 경우는 추가만 하세요. 결과 텍스트의 길이는 기존 원칙보다 짧아져서는 안 됩니다.'
    + '\n\n다음 JSON 형식으로만 답하세요. 다른 설명 없이 JSON만:\n{"partIndex": 숫자(1부터 시작), "updatedPrinciple": "갱신된 기본 원칙 전체 텍스트"}';
  var result = await callGem(prompt);
  if (!result) { showToast('AI 응답을 받지 못했습니다', 'err'); return; }
  var parsed;
  try {
    var cleaned = result.trim().replace(/^```json\s*|```$/g, '');
    parsed = JSON.parse(cleaned);
  } catch(e) { showToast('AI 응답 해석에 실패했습니다', 'err'); return; }
  if (!parsed || typeof parsed.partIndex !== 'number') { showToast('AI 응답 형식이 올바르지 않습니다', 'err'); return; }
  var idx = parsed.partIndex - 1;
  var part = m.parts[idx];
  if (!part) { showToast('해당 파트를 찾을 수 없습니다', 'err'); return; }

  _pendingAutoUpdate.manualId = m.id;
  _pendingAutoUpdate.partId = part.id;
  _pendingAutoUpdate.summary = (parsed.updatedPrinciple||'').trim();
  _pendingAutoUpdate.commentIdx = commentIdx;

  openMod('&#10022; 코멘트 반영 제안',
    '<div>'
    +'<div style="font-size:13px;color:var(--t2);margin-bottom:10px">직원 코멘트: <strong>'+esc(comment.text)+'</strong> ('+esc(comment.author)+')</div>'
    +'<div style="font-size:12px;color:var(--t3);margin-bottom:6px">매뉴얼: '+esc(m.title)+' &middot; 파트: <strong>'+esc(part.name)+'</strong></div>'
    +'<div style="background:var(--pr-l);border-radius:var(--rs);padding:12px;font-size:13px;color:var(--pr);margin-bottom:12px;white-space:pre-wrap">'+esc(_pendingAutoUpdate.summary)+'</div>'

  var m = DATA.manuals.find(function(x){return x.id===manualId;});

  } else {

  m.updatedAt = new Date();

function restoreVersion(manualId, revIdx) {
  var m = DATA.manuals.find(function(x){return x.id===manualId;});
  if (!m || !m.history) return;
  var rev = m.history.slice().reverse()[revIdx];
  if (!rev || !confirm('v'+(m.history.length-revIdx)+' 버전으로 되돌리시겠습니까?')) return;

  m.customerScript=rev.customerScript; m.warnings=rev.warnings; m.checklist=rev.checklist;

function backupManualVersion(m) {
  if (!m.history) m.history=[];
  m.history.push({
    date:fmtDate(new Date(m.updatedAt||Date.now())),
    by:localStorage.getItem('adminName')||'관리자',
    title:m.title, summary:m.summary, steps:[].concat(m.steps||[]),
    customerScript:m.customerScript, warnings:[].concat(m.warnings||[]),
    checklist:[].concat(m.checklist||[]),
    parts: m.parts ? JSON.parse(JSON.stringify(m.parts)) : undefined
  });
  // 최대 10개 유지
  if (m.history.length>10) m.history=m.history.slice(-10);
}

// 카톡 대화 정리
function cleanKakaoText(raw) {
  var lines = raw.split('\n').map(function(l){ return l.trim(); }).filter(Boolean);
  var cleaned = [];
  lines.forEach(function(line) {
    // 날짜/시간 헤더 제거
    if (/^\d{4}\.\d{1,2}\.\d{1,2}/.test(line)) return;
    if (/^-{3,}/.test(line)) return;
    // 카톡 형식 [이름] [오후 H:MM] 텍스트 파싱
    var m = line.match(/^\[(.+?)\]\s*\[(?:오전|오후)\s*\d+:\d+\]\s*(.*)/);
    var text = m ? m[2] : line;
    // 이름: 내용 형식
    var m2 = text.match(/^(.{1,10}):\s*(.*)/);
    if (m2) text = m2[2];
    text = text.trim();
    if (!text) return;
    // 무시 패턴 체크
    var ignored = INBOX_IGNORE_PATTERNS.some(function(p){ return p.test(text); });
    if (!ignored && text.length >= 5) cleaned.push(text);
  });
  return cleaned;
}

// 중요 문장 1차 추출
function extractImportantSentences(lines) {
  var important = [];
  var normal = [];
  lines.forEach(function(line) {
    var score = 0;
    INBOX_KEYWORDS.forEach(function(kw) {
      if (line.indexOf(kw) >= 0) score++;
    });
    if (score > 0) important.push({ text: line, score: score });
    else normal.push(line);
  });
  important.sort(function(a,b){ return b.score - a.score; });
  return { important: important.map(function(x){ return x.text; }), normal: normal };
}

// 느슨한 매뉴얼 후보 추리기: 정확도보다 누락 방지가 우선.
// 키워드/태그/카테고리 중 하나라도 겹치면 포함, 완전 무관한 것만 제외.
// AI에게는 이 후보들의 "제목만" 전달해 최종 의미 판단을 맡긴다.
function getLooseManualCandidates(text, cat) {
  var lowerText = (text || '').toLowerCase();
  var candidates = [];

  DATA.manuals.forEach(function(m) {
    var hit = false;

    // 카테고리 일치 (가장 흔한 접점)
    if (cat && m.cat === cat) hit = true;

    // 제목 단어가 입력 텍스트에 등장
    if (!hit) {
      var titleWords = (m.title || '').split(/\s+/).filter(function(w){ return w.length >= 2; });
      hit = titleWords.some(function(w){ return lowerText.indexOf(w.toLowerCase()) >= 0; });
    }

    // 태그가 입력 텍스트에 등장
    if (!hit) {
      hit = (m.tags || []).some(function(t){ return t.length >= 2 && lowerText.indexOf(t.toLowerCase()) >= 0; });
    }

    // 키워드가 입력 텍스트에 등장
    if (!hit) {
      hit = (m.keywords || []).some(function(k){ return k.length >= 2 && lowerText.indexOf(k.toLowerCase()) >= 0; });
    }

    // cat2/cat3 세부분류가 입력 텍스트에 등장
    if (!hit && m.cat3) hit = lowerText.indexOf(m.cat3.toLowerCase()) >= 0;
    if (!hit && m.cat2) hit = lowerText.indexOf(m.cat2.toLowerCase()) >= 0;

    if (hit) candidates.push(m);
  });

  return candidates;
}

// 텍스트와 관련된 기존 변경사항 후보 찾기 (최근 60일, 제목 단어 매칭)
function getRelatedChanges(text) {
  var lowerText = (text || '').toLowerCase();
  var cutoff = Date.now() - 60 * 24 * 60 * 60 * 1000; // 60일
  var results = [];
  (DATA.changes || []).forEach(function(c) {
    if (new Date(c.createdAt).getTime() < cutoff) return;
    var titleWords = (c.title || '').split(/\s+/).filter(function(w){ return w.length >= 2; });
    var hit = titleWords.some(function(w){ return lowerText.indexOf(w.toLowerCase()) >= 0; });
    if (!hit) {
      // after 내용도 검색
      var afterWords = (c.after || '').split(/\s+/).filter(function(w){ return w.length >= 2; });
      hit = afterWords.some(function(w){ return lowerText.indexOf(w.toLowerCase()) >= 0; });
    }
    if (hit) results.push(c);
  });
  // 최신순 최대 10건
  return results.sort(function(a,b){ return new Date(b.createdAt)-new Date(a.createdAt); }).slice(0, 10);
}

// 기존 매뉴얼과 유사도 비교
function compareWithManuals(title, tags, cat) {
  var best = null, bestScore = 0;
  DATA.manuals.forEach(function(m) {
    var score = 0;
    // 제목 유사도
    var titleWords = (title||'').split(/\s+/);
    titleWords.forEach(function(w) { if (w.length>=2 && m.title.indexOf(w)>=0) score+=20; });
    // 태그 유사도
    (tags||[]).forEach(function(t) { if ((m.tags||[]).indexOf(t)>=0) score+=15; });
    // 카테고리
    if (cat && m.cat === cat) score += 10;
    if (score > bestScore) { bestScore = score; best = m; }
  });
  return { manual: best, score: bestScore };
}

// 매뉴얼의 대표 요약 텍스트 (카드형은 summary, 파트형은 summary가 비어있으므로 파트 목록으로 대체)
function manualSummaryText(m) {
  if (!m) return '';
  if (m.summary) return m.summary;
  if (m.parts && m.parts.length) return '['+m.parts.length+'\uD30C\uD2B8] ' + m.parts.map(function(p){return p.name;}).join(', ');
  return '';
}

// AI/사용자 입력으로부터 파트형 매뉴얼 객체를 표준 형태로 생성
// rawParts: [{name,principle,checkpoints,script,exceptions}, ...] (AI 응답 그대로 와도 됨, 필드 누락 허용)
function buildPartManualObject(opts) {

      changeLog: [],

    keywords: opts.keywords || [],
    tags: opts.tags || [],
    summary: '', steps: [], customerScript: '', warnings: [], checklist: [],
    parts: parts,
    updatedAt: new Date(), views: 0, history: []
  };
}

function parseInboxAnalysisResult(result) {
  if (!result) return null;
  try {
    var clean = result.replace(/```json|```/g,'').trim();
    var m = clean.match(/\{[\s\S]*\}/);
    if (!m) return null;
    var parsed = JSON.parse(m[0]);
    // inbox에서는 newManuals를 모두 changes로 강제 이동
    if (parsed.newManuals && parsed.newManuals.length) {
      if (!parsed.changes) parsed.changes = [];
      parsed.newManuals.forEach(function(nm) {
        parsed.changes.push({
          targetManualId: 0, targetManualTitle: '',
          title: nm.title,
          before: '',
          after: (nm.parts && nm.parts[0] ? nm.parts[0].principle : nm.summary) || '',
          type: '중요',
          reason: '새 업무 내용 (매뉴얼화는 변경사항에서 별도 진행)'
        });
      });
      parsed.newManuals = [];
    }
    return parsed;
  } catch(e) { return null; }
}

// ── 탭2: 분석 결과 ──
function inboxTabResult() {
  // _INBOX_LIVE가 있으면 저장 전 라이브 결과를 먼저 표시
  var liveItems = _INBOX_LIVE ? [_INBOX_LIVE] : [];
  var savedItems = (DATA.inbox||[]).filter(function(x){ return x.result && x.status !== 'done'; });

  // 라이브 항목이 있으면 상단에 배너로 구분
  var liveHtml = '';
  if (_INBOX_LIVE) {
    var r = _INBOX_LIVE.result || {};
    var nm = (r.newManuals||[]).length;
    var ch = (r.changes||[]).length;
    var an = (r.announcements||[]).length;
    var ig = (r.ignore||[]).length;
    var totalItems = nm + ch + an;

    liveHtml = '<div class="card" style="margin-bottom:14px;border:2px solid var(--pr)">'
      + '<div class="chd">'
      + '<div class="ctitle" style="color:var(--pr)">&#10022; \ubc29\uae08 \ubd84\uc11d \uacb0\uacfc <span style="font-size:11px;font-weight:400;color:var(--t3)">\uc2b9\uc778\ud55c \ud56d\ubaa9\ub9cc \uc800\uc7a5\ub429\ub2c8\ub2e4</span></div>'
      + '<div style="display:flex;gap:6px">'
      + (totalItems === 0 ? '<button class="btn bs sm" onclick="_INBOX_LIVE=null;renderPage(\'inbox\')">&#10005; \ub2eb\uae30</button>' : '')
      + '</div></div>'
      + '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px">'
      + inboxStatBadge('&#128226; \ubcc0\uacbd\uc0ac\ud56d', ch, 'var(--wn)')
      + inboxStatBadge('&#128203; \uacf5\uc9c0\uc0ac\ud56d', an, 'var(--ac)')
      + inboxStatBadge('&#128683; \ubb34\uc2dc', ig, 'var(--t3)')
      + '</div>'
      + inboxResultSection('\ubcc0\uacbd\uc0ac\ud56d \ud6c4\ubcf4', r.changes||[], 'change', 'live', 'var(--wn)')
      + inboxResultSection('\uacf5\uc9c0\uc0ac\ud56d', r.announcements||[], 'announce', 'live', 'var(--ac)')
      + inboxHeldSection(_INBOX_LIVE)
      + (totalItems === 0 ? '<div style="text-align:center;padding:8px;color:var(--t3);font-size:12px">\ubaa8\ub4e0 \ud56d\ubaa9\uc744 \ucc98\ub9ac\ud588\uc2b5\ub2c8\ub2e4. \uc800\uc7a5\ub41c \uae30\ub85d\uc740 \uc5c6\uc2b5\ub2c8\ub2e4.</div>' : '')
      + '</div>';
  }

  // 저장된 과거 분석 기록
  var html = liveHtml;

  if (!savedItems.length && !_INBOX_LIVE) {
    return '<div class="empty"><div class="ei">&#128202;</div><div class="et">\ubd84\uc11d \uacb0\uacfc \uc5c6\uc74c</div><div class="ed">\uc0c8\ub85c \ubd84\uc11d \ud0ed\uc5d0\uc11c \ubd84\uc11d\uc744 \uc2e4\ud589\ud574\uc8fc\uc138\uc694</div></div>';
  }

  if (savedItems.length) {
    var sorted = savedItems.slice().sort(function(a,b){ return new Date(b.createdAt) - new Date(a.createdAt); });
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'
      + '<span style="font-size:12px;color:var(--t3)">\uacfc\uac70 \ubd84\uc11d \uae30\ub85d</span>'
      + '<button class="btn bs sm" style="color:var(--dn)" onclick="inboxDeleteAllRecords()">&#128465;&#65039; \uc804\uccb4 \uc0ad\uc81c (' + sorted.length + '\uac74)</button>'
      + '</div>';
    sorted.forEach(function(item) {
      var r = item.result || {};
      var nm = (r.newManuals||[]).length;
      var ch = (r.changes||[]).length;
      var an = (r.announcements||[]).length;
      var ig = (r.ignore||[]).length;
      html += '<div class="card" style="margin-bottom:14px">'
        + '<div class="chd"><div class="ctitle">&#128229; '+fmtDate(item.createdAt)+' \ubd84\uc11d</div>'
        + '<div style="display:flex;align-items:center;gap:8px">'
        + '<span style="font-size:11px;color:var(--t3)">'+(item.sourceType==='\uce74\uce74\uc624'?'&#128172;':item.sourceType==='\uc0ac\uc9c4'?'&#128247;':'&#128196;')+' '+item.sourceType+'</span>'
        + '<button class="btn gh sm" style="color:var(--t3);padding:2px 6px" onclick="inboxDeleteRecord('+item.id+')" title="\uc774 \ubd84\uc11d \uae30\ub85d \uc0ad\uc81c">&#128465;&#65039;</button>'
        + '</div></div>'
        + '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px">'
          + inboxStatBadge('&#128226; \ubcc0\uacbd\uc0ac\ud56d', ch, 'var(--wn)')
        + inboxStatBadge('&#128203; \uacf5\uc9c0\uc0ac\ud56d', an, 'var(--ac)')
        + inboxStatBadge('&#128683; \ubb34\uc2dc', ig, 'var(--t3)')
        + '</div>'
        + inboxResultSection('\ubcc0\uacbd\uc0ac\ud56d \ud6c4\ubcf4', r.changes||[], 'change', item.id, 'var(--wn)')
        + inboxResultSection('\uacf5\uc9c0\uc0ac\ud56d', r.announcements||[], 'announce', item.id, 'var(--ac)')
        + inboxHeldSection(item)
        + '</div>';
    });
  }
  return html;
}

// 분석 기록 카드 자체를 삭제 (신규매뉴얼/변경사항/공지 후보 전부 포함해서 삭제)
function inboxDeleteRecord(inboxId) {
  if (!confirm('\uc774 \ubd84\uc11d \uae30\ub85d\uc744 \uc0ad\uc81c\ud558\uc2dc\uaca0\uc2b5\ub2c8\uae4c?\n\uc548\uc5d0 \ub4e4\uc5b4\uc788\ub294 \ubbf8\ucc98\ub9ac \ud6c4\ubcf4\ub4e4\ub3c4 \ud568\uaed8 \uc0ad\uc81c\ub429\ub2c8\ub2e4.')) return;
  DATA.inbox = (DATA.inbox||[]).filter(function(x){ return x.id !== inboxId; });
  fsDelete('inbox', inboxId);
  renderPage('inbox');
  showToast('\ubd84\uc11d \uae30\ub85d\uc774 \uc0ad\uc81c\ub418\uc5c8\uc2b5\ub2c8\ub2e4', 'ok');
}

// 미검토 분석 결과 전체 삭제 (적용 기록은 보존)
function inboxDeleteAllRecords() {
  var targets = (DATA.inbox||[]).filter(function(x){ return x.result && x.status !== 'done'; });
  if (!targets.length) return;
  if (!confirm('\ubbf8\uac80\ud1a0 \ubd84\uc11d \uae30\ub85d ' + targets.length + '\uac74\uc744 \uc804\uccb4 \uc0ad\uc81c\ud558\uc2dc\uaca0\uc2b5\ub2c8\uae4c?\n\uc548\uc5d0 \ub4e4\uc5b4\uc788\ub294 \ubbf8\ucc98\ub9ac \ud6c4\ubcf4\ub4e4\ub3c4 \ubaa8\ub450 \ud568\uaed8 \uc0ad\uc81c\ub418\uba70, \ub418\ub3cc\ub9b4 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4.')) return;
  var ids = targets.map(function(x){ return x.id; });
  DATA.inbox = (DATA.inbox||[]).filter(function(x){ return ids.indexOf(x.id) < 0; });
  ids.forEach(function(id){ fsDelete('inbox', id); });
  renderPage('inbox');
  showToast(ids.length + '\uac74\uc758 \ubd84\uc11d \uae30\ub85d\uc774 \uc0ad\uc81c\ub418\uc5c8\uc2b5\ub2c8\ub2e4', 'ok');
}

function inboxHeldSection(inboxItem) {
  var held = inboxItem.held || [];
  if (!held.length) return '';
  var typeLabel = { manual:'\uc2e0\uaddc \ub9e4\ub274\uc5bc', change:'\ubcc0\uacbd\uc0ac\ud56d', announce:'\uacf5\uc9c0' };
  return '<div style="margin-top:8px">'
    + '<div style="font-size:12px;font-weight:700;color:var(--t3);margin-bottom:8px">&#9203; \ubcf4\ub958\ud568 ' + held.length + '\uac74</div>'
    + held.map(function(h, i) {
        return '<div style="border:1px dashed var(--bd);border-radius:var(--rs);padding:10px 12px;margin-bottom:6px;background:var(--s2)">'
          + '<div style="font-size:12px;font-weight:600;margin-bottom:2px">' + (h.data.title||h.data.content||'') + '</div>'
          + '<div style="font-size:10px;color:var(--t3);margin-bottom:6px">' + typeLabel[h.type] + ' &middot; ' + fmtDate(h.heldAt) + ' \ubcf4\ub958\ub428</div>'
          + '<button class="btn bs sm" onclick="inboxUnholdItem(' + inboxItem.id + ',' + i + ')">&#8634; \ub2e4\uc2dc \uac80\ud1a0</button>'
          + '</div>';
      }).join('')
    + '</div>';
}

function inboxStatBadge(label, count, color) {
  return '<div style="text-align:center;background:var(--s2);border-radius:var(--rs);padding:10px 6px">'
    + '<div style="font-size:20px;font-weight:800;color:' + color + '">' + count + '</div>'
    + '<div style="font-size:10px;color:var(--t2);margin-top:2px">' + label + '</div>'
    + '</div>';
}

function inboxResultSection(title, items, type, inboxId, color) {
  if (!items.length) return '';
  // inboxId가 문자열(live)이면 따옴표로 감싸서 onclick 속성에 안전하게 삽입
  var idStr = (typeof inboxId === 'string') ? "'" + inboxId + "'" : inboxId;
  return '<div style="margin-bottom:12px">'
    + '<div style="font-size:12px;font-weight:700;color:' + color + ';margin-bottom:8px">' + title + ' ' + items.length + '\uac74</div>'
    + items.map(function(item, i) {
        // 매뉴얼 자동 추천 (충돌/연관 매뉴얼 탐지)
        var comp = type !== 'announce' ? compareWithManuals(item.title, item.tags, item.cat) : null;
        var hasTarget = item.targetManualId || (comp && comp.manual && comp.score >= 40);
        var targetManual = item.targetManualId
          ? DATA.manuals.find(function(m){ return m.id===item.targetManualId; })
          : (comp ? comp.manual : null);
        var conflictBadge = '';
        if (type === 'manual' && comp && comp.score >= 40) {
          conflictBadge = '<div style="background:var(--wn-l);border:1px solid var(--wn);border-radius:var(--rs);padding:7px 10px;margin-bottom:8px;font-size:11px;color:#7D5A00">'
            + '&#9888; \uc720\uc0ac\ud55c \ub9e4\ub274\uc5bc\uc774 \uc788\uc2b5\ub2c8\ub2e4: <strong>' + (targetManual?targetManual.title:'') + '</strong> (\uc720\uc0ac\ub3c4 ' + comp.score + '%)'
            + '</div>';
        }
        // 변경사항 타입: 기존 유사 변경사항 경고
        if (type === 'change') {
          var dupChanges = getRelatedChanges(item.title + ' ' + (item.after||''));
          if (dupChanges.length) {
            conflictBadge = '<div style="background:var(--wn-l);border:1px solid var(--wn);border-radius:var(--rs);padding:7px 10px;margin-bottom:8px;font-size:11px;color:#7D5A00">'
              + '&#9888; \uc720\uc0ac\ud55c \uae30\uc874 \ubcc0\uacbd\uc0ac\ud56d\uc774 \uc788\uc2b5\ub2c8\ub2e4: '
              + dupChanges.slice(0,2).map(function(c){ return '<strong>'+c.title+'</strong>'; }).join(', ')
              + ' \u2014 \uc774\ubbf8 \ub4f1\ub85d\ub41c \ub0b4\uc6a9\uacfc \uc911\ubcf5\ub418\uc9c0 \uc54a\ub294\uc9c0 \ud655\uc778\ud558\uc138\uc694.'
              + '</div>';
          }
        }
        var targetBadge = (type === 'change' && targetManual)
          ? '<div style="display:inline-flex;align-items:center;gap:4px;background:var(--pr-l);color:var(--pr);font-size:11px;font-weight:600;padding:3px 8px;border-radius:10px;margin-bottom:8px">'
            + '&#128218; ' + targetManual.title + '</div>'
          : '';

        var isHeld = !!item._held;
        return '<div style="border:1px solid '+(isHeld?'var(--t3)':'var(--bd)')+';border-radius:var(--rs);padding:12px;margin-bottom:8px;opacity:'+(isHeld?'0.6':'1')+';background:'+(isHeld?'var(--s2)':'')+';">'
          + '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">'
          + '<span style="font-size:13px;font-weight:700;">' + (item.title||'\uc81c\ubaa9 \uc5c6\uc74c') + '</span>'
          + (isHeld?'<span style="font-size:10px;background:var(--bd);color:var(--t3);padding:2px 7px;border-radius:10px;font-weight:700">&#9203; \ubcf4\ub958</span>':'')
          + '</div>'
          + targetBadge
          + (item.summary ? '<div style="font-size:12px;color:var(--t2);margin-bottom:6px">' + item.summary + '</div>' : '')
          + (item.before && item.after ? '<div style="font-size:11px;color:var(--t3);margin-bottom:6px">'
            + '<span style="background:var(--dn-l);padding:2px 6px;border-radius:4px">' + item.before + '</span>'
            + ' &rarr; <span style="background:var(--ac-l);padding:2px 6px;border-radius:4px">' + item.after + '</span></div>' : '')
          + (item.reason ? '<div style="font-size:11px;color:var(--t3);margin-bottom:8px">&#128172; ' + item.reason + '</div>' : '')
          + conflictBadge
          + '<div style="display:flex;gap:6px;flex-wrap:wrap">'
          + (isHeld
            ? '<button class="btn bs sm" onclick="inboxHoldItem(' + idStr + ',' + i + ',\'' + type + '\')">&#8634; \ubcf4\ub958 \ud574\uc81c</button>'
              + '<button class="btn bs sm" style="color:var(--t3)" onclick="inboxIgnoreItem(' + idStr + ',' + i + ',\'' + type + '\')">&#128683; \ubb34\uc2dc</button>'
            : '<button class="btn bp sm" onclick="inboxApplyItem(' + idStr + ',' + i + ',\'' + type + '\')">&#10003; \uc2b9\uc778 \ubc0f \uc801\uc6a9</button>'
              + '<button class="btn bs sm" onclick="inboxEditItem(' + idStr + ',' + i + ',\'' + type + '\')">&#9998; \uc218\uc815</button>'
              + '<button class="btn bs sm" onclick="inboxHoldItem(' + idStr + ',' + i + ',\'' + type + '\')">&#9203; \ubcf4\ub958</button>'
              + '<button class="btn bs sm" style="color:var(--t3)" onclick="inboxIgnoreItem(' + idStr + ',' + i + ',\'' + type + '\')">&#128683; \ubb34\uc2dc</button>'
          )
          + '</div></div>';
      }).join('')
    + '</div>';
}

// (승인대기 탭 제거됨 - 분석결과에서 직접 적용/무시)

// ── 탭4: 적용 완료 ──
function inboxTabDone() {
  var allApplied = [];
  (DATA.inbox||[]).forEach(function(item) {
    (item.applied||[]).forEach(function(a) {
      allApplied.push({ title: a.title, type: a.type, appliedAt: a.appliedAt, sourceType: item.sourceType });
    });
  });
  allApplied.sort(function(a,b){ return new Date(b.appliedAt)-new Date(a.appliedAt); });

  if (!allApplied.length) return '<div class="empty"><div class="ei">&#10003;</div><div class="et">\uc801\uc6a9\ub41c \ub0b4\uc6a9\uc774 \uc5c6\uc74c</div></div>';

  return allApplied.map(function(item) {
    var typeLabel = item.type==='manual'?'\uc2e0\uaddc \ub9e4\ub274\uc5bc':item.type==='change'?'\ubcc0\uacbd\uc0ac\ud56d':'\uacf5\uc9c0';
    var typeColor = item.type==='manual'?'var(--pr)':item.type==='change'?'var(--wn)':'var(--ac)';
    return '<div style="padding:12px 14px;border:1px solid var(--bd);border-radius:var(--rs);margin-bottom:8px;display:flex;align-items:center;gap:10px">'
      + '<span style="font-size:20px;color:var(--ac)">&#10003;</span>'
      + '<div style="flex:1">'
      + '<div style="font-size:13px;font-weight:600">' + (item.title||'\uc801\uc6a9') + '</div>'
      + '<div style="font-size:11px;color:var(--t3);margin-top:2px">' + fmtDate(item.appliedAt) + ' \u00b7 ' + (item.sourceType||'') + '</div>'
      + '</div>'
      + '<span style="font-size:11px;font-weight:700;color:' + typeColor + ';background:var(--s2);padding:3px 8px;border-radius:10px">' + typeLabel + '</span>'
      + '</div>';
  }).join('');
}

// ── AI 분석 실행 ──
// ── AI 분류 없이 인식된 텍스트를 그대로 공지사항으로 등록 ──
function inboxAddRaw() {
  var inputEl = document.getElementById('inboxInput');
  var raw = inputEl ? inputEl.value.trim() : '';
  if (!raw) { showToast('\ub0b4\uc6a9\uc774 \uc5c6\uc2b5\ub2c8\ub2e4', 'err'); return; }

  var staffName = S.currentStaff ? S.currentStaff.name : '';
  var authorName = S.role==='admin' ? '\uad00\ub9ac\uc790' : (staffName || '\uc9c1\uc6d0');
  var authorId = S.role==='admin' ? 0 : (S.currentStaff ? S.currentStaff.id : 0);
  var modeLabel = INBOX_INPUT_MODE === 'kakao' ? '\uce74\uce74\uc624' : INBOX_INPUT_MODE === 'photo' ? '\uc0ac\uc9c4' : INBOX_INPUT_MODE === 'file' ? '\ud30c\uc77c' : '\uc9c1\uc811\uc785\ub825';
  var sourceType = staffName ? modeLabel + ' (\uc81c\ucd9c: ' + staffName + ')' : modeLabel;
  var titleLine = raw.split('\n').map(function(l){ return l.trim(); }).filter(Boolean)[0] || '\uba54\ubaa8';
  if (titleLine.length > 30) titleLine = titleLine.substring(0,30) + '...';

  var nid = Date.now();
  var an = {
    id: nid, title: titleLine, type: '\uacf5\uc9c0',
    before: '', after: raw,
    createdBy: authorName, affectedManuals: [], createdAt: new Date(),
    readBy: authorId ? [authorId] : []
  };
  DATA.changes.unshift(an);
  fsSave('changes', an);
  DATA.myRead[nid] = true; // \uc790\uc2e0\uc740 \ubc14\ub85c \ud655\uc778 \uc644\ub8cc

  // inbox 기록(적용 기록 탭에서 확인 가능하도록)
  if (!DATA.inbox) DATA.inbox = [];
  var inboxItem = {
    id: Date.now()+1,
    sourceType: sourceType,
    sourceText: raw.substring(0, 2000),
    extractedText: raw.substring(0, 1000),
    result: { newManuals:[], changes:[], announcements:[], ignore:[] },
    applied: [{ type:'announce', title: titleLine, appliedAt: new Date() }],
    status: 'done',
    createdAt: new Date(),
    appliedAt: new Date()
  };
  DATA.inbox.push(inboxItem);
  fsSave('inbox', inboxItem);

  if (inputEl) inputEl.value = '';
  INBOX_TAB = 'done';
  go('inbox');
  showToast('&#10024; \uc778\uc2dd\ub41c \ub0b4\uc6a9\uc774 \uacf5\uc9c0\uc0ac\ud56d\uc73c\ub85c \ubc14\ub85c \ub4f1\ub85d\ub418\uc5c8\uc2b5\ub2c8\ub2e4!', 'ok');
}

async function inboxAnalyze() {
  var inputEl = document.getElementById('inboxInput');
  var raw = inputEl ? inputEl.value.trim() : '';
  if (!raw) { showToast('\ub0b4\uc6a9\uc744 \uc785\ub825\ud574\uc8fc\uc138\uc694', 'err'); return; }

  var key = S.gemKey || localStorage.getItem('gmKey') || '';
  if (!key) { showToast('\ubd84\uc11d\ud558\ub824\uba74 Gemini API \ud0a4\ub97c \uc124\uc815\uc5d0\uc11c \uc785\ub825\ud574\uc8fc\uc138\uc694', 'err'); return; }

  // 입력 타입 감지
  var modeLabel = INBOX_INPUT_MODE === 'kakao' ? '\uce74\uce74\uc624' : INBOX_INPUT_MODE === 'photo' ? '\uc0ac\uc9c4' : INBOX_INPUT_MODE === 'file' ? '\ud30c\uc77c' : '\uc9c1\uc811\uc785\ub825';
  var staffName = S.currentStaff ? S.currentStaff.name : '';
  var sourceType = staffName ? modeLabel + ' (\uc81c\ucd9c: ' + staffName + ')' : modeLabel;

  // 로딩 UI
  var pg = document.getElementById('pg');
  if (pg) pg.innerHTML = '<div style="padding:40px 20px;text-align:center">'
    + '<div class="ai-spin" style="margin:0 auto 16px"></div>'
    + '<div style="font-size:15px;font-weight:700;color:var(--pr);margin-bottom:6px">\uc911\uc694 \ubb38\uc7a5 \ucd94\ucd9c \uc911...</div>'
    + '<div id="inboxProgress" style="font-size:12px;color:var(--t3)">\ud0a4\uc6cc\ub4dc \ubd84\uc11d \uc911</div>'
    + '</div>';

  // STEP 1: 카톡이면 정리, 아니면 그대로
  var lines = INBOX_INPUT_MODE === 'kakao' ? cleanKakaoText(raw) : raw.split('\n').filter(function(l){ return l.trim().length >= 3; });
  var extracted = extractImportantSentences(lines);
  var importantText = extracted.important.join('\n');
  var allText = raw;

  var prog = document.getElementById('inboxProgress');
  if (prog) prog.textContent = '\uc911\uc694 \ubb38\uc7a5 ' + extracted.important.length + '\uac1c \uc120\ubcc4 \u2192 AI \ubd84\uc11d \uc911...';

  // STEP 2: AI 분석 (중요 문장 우선, 부족하면 전체)
  var analysisInput = importantText.length >= 100 ? importantText : allText;

  // 느슨한 매뉴얼 후보 추리기 (누락 방지 우선 - 접점 하나라도 있으면 포함)
  // 프롬프트 빌드 + AI 호출 (공통 함수)
  var prompt = buildInboxAnalysisPrompt(analysisInput);
  var result = await callGem(prompt);

  var parsed = parseInboxAnalysisResult(result);
  if (!parsed) {
    showToast('AI 분석 실패. API 키를 확인하거나 다시 시도해주세요.', 'err');
    renderPage('inbox');
    return;
  }

  // STEP 4: 저장 없이 결과를 임시 보관 → 바로 결과 화면에서 검토
  _INBOX_LIVE = {
    id: Date.now(),
    sourceType: sourceType,
    sourceText: raw.substring(0, 2000),
    extractedText: analysisInput.substring(0, 1000),
    result: parsed,
    status: 'result',
    createdAt: new Date(),
    appliedAt: null,
    applied: [],
    held: []
  };

  INBOX_TAB = 'result';
  go('inbox');
  showToast('\ubd84\uc11d \uc644\ub8cc! \ud56d\ubaa9\ubcc4\ub85c \uac80\ud1a0\ud574\uc8fc\uc138\uc694.', 'ok');
}

// 신규 매뉴얼 생성 확인 모달: 생성될 매뉴얼 내용을 미리 보여주고 승인 시에만 onConfirm 실행
function openNewManualConfirmModal(item, onConfirm) {

    ? item.parts.map(function(p){ return '['+(p.name||'')+'] '+(p.principle||''); }).join('\n\n')
    : (item.summary||'');

    item: item, onConfirm: onConfirm,

  };

  var comp = compareWithManuals(item.title, item.tags, item.cat);
  var conflictWarning = (comp.manual && comp.score >= 40)
    ? '<div style="background:var(--wn-l);border:1px solid var(--wn);border-radius:var(--rs);padding:8px 12px;margin-bottom:14px;font-size:12px;color:#7D5A00">'
      + '&#9888; \uC720\uC0AC\uD55C \uB9E4\uB274\uC5BC\uC774 \uC788\uC2B5\uB2C8\uB2E4: <strong>' + esc(comp.manual.title) + '</strong> (\uC720\uC0AC\uB3C4 ' + comp.score + '%). \uC815\ub9D0 \uC0C8\uB85C \uB9CC\uB4E4\uC5B4\uC57C \ud558\ub294\uC9C0 \ud55C\ubC88 \ub354 \ud655\uC778\ud574\uC8FC\uC138\uC694.</div>'
    : '';

  var body = '<div>'
    + '<div style="background:var(--pr-l);border-radius:var(--rs);padding:8px 12px;margin-bottom:14px;font-size:12px;color:var(--pr);font-weight:600">'
    + '&#128218; \uC774 \uB0B4\uC6A9\uC73C\uB85C \uC0C8 \uB9E4\uB274\uC5BC\uC774 \uB9CC\ub4E4\uC5B4\uC9D1\ub2c8\ub2c8\uB2E4. \uB0B4\uC6A9\uC744 \uD655\uC778\uD558\uACE0 \uC2B9\uC778\ud574\uC8FC\uC138\uC694.</div>'
    + conflictWarning
    + '<div class="fg" style="margin-bottom:10px"><div class="fl">\uC81C\ubAA9</div>'
    + '<input class="fi" id="newManualConfirmTitle" value="' + esc(item.title||'') + '" oninput="NEW_MANUAL_CONFIRM.edited.title=this.value">'
    + '</div>'
    + '<div class="fg" style="margin-bottom:10px"><div class="fl">\uCE74\ud14c\uACE0\uB9AC</div>'
    + '<select class="fi" id="newManualConfirmCat" onchange="NEW_MANUAL_CONFIRM.edited.cat=this.value">'
    + DATA.cats.map(function(c){ return '<option value="'+c.name+'"'+(c.name===item.cat?' selected':'')+'>'+c.name+'</option>'; }).join('')
    + '</select></div>'
    + (hasParts
      ? '<div class="fg"><div class="fl">\uD30C\uD2B8 \uBBF8\uB9AC\ubcf4\uae30 (' + item.parts.length + '\uD30C\uD2B8, \uC0DD\uC131 \ud6C4 \uAC01 \uD30C\ud2b8\ub294 \ub9e4\ub274\uc5bc \uc218\uc815 \ud654\uba74\uc5d0\uc11c \uac1c\ubcc4 \uc218\uc815 \uac00\ub2a5)</div>'
        + '<div style="font-size:12px;color:var(--t2);background:var(--s2);border-radius:var(--rs);padding:10px 12px;white-space:pre-wrap;max-height:240px;overflow-y:auto">' + esc(previewText) + '</div>'
        + '</div>'
      : '<div class="fg"><div class="fl">\uC694\uC57D \uB0B4\uC6A9</div>'
        + '<textarea id="newManualConfirmSummary" class="fi" rows="4" oninput="NEW_MANUAL_CONFIRM.edited.summary=this.value">' + esc(item.summary||'') + '</textarea>'
        + '</div>')
    + (item.reason ? '<div style="font-size:11px;color:var(--t3);margin-top:10px">&#128172; ' + esc(item.reason) + '</div>' : '')
    + '</div>';

  openMod('&#128218; \uC2E0\uADDC \uB9E4\uB274\uC5BC \uD655\uC778',
    body,
    '<button class="btn bs" onclick="closeMod();NEW_MANUAL_CONFIRM=null">\uCDE8\uC18C</button>'
    + '<button class="btn bp" onclick="confirmNewManualApply()">&#10003; \uC2B9\uC778\uD558\uACE0 \uC0DD\uC131</button>'
  );
}

// 매뉴얼 변경사항 확인 모달
// 1) 모달이 열리는 즉시 onRegister()를 호출해 변경사항(changes) 등록은 무조건 실행
// 2) 모달 안에서는 "이 내용을 매뉴얼에도 반영할까요?" 만 별도로 묻고,
//    반영을 선택한 경우에만 onApplyToManual(editedAfter)를 호출
// 변경사항 등록 (구 버전: 등록 직후 "매뉴얼에도 반영" 여부를 묻는 모달이 떴으나,
// 이제는 등록은 등록만 하고, 매뉴얼 반영은 "변경사항 목록 > 매뉴얼에 적용" 버튼에서만 시작됨)
function openChangeConfirmModal(item, onRegister) {
  var targetId = item.targetManualId;
  if (!targetId) {
    var comp = compareWithManuals(item.title, item.tags, item.cat);
    if (comp.manual && comp.score >= 40) targetId = comp.manual.id;
  }
  if (onRegister) onRegister(targetId);
}

function inboxApplyItem(inboxId, itemIdx, type) {
  var isLive = (inboxId === 'live');
  var inbox = isLive ? _INBOX_LIVE : (DATA.inbox||[]).find(function(x){ return x.id===inboxId; });
  if (!inbox) return;
  var item;
  if (type==='manual')   item = (inbox.result.newManuals||[])[itemIdx];
  else if (type==='change')   item = (inbox.result.changes||[])[itemIdx];
  else if (type==='announce') item = (inbox.result.announcements||[])[itemIdx];
  if (!item) return;

  function ensureLiveSaved() {
    if (isLive && !_INBOX_LIVE._saved) {
      if (!DATA.inbox) DATA.inbox = [];
      DATA.inbox.push(_INBOX_LIVE);
      fsSave('inbox', _INBOX_LIVE);
      _INBOX_LIVE._saved = true;
    }
  }

  if (type === 'manual') {
    openNewManualConfirmModal(item, function(confirmed) {
      ensureLiveSaved();
      inboxRemoveItem(inbox, itemIdx, type);
      fsSave('inbox', inbox);
      var nm = buildPartManualObject({
        title: confirmed.title || item.title || '\uC2E0\uADDC \uB9E4\uB274\uC5BC',
        cat: confirmed.cat || item.cat || '\uAE30\uD0C0', cat2: item.cat2||'', cat3: item.cat3||'',
        keywords: item.keywords||[], tags: item.tags||[],
        parts: confirmed.parts || item.parts,
        fallbackText: confirmed.summary || item.summary || ''
      });
      DATA.manuals.unshift(nm);
      fsSave('manuals', nm);
      var nmCh = {
        id: Date.now()+1,
        title: '\uC0C8 \uB9E4\uB274\uC5BC \uB4F1\uB85D: ' + nm.title,
        type: '\uC2E0\uADDC',
        before: '', after: manualSummaryText(nm) || '\uC0C8 \uB9E4\uB274\uC5BC\uC774 \uB4F1\uB85D\uB418\uC5C8\uC2B5\uB2C8\uB2E4.',
        createdBy: '\uAD00\uB9AC\uC790(AI)',
        affectedManuals: [nm.id],
        createdAt: new Date(), readBy: []
      };
      DATA.changes.unshift(nmCh);
      fsSave('changes', nmCh);
      if (!inbox.applied) inbox.applied = [];
      inbox.applied.push({ type: type, title: nm.title, appliedAt: new Date() });
      fsSave('inbox', inbox);
      showToast('&#10024; \uC2E0\uADDC \uB9E4\uB274\uC5BC \uB4F1\uB85D \uC644\uB8CC!', 'ok');
      renderPage('inbox');
    });
    return;
  }
  else if (type === 'change') {
    var dupCh = getRelatedChanges((item.title||'') + ' ' + (item.after||''));
    if (dupCh.length) {
      var dupListHtml = dupCh.slice(0,3).map(function(c,i){
        return '<div style="border:1px solid var(--bd);border-radius:var(--rs);padding:8px 10px;margin-bottom:6px">'
          + '<div style="font-size:12px;font-weight:700;margin-bottom:2px">'+esc(c.title)+'</div>'
          + '<div style="font-size:11px;color:var(--t2);margin-bottom:6px">'+esc((c.after||'').substring(0,80))+'</div>'
          + '<div style="display:flex;gap:6px;flex-wrap:wrap">'
          + '<button class="btn bp sm" onclick="inboxUpdateExistingChange('+c.id+',\''+inboxId+'\','+itemIdx+')">&#9998; \uAE30\uC874 \uAC83 \uC218\uC815</button>'
          + '<button class="btn bs sm" onclick="closeMod();inboxSaveNewChange(\''+inboxId+'\','+itemIdx+')">+ \uC0C8\uB85C \uCD94\uAC00</button>'
          + '</div></div>';
      }).join('');
      openMod('&#9888;&#65039; \uC720\uC0AC\uD55C \uBCC0\uACBD\uC0AC\uD56D \uBC1C\uACAC',
        '<div>'
        + '<div style="background:var(--wn-l);border-radius:var(--rs);padding:8px 12px;margin-bottom:12px;font-size:12px;color:#7D5A00">'
        + '\uC544\uB798\uC640 \uC720\uC0AC\uD55C \uBCC0\uACBD\uC0AC\uD56D\uC774 \uC774\uBBF8 \uC788\uC2B5\uB2C8\uB2E4. \uAE30\uC874 \uAC83\uC744 \uC218\uC815\uD558\uAC70\uB098 \uC0C8\uB85C \uCD94\uAC00\uD558\uC138\uC694.</div>'
        + '<div style="font-size:12px;font-weight:700;margin-bottom:4px;color:var(--pr)">\uC0C8 \uBCC0\uACBD\uC0AC\uD56D: '+esc(item.title)+'</div>'
        + '<div style="font-size:11px;color:var(--t2);margin-bottom:12px">'+esc(item.after||'')+'</div>'
        + '<div style="font-size:12px;font-weight:700;margin-bottom:6px">\uAE30\uC874 \uC720\uC0AC \uBCC0\uACBD\uC0AC\uD56D:</div>'
        + dupListHtml
        + '</div>',
        '<button class="btn bs" onclick="closeMod()">\uCDE8\uC18C</button>'
        + '<button class="btn bp" onclick="closeMod();inboxSaveNewChange(\''+inboxId+'\','+itemIdx+')">+ \uC0C8\uB85C \uCD94\uAC00</button>'
      );
      return;
    }
    inboxSaveNewChange(inboxId, itemIdx);
    return;
  }
  else if (type === 'announce') {
    openMod('&#128203; \uacf5\uc9c0\uc0ac\ud56d \ud655\uc778',
      '<div>'
      + '<div style="background:var(--ac-l);border-radius:var(--rs);padding:8px 12px;margin-bottom:14px;font-size:12px;color:var(--ac);font-weight:600">'
      + '&#128203; \uc774 \ub0b4\uc6a9\uc73c\ub85c \uacf5\uc9c0\uc0ac\ud56d\uc774 \ub4f1\ub85d\ub429\ub2c8\ub2e4.</div>'
      + '<div style="font-size:14px;font-weight:700;margin-bottom:8px">'+esc(item.title||'')+'</div>'
      + '<div style="font-size:13px;color:var(--t2);white-space:pre-wrap">'+esc(item.content||'')+'</div>'
      + '</div>',
      '<button class="btn bs" onclick="closeMod()">\ucde8\uc18c</button>'
      + '<button class="btn bp" onclick="closeMod();_inboxConfirmAnnounce(\''+inboxId+'\','+itemIdx+')">&#10003; \ub4f1\ub85d</button>'
    );
    return;
  }
}

function _inboxConfirmAnnounce(inboxId, itemIdx) {
  var isLive = (inboxId === 'live');
  var inbox = isLive ? _INBOX_LIVE : (DATA.inbox||[]).find(function(x){ return x.id===inboxId; });
  if (!inbox) return;
  var item = (inbox.result.announcements||[])[itemIdx];
  if (!item) return;
  if (isLive && !_INBOX_LIVE._saved) {
    if (!DATA.inbox) DATA.inbox = [];
    DATA.inbox.push(_INBOX_LIVE);
    fsSave('inbox', _INBOX_LIVE);
    _INBOX_LIVE._saved = true;
  }
  var an = {
    id: Date.now(), title: item.title||'\uacf5\uc9c0', type: '\uacf5\uc9c0',
    before: '', after: item.content||'',
    createdBy: '\uad00\ub9ac\uc790', affectedManuals: [], createdAt: new Date(), readBy: []
  };
  DATA.changes.unshift(an);
  fsSave('changes', an);
  inboxRemoveItem(inbox, itemIdx, 'announce');
  if (!inbox.applied) inbox.applied = [];
  inbox.applied.push({ type: 'announce', title: item.title||'', appliedAt: new Date() });
  fsSave('inbox', inbox);
  showToast('\uacf5\uc9c0\uc0ac\ud56d\uc774 \ub4f1\ub85d\ub418\uc5c8\uc2b5\ub2c8\ub2e4.', 'ok');
  renderPage('inbox');
}

function inboxUpdateExistingChange(changeId, inboxId, itemIdx) {
  closeMod();
  var inbox = (inboxId === 'live') ? _INBOX_LIVE : (DATA.inbox||[]).find(function(x){ return x.id===inboxId; });
  var newItem = inbox ? (inbox.result.changes||[])[itemIdx] : null;
  var existing = DATA.changes.find(function(c){ return c.id===changeId; });
  if (!existing || !newItem) return;
  existing.after = newItem.after || existing.after;
  existing.title = newItem.title || existing.title;
  fsSave('changes', existing);
  if (inbox) {
    inboxRemoveItem(inbox, itemIdx, 'change');
    if (inboxId === 'live' && !_INBOX_LIVE._saved) {
      if (!DATA.inbox) DATA.inbox = [];
      DATA.inbox.push(_INBOX_LIVE);
      fsSave('inbox', _INBOX_LIVE);
      _INBOX_LIVE._saved = true;
    }
    if (!inbox.applied) inbox.applied = [];
    inbox.applied.push({ type: 'change', title: newItem.title||'', appliedAt: new Date() });

  if (!inbox) return;

    _INBOX_LIVE._saved = true;
  }
  var targetId = item.targetManualId || null;

    if (comp.manual && comp.score >= 40) targetId = comp.manual.id;
  }
  inboxRemoveItem(inbox, itemIdx, 'change');
  fsSave('inbox', inbox);
  var ch = {
    id: Date.now(),
    title: item.title||'\ubcc0\uacbd\uc0ac\ud56d',
    type: item.type||'\ucf54\ud310', before: item.before||'', after: item.after||'',

  };
  DATA.changes.unshift(ch);

}

function inboxRemoveItem(inbox, itemIdx, type) {
  if (type==='manual'   && inbox.result.newManuals)   inbox.result.newManuals.splice(itemIdx,1);
  else if (type==='change'   && inbox.result.changes)      inbox.result.changes.splice(itemIdx,1);
  else if (type==='announce' && inbox.result.announcements) inbox.result.announcements.splice(itemIdx,1);
}

  var inbox = (inboxId==='live') ? _INBOX_LIVE : (DATA.inbox||[]).find(function(x){ return x.id===inboxId; });
  if (!inbox) return;

}

// 보류함에서 다시 검토(결과 목록으로 복귀)
function inboxUnholdItem(inboxId, heldIdx) {
  var inbox = (inboxId === 'live') ? _INBOX_LIVE : (DATA.inbox||[]).find(function(x){ return x.id===inboxId; });
  if (!inbox || !inbox.held) return;
  var held = inbox.held[heldIdx];
  if (!held) return;
  if (held.type === 'manual') {
    if (!inbox.result.newManuals) inbox.result.newManuals = [];
    inbox.result.newManuals.push(held.data);
  } else if (held.type === 'change') {
    if (!inbox.result.changes) inbox.result.changes = [];
    inbox.result.changes.push(held.data);
  } else if (held.type === 'announce') {
    if (!inbox.result.announcements) inbox.result.announcements = [];
    inbox.result.announcements.push(held.data);
  }
  inbox.held.splice(heldIdx, 1);
  if (inboxId !== 'live') fsSave('inbox', inbox);
  showToast('\ub2e4\uc2dc \uac80\ud1a0 \ubaa9\ub85d\uc73c\ub85c \uc774\ub3d9\ud588\uc2b5\ub2c8\ub2e4.', 'ok');

}

async function inboxHandlePhoto(file) {
  if (!file) return;
  var dataUrl = await readAsDataURL(file);

  if (resultEl) resultEl.style.display = '';
  var ta = document.getElementById('inboxInput');
  if (ta) ta.placeholder = 'AI\uAC00 \uC0AC\uC9C4\uC744 \uC77D\uB294 \uC911\uC785\uB2C8\uB2E4...';

  var key = S.gemKey || localStorage.getItem('gmKey') || '';
  if (!key) { if(ta) ta.value = 'API \uD0A4\uAC00 \uD544\uC694\uD569\uB2C8\uB2E4.'; return; }

  var b64 = dataUrl.split(',')[1];
  var mime = dataUrl.split(';')[0].split(':')[1];
  var txt = await callGemOCR(b64, mime);
  if (txt) {
    if(ta) ta.value = (ta.value ? ta.value + '\n' : '') + txt.trim();
    showToast('&#10022; \uC0AC\uC9C4 \uD14D\uC2A4\uD2B8 \uC778\uC2DD \uC644\uB8CC! (\uCD94\uAC00\uB428)','ok');
    return;
  }
  if(ta) ta.placeholder='\uC778\uC2DD \uC2E4\uD328. \uB0B4\uC6A9\uC744 \uC9C1\uC811 \uC785\uB825\uD574\uC8FC\uC138\uC694.';
  showToast('\uC0AC\uC9C4 \uC778\uC2DD \uC2E4\uD328','err');
}


function inboxHandlePhotoDrop(e) {
  e.preventDefault();
  var f=e.dataTransfer.files[0];
  if(f&&f.type.startsWith('image/')) inboxHandlePhoto(f);
}

async function inboxHandleFile(file) {
  if(!file) return;
  var ta=document.getElementById('inboxInput');
  if(!ta) return;
  var ext=file.name.split('.').pop().toLowerCase();
  if(['txt','md'].indexOf(ext)>=0) {
    var text=await readAsText(file);
    ta.value=text.substring(0,10000);
  } else {
    showToast('\uc9c0\uc6d0\ud558\uc9c0 \uc54a\ub294 \ud30c\uc77c\uc785\ub2c8\ub2e4. TXT, MD \ud30c\uc77c\ub9cc \uac00\ub2a5\ud569\ub2c8\ub2e4.','err');

  e.preventDefault();
  var f=e.dataTransfer.files[0];
  if(f) inboxHandleFile(f);
}
