<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2D6BE4">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="약국매뉴얼">
<link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;약국매뉴얼&quot;,&quot;short_name&quot;:&quot;매뉴얼&quot;,&quot;start_url&quot;:&quot;.&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;#2D6BE4&quot;,&quot;theme_color&quot;:&quot;#2D6BE4&quot;,&quot;icons&quot;:[{&quot;src&quot;:&quot;data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%232D6BE4'/><text y='.9em' font-size='80' x='10'>💊</text></svg>&quot;,&quot;sizes&quot;:&quot;any&quot;,&quot;type&quot;:&quot;image/svg+xml&quot;}]}">
<title>약국매뉴얼 | 센트럴온누리약국</title>
<style>
:root{
  --bg:#F7F8FA;--surface:#fff;--s2:#F0F2F5;
  --pr:#2D6BE4;--pr-l:#EBF1FF;--pr-d:#1E4DB7;
  --ac:#00C48C;--ac-l:#E6FAF4;
  --wn:#F5A623;--wn-l:#FFF8ED;
  --dn:#E84646;--dn-l:#FFECEC;
  --tx:#1A1D23;--t2:#5A6072;--t3:#9DA3B4;
  --bd:#E4E7EF;
  --sh:0 2px 12px rgba(0,0,0,.07);
  --sh2:0 8px 32px rgba(0,0,0,.12);
  --r:12px;--rs:8px;
  --font:'Apple SD Gothic Neo','Noto Sans KR',sans-serif
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px;line-height:1.6}
#app{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:240px;background:var(--surface);border-right:1px solid var(--bd);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:120;transition:transform .3s}
.logo-area{padding:18px 20px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--pr),#6B8EF5);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;flex-shrink:0}
.logo-text{font-size:15px;font-weight:700}
.logo-sub{font-size:11px;color:var(--t3)}
.snav{flex:1;padding:10px 0;overflow-y:auto}
.nav-sec{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.08em;padding:12px 20px 4px;text-transform:uppercase}
.ni{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;color:var(--t2);font-size:13.5px;font-weight:500;position:relative;transition:background .15s;border:none;background:none;width:100%;text-align:left;font-family:var(--font)}
.ni:hover{background:var(--s2);color:var(--tx)}
.ni.active{background:var(--pr-l);color:var(--pr);font-weight:700}
.ni.active::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;background:var(--pr);border-radius:0 3px 3px 0}
.ni-icon{font-size:16px;width:20px;text-align:center}
.nbadge{margin-left:auto;background:var(--dn);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center}
.user-area{padding:14px 20px;border-top:1px solid var(--bd);display:flex;align-items:center;gap:10px;transition:background .15s}
.user-area:hover{background:var(--s2)}
#userPanel{background:var(--surface);border-top:1px solid var(--bd);overflow-y:auto;max-height:50vh}
.ava{border-radius:50%;background:linear-gradient(135deg,var(--pr),var(--ac));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;flex-shrink:0}
.u-name{font-size:13px;font-weight:600}
.u-role{font-size:11px;color:var(--t3)}
.role-btn{margin-left:auto;background:var(--s2);border:none;padding:4px 10px;border-radius:6px;font-size:10px;color:var(--t2);cursor:pointer;white-space:nowrap}

/* MAIN */
.main{margin-left:240px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--bd);padding:0 24px;height:58px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
.top-title{font-size:16px;font-weight:700;white-space:nowrap}
.sw{flex:1;max-width:400px;position:relative}
.sw input{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:var(--rs);padding:8px 12px 8px 34px;font-size:13px;outline:none;transition:border-color .15s;font-family:var(--font)}
.sw input:focus{border-color:var(--pr);background:#fff}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--t3);pointer-events:none}
.top-acts{margin-left:auto;display:flex;gap:8px}
.content{padding:24px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:var(--rs);font-size:13px;font-weight:600;border:none;cursor:pointer;transition:all .15s;font-family:var(--font);white-space:nowrap}
.bp{background:var(--pr);color:#fff}.bp:hover{background:var(--pr-d)}
.bs{background:var(--surface);border:1px solid var(--bd);color:var(--t2)}.bs:hover{background:var(--s2);color:var(--tx)}
.ba{background:var(--ac);color:#fff}.ba:hover{filter:brightness(.9)}
.bd2{background:var(--dn);color:#fff}.bd2:hover{filter:brightness(.9)}
.sm{padding:5px 10px;font-size:12px}
.gh{background:none;border:none;color:var(--t2);padding:6px 10px}.gh:hover{background:var(--s2)}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--bd);border-radius:var(--r);padding:20px;box-shadow:var(--sh)}
.chd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.ctitle{font-size:14px;font-weight:700}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.sc{background:var(--surface);border:1px solid var(--bd);border-radius:var(--r);padding:16px 18px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.slbl{font-size:12px;color:var(--t2);margin-bottom:2px;font-weight:500}
.sval{font-size:26px;font-weight:800;line-height:1}
.ssub{font-size:11px;color:var(--t3);margin-top:3px}

/* GRID LAYOUTS */
.dash-grid{display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:auto auto;gap:16px}
.span2{grid-column:span 2}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* CHANGE ITEM */
.chi{border:1px solid var(--bd);border-radius:var(--rs);padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color .15s}
.chi:hover{border-color:var(--pr);box-shadow:0 0 0 3px var(--pr-l)}
.chi-hd{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.pri{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.ph{background:var(--dn-l);color:var(--dn)}.pm{background:var(--wn-l);color:var(--wn)}.pl{background:var(--ac-l);color:var(--ac)}.pe{background:var(--s2);color:var(--t2)}
.chi-title{font-size:13.5px;font-weight:600}
.diff{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0}
.db{background:#FFF0F0;border-radius:6px;padding:8px 10px;font-size:12px;color:#C0392B}
.da{background:#F0FFF4;border-radius:6px;padding:8px 10px;font-size:12px;color:#1E8449}
.dlbl{font-size:10px;font-weight:700;margin-bottom:2px}
.pbar{height:5px;background:var(--s2);border-radius:3px;overflow:hidden;margin-top:3px}
.pfill{height:100%;background:var(--ac);border-radius:3px;transition:width .5s}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.chip{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.cok{background:var(--ac-l);color:var(--ac)}.cno{background:var(--s2);color:var(--t3)}

/* TABS */
.tabs{display:flex;gap:3px;background:var(--s2);padding:3px;border-radius:var(--rs);width:fit-content;margin-bottom:18px;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:6px;font-size:13px;font-weight:600;border:none;cursor:pointer;background:none;color:var(--t2);transition:all .15s;font-family:var(--font)}
.tab.active{background:#fff;color:var(--pr);box-shadow:0 1px 4px rgba(0,0,0,.1)}

/* MANUAL GRID */
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mi{border:1px solid var(--bd);border-radius:var(--rs);padding:14px;cursor:pointer;transition:all .15s;background:var(--surface)}
.mi:hover{border-color:var(--pr);transform:translateY(-1px);box-shadow:var(--sh)}
.mmeta{display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.cbadge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--pr-l);color:var(--pr)}
.mtitle{font-size:14px;font-weight:700;margin-bottom:4px}
.msum{font-size:12px;color:var(--t2);line-height:1.5}
.mtags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.tag{font-size:11px;background:var(--s2);color:var(--t3);padding:2px 7px;border-radius:4px}
.mfoot{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--bd)}
.oc{background:var(--dn-l);color:var(--dn);font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
.ow{background:var(--wn-l);color:var(--wn);font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}

/* CAT GRID */
.cgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.cc{background:var(--surface);border:1px solid var(--bd);border-radius:var(--r);padding:22px 16px;text-align:center;cursor:pointer;transition:all .15s}
.cc:hover{border-color:var(--pr);box-shadow:var(--sh);transform:translateY(-2px)}

/* TABLE */
table{width:100%;border-collapse:collapse}
th{font-size:12px;color:var(--t3);font-weight:600;text-align:left;padding:10px 14px;border-bottom:2px solid var(--bd)}
td{padding:11px 14px;border-bottom:1px solid var(--bd);font-size:13.5px}
tr:hover td{background:var(--s2)}

/* FEEDBACK */
.fbi{border:1px solid var(--bd);border-radius:var(--rs);padding:14px;margin-bottom:10px}
.fbhd{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.fbs{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}
.sn{background:var(--wn-l);color:var(--wn)}.sr{background:var(--pr-l);color:var(--pr)}.sa{background:var(--ac-l);color:var(--ac)}

/* REVIEW ITEM */
.rvi{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--bd)}
.rvi-info{flex:1}

/* QUIZ */
.qbox{background:var(--s2);border-radius:var(--rs);padding:16px;margin-bottom:14px}
.qopts{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.qopt{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--bd);border-radius:var(--rs);cursor:pointer;transition:all .15s;font-size:13px}
.qopt:hover{border-color:var(--pr);background:var(--pr-l)}
.qopt.correct{background:var(--ac-l);border-color:var(--ac)}
.qopt.wrong{background:var(--dn-l);border-color:var(--dn)}
.qnum{width:24px;height:24px;border-radius:50%;background:var(--bd);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}

/* POP */
.pop-prev{background:#fff;border:2px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-top:14px}
.pop-body{padding:24px}
.pop-fmts{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.pf{background:var(--s2);border:2px solid transparent;border-radius:var(--rs);padding:10px;text-align:center;cursor:pointer;transition:all .15s;font-size:12px;font-weight:600;color:var(--t2)}
.pf.active{border-color:var(--pr);background:var(--pr-l);color:var(--pr)}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
.mo.show{display:flex}
.modal{background:var(--surface);border-radius:var(--r);width:100%;max-width:680px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--sh2)}
/* 버그8 fix: 모바일 키보드 올라올 때 모달이 짤리지 않도록 */
@media(max-width:768px){
  .mo{align-items:flex-start;padding:12px 12px 0;overflow-y:auto}
  .modal{max-height:none;min-height:auto;margin:auto 0}
  .dash-top-grid{grid-template-columns:1fr !important}
}
.mhd{padding:18px 22px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mtit{font-size:16px;font-weight:700}
.mbody{padding:20px 22px;overflow-y:auto;flex:1}
.mfoot{padding:14px 22px;border-top:1px solid var(--bd);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}

/* SEARCH OVERLAY */
.so{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:flex-start;justify-content:center;padding-top:80px}
.so.show{display:flex}
.sm2{background:var(--surface);border-radius:var(--r);width:600px;max-height:70vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--sh2)}
.shd{padding:14px 18px;border-bottom:1px solid var(--bd);display:flex;gap:10px;align-items:center}
.sinp{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:var(--rs);padding:9px 13px;font-size:14px;outline:none;font-family:var(--font)}
.sinp:focus{border-color:var(--pr)}
.sres{overflow-y:auto;padding:10px}
.sri{padding:12px;border-radius:var(--rs);cursor:pointer;border:1px solid transparent;margin-bottom:6px;transition:all .15s}
.sri:hover{background:var(--pr-l);border-color:var(--pr)}
.hl{color:var(--pr);font-weight:700}

/* FORM */
.fg{margin-bottom:14px}
.fl{font-size:13px;font-weight:600;margin-bottom:5px;display:block}
.fh{font-size:11px;color:var(--t3);margin-top:3px}
.fi{width:100%;padding:9px 13px;background:var(--s2);border:1px solid var(--bd);border-radius:var(--rs);font-size:13.5px;outline:none;font-family:var(--font);transition:border-color .15s}
.fi:focus{border-color:var(--pr);background:#fff}
textarea.fi{resize:vertical;min-height:80px}
select.fi{cursor:pointer}
.imodes{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px}
.imode{background:var(--s2);border:2px solid transparent;border-radius:var(--rs);padding:12px 6px;text-align:center;cursor:pointer;transition:all .15s}
.imode:hover,.imode.active{border-color:var(--pr);background:var(--pr-l)}
.imode-icon{font-size:22px;display:block;margin-bottom:4px}
.imode-lbl{font-size:11px;color:var(--t2);font-weight:600}
.egrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.sei{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.sei input{flex:1;padding:7px 11px;background:var(--s2);border:1px solid var(--bd);border-radius:var(--rs);font-size:13px;outline:none;font-family:var(--font)}
.sei input:focus{border-color:var(--pr);background:#fff}
.sei button{background:none;border:none;cursor:pointer;color:var(--t3);font-size:14px;padding:4px}
.sei button:hover{color:var(--dn)}
.add-step{background:var(--s2);border:1px dashed var(--bd);border-radius:var(--rs);padding:7px;width:100%;font-size:12px;color:var(--t2);cursor:pointer;font-family:var(--font);transition:all .15s;margin-top:4px}
.add-step:hover{border-color:var(--pr);color:var(--pr);background:var(--pr-l)}

/* MANUAL DETAIL */
.msec{margin-bottom:18px}
.msec-t{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px;padding-bottom:5px;border-bottom:1px solid var(--bd)}
.step-list{list-style:none}
.step-it{display:flex;gap:11px;padding:8px 0;border-bottom:1px solid var(--bd);font-size:13px}
.snum{width:22px;height:22px;background:var(--pr);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.cscript{background:var(--pr-l);border-radius:var(--rs);padding:13px;font-size:13px;line-height:1.7;border-left:3px solid var(--pr)}
.wbox{background:var(--wn-l);border-radius:var(--rs);padding:11px;font-size:13px;color:#7D5A00;display:flex;gap:7px;margin-bottom:6px}
.chki{display:flex;align-items:flex-start;gap:8px;padding:6px 0;cursor:pointer;font-size:13px}
.chkb{width:16px;height:16px;border:2px solid var(--bd);border-radius:4px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.chkb.on{background:var(--ac);border-color:var(--ac)}.chkb.on::after{content:'v';color:#fff;font-size:10px;font-weight:700}

/* VOICE */
.vbtn{width:64px;height:64px;border-radius:50%;background:var(--dn);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;margin:14px auto;box-shadow:0 4px 16px rgba(232,70,70,.3)}
.vbtn.rec{animation:pulse 1s infinite;box-shadow:0 0 0 8px rgba(232,70,70,.2)}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes pulse2{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}

/* AI */
.ai-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:2px 7px;background:linear-gradient(135deg,#6B8EF5,var(--ac));color:#fff;border-radius:20px}
.ai-proc{text-align:center;padding:28px 20px}
.ai-spin{width:44px;height:44px;border:3px solid var(--pr-l);border-top-color:var(--pr);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
.ai-step{font-size:12px;color:var(--t3);padding:4px 0;display:flex;align-items:center;gap:7px}
.ai-step.done{color:var(--ac)}.ai-step.cur{color:var(--pr);font-weight:600}

/* TOAST */
.toast{position:fixed;bottom:26px;right:26px;background:var(--tx);color:#fff;padding:11px 18px;border-radius:var(--rs);font-size:13px;font-weight:600;z-index:500;transform:translateY(16px);opacity:0;transition:all .3s;max-width:320px;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{background:var(--ac)}.toast.err{background:var(--dn)}
@media(max-width:768px){
  .toast{bottom:76px} /* 탭바(60px) + 여백 */
}

/* ============ 기능14: 다크모드 ============ */
[data-theme="dark"] {
  --bg:#0f1117;--surface:#1a1d27;--s2:#22263a;--t2:#a0a8c0;--t3:#6b738a;
  --tx:#e8eaf6;--bd:#2d3250;--pr:#6B8EF5;--pr-l:#1a2040;
  --ac:#2eb87e;--ac-l:#0d2420;--wn:#e8a020;--wn-l:#2a1e00;
  --dn:#f06060;--dn-l:#2a1010;--sh2:0 4px 20px rgba(0,0,0,.5)
}
.hbg{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:8px;border:none;background:none}
.hbg span{display:block;width:20px;height:2px;background:var(--tx);border-radius:2px}

/* 기능8: 매뉴얼 상세 모달 하단 고정 확인 버튼 */
.modal-confirm-bar{position:sticky;bottom:0;background:var(--surface);border-top:1px solid var(--bd);padding:10px 16px;display:flex;gap:8px;align-items:center;z-index:10}
/* 기능8: 모바일 검색 버튼 (하단 탭바에 포함) */
.mob-search-fab{display:none;position:fixed;bottom:72px;right:16px;width:48px;height:48px;border-radius:50%;background:var(--pr);color:#fff;border:none;font-size:20px;cursor:pointer;box-shadow:var(--sh2);z-index:105;align-items:center;justify-content:center}
/* 기능3: 매뉴얼 상세 핵심 배너 */
.m-hero{background:linear-gradient(135deg,var(--pr),#6B8EF5);color:#fff;border-radius:var(--r);padding:16px 18px;margin-bottom:16px}
.m-hero-title{font-size:11px;font-weight:700;opacity:.75;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.m-hero-text{font-size:15px;font-weight:700;line-height:1.5}
/* 기능7: 담당자/점검일 배지 */

.m-meta-chip{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--s2);color:var(--t2);font-weight:600;display:flex;align-items:center;gap:4px}
.m-meta-chip.urgent{background:var(--dn-l);color:var(--dn)}
.m-meta-chip.warn{background:var(--wn-l);color:#7D5A00}
/* 기능2: 변경사항 재알림 버튼 */
.btn-remind{background:var(--wn-l);color:#7D5A00;border:1px solid var(--wn);padding:5px 12px;border-radius:var(--rs);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font)}
/* 기능11: 복제 버튼 */
.btn-clone{background:var(--s2);color:var(--t2);border:1px solid var(--bd);padding:5px 12px;border-radius:var(--rs);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font)}
/* 기능13: 정렬 토글 */
.sort-row{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.sort-btn{padding:4px 12px;border-radius:20px;border:1px solid var(--bd);background:transparent;color:var(--t2);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .15s}
.sort-btn.on{border-color:var(--pr);background:var(--pr-l);color:var(--pr)}

/* 7. 모바일 하단 탭바 */
.mob-tab{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--bd);z-index:110;padding:0 0 env(safe-area-inset-bottom)}
.mob-tab-inner{display:flex;align-items:stretch}
.mob-tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px 6px;border:none;background:none;cursor:pointer;font-family:var(--font);color:var(--t3);font-size:10px;font-weight:600;gap:3px;transition:color .15s;position:relative}
.mob-tab-btn.active{color:var(--pr)}
.mob-tab-btn .ti{font-size:20px;line-height:1}
.mob-tab-btn .tl{font-size:10px;line-height:1}
.mob-tab-badge{position:absolute;top:4px;right:calc(50% - 14px);background:var(--dn);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;min-width:16px;text-align:center}

/* 1. 버전 이력 배지 */
.ver-badge{font-size:10px;background:var(--s2);color:var(--t3);padding:2px 7px;border-radius:20px;font-weight:600}

/* 2. 즐겨찾기 별 */
.fav-btn{background:none;border:none;font-size:18px;cursor:pointer;padding:4px;line-height:1;transition:transform .2s}
.fav-btn:hover{transform:scale(1.2)}

/* 4. 코멘트 */
.comment-item{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--bd);font-size:12px}
.comment-ava{width:22px;height:22px;border-radius:50%;background:var(--pr);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}

/* 5. 직원 통계 */
.stat-mini{background:var(--s2);border-radius:var(--rs);padding:10px 14px;text-align:center;flex:1}
.stat-mini-val{font-size:22px;font-weight:800;line-height:1}
.stat-mini-lbl{font-size:11px;color:var(--t2);margin-top:3px}

/* 10. AI 시뮬레이터 채팅 */
.sim-msg{display:flex;gap:8px;margin-bottom:12px}
.sim-msg.ai{justify-content:flex-start}
.sim-msg.user{justify-content:flex-end}
.sim-bubble{max-width:80%;padding:10px 14px;border-radius:var(--r);font-size:13px;line-height:1.6}
.sim-msg.ai .sim-bubble{background:var(--s2);border-bottom-left-radius:4px}
.sim-msg.user .sim-bubble{background:var(--pr);color:#fff;border-bottom-right-radius:4px}
.sim-input-row{display:flex;gap:8px;padding:12px 0 0;border-top:1px solid var(--bd);margin-top:8px}
.sim-input-row input{flex:1;padding:9px 13px;background:var(--s2);border:1px solid var(--bd);border-radius:var(--rs);font-size:13px;outline:none;font-family:var(--font)}
.sim-input-row input:focus{border-color:var(--pr);background:#fff}

/* EMPTY */
.empty{text-align:center;padding:48px 20px}
.ei{font-size:48px;margin-bottom:12px}
.et{font-size:16px;font-weight:700;margin-bottom:5px}
.ed{font-size:13px;color:var(--t2)}

/* SETTINGS */
.set-sec{margin-bottom:22px;padding-bottom:22px;border-bottom:1px solid var(--bd)}
.set-sec:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.set-title{font-size:14px;font-weight:700;margin-bottom:12px}
.api-row{display:flex;gap:8px}
.api-row input{flex:1}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}
  .main{margin-left:0}.hbg{display:flex}
  .mob-tab{display:block}
  .mob-search-fab{display:flex}
  .content{padding:14px;padding-bottom:80px}

  .stats-row{grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
  .dash-grid{display:flex;flex-direction:column;gap:12px}
  .dash-grid > .card,
  .dash-grid > .card.span2{grid-column:unset;width:100%}

  .egrid,.cgrid{grid-template-columns:1fr 1fr}
  .mgrid,.g2{grid-template-columns:1fr}
  .pop-fmts,.imodes{grid-template-columns:repeat(2,1fr)}
  .topbar{padding:0 14px}
  .diff{grid-template-columns:1fr}
}
@media(max-width:480px){
  .stats-row{grid-template-columns:1fr 1fr}
  .cgrid{grid-template-columns:repeat(2,1fr)}
}

function buildNav() {
  var nav = S.role==='admin' ? ADMIN_NAV : STAFF_NAV;
  var html = nav.map(function(n) {
    if (n.sec) return '<div class="nav-sec">'+n.sec+'</div>';
    var badge = n.badge ? '<span class="nbadge" id="'+n.badge+'"></span>' : '';
    var cls = 'ni' + (S.page===n.id ? ' active' : '');
    return '<button class="'+cls+'" onclick="go(\''+n.id+'\')" id="nav-'+n.id+'"><span class="ni-icon">'+n.icon+'</span>'+n.lbl+badge+'</button>';
  }).join('');
  document.getElementById('snav').innerHTML = html;
  updBadges();
  buildMobTab();
}

function inboxBadge() {
  var n = (DATA.inbox||[]).filter(function(x){ return x.status==='pending'; }).length;
  return n > 0 ? n : '';
}

function buildMobTab() {
  var el = document.getElementById('mobTabInner');
  if (!el) return;
  var tabs = S.role==='admin'
    ? [
        {id:'dashboard',icon:'&#128202;',lbl:'홈'},
        {id:'manuals',icon:'&#128218;',lbl:'매뉴얼'},
        {id:'favorites',icon:'⭐',lbl:'즐겨'},
        {id:'changes',icon:'&#128226;',lbl:'변경',badge:true},
        {id:'settings',icon:'⚙️',lbl:'설정'}
      ]
    : [
        {id:'staff-home',icon:'&#127968;',lbl:'홈'},
        {id:'manuals',icon:'&#128218;',lbl:'매뉴얼'},
        {id:'favorites',icon:'⭐',lbl:'즐겨'},
        {id:'changes',icon:'&#128226;',lbl:'변경',badge:true},
        {id:'feedback-submit',icon:'&#128221;',lbl:'제보'}
      ];
  el.innerHTML = tabs.map(function(t){
    var unread = 0;
    if (t.badge) {
      if (S.role==='staff'&&S.currentStaff) unread=DATA.changes.filter(function(c){return c.readBy.indexOf(S.currentStaff.id)<0;}).length;
      else unread=DATA.staff.length?DATA.changes.filter(function(c){return c.readBy.length<DATA.staff.length;}).length:0;
    }
    var isActive = S.page===t.id || (t.id==='favorites' && S.page==='favorites');
    return '<button class="mob-tab-btn'+(isActive?' active':'')+'" onclick="go(\''+t.id+'\')">'
      +'<span class="ti">'+t.icon+'</span>'
      +(t.badge&&unread?'<span class="mob-tab-badge">'+unread+'</span>':'')
      +'<span class="tl">'+t.lbl+'</span></button>';
  }).join('');
}

function updBadges() {
  var cb = document.getElementById('chBadge');
  var fb = document.getElementById('fbBadge');
  if (cb) {
    var n;
    if (S.role === 'staff' && S.currentStaff) {
      // 직원 모드: 내가 안 읽은 것만
      var sid = S.currentStaff.id;
      n = DATA.changes.filter(function(c){ return c.readBy.indexOf(sid) < 0; }).length;
    } else {
      // 관리자 모드: 전체 직원 중 누군가 안 읽은 것
      n = DATA.staff.length
        ? DATA.changes.filter(function(c){ return c.readBy.length < DATA.staff.length; }).length
        : 0;
    }
    cb.textContent = n || '';
  }
  if (fb) {
    var n2 = DATA.feedback.filter(function(f){ return f.status==='new'; }).length;
    fb.textContent = n2 || '';
  }
}

function go(page) {
  var prev = S.page;
  S.page = page;
  // 버그7: 변경사항 탭 떠날 때 필터 초기화
  if (prev === 'changes' && page !== 'changes') chFilter = 'all';
  // 버그13: 직원 전환 시 더보기 상태 초기화
  if (page === 'staff-home') S._staffShowAll = false;
  // 피드백 탭 필터 초기화
  if (prev === 'feedback' && page !== 'feedback') fbFilter = 'all';
  document.getElementById('topTitle').textContent = TITLES[page] || page;
  buildNav();
  renderPage(page);
  if (window.innerWidth <= 768) toggleSB(false);
}

function renderPage(page) {
  var el = document.getElementById('pg');
  var acts = document.getElementById('topActs');
  if (!el) return;

  if (S.role === 'admin') {
    var btnMap = {
      dashboard: '<button class="btn bs sm" onclick="openChModal()">&#128226; 변경사항 추가</button><button class="btn bp sm" onclick="openNewMModal()">＋ 새 매뉴얼</button><button class="btn bp sm" onclick="go(\'inbox\')">&#128229; AI 지식 수집함</button>',
      manuals: '<button class="btn bp sm" onclick="openNewMModal()">＋ 새 매뉴얼</button>',
      changes: '<button class="btn bp sm" onclick="openChModal()">&#128226; 변경사항 추가</button>',
      staff: '<button class="btn bp sm" onclick="openAddStaff()">＋ 직원 추가</button>',
      quiz: '<button class="btn bp sm" onclick="openNewQuiz()">＋ 새 퀴즈</button>'
    };
    if (acts) acts.innerHTML = btnMap[page] || '';
  } else {
    if (acts) acts.innerHTML = '<button class="btn bp sm" onclick="go(\'inbox\')">&#128229; AI 지식 수집함</button>';
  }

  var fn = {
    dashboard: pgDash,
    manuals: pgManuals,
    categories: pgCats,
    'cat-manage': pgCatManage,
    changes: pgChanges,
    staff: pgStaff,
    feedback: pgFeedback,
    review: pgReview,
    quiz: pgQuiz,
    'ai-sim': pgAISim,
    pop: pgPOP,
    settings: pgSettings,
    'staff-home': pgStaffHome,
    'my-confirm': pgMyConfirm,
    'feedback-submit': pgFbSubmit,
    favorites: pgFavorites,
    'staff-detail': pgStaffDetail,
    'inbox': pgInbox
  };

  try {
    el.innerHTML = fn[page] ? fn[page]() : pgNotFound();
  } catch(e) {
    console.error('[renderPage] ' + page + ' 오류:', e);
    el.innerHTML = '<div style="padding:24px;text-align:center">'
      +'<div style="font-size:40px;margin-bottom:12px">&#9888;&#65039;</div>'
      +'<div style="font-size:16px;font-weight:700;margin-bottom:8px">화면을 불러올 수 없습니다</div>'
      +'<div style="font-size:13px;color:var(--t2);margin-bottom:16px">'+e.message+'</div>'
      +'<button class="btn bp" onclick="location.reload()">페이지 새로고침</button>'
      +'</div>';
  }
  buildMobTab();
}

function pgDash() {
  var nm = DATA.manuals ? DATA.manuals.length : 0;
  var nc = DATA.changes ? DATA.changes.length : 0;
  var staffLen = (DATA.staff && DATA.staff.length) || 1;
  var unread = DATA.changes ? DATA.changes.filter(function(c){return (c.readBy||[]).length<staffLen;}).length : 0;
  var fnew = DATA.feedback ? DATA.feedback.filter(function(f){return f.status==='new';}).length : 0;
  var nr = DATA.manuals ? DATA.manuals.filter(function(m){return daysSince(m.updatedAt||Date.now())>90;}).length : 0;

  // 3일 이상 미확인 변경사항 경고
  var staleChanges = (DATA.changes||[]).filter(function(c) {
    var daysOld = daysSince(c.createdAt);
    var unreadCount = staffLen - (c.readBy||[]).length;
    return daysOld >= 3 && unreadCount > 0;

// 변경사항 수정 모달
function openChEditModal(id) {
  var c = DATA.changes.find(function(x){ return x.id===id; });
  if (!c) return;

  var body = '<div>'
    + '<div class="fg" style="margin-bottom:10px"><div class="fl">\uC81C\uBAA9</div>'
    + '<input class="fi" id="chEditTitle" value="' + esc(c.title||'') + '"></div>'
    + '<div class="fg" style="margin-bottom:10px"><div class="fl">\uC720\uD615</div>'
    + '<select class="fi" id="chEditType">'
    + ['중요','진열','가격','신제품','공지','신규','기타'].map(function(t){ return '<option value="'+t+'"'+(t===c.type?' selected':'')+'>'+t+'</option>'; }).join('')
    + '</select></div>'
    + '<div class="fg" style="margin-bottom:10px"><div class="fl">\uBCC0\uACBD \uC804</div>'
    + '<textarea class="fi" id="chEditBefore" rows="3">' + esc(c.before||'') + '</textarea></div>'
    + '<div class="fg"><div class="fl">\uBCC0\uACBD \uD6C4</div>'
    + '<textarea class="fi" id="chEditAfter" rows="3">' + esc(c.after||'') + '</textarea></div>'
    + '</div>';

  openMod('&#9998; \uBCC0\uACBD\uC0AC\uD56D \uC218\uC815',
    body,
    '<button class="btn bs" onclick="closeMod()">\uCDE8\uC18C</button>'
    + '<button class="btn bp" onclick="saveChEdit(' + id + ')">\uC800\uC7A5</button>'
  );
}

function saveChEdit(id) {
  var c = DATA.changes.find(function(x){ return x.id===id; });
  if (!c) return;
  var title = document.getElementById('chEditTitle').value.trim();
  var type = document.getElementById('chEditType').value;
  var before = document.getElementById('chEditBefore').value.trim();
  var after = document.getElementById('chEditAfter').value.trim();
  if (!title || !after) { showToast('\uC81C\uBAA9\uACFC \uBCC0\uACBD \uD6C4 \uB0B4\uC6A9\uC740 \uD544\uC218\uC785\uB2C8\uB2E4', 'err'); return; }

  c.title = title; c.type = type; c.before = before; c.after = after;
  fsSave('changes', c);
  showToast('&#10003; \uC218\uC815\uB418\uC5C8\uC2B5\uB2C8\uB2E4', 'ok');
  closeMod();
  renderPage('changes');
}

function deleteChItem(id) {
  var c = DATA.changes.find(function(x){ return x.id===id; });
  if (!c) return;
  if (!confirm('\'' + c.title + '\' \uBCC0\uACBD\uC0AC\uD56D\uC744 \uC0AD\uC81C\uD558\uC2DC\uACA0\uC2B5\uB2C8\uAE4C?')) return;

  DATA.changes = DATA.changes.filter(function(x){ return x.id !== id; });
  fsDelete('changes', id);
  showToast('&#10003; \uC0AD\uC81C\uB418\uC5C8\uC2B5\uB2C8\uB2E4', 'ok');
  renderPage('changes');
}

function chItem(c, compact) {
  var pmap = {'중요':'ph','진열':'pm','가격':'pl','신제품':'pl'};
  var cls = pmap[c.type] || 'pe';
  var total = DATA.staff.length || 1; // 버그1: 0으로 나누기 방지
  var rate = Math.round(c.readBy.length / total * 100);
  var byStr = c.createdBy ? ' &middot; '+c.createdBy+' 등록' : '';
  var isStale = daysSince(c.createdAt) >= 3 && c.readBy.length < total;
  var diffHtml = compact
    ? '<div style="font-size:12px;color:var(--t2);margin-top:4px">'+c.after+'</div>'
    : '<div class="diff"><div class="db"><div class="dlbl">변경 전</div>'+c.before+'</div><div class="da"><div class="dlbl">변경 후</div>'+c.after+'</div></div>';
  var adminBtns = (S.role==='admin' && !compact)
    ? '<div style="display:flex;gap:6px;margin-top:8px" onclick="event.stopPropagation()">'
      + '<button class="btn bs sm" onclick="openChEditModal('+c.id+')">&#9998; 수정</button>'
      + '<button class="btn bd2 sm" onclick="deleteChItem('+c.id+')">&#128465;&#65039; 삭제</button>'
      + '</div>'
    : '';
  return '<div class="chi" onclick="openChDetail('+c.id+')" style="'+(isStale?'border-color:var(--dn)':'')+'">'
    +'<div class="chi-hd"><span class="pri '+cls+'">'+c.type+'</span><span class="chi-title">'+c.title+'</span>'
    +(isStale?'<span style="font-size:10px;background:var(--dn-l);color:var(--dn);padding:2px 7px;border-radius:10px;font-weight:700">&#9203; '+daysSince(c.createdAt)+'\uc77c\uc9f8 \ubbf8\ud655\uc778</span>':'')
    +(c.createdBy&&c.createdBy!=='관리자'
      ?'<span style="font-size:10px;background:var(--wn-l);color:var(--wn);padding:2px 7px;border-radius:10px;font-weight:700">'+c.createdBy+'</span>'
      :'<span class="ai-badge">&#10022; AI</span>')
    +'</div>'
    +diffHtml
    +'<div style="margin-top:8px"><div style="font-size:11px;color:var(--t3)">'+c.readBy.length+'/'+DATA.staff.length+'명 확인 &middot; '+rate+'%'+byStr+'</div>'
    +'<div class="pbar"><div class="pfill" style="width:'+Math.min(rate,100)+'%"></div></div></div>'
    +adminBtns
    +'</div>';
}

function pgManuals() {
  var cats = ['전체'].concat(DATA.cats.map(function(c){ return c.name; }));
  var cur = S.mtab || '전체';
  var curSub = S.mtab3 || '';

  // 1차 필터 (cat)
  var list = cur==='전체' ? DATA.manuals.slice()
    : DATA.manuals.filter(function(m){ return m.cat===cur; });

  // 2차 서브탭 (cat3)
  var cat3List = [];
  if (cur !== '전체') {
    var cat3Set = {};
    list.forEach(function(m){ if(m.cat3) cat3Set[m.cat3]=true; });
    cat3List = Object.keys(cat3Set);
    if (curSub && cat3List.indexOf(curSub) >= 0) {
      list = list.filter(function(m){ return m.cat3 === curSub; });
    }
  }

  // 정렬
  if (manualSort==='views') list.sort(function(a,b){return b.views-a.views;});
  else if (manualSort==='alpha') list.sort(function(a,b){return a.title.localeCompare(b.title,'ko');});
  else if (manualSort==='review') list.sort(function(a,b){return new Date(a.updatedAt)-new Date(b.updatedAt);});
  else list.sort(function(a,b){return new Date(b.updatedAt)-new Date(a.updatedAt);});

  return '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:10px">'
    +'<div class="tabs" style="flex-wrap:wrap">'
    +cats.map(function(t){
      return '<button class="tab'+(cur===t?' active':'')+'" onclick="S.mtab3=\'\';setMTab(\''+t+'\')">'+t+'</button>';
    }).join('')
    +'</div>'
    +(S.role==='admin'?'<div style="display:flex;gap:6px">'
      +'<button class="btn '+(MANUAL_SELECT_MODE?'bd2':'bs')+' sm" onclick="toggleManualSelectMode()">'+(MANUAL_SELECT_MODE?'&#10005; 선택취소':'&#9989; 선택삭제')+'</button>'
      +(MANUAL_SELECT_MODE?'':'<button class="btn bp sm" onclick="openNewMModal()">+ 새 매뉴얼</button>')
      +'</div>':'')
    +'</div>'
    // 선택모드 안내바
    +(MANUAL_SELECT_MODE
      ? '<div style="display:flex;align-items:center;justify-content:space-between;background:var(--dn-l);border:1px solid var(--dn);border-radius:var(--rs);padding:10px 14px;margin-bottom:12px;flex-wrap:wrap;gap:8px">'
        +'<div style="font-size:13px;font-weight:600;color:var(--dn)">'+MANUAL_SELECTED.length+'\uac1c \uc120\ud0dd\ub428</div>'
        +'<div style="display:flex;gap:6px">'
        +'<button class="btn bs sm" onclick="manualSelectAll(window.__curManualList||[])">\uc804\uccb4 \uc120\ud0dd</button>'
        +'<button class="btn bs sm" onclick="manualSelectNone()">\uc120\ud0dd \ud574\uc81c</button>'
        +(MANUAL_SELECTED.length>=2?'<button class="btn bp sm" onclick="mergeSelectedManuals()">&#10022; \uc120\ud0dd \ubcd1\ud569 ('+MANUAL_SELECTED.length+')</button>':'')
        +'<button class="btn bd2 sm" onclick="deleteSelectedManuals()">&#128465;&#65039; \uc120\ud0dd \uc0ad\uc81c ('+MANUAL_SELECTED.length+')</button>'
        +'</div></div>'
      : '')
    // cat3 서브탭 (해당 카테고리에 cat3가 있을 때만)
    +(cat3List.length>1
      ? '<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px;padding:6px 10px;background:var(--s2);border-radius:var(--rs)">'
        +'<span style="font-size:11px;color:var(--t3);align-self:center;margin-right:4px">세부분류:</span>'
        +'<button class="sort-btn'+(curSub===''?' on':'')+'" onclick="S.mtab3=\'\';renderPage(\'manuals\')">전체</button>'
        +cat3List.map(function(s3){
          return '<button class="sort-btn'+(curSub===s3?' on':'')+'" onclick="S.mtab3=\''+s3+'\';renderPage(\'manuals\')">'+s3+'</button>';

        +'</div>'
      : '')
    // 정렬 버튼

    +[['recent','최신수정순'],['views','조회순'],['alpha','가나다순'],['review','점검필요순']].map(function(s){
      return '<button class="sort-btn'+(manualSort===s[0]?' on':'')+'" onclick="setManualSort(\''+s[0]+'\')">'+s[1]+'</button>';
    }).join('')
    +'</div>'
    +(list.length===0?'<div class="empty"><div class="ei">&#128269;</div><div class="et">매뉴얼 없음</div></div>':'')
    +'<div class="mgrid">'
    +(window.__curManualList = list, '')
    +list.map(function(m){

      var isSelected = MANUAL_SELECTED.indexOf(m.id) >= 0;
      // cat3 경로 표시: 조제 > 항생제 시럽
      var catPath = m.cat + (m.cat3?' > '+m.cat3:'');
      return '<div class="mi" style="'+(MANUAL_SELECT_MODE&&isSelected?'outline:2px solid var(--dn);outline-offset:-2px;background:var(--dn-l)':'')+'" onclick="'+(MANUAL_SELECT_MODE?'toggleManualSelected('+m.id+')':'openMDetail('+m.id+')')+'">'

        +'<div class="mtitle">'+m.title+'</div>'
        +(assignee?'<div style="font-size:11px;color:var(--t2);margin-bottom:3px">&#128100; '+assignee+(nextReview?' &middot; 점검: '+nextReview:'')+'</div>':'')

        +'</div></div></div>';

function pgCats() {

    return '<div class="empty"><div class="ei">&#128193;</div><div class="et">\uce74\ud14c\uace0\ub9ac\uac00 \uc5c6\uc2b5\ub2c8\ub2e4</div>'

      + (S.role==='admin'
        ? '<div style="display:flex;gap:8px;justify-content:center;margin-top:12px">'
          + '<button class="btn bp sm" onclick="restoreDefaultCats()">&#8634; \uae30\ubcf8\uac12\uc73c\ub85c \ubcf5\uc6d0</button>'
          + '<button class="btn bs sm" onclick="go(\'cat-manage\')">\uce74\ud14c\uace0\ub9ac \uad00\ub9ac\ub85c \uc774\ub3d9</button>'
          + '</div>'
        : '')
      + '</div>';
  }

  var groups = {};
  DATA.cats.forEach(function(c) {
    var g = c.group || '\uae30\ud0c0';
    if (!groups[g]) groups[g] = [];
    groups[g].push(c);
  });

  var groupColors = {
    '업무별': 'var(--pr)', '상황별': 'var(--wn)', '제품별': 'var(--ac)', '기타': 'var(--t3)'
  };

  return Object.keys(groups).map(function(g) {
    return '<div style="margin-bottom:24px">'
      +'<div style="font-size:11px;font-weight:800;color:'+(groupColors[g]||'var(--t3)')+';text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;display:flex;align-items:center;gap:6px">'
      +'<div style="width:3px;height:14px;background:'+(groupColors[g]||'var(--t3)')+';border-radius:2px"></div>'
      +g
      +'</div>'
      +'<div class="cgrid">'

// 두 매뉴얼 간 유사도 점수 계산 (0~100)
function manualSimilarity(a, b) {
  if (a.id === b.id) return 0;
  var score = 0;

  // 제목 단어 겹침
  var aWords = (a.title||'').split(/\s+/).filter(function(w){return w.length>=2;});
  var bTitle = b.title||'';
  aWords.forEach(function(w){ if (bTitle.indexOf(w)>=0) score += 12; });

  // 태그 겹침
  var aTags = a.tags||[], bTags = b.tags||[];
  var tagOverlap = aTags.filter(function(t){ return bTags.indexOf(t)>=0; }).length;
  score += tagOverlap * 10;

  // 카테고리/세부분류 일치
  if (a.cat === b.cat) score += 8;
  if (a.cat2 && a.cat2 === b.cat2) score += 6;
  if (a.cat3 && a.cat3 === b.cat3) score += 6;

  // 키워드 겹침
  var aKw = a.keywords||[], bKw = b.keywords||[];
  var kwOverlap = aKw.filter(function(k){ return bKw.indexOf(k)>=0; }).length;
  score += kwOverlap * 8;

  // 요약 문장 단어 겹침 (간단 토큰 비교)
  var aSumWords = (a.summary||'').split(/[\s,.]+/).filter(function(w){return w.length>=2;});
  var bSummary = b.summary||'';
  var sumOverlap = aSumWords.filter(function(w){ return bSummary.indexOf(w)>=0; }).length;
  score += Math.min(sumOverlap * 3, 15);

  // steps 문장 겹침 (제목 키워드 기반 약식 비교)
  var aSteps = (a.steps||[]).join(' ');
  var bSteps = (b.steps||[]).join(' ');
  var stepWords = aSteps.split(/[\s,.]+/).filter(function(w){return w.length>=3;});
  var stepOverlap = stepWords.filter(function(w){ return bSteps.indexOf(w)>=0; }).length;
  score += Math.min(stepOverlap * 2, 20);

  return Math.min(Math.round(score), 100);
}

// 전체 매뉴얼 쌍별 중복 검사 (50% 이상만 반환)
function findDuplicateManuals() {
  var pairs = [];
  var manuals = DATA.manuals;
  for (var i = 0; i < manuals.length; i++) {
    for (var j = i+1; j < manuals.length; j++) {
      var score = manualSimilarity(manuals[i], manuals[j]);
      if (score >= 50) {
        pairs.push({ a: manuals[i], b: manuals[j], score: score });
      }
    }
  }
  pairs.sort(function(x,y){ return y.score - x.score; });
  return pairs;
}

var DUP_IGNORED = []; // 세션 내 무시한 쌍 (id1-id2)
var DUP_RESULTS = null;

function dupPairKey(a, b) {
  return [a.id, b.id].sort().join('-');

function runDuplicateCheck() {

async function runSelectDupAction(action) {

// dupMergeManuals의 무음 버전 (토스트/모달 전환 없이 결과만 반환) - 일괄 처리용
async function dupMergeManualsSilent(aId, bId) {
  var a = DATA.manuals.find(function(m){return m.id===aId;});
  var b = DATA.manuals.find(function(m){return m.id===bId;});
  if (!a || !b) return false;

  var key = S.gemKey || localStorage.getItem('gmKey') || '';
  if (!key) return false;

  var prompt = '\uc544\ub798 \ub450 \uac1c\uc758 \uc57d\uad6d \uc5c5\ubb34 \ub9e4\ub274\uc5bc\uc740 \ub0b4\uc6a9\uc774 \uacb9\uce69\ub2c8\ub2e4. \uc911\ubcf5\uc744 \uc81c\uac70\ud558\uace0 \ud558\ub098\uc758 \uc644\uc131\ub3c4 \ub192\uc740 \ub9e4\ub274\uc5bc\ub85c \ud569\uccd0\uc8fc\uc138\uc694.\n\n'
    + '=== \ub9e4\ub274\uc5bc A ===\n\uc81c\ubaa9: ' + a.title + '\n\uc694\uc57d: ' + a.summary + '\n\ub2e8\uacc4: ' + (a.steps||[]).join(' / ') + '\n\uace0\uac1d\uba58\ud2b8: ' + a.customerScript + '\n\uc8fc\uc758\uc0ac\ud56d: ' + (a.warnings||[]).join(' / ') + '\n\uccb4\ud06c\ub9ac\uc2a4\ud2b8: ' + (a.checklist||[]).join(' / ') + '\n\n'
    + '=== \ub9e4\ub274\uc5bc B ===\n\uc81c\ubaa9: ' + b.title + '\n\uc694\uc57d: ' + b.summary + '\n\ub2e8\uacc4: ' + (b.steps||[]).join(' / ') + '\n\uace0\uac1d\uba58\ud2b8: ' + b.customerScript + '\n\uc8fc\uc758\uc0ac\ud56d: ' + (b.warnings||[]).join(' / ') + '\n\uccb4\ud06c\ub9ac\uc2a4\ud2b8: ' + (b.checklist||[]).join(' / ') + '\n\n'
    + 'JSON\ub9cc \ubc18\ud658(\ubc31\ud2f1\uc5c6\uc774): {"title":"","summary":"","steps":[],"customerScript":"","warnings":[],"checklist":[],"tags":[]}';

  var result = await callGem(prompt);
  var merged = null;
  if (result) {
    try {
      var clean = result.replace(/```json|```/g,'').trim();
      var m = clean.match(/\{[\s\S]*\}/);
      if (m) merged = JSON.parse(m[0]);
    } catch(e) {}
  }
  if (!merged) return false;

  var nm = {
    id: Date.now() + Math.floor(Math.random()*1000),
    title: merged.title || a.title,
    cat: a.cat, cat2: a.cat2 || b.cat2, cat3: a.cat3 || b.cat3,
    keywords: Array.from(new Set((a.keywords||[]).concat(b.keywords||[]).concat(merged.tags||[]))),
    summary: merged.summary || a.summary,
    steps: merged.steps && merged.steps.length ? merged.steps : (a.steps||[]),
    customerScript: merged.customerScript || a.customerScript,
    warnings: merged.warnings && merged.warnings.length ? merged.warnings : (a.warnings||[]),
    checklist: merged.checklist && merged.checklist.length ? merged.checklist : (a.checklist||[]),
    tags: Array.from(new Set((a.tags||[]).concat(b.tags||[]).concat(merged.tags||[]))),
    updatedAt: new Date(), views: (a.views||0)+(b.views||0), history: (a.history||[]).concat(b.history||[])
  };

  DATA.manuals.unshift(nm);
  fsSave('manuals', nm);
  reassignManualRefs(aId, nm.id);
  reassignManualRefs(bId, nm.id);
  DATA.manuals = DATA.manuals.filter(function(m){ return m.id !== aId && m.id !== bId; });
  fsDelete('manuals', aId);
  fsDelete('manuals', bId);

  return true;
}

function answerQ(el) {
  var qi=parseInt(el.dataset.qi), oi=parseInt(el.dataset.oi), ans=parseInt(el.dataset.ans);
  var container=el.closest('.qopts');
  container.querySelectorAll('.qopt').forEach(function(o){
    var thisOi=parseInt(o.dataset.oi);
    o.classList.remove('correct','wrong');
    if(thisOi===ans) o.classList.add('correct');
    else if(thisOi===oi && oi!==ans) o.classList.add('wrong');
    o.onclick=null;
  });
  // 버그13 fix: 직원 모드에서 퀴즈 점수 저장
  if (S.currentStaff) {
    var staffId = S.currentStaff.id;
    var quiz = DATA.quizzes[0];
    if (quiz) {
      // 첫 번째 퀴즈 기준 점수 계산
      if (!quiz._answers) quiz._answers = {};
      quiz._answers[qi] = oi;
      // 모든 문제 답변 완료 시 점수 기록
      var allAnswered = quiz.questions.every(function(q,i){ return quiz._answers[i] !== undefined; });
      if (allAnswered) {
        var correct = quiz.questions.filter(function(q,i){ return quiz._answers[i]===q.ans; }).length;
        var score = Math.round(correct/quiz.questions.length*100);
        if (!quiz.scores) quiz.scores = {};
        quiz.scores[staffId] = score;
        fsSave('quizzes', quiz);
        showToast('퀴즈 완료! '+score+'점', score>=90?'ok':'');
      }
    }
  }
}

// 유효기간 앱의 teams/{code}/drugs 컬렉션에서 pinned(먼저)된 약품만 가져오기
async function loadPinnedExpiry(callback) {
  var code = localStorage.getItem('expiryTeamCode');
  if (!code || !FB_OK || !db) { if (callback) callback(false, 0); return; }

  try {
    var fs = window._fs;
    var snap = await fs.getDocs(fs.collection(db, 'teams', code, 'drugs'));
    var all = [];
    snap.forEach(function(d) { all.push(Object.assign({ id: d.id }, d.data())); });
    EXPIRY_PINNED = all.filter(function(d){ return d.pinned; })
      .sort(function(a,b){ return new Date(a.exp) - new Date(b.exp); });
    if (callback) callback(true, EXPIRY_PINNED.length);
    if (S.page === 'dashboard') renderPage('dashboard');
  } catch (e) {
    console.warn('\uC720\ud6a8\uae30\uac04 \uc571 \uC5F0\uacb0 \uc2e4\ud328:', e);
    EXPIRY_PINNED = [];
    if (callback) callback(false, 0);
  }
}

function expiryDaysLeft(expDate) {
  var exp = new Date(expDate); exp.setHours(23,59,59,0);
  var now = new Date(); now.setHours(0,0,0,0);
  return Math.ceil((exp - now) / 86400000);
}

// 중요 변경사항: 숙지 확인 모달 (간단 체크 질문 1개 포함)
async function openCriticalConfirm(changeId) {
  var c = DATA.changes.find(function(x){ return x.id===changeId; });

  openMod('&#9888;&#65039; 숙지 확인',

    + '</div>', '');

  // AI로 변경사항 기반 간단 OX/객관식 질문 생성 (실패 시 기본 질문 사용)
  var key = S.gemKey || localStorage.getItem('gmKey') || '';
  var question = null;
  if (key) {
    var prompt = '\ub2e4\uc74c \uc57d\uad6d \uc5c5\ubb34 \ubcc0\uacbd\uc0ac\ud56d\uc744 \uc9c1\uc6d0\uc774 \uc81c\ub300\ub85c \uc219\uc9c0\ud588\ub294\uc9c0 \ud655\uc778\ud558\ub294 \uac04\ub2e8\ud55c \uac1d\uad00\uc2dd \ubb38\uc81c 1\uac1c\ub97c \ub9cc\ub4e4\uc5b4\uc8fc\uc138\uc694.\n'
      + '\ubcc0\uacbd\uc0ac\ud56d: ' + c.title + '\n\ubcc0\uacbd \uc804: ' + c.before + '\n\ubcc0\uacbd \ud6c4: ' + c.after + '\n\n'
      + 'JSON\ub9cc \ubc18\ud658(\ubc31\ud2f1\uc5c6\uc774): {"q":"\uc9c8\ubb38","opts":["\ubcf4\uae301","\ubcf4\uae302","\ubcf4\uae303"],"ans":0}';
    var result = await callGem(prompt);
    if (result) {
      try {
        var clean = result.replace(/```json|```/g,'').trim();
        var m = clean.match(/\{[\s\S]*\}/);
        if (m) question = JSON.parse(m[0]);
      } catch(e) {}
    }
  }

  // AI 실패 시 기본 질문(변경 후 내용 그대로 보여주고 정답 인지)
  if (!question || !question.opts || question.opts.length < 2) {
    question = {
      q: '\ubcc0\uacbd\ub41c \ub0b4\uc6a9\uc73c\ub85c \uc62c\ubc14\ub978 \uac83\uc740?',
      opts: [c.after, c.before || '\uc774\uc804\uacfc \ub3d9\uc77c\ud568'],
      ans: 0
    };
  }

  CRITICAL_CONFIRM = { changeId: changeId, question: question, selected: null };
  renderCriticalConfirmModal();
}

// 버그8 fix: 버튼 클릭으로 시작
function startSimFromSel() {
  var sel = document.getElementById('simManualSel');
  if (!sel || !sel.value) { showToast('매뉴얼을 선택해주세요','err'); return; }
  startSim(sel.value);
}

function startSim(manualId) {
  if (!manualId) return;
  SIM.manualId = parseInt(manualId);
  var m = DATA.manuals.find(function(x){return x.id===SIM.manualId;});
  if (!m) return;
  var scenario = m.warnings[0] || m.checklist[0] || '제품 불만';
  SIM.msgs = [{role:'ai', text:'안녕하세요! 저는 '+m.title+' 관련으로 문의 드립니다. 궁금한 점이 있어서요. 상황: "'+scenario+'" 에 대해 직원분한테 문의하려고 하는데 맞나요?'}];
  renderPage('ai-sim');
  setTimeout(function(){ var c=document.getElementById('simChat'); if(c) c.scrollTop=c.scrollHeight; var inp=document.getElementById('simInput'); if(inp) inp.focus(); },80);
}

async function sendSim() {
  var inp = document.getElementById('simInput');
  var text = inp ? inp.value.trim() : '';
  if (!text || SIM.busy) return;
  if (!S.gemKey && !localStorage.getItem('gmKey')) {
    // 버그12 fix: API키 없으면 명확한 안내
    showToast('⚠️ Gemini API 키를 먼저 설정해주세요 (설정 메뉴)','err');
    return;
  }
  var m = DATA.manuals.find(function(x){return x.id===SIM.manualId;});
  if (!m) return;

  // 버그3 fix: input 값 먼저 지우고 메시지 추가
  inp.value = '';
  SIM.msgs.push({role:'user', text:text});
  SIM.busy = true;

  // DOM만 업데이트 (전체 재렌더링 없음)
  var chatEl = document.getElementById('simChat');
  if (chatEl) {
    var userDiv = document.createElement('div');
    userDiv.className = 'sim-msg user';
    userDiv.innerHTML = '<div class="sim-bubble">'+text+'</div>'
      +'<div class="ava" style="width:28px;height:28px;font-size:12px;flex-shrink:0;background:linear-gradient(135deg,var(--ac),#6B8EF5)">'+(S.currentStaff?S.currentStaff.ava:'우')+'</div>';
    chatEl.appendChild(userDiv);
    var thinkDiv = document.createElement('div');
    thinkDiv.className='sim-msg ai'; thinkDiv.id='simThinking';
    thinkDiv.innerHTML='<div class="ava" style="width:28px;height:28px;font-size:12px;flex-shrink:0">&#129302;</div><div class="sim-bubble" style="color:var(--t3)">&#8943;</div>';
    chatEl.appendChild(thinkDiv);
    chatEl.scrollTop = chatEl.scrollHeight;
    // 입력 비활성화
    var sendBtn = inp.nextElementSibling;
    inp.disabled=true; if(sendBtn) sendBtn.disabled=true;
  }

  var prompt = '당신은 약국의 조금 어려운 고객 역할입니다. 1-2문장으로 간결하게 응답하세요.\n매뉴얼: '+m.title+'\n매뉴얼 요약: '+m.summary+'\n직원 응답: "'+text+'"\n이에 대해 어려운 고객 역할로 답하세요.';
  var resp = await callGem(prompt);
  SIM.busy = false;
  var replyText = resp || ('아, 그렇군요. 혼란스럽지만 고객입장에서 생각해보면 일리가 있는 요쫐이라고 생각합니다. 더 자세한 안내를 부탁드립니다!');
  SIM.msgs.push({role:'ai', text:replyText});

  if (chatEl) {
    var tk = document.getElementById('simThinking');
    if (tk) tk.remove();
    var aiDiv = document.createElement('div');
    aiDiv.className='sim-msg ai';
    aiDiv.innerHTML='<div class="ava" style="width:28px;height:28px;font-size:12px;flex-shrink:0">&#129302;</div><div class="sim-bubble">'+replyText+'</div>';
    chatEl.appendChild(aiDiv);
    chatEl.scrollTop=chatEl.scrollHeight;
    inp.disabled=false;
    var sendBtn2=inp.nextElementSibling; if(sendBtn2) sendBtn2.disabled=false;
    inp.focus();
  }
}

// 카톡 대화 정리
function cleanKakaoText(raw) {
  var lines = raw.split('\n').map(function(l){ return l.trim(); }).filter(Boolean);
  var cleaned = [];
  lines.forEach(function(line) {
    // 날짜/시간 헤더 제거
    if (/^\d{4}\.\d{1,2}\.\d{1,2}/.test(line)) return;
    if (/^-{3,}/.test(line)) return;
    // 카톡 형식 [이름] [오후 H:MM] 텍스트 파싱
    var m = line.match(/^\[(.+?)\]\s*\[(?:오전|오후)\s*\d+:\d+\]\s*(.*)/);
    var text = m ? m[2] : line;
    // 이름: 내용 형식
    var m2 = text.match(/^(.{1,10}):\s*(.*)/);
    if (m2) text = m2[2];
    text = text.trim();
    if (!text) return;
    // 무시 패턴 체크
    var ignored = INBOX_IGNORE_PATTERNS.some(function(p){ return p.test(text); });
    if (!ignored && text.length >= 5) cleaned.push(text);
  });
  return cleaned;
}

// 중요 문장 1차 추출
function extractImportantSentences(lines) {
  var important = [];
  var normal = [];
  lines.forEach(function(line) {
    var score = 0;
    INBOX_KEYWORDS.forEach(function(kw) {
      if (line.indexOf(kw) >= 0) score++;
    });
    if (score > 0) important.push({ text: line, score: score });
    else normal.push(line);
  });
  important.sort(function(a,b){ return b.score - a.score; });
  return { important: important.map(function(x){ return x.text; }), normal: normal };
}

// 느슨한 매뉴얼 후보 추리기: 정확도보다 누락 방지가 우선.
// 키워드/태그/카테고리 중 하나라도 겹치면 포함, 완전 무관한 것만 제외.
// AI에게는 이 후보들의 "제목만" 전달해 최종 의미 판단을 맡긴다.
function getLooseManualCandidates(text, cat) {
  var lowerText = (text || '').toLowerCase();
  var candidates = [];

  DATA.manuals.forEach(function(m) {
    var hit = false;

    // 카테고리 일치 (가장 흔한 접점)
    if (cat && m.cat === cat) hit = true;

    // 제목 단어가 입력 텍스트에 등장
    if (!hit) {
      var titleWords = (m.title || '').split(/\s+/).filter(function(w){ return w.length >= 2; });
      hit = titleWords.some(function(w){ return lowerText.indexOf(w.toLowerCase()) >= 0; });
    }

    // 태그가 입력 텍스트에 등장
    if (!hit) {
      hit = (m.tags || []).some(function(t){ return t.length >= 2 && lowerText.indexOf(t.toLowerCase()) >= 0; });
    }

    // 키워드가 입력 텍스트에 등장
    if (!hit) {
      hit = (m.keywords || []).some(function(k){ return k.length >= 2 && lowerText.indexOf(k.toLowerCase()) >= 0; });
    }

    // cat2/cat3 세부분류가 입력 텍스트에 등장
    if (!hit && m.cat3) hit = lowerText.indexOf(m.cat3.toLowerCase()) >= 0;
    if (!hit && m.cat2) hit = lowerText.indexOf(m.cat2.toLowerCase()) >= 0;

    if (hit) candidates.push(m);
  });

  return candidates;
}

// 기존 매뉴얼과 유사도 비교
function compareWithManuals(title, tags, cat) {
  var best = null, bestScore = 0;
  DATA.manuals.forEach(function(m) {
    var score = 0;
    // 제목 유사도
    var titleWords = (title||'').split(/\s+/);
    titleWords.forEach(function(w) { if (w.length>=2 && m.title.indexOf(w)>=0) score+=20; });
    // 태그 유사도
    (tags||[]).forEach(function(t) { if ((m.tags||[]).indexOf(t)>=0) score+=15; });
    // 카테고리
    if (cat && m.cat === cat) score += 10;
    if (score > bestScore) { bestScore = score; best = m; }
  });
  return { manual: best, score: bestScore };
}

// ── 탭2: 분석 결과 ──
function inboxTabResult() {
  var latest = (DATA.inbox||[]).filter(function(x){ return x.result && x.status !== 'done'; });
  if (!latest.length) return '<div class="empty"><div class="ei">&#128202;</div><div class="et">\ubd84\uc11d \uacb0\uacfc \uc5c6\uc74c</div><div class="ed">\uc0c8\ub85c \ubd84\uc11d \ud0ed\uc5d0\uc11c \ubd84\uc11d\uc744 \uc2e4\ud589\ud574\uc8fc\uc138\uc694</div></div>';

  var html = '';
  latest.slice().reverse().forEach(function(item) {
    var r = item.result || {};
    var nm = (r.newManuals||[]).length;
    var ch = (r.changes||[]).length;
    var an = (r.announcements||[]).length;
    var ig = (r.ignore||[]).length;

    html += '<div class="card" style="margin-bottom:14px">'
      + '<div class="chd"><div class="ctitle">&#128229; '+fmtDate(item.createdAt)+' \ubd84\uc11d</div>'
      + '<span style="font-size:11px;color:var(--t3)">'+(item.sourceType==='\uce74\uce74\uc624'?'&#128172;':item.sourceType==='\uc0ac\uc9c4'?'&#128247;':'&#128196;')+' '+item.sourceType+'</span></div>'

      // 요약 카드
      + '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px">'
      + inboxStatBadge('&#128218; \uc2e0\uaddc \ub9e4\ub274\uc5bc', nm, 'var(--pr)')
      + inboxStatBadge('&#128226; \ubcc0\uacbd\uc0ac\ud56d', ch, 'var(--wn)')
      + inboxStatBadge('&#128203; \uacf5\uc9c0\uc0ac\ud56d', an, 'var(--ac)')
      + inboxStatBadge('&#128683; \ubb34\uc2dc', ig, 'var(--t3)')
      + '</div>'

      // 신규 매뉴얼 후보
      + inboxResultSection('\uc2e0\uaddc \ub9e4\ub274\uc5bc \ud6c4\ubcf4', r.newManuals||[], 'manual', item.id, 'var(--pr)')
      // 변경사항 후보
      + inboxResultSection('\ubcc0\uacbd\uc0ac\ud56d \ud6c4\ubcf4', r.changes||[], 'change', item.id, 'var(--wn)')
      // 공지사항
      + inboxResultSection('\uacf5\uc9c0\uc0ac\ud56d', r.announcements||[], 'announce', item.id, 'var(--ac)')
      // 보류함
      + inboxHeldSection(item)
      + '</div>';
  });
  return html;
}

function inboxHeldSection(inboxItem) {
  var held = inboxItem.held || [];
  if (!held.length) return '';
  var typeLabel = { manual:'\uc2e0\uaddc \ub9e4\ub274\uc5bc', change:'\ubcc0\uacbd\uc0ac\ud56d', announce:'\uacf5\uc9c0' };
  return '<div style="margin-top:8px">'
    + '<div style="font-size:12px;font-weight:700;color:var(--t3);margin-bottom:8px">&#9203; \ubcf4\ub958\ud568 ' + held.length + '\uac74</div>'
    + held.map(function(h, i) {
        return '<div style="border:1px dashed var(--bd);border-radius:var(--rs);padding:10px 12px;margin-bottom:6px;background:var(--s2)">'
          + '<div style="font-size:12px;font-weight:600;margin-bottom:2px">' + (h.data.title||h.data.content||'') + '</div>'
          + '<div style="font-size:10px;color:var(--t3);margin-bottom:6px">' + typeLabel[h.type] + ' &middot; ' + fmtDate(h.heldAt) + ' \ubcf4\ub958\ub428</div>'
          + '<button class="btn bs sm" onclick="inboxUnholdItem(' + inboxItem.id + ',' + i + ')">&#8634; \ub2e4\uc2dc \uac80\ud1a0</button>'
          + '</div>';
      }).join('')
    + '</div>';
}

function inboxStatBadge(label, count, color) {
  return '<div style="text-align:center;background:var(--s2);border-radius:var(--rs);padding:10px 6px">'
    + '<div style="font-size:20px;font-weight:800;color:' + color + '">' + count + '</div>'
    + '<div style="font-size:10px;color:var(--t2);margin-top:2px">' + label + '</div>'
    + '</div>';
}

function inboxResultSection(title, items, type, inboxId, color) {
  if (!items.length) return '';
  return '<div style="margin-bottom:12px">'
    + '<div style="font-size:12px;font-weight:700;color:' + color + ';margin-bottom:8px">' + title + ' ' + items.length + '\uac74</div>'
    + items.map(function(item, i) {
        // 매뉴얼 자동 추천 (충돌/연관 매뉴얼 탐지)
        var comp = type !== 'announce' ? compareWithManuals(item.title, item.tags, item.cat) : null;
        var hasTarget = item.targetManualId || (comp && comp.manual && comp.score >= 40);
        var targetManual = item.targetManualId
          ? DATA.manuals.find(function(m){ return m.id===item.targetManualId; })
          : (comp ? comp.manual : null);
        var conflictBadge = '';
        if (type === 'manual' && comp && comp.score >= 40) {
          conflictBadge = '<div style="background:var(--wn-l);border:1px solid var(--wn);border-radius:var(--rs);padding:7px 10px;margin-bottom:8px;font-size:11px;color:#7D5A00">'
            + '&#9888; \uc720\uc0ac\ud55c \ub9e4\ub274\uc5bc\uc774 \uc788\uc2b5\ub2c8\ub2e4: <strong>' + (targetManual?targetManual.title:'') + '</strong> (\uc720\uc0ac\ub3c4 ' + comp.score + '%)'
            + '</div>';
        }
        var targetBadge = (type === 'change' && targetManual)
          ? '<div style="display:inline-flex;align-items:center;gap:4px;background:var(--pr-l);color:var(--pr);font-size:11px;font-weight:600;padding:3px 8px;border-radius:10px;margin-bottom:8px">'
            + '&#128218; ' + targetManual.title + '</div>'
          : '';

        return '<div style="border:1px solid var(--bd);border-radius:var(--rs);padding:12px;margin-bottom:8px">'
          + '<div style="font-size:13px;font-weight:700;margin-bottom:4px">' + (item.title||'\uc81c\ubaa9 \uc5c6\uc74c') + '</div>'
          + targetBadge
          + (item.summary ? '<div style="font-size:12px;color:var(--t2);margin-bottom:6px">' + item.summary + '</div>' : '')
          + (item.before && item.after ? '<div style="font-size:11px;color:var(--t3);margin-bottom:6px">'
            + '<span style="background:var(--dn-l);padding:2px 6px;border-radius:4px">' + item.before + '</span>'
            + ' &rarr; <span style="background:var(--ac-l);padding:2px 6px;border-radius:4px">' + item.after + '</span></div>' : '')
          + (item.reason ? '<div style="font-size:11px;color:var(--t3);margin-bottom:8px">&#128172; ' + item.reason + '</div>' : '')
          + conflictBadge
          + '<div style="display:flex;gap:6px;flex-wrap:wrap">'
          + '<button class="btn bp sm" onclick="inboxApplyItem(' + inboxId + ',' + i + ',\'' + type + '\')">&#10003; \uc2b9\uc778 \ubc0f \uc801\uc6a9</button>'
          + '<button class="btn bs sm" onclick="inboxEditItem(' + inboxId + ',' + i + ',\'' + type + '\')">&#9998; \uc218\uc815</button>'
          + '<button class="btn bs sm" onclick="inboxHoldItem(' + inboxId + ',' + i + ',\'' + type + '\')">&#9203; \ubcf4\ub958</button>'
          + '<button class="btn bs sm" style="color:var(--t3)" onclick="inboxIgnoreItem(' + inboxId + ',' + i + ',\'' + type + '\')">&#128683; \ubb34\uc2dc</button>'
          + '</div></div>';
      }).join('')
    + '</div>';
}

function inboxTabDone() {

// ── AI 분석 실행 ──
async function inboxAnalyze() {
  var inputEl = document.getElementById('inboxInput');
  var raw = inputEl ? inputEl.value.trim() : '';
  if (!raw) { showToast('\ub0b4\uc6a9\uc744 \uc785\ub825\ud574\uc8fc\uc138\uc694', 'err'); return; }

  var key = S.gemKey || localStorage.getItem('gmKey') || '';
  if (!key) { showToast('\ubd84\uc11d\ud558\ub824\uba74 Gemini API \ud0a4\ub97c \uc124\uc815\uc5d0\uc11c \uc785\ub825\ud574\uc8fc\uc138\uc694', 'err'); return; }

  // 입력 타입 감지
  var modeLabel = INBOX_INPUT_MODE === 'kakao' ? '\uce74\uce74\uc624' : INBOX_INPUT_MODE === 'photo' ? '\uc0ac\uc9c4' : INBOX_INPUT_MODE === 'file' ? '\ud30c\uc77c' : '\uc9c1\uc811\uc785\ub825';
  var staffName = S.currentStaff ? S.currentStaff.name : '';
  var sourceType = staffName ? modeLabel + ' (\uc81c\ucd9c: ' + staffName + ')' : modeLabel;

  // 로딩 UI
  var pg = document.getElementById('pg');
  if (pg) pg.innerHTML = '<div style="padding:40px 20px;text-align:center">'
    + '<div class="ai-spin" style="margin:0 auto 16px"></div>'
    + '<div style="font-size:15px;font-weight:700;color:var(--pr);margin-bottom:6px">\uc911\uc694 \ubb38\uc7a5 \ucd94\ucd9c \uc911...</div>'
    + '<div id="inboxProgress" style="font-size:12px;color:var(--t3)">\ud0a4\uc6cc\ub4dc \ubd84\uc11d \uc911</div>'
    + '</div>';

  // STEP 1: 카톡이면 정리, 아니면 그대로
  var lines = INBOX_INPUT_MODE === 'kakao' ? cleanKakaoText(raw) : raw.split('\n').filter(function(l){ return l.trim().length >= 3; });
  var extracted = extractImportantSentences(lines);
  var importantText = extracted.important.join('\n');
  var allText = raw;

  var prog = document.getElementById('inboxProgress');
  if (prog) prog.textContent = '\uc911\uc694 \ubb38\uc7a5 ' + extracted.important.length + '\uac1c \uc120\ubcc4 \u2192 AI \ubd84\uc11d \uc911...';

  // STEP 2: AI 분석 (중요 문장 우선, 부족하면 전체)
  var analysisInput = importantText.length >= 100 ? importantText : allText;

  // 느슨한 매뉴얼 후보 추리기 (누락 방지 우선 - 접점 하나라도 있으면 포함)
  var candidates = getLooseManualCandidates(analysisInput);
  var manualList = candidates.length
    ? candidates.map(function(m){ return m.id+': '+m.title; }).join('\n')
    : '(\uad00\ub828 \ud6c4\ubcf4 \uc5c6\uc74c)';

  var prompt = '\ub2f9\uc2e0\uc740 \uc57d\uad6d \uc5c5\ubb34 \uc804\ubb38\uac00\uc785\ub2c8\ub2e4.\n\n'
    + '=== \uc785\ub825 \ub0b4\uc6a9 (\uc18c\uc2a4: '+sourceType+') ===\n'
    + analysisInput.substring(0, 5000) + '\n\n'
    + '=== \uae30\uc874 \uad00\ub828 \ub9e4\ub274\uc5bc \ud6c4\ubcf4 (id: \uc81c\ubaa9) ===\n' + manualList + '\n\n'
    + '\uc704 \ub0b4\uc6a9\uc744 \uc544\ub798 JSON \ud615\uc2dd\uc73c\ub85c\ub9cc \ubc18\ud658 (\ubc31\ud2f1 \uc5c6\uc774):\n'
    + '{\n'
    + '  "newManuals": [{"title":"","cat":"\uc870\uc81c","cat2":"","cat3":"","summary":"","steps":[],"customerScript":"","warnings":[],"checklist":[],"tags":[]}],\n'
    + '  "changes": [{"targetManualId":10,"targetManualTitle":"","title":"","before":"","after":"","type":"\uc911\uc694","reason":""}],\n'
    + '  "announcements": [{"title":"","content":""}],\n'
    + '  "ignore": [{"content":"","reason":""}]\n'
    + '}\n\n'
    + '\uaddc\uce59:\n'
    + '1. \uc5c5\ubb34 \uc9c0\uc2dc/\ubcc0\uacbd\uc0ac\ud56d\ub9cc \ucd94\ucd9c\n'
    + '2. \ub2e8\uc21c \uc751\ub2f5/\uc778\uc0ac\ub9d0\uc740 ignore\n'
    + '3. \uc785\ub825 \ub0b4\uc6a9 \uc548\uc5d0 \ub530\uc9c0\ub9cc \ub2e4\ub978 \ud45c\ud604\uc73c\ub85c \ub3d9\uc77c\ud55c \uaddc\uce59\uc744 \uac00\ub9ac\ud0a4\ub294 \ubb38\uc7a5\uc774 \uc5ec\ub7ec \uac1c \uc788\uc73c\uba74 \ud558\ub098\ub85c \ud569\uccd0\uc11c \ud56d\ubaa9 1\uac1c\ub85c\ub9cc \ub9cc\ub4dc\uc138\uc694. (\uc608: "\ub0c9\uc7a5\uc57d \ubb38\uc790 \ubcf4\ub0b4\uae30", "\ub0c9\uc7a5\ubcf4\uad00 \ubb38\uc790 \uc548\ub0b4", "\ub0c9\uc7a5\uc57d \ubb38\uc790 \ubc1c\uc1a1 \ud544\uc218"\ub294 \ud45c\ud604\ub9cc \ub2e4\ub974\uace0 \uc758\ubbf8\uac00 \uac19\uc740 \ud558\ub098\uc758 \uaddc\uce59\uc785\ub2c8\ub2e4)\n'
    + '4. \uac01 \ud56d\ubaa9\ub9c8\ub2e4 "\uae30\uc874 \uad00\ub828 \ub9e4\ub274\uc5bc \ud6c4\ubcf4" \ubaa9\ub85d\uc744 \uba3c\uc800 \ud655\uc778\ud574\uc11c, \uc758\ubbf8\uc0c1 \uac19\uac70\ub098 \ud574\ub2f9 \ub9e4\ub274\uc5bc\uc744 \uc5c5\ub370\uc774\ud2b8\ud574\uc57c \ud558\ub294 \ub0b4\uc6a9\uc774\uba74 \ubc18\ub4dc\uc2dc changes\ub85c \ubd84\ub958\ud558\uace0 targetManualId\uc5d0 \ud574\ub2f9 id\ub97c \ub123\uc73c\uc138\uc694. \ud45c\ud604\uc774 \ub2e4\ub974\ub2e4\ub294 \uc774\uc720\ub9cc\uc73c\ub85c newManuals\ub85c \ubd84\ub958\ud558\uc9c0 \ub9c8\uc138\uc694.\n'
    + '5. \ud6c4\ubcf4 \ubaa9\ub85d\uc5d0 \uc5c6\uac70\ub098, \ud6c4\ubcf4\uc640 \ube44\uad50\ud574\ub3c4 \uc815\ub9d0 \uc0c8\ub85c\uc6b4 \uc8fc\uc81c\uc77c \ub54c\ub9cc newManuals\ub85c \ubd84\ub958\ud558\uc138\uc694. \ud655\uc2e0\uc774 \uc5c6\uc73c\uba74 changes\ub97c \uc6b0\uc120\ud558\uc138\uc694.\n'
    + '6. newManuals\uc758 cat\uc740 \ubc18\ub4dc\uc2dc \ub2e4\uc74c 9\uac1c \uc911 \ud558\ub098\uc640 \uc815\ud655\ud788 \uc77c\uce58: \uc870\uc81c,\uc77c\ubc18\uc57d,\ub3d9\ubb3c\uc57d,\uace0\uac1d\uc751\ub300,\uc751\uae09\uc0c1\ud669,\uccad\uad6c\u00b7\ubcf4\ud5d8,\uc7ac\uace0\u00b7\ubc1c\uc8fc,\ub9e4\uc7a5\uad00\ub9ac,\uc9c1\uc6d0\uad50\uc721';

  var result = await callGem(prompt);
  var parsed = null;
  if (result) {
    try {
      var clean = result.replace(/```json|```/g,'').trim();
      var m = clean.match(/\{[\s\S]*\}/);
      if (m) parsed = JSON.parse(m[0]);
    } catch(e) { console.warn('inbox parse err', e); }
  }

  if (!parsed) {
    showToast('\ubd84\uc11d\uc5d0 \uc2e4\ud328\ud588\uc2b5\ub2c8\ub2e4. \ub2e4\uc2dc \uc2dc\ub3c4\ud574\uc8fc\uc138\uc694.', 'err');
    go('inbox'); return;
  }
  // AI가 이미 후보 목록을 보고 changes/newManuals를 판단했으므로 추가 임계값 재필터링은 하지 않음

  // STEP 3: AI가 후보를 보고도 놓쳤을 수 있는 명백한 중복에 대한 보조 안전망
  // (느슨한 후보 추리기 자체가 누락 방지에 초점을 두므로, 여기서는 아주 명백한 경우만 재포착)
  if (parsed.newManuals) {
    parsed.newManuals = parsed.newManuals.filter(function(nm) {
      var comp = compareWithManuals(nm.title, nm.tags, nm.cat);
      if (comp.score >= 60) {
        // 명백히 유사 → changes로 이동 (AI 1차 판단을 보완하는 2차 안전망)
        if (!parsed.changes) parsed.changes = [];
        parsed.changes.push({
          targetManualId: comp.manual.id,
          targetManualTitle: comp.manual.title,
          title: nm.title,
          before: comp.manual.summary,
          after: nm.summary,
          type: '\uBCC0\uACBD',
          reason: '\uC720\uC0AC \uB9E4\uB274\uC5BC \uBC1C\uACAC (\uC720\uC0AC\uB3C4 ' + comp.score + '%, \uC548\uC804\uB9DD\uC5D0\uC11C \uC7AC\uD3EC\uCC29\uB428)'
        });
        return false;
      }
      return true;
    });
  }

  // STEP 4: inbox에 저장
  if (!DATA.inbox) DATA.inbox = [];
  var inboxItem = {
    id: Date.now(),
    sourceType: sourceType,
    sourceText: raw.substring(0, 2000),
    extractedText: analysisInput.substring(0, 1000),
    result: parsed,
    status: 'result',
    createdAt: new Date(),
    appliedAt: null
  };
  DATA.inbox.push(inboxItem);
  fsSave('inbox', inboxItem);

  // 결과 탭으로 이동
  INBOX_TAB = 'result';
  go('inbox');
  showToast('\ubd84\uc11d \uc644\ub8cc! \uacb0\uacfc \ud655\uc778\ud574\uc8fc\uc138\uc694.', 'ok');
}

// ── 개별 항목 적용 ──
// 카테고리 검증 - DATA.cats에 없는 값이면 기타로 보정
function validateCat(catName) {
  var found = DATA.cats.find(function(c){ return c.name === catName; });
  return found ? catName : (DATA.cats[0] ? DATA.cats[0].name : '\uae30\ud0c0');
}

// 신규 매뉴얼 생성 확인 모달: 생성될 매뉴얼 내용을 미리 보여주고 승인 시에만 onConfirm 실행

    + '<select class="fi" id="newManualConfirmCat" onchange="NEW_MANUAL_CONFIRM.edited.cat=this.value">'
