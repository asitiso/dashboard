  if (!selected.length) { showToast('\uc0dd\uc131\ud560 \ud56d\ubaa9\uc744 \uc120\ud0dd\ud574\uc8fc\uc138\uc694', 'err'); return; }

  var fullText = BULK.fullText || '';
  // 각 후보의 관련 구간 추출 (startHint + chunkOffset 활용)
  var chunks = selected.map(function(item) {
    // 1) startHint로 위치 찾기
    var hintPos = -1;
    if (item.startHint) {
      hintPos = fullText.indexOf(item.startHint.substring(0, 30));
    }
    // 2) chunkOffset 활용
    var basePos = hintPos >= 0 ? hintPos : (item.chunkOffset || 0);
    // 3) 해당 위치 전후 4000자 추출
    var from = Math.max(0, basePos - 200);
    var to   = Math.min(fullText.length, from + 4500);
    return fullText.substring(from, to);
  });

  await runBulkGeneration(
    chunks,
    BULK.cat,
    BULK.cat2,
    selected.map(function(item) { return item.title; })
  );
}

// 누락 구간 재스캔
async function bulkRescan() {
  var text = BULK.fullText || '';
  if (!text) return;
  // 기존 후보가 커버 못한 구간 찾기
  var covered = (BULK.items || []).map(function(item) { return item.chunkOffset || 0; });
  var chunks = chunkText(text, 5000, 500);
  var uncovered = chunks.filter(function(chunk) {
    return !covered.some(function(off) { return Math.abs(off - chunk.offset) < 3000; });
  });
  if (!uncovered.length) { showToast('\ub204\ub77d \uad6c\uac04\uc774 \uc5c6\uc2b5\ub2c8\ub2e4!', 'ok'); return; }
  showToast('\ub204\ub77d \uc758\uc2ec \uad6c\uac04 ' + uncovered.length + '\uac1c \uc7ac\uc2a4\uce94 \uc911...', '');
  var extra = [];
  for (var i = 0; i < uncovered.length; i++) {
    var prompt = '\ub2e4\uc74c \ud14d\uc2a4\ud2b8\uc5d0\uc11c \ub9e4\ub274\uc5bc \ud56d\ubaa9 \uc81c\ubaa9\ub9cc JSON\uc73c\ub85c: [{"title":"...","startHint":"..."}]\n' + uncovered[i].text.substring(0, 3000);
    var res = await callGem(prompt);
    if (res) {
      try {
        var m = res.replace(/```json|```/g,'').match(/\[[\s\S]*\]/);
        if (m) {
          JSON.parse(m[0]).forEach(function(item) {
            extra.push({ title: item.title, startHint: item.startHint || '', chunkOffset: uncovered[i].offset, source: 'ai' });
          });
        }
      } catch(e) {}
    }
  }
  if (extra.length) {
    var titleSet = {};
    (BULK.items || []).forEach(function(c) { titleSet[c.title.substring(0,10)] = true; });
    extra.forEach(function(c) {
      var key = c.title.substring(0,10);
      if (!titleSet[key]) { BULK.items.push(c); titleSet[key] = true; }
    });
    showToast('\ub204\ub77d \ud56d\ubaa9 ' + extra.length + '\uac1c \ucd94\uac00!', 'ok');
    bulkAutoExtract(text, BULK.cat, BULK.cat2);  // 결과 화면 재렌더
  } else {
    showToast('\ucd94\uac00 \ub204\ub77d \uc5c6\uc74c!', 'ok');
  }
}



async function runBulkGeneration(chunks, cat, cat2, titles) {
  BULK.processing = true;
  BULK.done = 0;
  BULK.total = chunks.length;

  var bodyEl = document.getElementById('bulkBody');
  var footEl = document.getElementById('mFoot');
  if (footEl) footEl.innerHTML = '';

  var created = [];
  var failed  = [];

  for (var i = 0; i < chunks.length; i++) {
    // 진행상황 UI 업데이트
    if (bodyEl) {
      bodyEl.innerHTML = '<div class="ai-proc">'
        + '<div class="ai-spin"></div>'
        + '<div style="font-size:15px;font-weight:700;color:var(--pr);margin-bottom:8px">'
        + '\ub9e4\ub274\uc5bc \uc0dd\uc131 \uc911... (' + (i+1) + ' / ' + chunks.length + ')</div>'
        + '<div class="pbar" style="margin-bottom:12px"><div class="pfill" style="width:' + Math.round((i/chunks.length)*100) + '%"></div></div>'
        + '<div style="max-height:180px;overflow-y:auto">'
        + created.map(function(m) {
            return '<div style="padding:5px 0;font-size:12px;color:var(--ac);display:flex;align-items:center;gap:6px">'
              + '&#10003; ' + m.title + '</div>';
          }).join('')
        + (failed.length ? failed.map(function(f) {
            return '<div style="padding:5px 0;font-size:12px;color:var(--dn)">&#10005; \uc2e4\ud328: ' + f + '</div>';
          }).join('') : '')
        + '<div style="padding:5px 0;font-size:12px;color:var(--pr);animation:pulse2 1s infinite">'
        + '&#8943; ' + ((titles && titles[i]) || ('\ud56d\ubaa9 ' + (i+1))) + ' \uc0dd\uc131 \uc911...</div>'
        + '</div></div>';
    }

    try {
      var hint = titles && titles[i] ? '\n\ub9e4\ub274\uc5bc \uc81c\ubaa9 \ud78c\ud2b8: ' + titles[i] : '';
      var nm = await genSingleManual(chunks[i] + hint, cat, cat2, false);
      if (nm) {
        if (titles && titles[i]) nm.title = titles[i]; // 제목 힌트 우선
        created.push(nm);
      }
    } catch(e) {
      failed.push((titles && titles[i]) || ('\ud56d\ubaa9 ' + (i+1)));
    }

    // API 부하 방지 대기
    if (i < chunks.length - 1) await new Promise(function(r){ setTimeout(r, 800); });
  }

  // 완료 화면
  if (bodyEl) {
    bodyEl.innerHTML = '<div style="text-align:center;padding:20px 0">'
      + '<div style="font-size:40px;margin-bottom:12px">&#127881;</div>'
      + '<div style="font-size:16px;font-weight:700;margin-bottom:6px">\uc77c\uad04 \uc0dd\uc131 \uc644\ub8cc!</div>'
      + '<div style="font-size:13px;color:var(--t2);margin-bottom:16px">'
      + '<span style="color:var(--ac);font-weight:700">' + created.length + '\uac1c \uc131\uacf5</span>'
      + (failed.length ? ' &nbsp;|&nbsp; <span style="color:var(--dn)">' + failed.length + '\uac1c \uc2e4\ud328</span>' : '')
      + '</div>'
      + created.map(function(m) {
          return '<div style="text-align:left;padding:6px 12px;background:var(--ac-l);border-radius:var(--rs);margin-bottom:4px;font-size:12px;color:var(--ac)">'
            + '&#10003; ' + m.title + '</div>';
        }).join('')
      + '</div>';
    if (footEl) footEl.innerHTML = '<button class="btn bp" onclick="closeMod();go(\'manuals\')">'
      + '&#128218; \ub9e4\ub274\uc5bc \ubaa9\ub85d\uc5d0\uc11c \ud655\uc778</button>';
  }
}

function showToast(msg, type) {
  type = type || '';
  var t=document.getElementById('toast');
  t.innerHTML=msg;t.className='toast'+(type?' '+type:'');
  t.classList.add('show');
  clearTimeout(t._t);
  t._t=setTimeout(function(){t.classList.remove('show');},3000);
}

// 싱크 상태 UI
function setSyncStatus(status) {
  // status: 'loading' | 'ok' | 'err' | 'offline'
  var el = document.getElementById('syncDot');
  if (!el) return;
  var cfg = {
    loading: {bg:'var(--wn)',  title:'Firebase 동기화 중...'},
    ok:      {bg:'var(--ac)',  title:'Firebase 실시간 동기화 중'},
    err:     {bg:'var(--dn)',  title:'Firebase 연결 실패 - 로컬 모드'},
    offline: {bg:'var(--t3)', title:'오프라인 모드'}
  };
  var c = cfg[status] || cfg.offline;
  el.style.background = c.bg;
  el.title = c.title;
  el.style.animation = status === 'loading' ? 'pulse2 1s infinite' : 'none';
}

// Firestore 날짜 직렬화 / 역직렬화
function toFS(obj) {
  // Date &#8594; ISO string, 순환참조 제거
  return JSON.parse(JSON.stringify(obj, function(k, v) {
    if (v instanceof Date) return { __t: v.toISOString() };
    return v;
  }));
}
function fromFS(obj) {
  // ISO string &#8594; Date 복원
  return JSON.parse(JSON.stringify(obj), function(k, v) {
    if (v && v.__t) return new Date(v.__t);
    return v;
  });
}

async function initFirebase() {
  setSyncStatus('loading');
  showSyncBanner('loading');
  try {
    var { initializeApp, getApps, getApp } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    var { getFirestore, doc, collection, setDoc, getDoc, getDocs, onSnapshot, deleteDoc, writeBatch, query, orderBy }
      = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');

    // 재연결 시 중복 초기화 방지
    var app = getApps().some(function(a){ return a.name === 'pharmacy-manual'; })
      ? getApp('pharmacy-manual')
      : initializeApp(FB_CFG, 'pharmacy-manual');
    db = getFirestore(app);
    FB_OK = true;

    // 전역에 Firestore 함수 저장
    window._fs = { doc, collection, setDoc, getDoc, getDocs, onSnapshot, deleteDoc, writeBatch, query, orderBy };

    // 기존 실시간 리스너가 있으면 해제 후 재등록 (재연결 시 중복 구독 방지)
    Object.keys(FB_UNSUB).forEach(function(k) {
      try { if (typeof FB_UNSUB[k] === 'function') FB_UNSUB[k](); } catch(e) {}
    });
    FB_UNSUB = {};

    // 초기 데이터 로드 + 실시간 리스너 등록
    await loadAllFromFirestore();
    await flushPendingWrites();
    if (localStorage.getItem('expiryTeamCode')) { loadPinnedExpiry(); }
    setSyncStatus('ok');
    showSyncBanner('ok');
  } catch(e) {
    console.error('Firebase init error:', e);
    FB_OK = false;
    setSyncStatus('err');
    showSyncBanner('offline');
    // 오프라인 모드 - 앱은 계속 정상 작동
    renderPage(S.page);
    buildNav();
  }
}

    if (!DATA.cats || !DATA.cats.length) {
      // cats가 비어있으면(또는 끝까지 비정상) HTML 기본값으로 복구 + Firebase 재업로드

// ============================================================
// 실시간 리스너 (onSnapshot)
// ============================================================
function registerListeners() {
  var fs = window._fs;
  var colMap = {
    manuals:  function(items){ DATA.manuals  = items; },
    changes:  function(items){ DATA.changes  = items; },
    feedback: function(items){ DATA.feedback = items; },
    quizzes:  function(items){ DATA.quizzes  = items; },
    staff:    function(items){ DATA.staff    = items; },
    cats:     function(items){ DATA.cats     = items; },  // cats 추가
    inbox:    function(items){ DATA.inbox    = items; }   // inbox 추가
  };

  Object.keys(colMap).forEach(function(col) {
    if (FB_UNSUB[col]) FB_UNSUB[col](); // 기존 리스너 해제
    FB_UNSUB[col] = fs.onSnapshot(
      fs.collection(db, 'pharmacy_'+col),
      function(snap) {
        var items = [];
        snap.forEach(function(d) { items.push(fromFS(d.data())); });
        items.sort(function(a,b){
          var ta = a.createdAt||a.updatedAt||0;
          var tb = b.createdAt||b.updatedAt||0;
          return new Date(tb) - new Date(ta);
        });
        colMap[col](items);
        // 버그14 fix: LocalStorage 백업
        try { localStorage.setItem('lb_'+col, JSON.stringify(toFS(items))); } catch(e){}
        // 버그3 fix: myRead를 readBy 기반으로 동기화
        if (col === 'changes' && S.currentStaff) {
          var sid = S.currentStaff.id;
          items.forEach(function(c){ DATA.myRead[c.id] = c.readBy.indexOf(sid)>=0; });
        }
        renderPage(S.page);
        buildNav();
        setSyncStatus('ok');
      },
      function(err) {
        console.warn('snapshot error:', col, err);
        setSyncStatus('err');
        // 버그4 fix: 오류 시 10초 후 자동 재연결 시도
        setTimeout(function(){
          if(FB_OK && db) registerListeners();
        }, 10000);
      }
    );
  });
}

async function fsSave(col, item) {
  if (!FB_OK || !db) {
    // 버그14 fix: 오프라인 시 LocalStorage에 임시 저장
    try {
      var lbKey = 'lb_pending_'+col;
      var pending = JSON.parse(localStorage.getItem(lbKey)||'[]');
      var exists = pending.findIndex(function(x){return x.id===item.id;});
      if(exists>=0) pending[exists]=toFS(item); else pending.push(toFS(item));
      localStorage.setItem(lbKey, JSON.stringify(pending));
    } catch(e){}
    return;
  }
  try {
    var fs = window._fs;
    await fs.setDoc(fs.doc(db, 'pharmacy_'+col, String(item.id)), toFS(item));
    // 저장 성공 시 pending 제거
    localStorage.removeItem('lb_pending_'+col);
  } catch(e) {
    console.error('fsSave error:', col, e);
    setSyncStatus('err');
    // 실패 시 pending에 저장
    try {
      var lbKey2 = 'lb_pending_'+col;
      var p2 = JSON.parse(localStorage.getItem(lbKey2)||'[]');
      var ei = p2.findIndex(function(x){return x.id===item.id;});
      if(ei>=0) p2[ei]=toFS(item); else p2.push(toFS(item));
      localStorage.setItem(lbKey2, JSON.stringify(p2));
    } catch(e2){}
  }
}

// 오프라인 중 쌓인 pending 데이터를 Firebase 재연결 후 일괄 업로드
async function flushPendingWrites() {
  if (!FB_OK || !db) return;
  var fs = window._fs;
  var COLS = ['manuals','changes','feedback','quizzes','staff','cats','inbox'];
  var totalFlushed = 0;

  for (var i = 0; i < COLS.length; i++) {
    var col = COLS[i];
    var lbKey = 'lb_pending_' + col;
    var pendingRaw = localStorage.getItem(lbKey);
    if (!pendingRaw) continue;

    var pending;
    try { pending = JSON.parse(pendingRaw); } catch(e) { continue; }
    if (!pending || !pending.length) { localStorage.removeItem(lbKey); continue; }

    var failed = [];
    for (var j = 0; j < pending.length; j++) {
      try {
        await fs.setDoc(fs.doc(db, 'pharmacy_'+col, String(pending[j].id)), pending[j]);
        totalFlushed++;
      } catch(e) {
        console.warn('flush \uc2e4\ud328:', col, pending[j].id, e);
        failed.push(pending[j]);
      }
    }

    // 실패한 것만 다시 pending에 남김
    if (failed.length) localStorage.setItem(lbKey, JSON.stringify(failed));
    else localStorage.removeItem(lbKey);
  }

  if (totalFlushed > 0) {
    showToast('&#128229; \uc624\ud504\ub77c\uc778 \uc911 \uc800\uc7a5\ub41c \ub370\uc774\ud130 ' + totalFlushed + '\uac74\uc774 \ub3d9\uae30\ud654\ub418\uc5c8\uc2b5\ub2c8\ub2e4!', 'ok');
  }
}

// 자연어 증상 문장 → 핵심 키워드 추출
function extractSymptomKeywords(q) {
  var found = [];
  Object.keys(SYNONYMS).forEach(function(k) {
    if (q.indexOf(k) >= 0) found.push(SYNONYMS[k]);
  });
  return found;
}

var JAMO = {
  'ㄱ':'[가-깃]', 'ㄲ':'[깄-밧]', 'ㄴ':'[밨-삫]',
  'ㄷ':'[사-옷]', 'ㄸ':'[옸-펻]', 'ㄹ':'[펼-힣]',
  'ㅁ':'[마-바]', 'ㅂ':'[바-빋]', 'ㅃ':'[빌-삫]',
  'ㅅ':'[사-싧]', 'ㅇ':'[아-짃]', 'ㅈ':'[자-찧]',
  'ㅊ':'[이-췣]', 'ㅋ':'[카-탋]', 'ㅌ':'[탌-퍻]',
  'ㅍ':'[퍼-헛]', 'ㅎ':'[헜-힣]'
};

function fuzzyMatch(text, q) {
  if (!text || !q) return false;
  var t = String(text).toLowerCase();
  var lq = String(q).toLowerCase();
  if (t.indexOf(lq) >= 0) return true;
  // 동의어 검색
  var syn = SYNONYMS[q] || SYNONYMS[lq];
  if (syn && t.indexOf(String(syn).toLowerCase()) >= 0) return true;
  // 초성 검색
  if (/^[ㄱ-ㅎ]+$/.test(q)) {
    var pattern = Array.from(q).map(function(c){ return JAMO[c] || c; }).join('.*');
    try { if (new RegExp(pattern).test(text)) return true; } catch(e) {}
  }
  // 오타 허용: 70% 이상 일치하는 부분 문자열
  if (lq.length >= 2) {
    var sub = lq.substring(0, Math.ceil(lq.length * 0.7));
    if (sub.length >= 2 && t.indexOf(sub) >= 0) return true;
  }
  return false;
}

// 스코어 기반 정렬 검색
// 변경사항(공지/변경 이력) 검색
function searchChanges(q) {
  if (!q) return [];
  var scored = (DATA.changes||[]).map(function(c) {
    var score = 0;
    if (fuzzyMatch(c.title, q)) score += 10;
    if (fuzzyMatch(c.type, q)) score += 5;
    if (fuzzyMatch(c.before, q)) score += 3;
    if (fuzzyMatch(c.after, q)) score += 4;
    if (fuzzyMatch(c.createdBy, q)) score += 2;
    return { c: c, score: score };
  }).filter(function(x){ return x.score > 0; });
  scored.sort(function(a,b){ return b.score - a.score; });
  return scored.map(function(x){ return x.c; });
}

function searchManuals(q) {
  if (!q) return DATA.manuals;
  var lq = q.toLowerCase();
  var symptomKws = extractSymptomKeywords(q); // 자연어 증상 문장 보조 키워드
  var scored = DATA.manuals.map(function(m) {
    var score = 0;
    if (fuzzyMatch(m.title, q)) score += 10;
    if ((m.keywords||[]).some(function(k){ return fuzzyMatch(k, q); })) score += 8;
    if (m.tags.some(function(t){ return fuzzyMatch(t, q); })) score += 7;
    if (fuzzyMatch(m.cat3, q)) score += 6;
    if (fuzzyMatch(m.cat2, q)) score += 5;
    if (fuzzyMatch(m.cat, q)) score += 4;
    if (fuzzyMatch(m.summary, q)) score += 3;
    if ((m.warnings||[]).some(function(w){ return fuzzyMatch(w, q); })) score += 2;
    if ((m.steps||[]).some(function(s){ return fuzzyMatch(s, q); })) score += 2;
    if (fuzzyMatch(m.customerScript, q)) score += 1;
    // 자연어 증상 문장 보조 매칭 (예: "아이가 열나요" → "소아","해열제")
    symptomKws.forEach(function(kw) {
      if (fuzzyMatch(m.title, kw) || fuzzyMatch(m.summary, kw) || (m.tags||[]).some(function(t){return fuzzyMatch(t,kw);}) || (m.keywords||[]).some(function(k){return fuzzyMatch(k,kw);})) {
        score += 3;
      }
    });
    return { m: m, score: score };
  }).filter(function(x){ return x.score > 0; });
  scored.sort(function(a,b){ return b.score - a.score; });
  return scored.map(function(x){ return x.m; });
}

  DATA.manuals.forEach(function(m) {
    (m.tags||[]).forEach(function(t) {
      tagCount[t] = (tagCount[t]||0) + (m.views||0) + 1;
    });
  });
  return Object.keys(tagCount).sort(function(a,b){ return tagCount[b]-tagCount[a]; }).slice(0, 8);
}

// 검색창이 비어있을 때 최근/인기 검색어 제안 표시
function renderSrchSuggestions() {
  var inEl = document.getElementById('srchIn');
  var resEl = document.getElementById('srchRes');
  if (!inEl || !resEl || inEl.value.trim()) return;

  var recent = getRecentSearches();
  var popular = getPopularSearches();

    html += '<div style="margin-bottom:16px">'
      + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
      + '<span style="font-size:12px;font-weight:700;color:var(--t2)">&#128337; \uCD5C\uADFC \uAC80\uC0C9\uC5B4</span>'
      + '<button onclick="clearRecentSearches()" style="background:none;border:none;font-size:11px;color:var(--t3);cursor:pointer">\uC9C0\uC6B0\uAE30</button>'
      + '</div>'
      + '<div style="display:flex;flex-wrap:wrap;gap:6px">'
      + recent.map(function(q){
          return '<span onclick="handleSearch(\'' + q.replace(/'/g,"\\'") + '\')" style="background:var(--s2);padding:6px 12px;border-radius:14px;font-size:12px;cursor:pointer;color:var(--t2)">' + q + '</span>';
        }).join('')
      + '</div></div>';
  }
  if (popular.length) {
    html += '<div>'
      + '<div style="font-size:12px;font-weight:700;color:var(--t2);margin-bottom:8px">&#128293; \uC778\uAE30 \uAC80\uC0C9\uC5B4</div>'
      + '<div style="display:flex;flex-wrap:wrap;gap:6px">'
      + popular.map(function(t, i){
          return '<span onclick="handleSearch(\'' + t.replace(/'/g,"\\'") + '\')" style="background:var(--pr-l);color:var(--pr);padding:6px 12px;border-radius:14px;font-size:12px;cursor:pointer;font-weight:600">'
            + (i<3?'#'+(i+1)+' ':'') + t + '</span>';
        }).join('')

  }

function clearRecentSearches() {
  localStorage.removeItem('recentSearches');
  renderSrchSuggestions();
}

function doSearch(q) {
  var lq = (q||'').replace('#','');
  if (!q || !q.trim()) {
    renderSrchSuggestions();
    return;
  }
  addRecentSearch(q.trim());
  var res = searchManuals(lq);
  var chRes = searchChanges(lq);
  var el = document.getElementById('srchRes');
  if (!res.length && !chRes.length) {
    if(el) el.innerHTML='<div class="empty"><div class="ei">&#128269;</div><div class="et">\uAC80\uC0C9 \uACB0\uACFC \uC5C6\uC74C</div>'
      +'<div class="ed">&ldquo;'+q+'&rdquo;\uC5D0 \uB300\uD55C \uACB0\uACFC\uAC00 \uC5C6\uC2B5\uB2C8\uB2E4</div>'
      +'<div style="margin-top:12px;font-size:12px;color:var(--t3)">\uC608\uC2DC: \uB0C9\uC7A5 &middot; \uAC15\uC544\uC9C0 \uC9C4\uB4DC\uAE30 &middot; \uD658\uBD88 &middot; \uC18C\uC544 \uD56D\uC0DD\uC81C</div></div>';
    return;
  }

  var html = '';
  if (res.length) {
    html += '<div style="font-size:11px;font-weight:700;color:var(--t3);margin:4px 0 8px;text-transform:uppercase;letter-spacing:.04em">&#128218; \uB9E4\uB274\uC5BC ' + res.length + '\uAC74</div>';
    html += res.map(function(m){
      var catPath = m.cat + (m.cat3?' > '+m.cat3:'');
      return '<div class="sri" onclick="closeSrch();openMDetail('+m.id+')">'
        +'<div style="display:flex;align-items:center;gap:7px;margin-bottom:4px">'
        +'<span class="cbadge">'+catPath+'</span>'
        +'<span style="font-size:14px;font-weight:600">'+hilite(m.title,lq)+'</span></div>'
        +'<div style="font-size:12px;color:var(--t2)">'+hilite(m.summary,lq)+'</div>'
        +'<div style="margin-top:5px">'+m.tags.map(function(t){
          return '<span class="tag" onclick="event.stopPropagation();filterByTag(\''+t+'\')" style="cursor:pointer">#'+t+'</span>';
        }).join(' ')+'</div>'
        +'</div>';
    }).join('');
  }
  if (chRes.length) {
    var pmap = {'중요':'ph','진열':'pm','가격':'pl','신제품':'pl'};
    html += '<div style="font-size:11px;font-weight:700;color:var(--t3);margin:14px 0 8px;text-transform:uppercase;letter-spacing:.04em">&#128226; \uBCC0\uACBD\uC0AC\uD56D ' + chRes.length + '\uAC74</div>';
    html += chRes.map(function(c){
      var cls = pmap[c.type] || 'pe';
      return '<div class="sri" onclick="closeSrch();openChDetail('+c.id+')">'
        +'<div style="display:flex;align-items:center;gap:7px;margin-bottom:4px">'
        +'<span class="pri '+cls+'">'+c.type+'</span>'
        +'<span style="font-size:14px;font-weight:600">'+hilite(c.title,lq)+'</span></div>'
        +'<div style="font-size:12px;color:var(--t2)">'+hilite(c.after,lq)+'</div>'
        +'</div>';
    }).join('');
  }
  if(el) el.innerHTML = html;
  // AI 보완 검색 (결과가 적을 때)
  clearTimeout(aiSearchTimer);
  aiSearchTimer = setTimeout(async function() {
    if (!S.gemKey && !localStorage.getItem('gmKey')) return;
    if (res.length >= 3) return;
    var allTitles = DATA.manuals.map(function(m,i){ return i+'. '+m.title+' ('+m.cat+')'; }).join('\n');
    var prompt = '약국 직원이 "'+lq+'" 로 검색했습니다. 관련 매뉴얼 번호를 쉼표로만 답하세요 (없으면 none):\n'+allTitles;
    var result = await callGem(prompt);
    if (!result||result.trim()==='none'||!el) return;
    var idxs = result.split(',').map(function(x){return parseInt(x.trim());}).filter(function(n){return !isNaN(n)&&DATA.manuals[n];});
    if (!idxs.length) return;
    var aiHtml = '<div style="font-size:11px;font-weight:700;color:var(--pr);padding:6px 12px 2px">&#10022; AI 추천</div>';
    idxs.slice(0,3).forEach(function(i){
      var m = DATA.manuals[i];
      if (res.find(function(r){return r.id===m.id;})) return;
      var catPath2 = m.cat + (m.cat3?' > '+m.cat3:'');
      aiHtml += '<div class="sri" onclick="closeSrch();openMDetail('+m.id+')">'
        +'<div style="display:flex;align-items:center;gap:7px"><span class="cbadge">'+catPath2+'</span>'
        +'<span style="font-size:14px;font-weight:600">'+m.title+'</span><span class="ai-badge">AI</span></div>'
        +'<div style="font-size:12px;color:var(--t2)">'+m.summary+'</div></div>';
    });
    el.innerHTML += aiHtml;
  }, 1000);
}

// 기능11: 매뉴얼 복제
function cloneManual(id) {
  var m = DATA.manuals.find(function(x){return x.id===id;});
  if (!m) return;
  var cloned = JSON.parse(JSON.stringify(m));
  cloned.id = Date.now();
  cloned.title = '박제 사본] ' + m.title;

  showToast('&#128203; 매뉴얼이 복제되었습니다! 수정해서 사용하세요.', 'ok');
  setTimeout(function(){ openEditM(cloned.id); }, 300);
}

// 선택한 매뉴얼 2개 이상을 AI로 하나로 병합
async function mergeSelectedManuals() {
  if (MANUAL_SELECTED.length < 2) { showToast('\uc801\uc5b4\ub3c4 2\uac1c \uc774\uc0c1 \uc120\ud0dd\ud574\uc8fc\uc138\uc694', 'err'); return; }
  var targets = DATA.manuals.filter(function(m){ return MANUAL_SELECTED.indexOf(m.id) >= 0; });
  if (targets.length < 2) { showToast('\uc120\ud0dd\ub41c \ub9e4\ub274\uc5bc\uc744 \ucc3e\uc744 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4', 'err'); return; }

  var key = S.gemKey || localStorage.getItem('gmKey') || '';
  if (!key) { showToast('Gemini API \ud0a4\uac00 \ud544\uc694\ud569\ub2c8\ub2e4', 'err'); return; }

  if (!confirm('\uc120\ud0dd\ud55c \ub9e4\ub274\uc5bc ' + targets.length + '\uac1c\ub97c \ud558\ub098\ub85c \ud569\uce58\uc2dc\uaca0\uc2b5\ub2c8\uae4c?\n\uae30\uc874 \ub9e4\ub274\uc5bc\uc740 \uc0ad\uc81c\ub418\uace0 \uc0c8 \ub9e4\ub274\uc5bc\ub85c \ub300\uccb4\ub429\ub2c8\ub2e4.')) return;

  showToast('&#10022; AI\uac00 ' + targets.length + '\uac1c\uc758 \ub9e4\ub274\uc5bc\uc744 \ud558\ub098\ub85c \ud569\uce58\ub294 \uc911...', '');

  var manualsText = targets.map(function(m, i) {
    return '=== \ub9e4\ub274\uc5bc ' + (i+1) + ' ===\n\uc81c\ubaa9: ' + m.title + '\n\uc694\uc57d: ' + m.summary
      + '\n\ub2e8\uacc4: ' + (m.steps||[]).join(' / ') + '\n\uace0\uac1d\uba58\ud2b8: ' + m.customerScript
      + '\n\uc8fc\uc758\uc0ac\ud56d: ' + (m.warnings||[]).join(' / ') + '\n\uccb4\ud06c\ub9ac\uc2a4\ud2b8: ' + (m.checklist||[]).join(' / ');
  }).join('\n\n');

  var prompt = '\uc544\ub798 ' + targets.length + '\uac1c\uc758 \uc57d\uad6d \uc5c5\ubb34 \ub9e4\ub274\uc5bc\uc740 \ub0b4\uc6a9\uc774 \uacb9\uce69\ub2c8\ub2e4. \uc911\ubcf5\uc744 \uc81c\uac70\ud558\uace0 \ud558\ub098\uc758 \uc644\uc131\ub3c4 \ub192\uc740 \ub9e4\ub274\uc5bc\ub85c \ud569\uccd0\uc8fc\uc138\uc694.\n\n'
    + manualsText + '\n\n'
    + 'JSON\ub9cc \ubc18\ud658(\ubc31\ud2f1\uc5c6\uc774): {"title":"","summary":"","steps":[],"customerScript":"","warnings":[],"checklist":[],"tags":[]}';

  var result = await callGem(prompt);
  var merged = null;
  if (result) {
    try {
      var clean = result.replace(/```json|```/g,'').trim();
      var m = clean.match(/\{[\s\S]*\}/);
      if (m) merged = JSON.parse(m[0]);
    } catch(e) {}
  }

  if (!merged) { showToast('\ubcd1\ud569 \uc2e4\ud328. \ub2e4\uc2dc \uc2dc\ub3c4\ud574\uc8fc\uc138\uc694.', 'err'); return; }

  var first = targets[0];
  var nm = {
    id: Date.now(),
    title: merged.title || first.title,
    cat: first.cat, cat2: first.cat2 || '', cat3: first.cat3 || '',
    keywords: Array.from(new Set(targets.reduce(function(acc,m){ return acc.concat(m.keywords||[]); }, []).concat(merged.tags||[]))),
    summary: merged.summary || first.summary,
    steps: merged.steps && merged.steps.length ? merged.steps : (first.steps||[]),
    customerScript: merged.customerScript || first.customerScript,
    warnings: merged.warnings && merged.warnings.length ? merged.warnings : (first.warnings||[]),
    checklist: merged.checklist && merged.checklist.length ? merged.checklist : (first.checklist||[]),
    tags: Array.from(new Set(targets.reduce(function(acc,m){ return acc.concat(m.tags||[]); }, []).concat(merged.tags||[]))),
    updatedAt: new Date(),
    views: targets.reduce(function(s,m){ return s+(m.views||0); }, 0),
    history: targets.reduce(function(h,m){ return h.concat(m.history||[]); }, [])
  };

  DATA.manuals.unshift(nm);
  fsSave('manuals', nm);

  // 참조 이전 후 기존 매뉴얼 삭제
  var oldIds = targets.map(function(m){ return m.id; });
  for (var i = 0; i < oldIds.length; i++) {
    reassignManualRefs(oldIds[i], nm.id);
  }
  DATA.manuals = DATA.manuals.filter(function(m){ return oldIds.indexOf(m.id) < 0; });
  for (var j = 0; j < oldIds.length; j++) {
    try { await fsDelete('manuals', oldIds[j]); } catch(e) {}
  }

  showToast('&#10024; ' + targets.length + '\uac1c \ub9e4\ub274\uc5bc\uc774 \ud558\ub098\ub85c \ubcd1\ud569\ub418\uc5c8\uc2b5\ub2c8\ub2e4!', 'ok');
  MANUAL_SELECT_MODE = false;
  MANUAL_SELECTED = [];
  renderPage('manuals');
  buildNav();
}

(function registerSW() {

  var swCode = [
    'var CACHE="pharm-v1";',

    'self.addEventListener("activate",function(e){e.waitUntil(caches.keys().then(function(keys){return Promise.all(keys.filter(function(k){return k!==CACHE;}).map(function(k){return caches.delete(k);}));}));});',
    'self.addEventListener("fetch",function(e){if(e.request.method!=="GET")return;e.respondWith(fetch(e.request).catch(function(){return caches.match(e.request);}));});'
  ].join('');
  var blob = new Blob([swCode],{type:'application/javascript'});
  var url = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).then(function(){
    console.log('[PWA] Service Worker 등록 완료');
  }).catch(function(){});
})();
