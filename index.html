<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2D6BE4">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="약국매뉴얼">
<link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;약국매뉴얼&quot;,&quot;short_name&quot;:&quot;매뉴얼&quot;,&quot;start_url&quot;:&quot;.&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;#2D6BE4&quot;,&quot;theme_color&quot;:&quot;#2D6BE4&quot;,&quot;icons&quot;:[{&quot;src&quot;:&quot;data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%232D6BE4'/><text y='.9em' font-size='80' x='10'>💊</text></svg>&quot;,&quot;sizes&quot;:&quot;any&quot;,&quot;type&quot;:&quot;image/svg+xml&quot;}]}">
<title>약국매뉴얼 | 센트럴온누리약국</title>
<style>
:root{
  --bg:#F2F4F8;--surface:#fff;--s2:#ECEEF3;
  --pr:#5B7FDB;--pr-l:#EEF2FF;--pr-d:#4468C4;
  --ac:#3DBFA0;--ac-l:#E8F8F4;
  --wn:#D97706;--wn-l:#FEF3E2;
  --dn:#B91C1C;--dn-l:#FFE8E8;
  --tx:#374151;--t2:#6B7280;--t3:#9CA3AF;
  --bd:#E0E4EE;
  --sh:0 2px 12px rgba(0,0,0,.06);
  --sh2:0 8px 32px rgba(0,0,0,.10);
  --r:12px;--rs:8px;
  --font:'Apple SD Gothic Neo','Noto Sans KR',sans-serif
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px;line-height:1.6}
#app{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:240px;background:var(--surface);border-right:1px solid var(--bd);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:120;transition:transform .3s}
.logo-area{padding:18px 20px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--pr),#8BA4F0);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;flex-shrink:0}
.logo-text{font-size:15px;font-weight:700;color:var(--tx)}
.logo-sub{font-size:11px;color:var(--t3)}
.snav{flex:1;padding:10px 0;overflow-y:auto}
.nav-sec{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.08em;padding:12px 20px 4px;text-transform:uppercase}
.ni{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;color:var(--t2);font-size:13.5px;font-weight:500;position:relative;transition:background .15s;border:none;background:none;width:100%;text-align:left;font-family:var(--font)}
.ni:hover{background:var(--s2);color:var(--tx)}
.ni.active{background:var(--pr-l);color:var(--pr);font-weight:700}
.ni.active::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;background:var(--pr);border-radius:0 3px 3px 0}
.ni-icon{font-size:16px;width:20px;text-align:center}
.nbadge{margin-left:auto;background:var(--dn);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center}
.user-area{padding:14px 20px;border-top:1px solid var(--bd);display:flex;align-items:center;gap:10px;transition:background .15s}
.user-area:hover{background:var(--s2)}
#userPanel{background:var(--surface);border-top:1px solid var(--bd);overflow-y:auto;max-height:50vh}
.ava{border-radius:50%;background:linear-gradient(135deg,var(--pr),var(--ac));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;flex-shrink:0}
.u-name{font-size:13px;font-weight:600;color:var(--tx)}
.u-role{font-size:11px;color:var(--t3)}

/* MAIN */
.main{margin-left:240px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--bd);padding:0 24px;height:58px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
.top-title{font-size:16px;font-weight:700;white-space:nowrap;color:var(--tx)}
.sw{flex:1;max-width:400px;position:relative}
.sw input{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:var(--rs);padding:8px 12px 8px 34px;font-size:13px;outline:none;transition:border-color .15s;font-family:var(--font);color:var(--tx)}
.sw input::placeholder{color:var(--t3)}
.sw input:focus{border-color:var(--pr);background:#fff}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--t3);pointer-events:none}
.top-acts{margin-left:auto;display:flex;gap:8px}
.content{padding:24px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:var(--rs);font-size:13px;font-weight:600;border:none;cursor:pointer;transition:all .15s;font-family:var(--font);white-space:nowrap}
.bp{background:var(--pr-l);color:var(--pr);border:1px solid #C7D2F8}.bp:hover{background:#E0E8FF;border-color:var(--pr)}
.bs{background:var(--surface);border:1px solid var(--bd);color:var(--t2)}.bs:hover{background:var(--s2);color:var(--tx)}
.ba{background:var(--ac-l);color:#0F7A61;border:1px solid #B2DFD5}.ba:hover{background:#D0F2EC}
.bd2{background:var(--dn-l);color:var(--dn);border:1px solid #F5C0C0}.bd2:hover{background:#FFD5D5}
.sm{padding:5px 10px;font-size:12px}
.gh{background:none;border:none;color:var(--t2);padding:6px 10px}.gh:hover{background:var(--s2)}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--bd);border-radius:var(--r);padding:20px;box-shadow:var(--sh)}
.chd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.ctitle{font-size:14px;font-weight:700}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.sc{background:var(--surface);border:1px solid var(--bd);border-radius:var(--r);padding:16px 18px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.slbl{font-size:12px;color:var(--t2);margin-bottom:2px;font-weight:500}
.sval{font-size:26px;font-weight:800;line-height:1}
.ssub{font-size:11px;color:var(--t3);margin-top:3px}

/* GRID LAYOUTS */
.dash-grid{display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:auto auto;gap:16px}
.span2{grid-column:span 2}

/* CHANGE ITEM */
.chi{border:1px solid var(--bd);border-radius:var(--rs);padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color .15s}
.chi:hover{border-color:var(--pr);box-shadow:0 0 0 3px var(--pr-l)}
.chi-hd{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.pri{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.ph{background:var(--dn-l);color:var(--dn)}.pm{background:var(--wn-l);color:var(--wn)}.pl{background:var(--ac-l);color:var(--ac)}.pe{background:var(--s2);color:var(--t2)}
.chi-title{font-size:13.5px;font-weight:600}
.diff{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0}
.db{background:#FFF0F0;border-radius:6px;padding:8px 10px;font-size:12px;color:#C0392B;white-space:pre-wrap}
.da{background:#F0FFF4;border-radius:6px;padding:8px 10px;font-size:12px;color:#1E8449;white-space:pre-wrap}
.dlbl{font-size:10px;font-weight:700;margin-bottom:2px}
.pbar{height:5px;background:var(--s2);border-radius:3px;overflow:hidden;margin-top:3px}
.pfill{height:100%;background:var(--ac);border-radius:3px;transition:width .5s}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.chip{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.cok{background:var(--ac-l);color:var(--ac)}.cno{background:var(--s2);color:var(--t3)}

/* TABS */
.tabs{display:flex;gap:3px;background:var(--s2);padding:3px;border-radius:var(--rs);width:fit-content;margin-bottom:18px;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:6px;font-size:13px;font-weight:600;border:none;cursor:pointer;background:none;color:var(--t2);transition:all .15s;font-family:var(--font)}
.tab.active{background:#fff;color:var(--pr);box-shadow:0 1px 4px rgba(0,0,0,.1)}

/* MANUAL GRID */
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mi{border:1px solid var(--bd);border-radius:var(--rs);padding:14px;cursor:pointer;transition:all .15s;background:var(--surface)}
.mi:hover{border-color:var(--pr);transform:translateY(-1px);box-shadow:var(--sh)}
.mmeta{display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.cbadge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--pr-l);color:var(--pr)}
.mtitle{font-size:14px;font-weight:700;margin-bottom:4px}
.msum{font-size:12px;color:var(--t2);line-height:1.5}
.tag{font-size:11px;background:var(--s2);color:var(--t3);padding:2px 7px;border-radius:4px}
.mfoot{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--bd)}

/* CAT GRID */
.cgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.cc{background:var(--surface);border:1px solid var(--bd);border-radius:var(--r);padding:22px 16px;text-align:center;cursor:pointer;transition:all .15s}
.cc:hover{border-color:var(--pr);box-shadow:var(--sh);transform:translateY(-2px)}

/* TABLE */
table{width:100%;border-collapse:collapse}
th{font-size:12px;color:var(--t3);font-weight:600;text-align:left;padding:10px 14px;border-bottom:2px solid var(--bd)}
td{padding:11px 14px;border-bottom:1px solid var(--bd);font-size:13.5px}
tr:hover td{background:var(--s2)}

/* FEEDBACK */
.fbi{border:1px solid var(--bd);border-radius:var(--rs);padding:14px;margin-bottom:10px}
.fbhd{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.fbs{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}
.sn{background:var(--wn-l);color:var(--wn)}.sh{background:var(--s2);color:var(--t3)}.sr{background:var(--pr-l);color:var(--pr)}.sa{background:var(--ac-l);color:var(--ac)}

/* REVIEW ITEM */
.rvi{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--bd)}
.rvi-info{flex:1}

/* QUIZ */
.qbox{background:var(--s2);border-radius:var(--rs);padding:16px;margin-bottom:14px}
.qopts{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.qopt{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--bd);border-radius:var(--rs);cursor:pointer;transition:all .15s;font-size:13px}
.qopt:hover{border-color:var(--pr);background:var(--pr-l)}
.qopt.correct{background:var(--ac-l);border-color:var(--ac)}
.qopt.wrong{background:var(--dn-l);border-color:var(--dn)}
.qnum{width:24px;height:24px;border-radius:50%;background:var(--bd);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}

/* POP */
.pop-prev{background:#fff;border:2px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-top:14px}
.pop-body{padding:24px}
.pop-fmts{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.pf{background:var(--s2);border:2px solid transparent;border-radius:var(--rs);padding:10px;text-align:center;cursor:pointer;transition:all .15s;font-size:12px;font-weight:600;color:var(--t2)}
.pf.active{border-color:var(--pr);background:var(--pr-l);color:var(--pr)}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
.mo.show{display:flex}
.modal{background:var(--surface);border-radius:var(--r);width:100%;max-width:680px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--sh2)}
/* 버그8 fix: 모바일 키보드 올라올 때 모달이 짤리지 않도록 */
@media(max-width:768px){
  .mo{align-items:flex-start;padding:12px 12px 0;overflow-y:auto}
  .modal{max-height:none;min-height:auto;margin:auto 0}
  .dash-top-grid{grid-template-columns:1fr !important}
}
.mhd{padding:18px 22px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mtit{font-size:16px;font-weight:700}
.mbody{padding:20px 22px;overflow-y:auto;flex:1}
.mfoot{padding:14px 22px;border-top:1px solid var(--bd);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}

/* SEARCH OVERLAY */
.so{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:flex-start;justify-content:center;padding-top:80px}
.so.show{display:flex}
.sm2{background:var(--surface);border-radius:var(--r);width:600px;max-height:70vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--sh2)}
.shd{padding:14px 18px;border-bottom:1px solid var(--bd);display:flex;gap:10px;align-items:center}
.sinp{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:var(--rs);padding:9px 13px;font-size:14px;outline:none;font-family:var(--font)}
.sinp:focus{border-color:var(--pr)}
.sres{overflow-y:auto;padding:10px}
.sri{padding:12px;border-radius:var(--rs);cursor:pointer;border:1px solid transparent;margin-bottom:6px;transition:all .15s}
.sri:hover{background:var(--pr-l);border-color:var(--pr)}
.hl{color:var(--pr);font-weight:700}

/* FORM */
.fg{margin-bottom:14px}
.fl{font-size:13px;font-weight:600;margin-bottom:5px;display:block}
.fh{font-size:11px;color:var(--t3);margin-top:3px}
.fi{width:100%;padding:9px 13px;background:var(--s2);border:1px solid var(--bd);border-radius:var(--rs);font-size:13.5px;outline:none;font-family:var(--font);transition:border-color .15s}
.fi:focus{border-color:var(--pr);background:#fff}
textarea.fi{resize:vertical;min-height:80px}
select.fi{cursor:pointer}
.egrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.sei{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.sei input{flex:1;padding:7px 11px;background:var(--s2);border:1px solid var(--bd);border-radius:var(--rs);font-size:13px;outline:none;font-family:var(--font)}
.sei input:focus{border-color:var(--pr);background:#fff}
.sei button{background:none;border:none;cursor:pointer;color:var(--t3);font-size:14px;padding:4px}
.sei button:hover{color:var(--dn)}
.add-step{background:var(--s2);border:1px dashed var(--bd);border-radius:var(--rs);padding:7px;width:100%;font-size:12px;color:var(--t2);cursor:pointer;font-family:var(--font);transition:all .15s;margin-top:4px}
.add-step:hover{border-color:var(--pr);color:var(--pr);background:var(--pr-l)}

/* MANUAL DETAIL */
.msec{margin-bottom:18px}
.msec-t{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px;padding-bottom:5px;border-bottom:1px solid var(--bd)}
.step-list{list-style:none}
.step-it{display:flex;gap:11px;padding:8px 0;border-bottom:1px solid var(--bd);font-size:13px}
.snum{width:22px;height:22px;background:var(--pr);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.cscript{background:var(--pr-l);border-radius:var(--rs);padding:13px;font-size:13px;line-height:1.7;border-left:3px solid var(--pr)}
.wbox{background:var(--wn-l);border-radius:var(--rs);padding:11px;font-size:13px;color:#7D5A00;display:flex;gap:7px;margin-bottom:6px}
.chki{display:flex;align-items:flex-start;gap:8px;padding:6px 0;cursor:pointer;font-size:13px}
.chkb{width:16px;height:16px;border:2px solid var(--bd);border-radius:4px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.chkb.on{background:var(--ac);border-color:var(--ac)}.chkb.on::after{content:'v';color:#fff;font-size:10px;font-weight:700}

/* VOICE */
.vbtn{width:64px;height:64px;border-radius:50%;background:var(--dn);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;margin:14px auto;box-shadow:0 4px 16px rgba(232,70,70,.3)}
.vbtn.rec{animation:pulse 1s infinite;box-shadow:0 0 0 8px rgba(232,70,70,.2)}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes pulse2{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}

/* AI */
.ai-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:2px 7px;background:linear-gradient(135deg,var(--pr),var(--ac));color:#fff;border-radius:20px}
.ai-proc{text-align:center;padding:28px 20px}
.ai-spin{width:44px;height:44px;border:3px solid var(--pr-l);border-top-color:var(--pr);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
.ai-step{font-size:12px;color:var(--t3);padding:4px 0;display:flex;align-items:center;gap:7px}
.ai-step.done{color:var(--ac)}.ai-step.cur{color:var(--pr);font-weight:600}

/* TOAST */
.toast{position:fixed;bottom:26px;right:26px;background:var(--tx);color:#fff;padding:11px 18px;border-radius:var(--rs);font-size:13px;font-weight:600;z-index:500;transform:translateY(16px);opacity:0;transition:all .3s;max-width:320px;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{background:var(--ac)}.toast.err{background:var(--dn)}
@media(max-width:768px){
  .toast{bottom:76px} /* 탭바(60px) + 여백 */
}

/* ============ 기능14: 다크모드 ============ */
[data-theme="dark"] {
  --bg:#0f1117;--surface:#1a1d27;--s2:#22263a;--t2:#a0a8c0;--t3:#6b738a;
  --tx:#e8eaf6;--bd:#2d3250;--pr:#7B9FEB;--pr-l:#1a2040;
  --ac:#3DBFA0;--ac-l:#0d2420;--wn:#d97706;--wn-l:#2a1e00;
  --dn:#e05555;--dn-l:#2a1010;--sh2:0 4px 20px rgba(0,0,0,.5)
}
.hbg{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:8px;border:none;background:none}
.hbg span{display:block;width:20px;height:2px;background:var(--tx);border-radius:2px}

/* 기능8: 모바일 검색 버튼 (하단 탭바에 포함) */
.mob-search-fab{display:none;position:fixed;bottom:72px;right:16px;width:48px;height:48px;border-radius:50%;background:var(--pr);color:#fff;border:none;font-size:20px;cursor:pointer;box-shadow:var(--sh2);z-index:105;align-items:center;justify-content:center}
/* 기능3: 매뉴얼 상세 핵심 배너 */
.m-hero{background:linear-gradient(135deg,var(--pr),#6B8EF5);color:#fff;border-radius:var(--r);padding:16px 18px;margin-bottom:16px}
.m-hero-title{font-size:11px;font-weight:700;opacity:.75;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.m-hero-text{font-size:15px;font-weight:700;line-height:1.5}
/* 기능7: 담당자/점검일 배지 */
.m-meta-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
/* 기능2: 변경사항 재알림 버튼 */
.btn-remind{background:var(--wn-l);color:#7D5A00;border:1px solid var(--wn);padding:5px 12px;border-radius:var(--rs);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font)}
/* 7. 모바일 하단 탭바 */
.mob-tab{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--bd);z-index:110;padding:0 0 env(safe-area-inset-bottom)}
.mob-tab-inner{display:flex;align-items:stretch}
.mob-tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px 6px;border:none;background:none;cursor:pointer;font-family:var(--font);color:var(--t3);font-size:10px;font-weight:600;gap:3px;transition:color .15s;position:relative}
.mob-tab-btn.active{color:var(--pr)}
.mob-tab-btn .ti{font-size:20px;line-height:1}

     summary:'', steps:[], customerScript:'', warnings:[], checklist:[],
     parts:[
      {id:'p10-1', name:'기본 숙지사항', changeLog:[],
       principle:'의약품(전문약+일반약)은 약사님만이 상담하고 판매할 수 있습니다. 다른 업무로 약사님이 바쁘다면 직원은 고객에게 양해를 구하고 잠시 기다려 달라고 하고, 약사님은 상황에 따라서 하고 있는 업무를 중단하고 판매하도록 합니다. 외품이나 기타 잡화는 직원이 상담하고 판매 가능하며, 이를 위해 외품이나 잡화에 대한 지식이 필요합니다.\n\n기본적으로 처방전은 직원이 받습니다. 부득이하게 약사님이 받을 경우 빠르게 직원이 처방전을 접수할 수 있도록 합니다.\n\n약국에 근무하는 약국장님, 근무약사님, 직원분들은 각자가 맡은 기본적인 역할을 기본 업무표에 맞춰 성실히 수행해야 합니다. 오전 중에 여유가 있을 때(되도록이면 업무 개시 전) 약국에 근무하는 모든 분들이 모여, 기본 업무와 특이사항 및 우선 처리 업무 등에 대해 대화를 나누고 업무 분담을 하도록 합니다. 어느 한 사람이 바쁘고 어려운 업무를 하고 있다면 지위고하를 넘어서 서로 지원하고 보조하는 습관과 문화를 만들도록 합니다.\n\n고객을 상대할 때는 항상 밝은 표정과 친절함을 유지하도록 합니다. 환하게 웃고, 자신감 있는 목소리로 대화하며, 호칭에 유의합니다.\n\n업무 일지를 매일 작성하고 업무공유가 되도록 합니다. 약의 주문/반품/교품, 재고 상의함, 사건 사고, 주의사항 등을 업무일지에 기록합니다.\n\n신규 고객일 경우, 고객의 연락처를 받아 알리미팜에 저장하도록 하여, 고객의 구매이력이나 약력을 "알리미 고객메모란"에 상세하게 저장합니다.',

       exceptions:['직원혜택 적용 시 지명도 있는 제품은 할인 대상에서 제외됩니다.','직원혜택은 현금결제 원칙이며, 구입 시 반드시 약국장을 통해야 합니다.','퇴사 후 약품구입 10% 할인은 6개월 이상 근무자에 한해 적용됩니다.']},
      {id:'p10-3', name:'근무 자세 (약사·직원 공통)', changeLog:[],
       principle:'근무 자세에서 5가지 중요한 원칙은 인사, 미소, 네이밍(고객 이름 외우기·불러주기), 즉각적인 대답과 행동, 감사입니다.\n\n약국은 서비스 업종입니다. 손님을 중심으로 하는 서비스 마인드가 필요합니다. 자신의 불편보다는 고객의 입장을 먼저 생각하고 행동하는 것이 필요합니다. 개인적인 핸드폰 통화나 문자, 개인적인 인터넷 사용은 매장에서 금합니다(급한 전화는 조제실에서 이용). 고객 상담 시 핸드폰은 받지 않으며 다른 사람이 대신 받아줍니다. 매장에서 업무와 관련 없는 독서는 금합니다. 너무 화려한 화장이나 헤어스타일, 복장은 피하고 위생적이고 단정한 차림을 합니다.\n\n환자나 손님이 오시면 인사를 꼭 하고 웃는 얼굴로 맞이합니다. 일부 환자나 손님이 무리한 요구를 해오는 경우가 있으나 불쾌하더라도 다툼 없이 내보내는 것이 좋습니다. 내방환자가 약국에서 나가실 때도 친절하게 꼭 인사를 합니다.\n\n환자와 대화 시 가능하면 좀 더 큰 소리(자신감 있는 목소리)로 말씀하시는 게 정확한 의사소통에 도움이 됩니다. 환자가 내 말을 잘 알아듣지 못한다면 목소리, 발음, 말하는 속도, 눈빛(시선을 맞추고 말하는지), 손동작을 체크해 봅니다.\n\n처방조제약 투약 전에 가능하면 처방전과 조제약의 확인을 한 번 더 하시고 복약지도를 합니다. 환자 앞에서 직원들끼리 문의사항이 있을 경우에는 환자에게 잘 들리지 않게 조제실에서 의견교환을 하는 게 불신유발을 차단하는 데 도움이 됩니다.\n\n일반약 판매 시 다빈도 약이 아닌 경우는 유효기간을 한 번씩 확인합니다. 약 포장에 먼지 등이 묻어 있을 시에는 제거 후 판매하며, 판매된 약은 재고가 있으면 바로 채우고 없으면 주문장에 적습니다.\n\n약국 내에서 구성원들 사이에서는 서로 존중하고 가족적인 분위기를 유지합니다. 멀티 플레이어, 상호협조, 팀워크가 중요합니다.',
       checkpoints:['근무자세 5원칙: 인사, 미소, 네이밍, 즉각적인 대답/행동, 감사','매장 내 개인 핸드폰·인터넷·독서 금지','고객 입장/퇴장 시 반드시 인사','투약 전 처방전과 조제약 재확인 후 복약지도','일반약 판매 시 유효기간 확인 및 먼지 제거 후 판매'],
       script:'"안녕하세요" "고맙습니다, 건강하세요" / 호칭: "OOO님, 어르신, 선생님, 고객님, 학생, 어린이" 등 상황에 맞게 사용\n대체조제 동의 구할 때: "성분은 같으나 회사가 다른 약으로 조제해 드려도 괜찮으십니까?" "같은 효능으로 허가 받은 약입니다."\n전화 문의 응대 시: "죄송합니다. 지금 상담중이시라 전화번호를 남겨주시면 1시간 이내에 연락드리도록 하겠습니다."\n외상 거절 시: "미납금은 다음에 편한 시간에 주세요" / "죄송합니다. 안타깝지만 저희가 도와드릴 방법이 없습니다."',
       exceptions:['대체조제·변경조제 시에는 처방전에 꼭 내용을 기재해야 합니다. 대체조제 시 생동제품은 환자에게 사전 동의만 받고 병원에 팩스를 보내면 되지만, 비교용출이거나 변경조제 시에는 반드시 해당 병원에 전화하여 사전 동의를 받고 환자에게 설명한 뒤 처방전에 병원통화 내용을 적어야 합니다. 시럽류, 복합제, 연고류 등 외용제는 변경조제만 가능합니다. 문제 발생 시 약국 행정처분의 원인이 됩니다.','약사 상담 중 걸려온 문의 전화나 환자의 약 문의, 약값 문의 등은 전화번호와 함께 정확히 메모한 후 1시간 이내 답변전화를 드리겠다고 응대하고, 약사에게 추후 메모 내용과 답변예정시간을 전달합니다.','처방조제 시 피치 못할 외상이 아닌 경우는 가급적 외상을 주지 않습니다. 6개월 미만 고객이 처방전 없이 내방하여 복용약을 먼저 지어주면 후에 처방전을 가져오겠다는 요구는 현행법상 불법이므로 정확하고 친절하게 거절합니다.']}
     ]},
    {id:11,title:'응대예절 5원칙',cat:'고객응대',cat2:'기본응대',cat3:'예절규정',keywords:['응대예절','인사','미소','태도','금지행동','호칭'],tags:['응대예절','인사','금지행동','서비스'],updatedAt:new Date(),views:0,history:[],
     summary:'', steps:[], customerScript:'', warnings:[], checklist:[],
     parts:[
      {id:'p11-1', name:'응대예절의 다섯 가지 원칙', changeLog:[],
       principle:'1. 인사 - 밝게, 언제나, 먼저, 지속적으로.\n\n2. 표정 - 가벼운 미소를 띠는 것이 이상적이며, 시선은 상대방 코쯤을 봅니다.\n\n3. 몸가짐 - 청결함, 품격, 적당한 화장, 건강함을 유지합니다.\n\n4. 태도 - 인사법, 걷는 법, 방향을 가리키는 자세, 물건을 건네는 법에 유의합니다.\n\n5. 말씨 - 시간, 장소, 경우에 맞는 단어를 사용하고 예의를 지킵니다. 유행어와 전문용어는 피하며, 완충단어를 적절히 사용하고 말끝을 정중하게 합니다.\n\n고객을 상대할 때는 항상 밝은 표정과 친절함을 유지하도록 합니다. 환하게 웃고, 자신감 있는 목소리로 대화하며, 호칭에 유의합니다.',
       checkpoints:['인사: 밝게, 언제나, 먼저, 지속적으로','표정: 가벼운 미소, 시선은 상대방 코 부근','몸가짐: 청결 단정 위생복 착용','태도: 올바른 인사법, 물건은 두 손으로 전달','말씨: 시간·장소에 맞는 단어, 유행어·전문용어 피함, 말끝은 정중하게','고객 퇴장 시에도 반드시 인사하기'],
       script:'"안녕하세요!" / "고맙습니다, 건강하세요!"\n호칭: "OOO님", "어르신", "선생님", "고객님" 등 상황에 맞게 사용',
       exceptions:[]},
      {id:'p11-2', name:'근무 중 금지 행동', changeLog:[],

       checkpoints:['고객 앞 핸드폰 사용 절대 금지','동료와 수다·장난 금지','고객 외모에 따른 태도 차별 금지','개인 감정 표출 금지'],

       checkpoints:['출근 시 복장·화장 점검','고객 입장 시 즉시 인사','고객 퇴장 시 배웅 인사'],

    {id:12,title:'약국 근무 규정',cat:'직원교육',cat2:'신입교육',cat3:'근무규정',keywords:['근무규정','출근','지각','결근','업무준비','접객','퇴근'],tags:['근무규정','출퇴근','직원교육'],updatedAt:new Date(),views:0,history:[],
     summary:'', steps:[], customerScript:'', warnings:[], checklist:[],
     parts:[
      {id:'p26-1', name:'출근 및 지각·결근 규정', changeLog:[],
       principle:'지각은 자신의 근무에도 영향을 줄 뿐만 아니라 다른 직원에게도 나쁜 영향을 끼치므로 자중하여 지각이 없도록 합니다. 출근은 오전 8시 30분까지입니다.\n\n부득이한 사정으로 지각, 결근을 할 때는 꼭 사전에 약국장에게 알려 허가를 받아야 합니다. 아무런 연락도 없이 지각 및 무단결근을 할 경우, 사유서를 제출하여야 합니다.',
       checkpoints:['출근 시각: 오전 8시 30분까지','지각·결근은 반드시 사전에 약국장에게 알려 허가받기','무연락 지각·무단결근 시 사유서 제출'],
       script:'',
       exceptions:['정당한 사유 없이 3회 이상 지각 시 결근 1일로 간주, 5회 이상 지각 시 결근 2일로 간주, 반일결근 2회는 1일 전일 결근으로 인정됩니다.','무단결근을 할 경우는 징계조치(해고사유)를 합니다.']},
      {id:'p26-2', name:'업무 준비 (용모·마음가짐)', changeLog:[],
       principle:'약국시설물 및 환경, 기기, 장치, 기구, 재료 등을 깨끗하게 청소하거나 소독하여 청결한 상태를 유지합니다. 영업 개시 전까지 각자 맡은 것을 정리/정돈하여 바로 업무에 임할 수 있도록 합니다. 스스로의 마음가짐과 복장을 점검합니다.\n\n의료 서비스인으로서 갖추어야 할 성실, 정확, 배려, 인내력 등을 기르도록 향상 노력합니다. 자신에게 주어진 일은 책임을 갖고 신속, 정확하게 처리합니다. 윗사람에게는 존경을, 동료나 아랫사람에게는 신뢰와 친밀감을 갖고 대하며 서로의 인격을 존중합니다. 약국 내의 정보에 대해서는 외부에 대해 비밀을 엄수해야 합니다. 언제라도 일에 최선을 다할 수 있도록 자신의 건강에 항상 신경을 씁니다.\n\n약국 서비스에 종사하는 사람에게 무엇보다 중요한 것은 청결이므로, 항상 깨끗이 하고 수시로 체크하도록 합니다.',
       checkpoints:['두발은 단정하게, 흐트러지거나 요란한 머리모양 삼가','손톱은 짧게 정리, 색이 있는 매니큐어 삼가','아이섀도, 강한 향수, 짙은 화장 삼가','화려한 색상이나 짧은 스커트 등의 옷 피하고 깔끔한 옷 착용'],
       script:'',
       exceptions:[]},
      {id:'p26-3', name:'업무 중 기본자세 및 접수·접객·조제실 업무', changeLog:[],
       principle:'[업무 기본자세] 업무 처리는 계획적이고 체계적으로 합니다. 업무에 필요한 지식을 습득할 수 있도록 학습을 게을리하지 않습니다. 상급자의 지시를 충분히 이해하고, 모르는 것은 재차 문의하여 확실히 실행합니다. 공유물은 사용 후에 반드시 원위치에 놓는 습관을 기릅니다. 근무 중에 외출이 필요할 때에는 반드시 약국장의 허락을 받도록 합니다. 약국의 기자재는 중요한 자산이므로 소중히 다루고 관리해야 합니다.\n\n[접수 업무] 깨끗하고 단정한 몸가짐을 하며, 항상 미소와 말씨를 주의하며, 상냥한 인사를 습관화합니다. 항상 주위를 정돈하여 안정된 분위기를 만들고 업무처리는 현명하고 정확하게 합니다. 항상 자기 앞에 있는 고객에게 충실히 하며, 고객 한 사람 한 사람에게 관심을 갖고 성실하게 상담하고 친절하게 설명합니다. 처방전에 관한 내용이나 조제 후 처리 등에 관하여 숙지하여 고객에게 설명할 수 있어야 합니다. 수납에 관한 업무는 정확하고 체계적으로 합니다.\n\n[접객 업무] 모든 약사/직원은 약국에 내방하는 고객에게 항상 친절한 응대를 하며, 제일 먼저 본 사람이 먼저 인사를 합니다. 업무 중이거나 기타 사정으로 인하여 고객을 기다리게 하는 경우에는 정중하게 양해를 구합니다.\n\n[조제실 업무] 조제기기 및 기구를 취급할 때는 신중하게 다루고, 시끄러운 소리가 나지 않도록 주의합니다. 조제업무가 끝나면 사용하던 약을 정리/정돈하는 등 다음 고객을 위해 신속히 준비합니다. 약국 내에서 조제기기 및 기구의 청소는 조제실 전원이 책임지고 반드시 청결을 유지합니다. 조제 오류가 발생하지 않도록 검수과정을 꼭 거치며, 조제 시 처방전과 모니터를 확인하도록 합니다.\n\n[근무 중 주의사항] 근무 중에는 큰소리를 내어 웃거나 잡담하는 행동은 금합니다. 사적인 통화는 피하며, 전화할 때는 간단명료하게 요점을 말하고 상대방이 요점을 이해하고 있는지 확인합니다. 근무 중에 여유 시간이 있다면 제품 진열 상태 및 수량 파악, 정리/정돈, 서류 정리, 처방전 확인 등의 업무를 진행하도록 합니다. 어떠한 일을 하더라도 고객이 내방하게 되면 하고 있던 일을 잠시 중단하고 접객을 하도록 합니다.',
       checkpoints:['업무 처리는 계획적·체계적으로, 모르는 지시는 재차 문의 후 확실히 실행','공유물 사용 후 반드시 원위치','근무 중 외출 시 약국장 허락 필수','접수 시 고객 한 명 한 명에게 충실하고 정확하게 수납','조제기기·기구는 조제실 전원이 책임지고 청결 유지','조제 시 검수과정 필수, 처방전과 모니터 재확인'],
       script:'약사님이 부재중일 때 고객이 약에 관한 질문을 하면: "약사님이 부재중이므로 조금만 더 기다려 주시겠습니까?" 또는 "약사님이 OO시쯤에 돌아오시니 다시 한 번 방문해 주시겠습니까?"',
       exceptions:['제일 먼저 본 사람이 먼저 인사하는 것이 원칙이며, 고객을 기다리게 하는 경우 정중히 양해를 구해야 합니다.']},
      {id:'p26-4', name:'업무 종료 및 퇴근', changeLog:[],
       principle:'업무 종료 시간 전에 하던 일을 그만두고 퇴근할 준비를 하지 않습니다. 당일의 업무는 당일에 처리하는 습관을 들입니다. 당일에 있었던 업무 중 특이사항을 기록하고, 빠른 처리가 필요한 일은 익일에 진행할 수 있도록 준비하도록 합니다. 기구 및 기기의 청소 및 정리정돈을 합니다.\n\n[퇴근] 각자의 맡은 자리를 정리 상태를 다시 한 번 점검하며, 전원 상태를 확인합니다.',
       checkpoints:['업무 종료 시간 전 퇴근 준비 금지','당일 업무는 당일 처리','특이사항 기록 및 익일 처리 사항 준비','퇴근 전 각자 자리 정리상태 점검 및 전원 확인'],

     ]},
    {id:13,title:'업무 분장',cat:'직원교육',cat2:'신입교육',cat3:'역할분담',keywords:['업무분장','약국장','근무약사','실장','직원','역할'],tags:['업무분장','역할','직원교육'],updatedAt:new Date(),views:0,history:[],
     summary:'', steps:[], customerScript:'', warnings:[], checklist:[],
     parts:[
      {id:'p27-1', name:'업무 분장의 원칙', changeLog:[],
       principle:'약국은 의약품에 관련된 업무가 대부분이므로, 소소한 일이든 중대한 일이든 처음부터 끝까지 대부분의 업무들이 약사중심으로 시작되고 끝나게 됩니다. 기본적으로 근무약사나 직원은 약국장의 업무를 보조하면서 일정 부분은 업무를 전담해야 합니다. 공통으로 해야 할 일과 분담해야 할 일, 보조해야 할 일 등을 정하여 체계적으로 업무처리가 될 수 있도록 해야 합니다.\n\n모든 업무의 정(正)은 약사님이며, 부(副)는 근무약사와 직원입니다. 근무약사와 직원은 업무가 신속하고 정확하게 처리될 수 있도록 약사님을 보좌해 주는 것이 핵심입니다.',
       checkpoints:[],
       script:'',
       exceptions:[]},
      {id:'p27-2', name:'약국장의 역할', changeLog:[],
       principle:'약국을 대표하는 약사로서 내부적인 최종 결정권자이며, 모든 책임은 약국장님으로 귀결되므로 약국 내/외적으로 진행되는 모든 업무를 정확히 숙지하고 파악해야 하며, 약사로서의 책임과 역할, 약국을 대표하는 자로서의 책임과 역할을 병행해야 합니다.\n\n약국장님은 근무약사나 직원에게 일부의 업무에 대해 책임과 역할을 일임하고, 그에 대한 업무 진행 현황을 정기적으로 보고 받도록 합니다. 항상 밝은 약국을 위해 근무약사와 직원들의 입장에서 고충과 애로사항을 경청하고 해결하도록 노력합니다.\n\n어떤 업무든지 완료 여부를 확인하고, 필요하다면 서면 보고를 받도록 합니다. 처방전 입력, 청구, 일일 결산 등의 중요한 업무에 대해서는 직접 확인하고, 잘못된 점에 시정 조치를 합니다. 당일 업무내용을 기록하고, 특이사항은 점검하여 익일 해야 할 일들을 준비하며 계획하도록 합니다.',
       checkpoints:['약국 내외 모든 업무를 정확히 숙지·파악','업무 일임 후 진행현황 정기 보고 받기','처방전 입력·청구·일일결산은 직접 확인 및 시정조치','당일 업무내용 기록 및 익일 계획 수립'],

      {id:'p27-3', name:'근무약사의 역할', changeLog:[],
       principle:'중, 소 약국의 경우, 약국장 부재 시 약국장의 업무를 대행하며, 외부적인 업무 중 처리가 어려운 경우 즉시 보고하여 약국장님의 지시에 따라 업무를 처리합니다.\n\n대형 약국의 경우, 조제, 복약지도 등으로 특화되는 경우 해당 업무에 대하여 책임과 권한을 가지게 됩니다.',
       checkpoints:['약국장 부재 시 업무 대행','처리 어려운 외부업무는 즉시 보고 후 지시에 따름'],

      {id:'p27-4', name:'실장의 역할 (실장이 있는 경우)', changeLog:[],
       principle:'약국이 효율적이고 체계적으로 운영되도록 약국 내외부를 관리하는 사무 업무 및 고객 응대에 관련된 업무 등을 약국장의 권한을 위임 받아 처리하며, 약국장의 지시 사항을 전파하고 실행하며, 자체 양식에 의거하여 서면 혹은 구두 보고합니다.\n\n건물 내부 및 외부를 정기적으로 점검하고 필요 시 보수를 책임집니다. 공동 장비 및 비품의 현황 파악, 관리, 구매 업무를 담당하며, 필요 시 의약품 구매업무를 진행합니다. 관공서 관련 업무 처리를 하며 고객 응대에 대한 책임을 집니다.\n\n약국에서 일어나는 모든 업무에 대하여 파악하고 있어야 하며, 약국장님에게 정기적으로 보고하여 업무처리가 될 수 있도록 해야 합니다.',
       checkpoints:['건물 내외부 정기 점검 및 필요시 보수 책임','공동 장비·비품 현황파악, 관리, 구매','관공서 관련 업무 처리 및 고객응대 책임','전체 업무 파악 후 약국장에게 정기 보고'],
       script:'',
       exceptions:[]},
      {id:'p27-5', name:'직원의 역할', changeLog:[],
       principle:'실장이 없는 경우, 실장의 역할 중 일부를 약국장님으로부터 위임 받아 진행합니다. 업무를 신속하고 빠르게 처리할 수 있도록 약국장님, 근무약사님의 업무를 보조합니다.\n\n기본적으로 약국내외부의 청소와 정리, 고객 응대, 장비 및 비품 관리, 서류관리, 진열관리, 재고관리, 조제지원, 행정 업무, 수납 등을 수행합니다.\n\n고객이 몰리는 바쁜 시간에는 업무가 신속하고 정확히 처리될 수 있도록 적재적소에 약사님의 업무를 지원해야 하므로, 약국 업무를 전체적으로 파악하고 있어야 하며, 약사님의 지시를 받아 정확히 업무를 처리하도록 합니다.\n\n고객들을 친절하게 응대하고 대기시간 지체 시 환자에게 사전예고하고 대안을 제시하도록 합니다. 매장을 정리정돈하고 편의시설을 청결하게 관리하고 고객이 잘 사용할 수 있도록 안내합니다. 약국 내 진열된 제품의 진열, 청소 및 POP 등을 관리하고, 상태를 보고하여 지시에 따라 수정 또는 변경하도록 합니다.\n\n의약품 문의를 제외한 매약 문의 시 적극적으로 대응하며 의약품 문의는 약사님에게로 전달하고 안내합니다. 특이사항이 있을 경우 고객정보란에 메모합니다.\n\n처방전 접수 및 수납은 신속하고 정확하게 하며, 접수 순서대로 정리하고 계산하여 약사님의 결산업무를 보조합니다. 거래명세서, 세금계산서, 영수증 등을 정리 및 관리 보관하도록 합니다. 재고 현황을 파악하고 보고하여 약사님의 지시에 따라 주문하고, 업무일지에 기록하도록 합니다.',
       checkpoints:['청소·정리, 고객응대, 장비·비품관리, 서류관리, 진열관리, 재고관리, 조제지원, 행정업무, 수납 수행','대기시간 지체 시 환자에게 사전예고 및 대안 제시','의약품 문의는 약사에게 전달, 매약 문의는 직접 응대','특이사항은 고객정보란에 메모','처방전 접수·수납은 순서대로 정리 및 계산'],

    {id:14,title:'업무준비 매뉴얼',cat:'직원교육',cat2:'신입교육',cat3:'오픈준비',keywords:['업무준비','약국오픈','전산세팅','청소점검','재고확인'],tags:['업무준비','약국오픈','직원교육'],updatedAt:new Date(),views:0,history:[],
     summary:'', steps:[], customerScript:'', warnings:[], checklist:[],
     parts:[
      {id:'p28-1', name:'약국 오픈', changeLog:[],
       principle:'매장의 보안 및 잠금 장치를 해제하고, 약국에 들어서면서 전체적으로 이상이 없는지 점검합니다.\n\n오픈 순서: 우편함에 주차카드 챙기기 → 보안해제 → 비밀번호(7890) → 직원자리 컴퓨터 & 냉장고 불 & 약국 불 & 온장고 & 약사님자리 컴퓨터 켜기 → 앞으로 가서 정수기 켜기 → 앞문 열기 → 직원자리 컴퓨터 PM2000 틀고 완전히 켜지면 알리미팜 틀기 → 약사님 자리 알리미팜 열어서 조제현황, A-POS 창 터치화면에 띄워놓고 → 직원자리 알리미팜을 끄고 라벨기 껐다가 켠 후 알리미팜 다시 틀기.\n\n조제실 안의 약 뚜껑 열기 → 물병 채우기 → 빈 약칸에 약 채우기 → 시럽병 확인. 청소는 빗자루질 먼저 하고 밀대걸레는 여자화장실에서 빨아오기. 정수기 뒤 벌레 청소.\n\n약국의 출입문과 창문을 열어 환기를 시킵니다. 완료 후에 에어컨, 제습기, 온풍기 등을 가동시킵니다. 약국에 설치되어 있는 정수기, 온장고(50도씨), 포장기, 냉장고 전등, 진열장 전등, 스피커(멜론음악시작) 등의 일반기기를 점검하면서 가동시킵니다.\n\n약국 내부의 기본 사항이 완료되면 외부 청소 및 주변 정리를 합니다. 약국 입구 및 주위, 쇼윈도, 간판의 상태를 확인하고 기본적인 청소를 합니다.',
       checkpoints:['보안 해제 비밀번호(7890) 입력','컴퓨터/전등/온장고/정수기 순서대로 켜기','조제실 약 뚜껑·물병·시럽병 확인 및 채우기','청소는 빗자루질 먼저, 밀대걸레는 여자화장실에서 세척','환기 후 에어컨/제습기/온풍기 가동','정수기·온장고(50도)·포장기 등 일반기기 점검 가동'],
       script:'',
       exceptions:['날씨가 궂을 경우는 제한적으로 환기를 하되 평소보다 길게 환기하고, 완료 후 냉난방기를 가동합니다.','계절에 따라 약탕기, 온장고는 가동하지 않을 수 있으며, 온도 조절을 해야 합니다.','겨울철에는 외부 물청소를 하지 않습니다(금물).']},
      {id:'p28-2', name:'전산 시스템 및 주변기기 세팅', changeLog:[],
       principle:'컴퓨터 및 주변기기는 정해진 부팅 순서에 따라 부팅합니다(스캐너를 먼저 부팅해야 정상 작동되는 경우가 있으므로, 부팅 후 작동 여부를 확인합니다).\n\n일반적인 부팅 순서: 처방전 입력 컴퓨터(Server) → 알리미팜 컴퓨터 → 약사님 컴퓨터 → 조제실 컴퓨터 → ATC 컴퓨터.\n\n컴퓨터 부팅 후 설치되어 있는 바이러스 검사 프로그램 및 쿠키 정리 프로그램을 가동합니다. 각 컴퓨터에 PM2000, 알리미팜 등에 로그인을 하고 정상적으로 구동되는지 확인합니다. 각 프로그램의 업데이트 창이 뜬다면 어떤 업데이트인지 확인한 후 업데이트를 진행합니다.',
       checkpoints:['부팅 순서: 처방전입력(Server) → 알리미팜 → 약사님컴퓨터 → 조제실컴퓨터 → ATC','스캐너는 먼저 부팅 후 작동 여부 확인','바이러스 검사·쿠키 정리 프로그램 가동','PM2000, 알리미팜 정상 로그인 및 구동 확인','업데이트 창 발생 시 내용 확인 후 진행'],
       script:'',
       exceptions:['컴퓨터나 주변기기의 이상 또는 오류가 발생할 경우, 먼저 재부팅을 하고, 재 오류 시 조치를 취할 수 있는 담당자 또는 업체와 연락하여 조치를 취합니다.','컴퓨터 및 전산 프로그램의 오류 발생 시 업무에 큰 문제가 생길 수 있으므로 비상연락망을 작성하여 비치하고 해결 방안을 마련해 빠르게 처리할 수 있도록 합니다.']},
      {id:'p28-3', name:'약국 청소 및 점검 사항', changeLog:[],
       principle:'청소를 깨끗이 하는 것도 중요하지만, 제품의 수량과 진열상태, POP 등을 체크하고 이상이 있을 경우에는 바로 조치를 취하고, 해결이 어려울 경우 메모하여 동료 및 약사님과 상의하여 처리하도록 합니다.\n\n의약품, 건기식 등 제품의 수량과 유효기간을 확인하고 부족하지 않게 진열하도록 하며, 재고량이 부족할 경우 주문할 수 있도록 기록합니다.\n\n매일 청소해야 할 사항과 요일별 청소 구역을 정하여 해야 할 곳을 지정합니다. 매일 청소해야 할 곳: 카운터 주위, 조제실, 독립매대 냉장고, 온장고, 정수기, 바닥청소, 분리수거 등. 요일별 청소 지역: 벽장, 수납공간, 쇼윈도, 창고 등.\n\n점검사항: 매장 내 물품 및 소모품의 점검, 제품의 수량, 진열상태 훼손 여부, 가격표와 POP 상태 확인 등. 매일 아침 매장 전체를 빗질, 걸레질 합니다.\n\n카운터 주위는 소비자들이 가장 많이 보는 지역으로 항상 청결한 상태를 유지하도록 노력합니다. 모든 제품, 가격표, POP 등은 소비자가 잘 볼 수 있도록 하는 것이 원칙입니다. 가격표와 POP의 상태를 확인하고, 훼손이나 변색되었으면 교체하도록 합니다.\n\n조제실은 조제 테이블을 깨끗하게 청소하고, 조제에 필요한 기기나 도구들(약포장기, 약사발, 약주걱 등)을 점검 및 체크하고 청결상태를 유지합니다. 조제약의 수량을 체크하고 부족할 경우 채워 놓도록 합니다.',
       checkpoints:['매주 화요일: 출입 유리문 닦기 / 매주 수요일: 약장 먼지떨이','제품 수량·유효기간 확인 및 부족분 주문 기록','카운터, 조제실, 냉장고, 온장고, 정수기, 바닥은 매일 청소','벽장·수납공간·쇼윈도·창고는 요일별 청소','가격표·POP 훼손·변색 시 즉시 교체','조제실 기기(약포장기, 약사발, 약주걱) 점검 및 청결 유지'],
       script:'',
       exceptions:[]},
      {id:'p28-4', name:'재고 확인 및 제품 주문, 전일 마감 확인', changeLog:[],
       principle:'아침에는 안전 재고량 이하의 제품을 위주로 주 거래처에 주문하여 빠른 시간 내에 배송받을 수 있도록 합니다. 약국별로 제품 주문 시 주의사항을 작성하고 최적의 주문이 되도록 공유 및 숙지하도록 합니다.\n\n청구 오류 확인: 전일에 입력된 처방전이 정확히 입력되어 있는지 확인합니다. 전일 특이사항 확인: 전일에 발생된 특이사항(예약 구매, 수령 등)을 확인하고 우선순위에 따라 처리할 업무를 확인합니다. 문서 확인: 전일 처방전, 거래명세표, 영수증 등이 날짜별로 정리되어 있는지 확인하고, 정리가 안 되어 있으면 정리하여 보관합니다.\n\n전일 매출 확인: 매출 유형(조제, 매약)에 따라 매출을 확인합니다(여건이 된다면 성별, 연령별 매출도 확인). 정리 마감이 안 되어 있을 경우 마감을 진행하며, 바쁠 경우 봉투에 넣고 날짜를 기록하여 밀봉하도록 합니다.\n\n거스름돈 확인: 거스름돈이 충분한지 확인하고, 부족할 시 여유 있는 시간에 은행을 방문합니다. 사무용품 및 소모품 확인: 필기도구, 포스트잇, 메모지 등과 잉크&토너, 영수증카트리지 등이 충분한지 확인합니다. 스탬프 도장을 당일 날짜로 변경합니다. 조제실 준비: 조제에 사용되는 약포지, 약봉투 등을 확인하고 약포지를 끼워둡니다.',
       checkpoints:['안전 재고량 이하 제품 위주로 아침에 주거래처 발주','전일 입력 처방전 청구오류 확인','전일 처방전·거래명세표·영수증 날짜별 정리 확인','전일 매출(조제/매약) 확인 및 마감 처리','거스름돈 충분 여부 확인','스탬프 도장 당일 날짜로 변경','조제실 약포지·약봉투 보충'],
       script:'',
       exceptions:[]},
      {id:'p28-5', name:'근무의 일반적 사항', changeLog:[],
       principle:'8시 30분까지 출근, 지각하지 않습니다. 출근하면 약국 조명, 냉장고 조명을 켜고 신문을 정리하고 환기를 시킵니다. 컴퓨터를 켜고 pharm3000을 실행합니다. 주 컴퓨터에 알리미를 실행하고 음악을 틉니다. 약국 근무시간에는 클래식과 같이 차분한 음악이나 방송이 흐르도록 하며, 너무 시끄러운 음악과 방송은 삼갑니다. 투약 쪽 컴퓨터에도 알리미를 실행하고 휴포스는 아래, 조제현황은 위쪽 화면에 보이도록 설정합니다. 조제실 컴퓨터도 알리미를 실행하고 조제현황이 보이도록 설정합니다. 조제확인도장의 일자를 당일로 조정합니다.\n\n청소는 아침에 한 번을 원칙으로 하되, 일과 중에 많이 더러워지면 한 번 더 합니다. 아침 청소는 바닥 쓸기와 물걸레 바닥 닦기로 합니다.\n\n쓰레기 처리: 일반쓰레기는 매일 퇴근 전에 확인해서 필요하면 비웁니다. 분리수거는 종이류와 플라스틱류를 함께 처리하고, 병과 캔류를 함께 처리합니다.\n\n핸드폰 통화는 중요하고 급한 사항이 아니면 조제실 안이나 바깥에서 하도록 하며, 손님이 있을 때는 자기 할 일이 없더라도 핸드폰 사용을 중단합니다. 환자가 투약 후 나갈 때까지 위급하지 않은 개인적인 용무(개인 인터넷, 문자, 업무와 관계없는 독서 등)는 금합니다.\n\n직원의 역할에 약을 설명하고 판매하는 것은 포함되지 않습니다. 약과 건강에 대한 문의는 자신이 잘 아는 부분이라 하더라도 약사가 하도록 넘겨야 합니다. 의료기기, 부외품, 화장품 등은 제품의 특성을 잘 이해하여 손님에게 설명하는 것이 가능합니다. 무조건적인 제품 권매보다 제품의 정확한 정보 전달을 통한 판매가 되도록 합니다.\n\n반품이나 환불을 요구할 때는 이유 없이 훼손된 제품을 반품하는 경우를 제외하고는 친절히 받아주도록 합니다. 약국에서 구입한 제품으로 효과를 보고 만족하여 다시 찾도록 하는 것이 우리 약국의 목적이자 목표입니다.',
       checkpoints:['8시 30분까지 출근','출근 시 조명·환기·신문정리·pharm3000 실행','근무 중 음악은 차분한 음악(클래식 등)으로, 시끄러운 음악 지양','조제확인도장 일자를 당일로 조정','일반쓰레기 매일 퇴근 전 확인, 분리수거(종이+플라스틱, 병+캔)','의약품 설명·판매는 직원 역할에서 제외, 약사에게 안내'],
       script:'손님 응대: 오실 때 "안녕하세요", "어서 오세요" / 가실 때 "안녕히 가세요"\n손님이 수긍할 수 있는 불만을 얘기할 때: "잘 알겠습니다. 더 잘하겠습니다."\n진상 손님이 무리한 요구를 할 때(직접 처리해야 하는 경우): "죄송하지만 이 부분은 해드릴 수가 없습니다." (절대 목소리를 높이지 않고 정중하게)\n먼저 온 처방 환자가 있어 약사가 조제·투약 중일 때 다른 손님이 상담 요청 시: "먼저 오신 손님 약을 조제 중이니 잠시 기다려 주세요."\n조제시간이 오래 걸릴 것으로 예상될 때: "장기약 조제가 있어 시간이 다소 걸립니다. 잠시만 기다려 주십시오."\n급한 표시를 내는 고객이 있을 때 먼저 오신 분께: "이분 먼저 해드려도 될까요?"\n바쁜 아기엄마가 기다리고 있을 때 어르신께: "어르신 아기들 약 먼저 지어줘도 괜찮을까요?"\n약사 상담 중 걸려온 약 문의 전화: "죄송합니다. 지금 상담 중이시라 전화번호를 남겨주시면 2시간 이내에 연락 드리도록 하겠습니다."',
       exceptions:['진상 손님이 무리한 요구를 하면 국장이나 관리약사에게 넘기고, 직접 처리해야 할 때는 절대 목소리를 높이지 말고 정중하게 거절합니다.','약사 상담 중 걸려온 환자의 약 문의·약값 문의 등의 전화는 전화번호와 함께 정확히 메모한 후 답변전화를 2시간 이내에 드리겠다고 응대하고, 약사에게 추후 메모 내용과 답변예정시간을 전달합니다.','어르신들은 비교적 시간 여유가 많은 편이고 젊은 사람들을 도와주고 싶은 분들도 있으므로, 바쁜 아기엄마들이 기다리고 있으면 양해를 구하고 순서를 조정할 수 있습니다.']}
     ]},
    {id:15,title:'처방전 고객 응대 매뉴얼',cat:'고객응대',cat2:'처방응대',cat3:'접수확인',keywords:['처방전','접객','접수','검수','재고없음','대체조제'],tags:['처방전','접객','접수','고객응대'],updatedAt:new Date(),views:0,history:[],
     summary:'', steps:[], customerScript:'', warnings:[], checklist:[],
     parts:[
      {id:'p29-1', name:'접객 준비 및 접객 인사', changeLog:[],
       principle:'항상 1명 이상의 직원 또는 약사가 접수대를 지키고 있어야 하며, 부득이하게 자리를 비울 경우, 직원 또는 약사에게 그 사실을 알려 접수대에 직원이 상주하도록 합니다. 고객의 유입 대비를 위해 진열, 조제 준비(시럽병 등), 약품 준비 등을 다시 한 번 체크합니다.\n\n고객이 약국에 들어설 때 진행 중인 모든 업무를 중단하고 접객을 합니다. 접객 인사는 통일하여 "안녕하세요" 혹은 "어서오세요"로 합니다. 거동이 불편한 고객의 경우와 짐이 많은 경우에 마중을 나가도록 합니다. 대부분 조제와 매약 고객이 구분될 수 있으므로 상응하는 준비를 합니다. 한 번에 여러 명의 고객이 입장했을 때에는 여유인력도 접객을 지원합니다.',
       checkpoints:['접수대는 항상 1명 이상 상주, 자리 비울 시 알리고 교대','고객 유입 전 진열·조제준비·약품준비 재확인','고객 입장 시 모든 업무 중단 후 접객','거동불편·짐 많은 고객은 마중'],
       script:'접객 인사: "안녕하세요" / "어서오세요"',
       exceptions:[]},
      {id:'p29-2', name:'처방전 접수 및 1차 검수', changeLog:[],
       principle:'처방전은 본인보관용과 약국제출용 2부를 다 받는 것이 원칙이며, 본인보관용을 미제출 시 조제완료 후 조제약과 함께 돌려드린다고 설명해 드립니다.\n\n처방전을 접수한 순서대로 정리하고, 입력하고, 봉투를 출력하여 조제를 빠르게 할 수 있도록 준비를 하도록 합니다(봉투나 약포지를 미리 준비하며, 때에 따라서 결제를 먼저 할 수 있습니다).\n\n조제 시간이 길어질 경우나 환자가 몰려서 대기 시간이 길어질 경우에는 안내드리고, 매장을 쇼핑하도록 유도합니다.\n\n접수 중이라도 고객의 니즈를 파악하면서 동시에 접수도 합니다.',
       checkpoints:['처방전 본인보관용+약국제출용 2부 원칙으로 받기','접수 순서대로 정리·입력·봉투출력','대기시간 길어질 경우 안내 후 매장 쇼핑 유도'],
       script:'',
       exceptions:['본인보관용 미제출 시: 조제완료 후 조제약과 함께 돌려드린다고 설명합니다.']},
      {id:'p29-3', name:'재고가 없는 경우 대응', changeLog:[],
       principle:'조제해야 할 약이 재고가 없는 경우나, 처방전에 특이사항이 있거나 오류가 있는 경우, 고객과 상담을 진행합니다.\n\n대체 조제가 가능한 경우와 어려운 경우를 구분하여 각각 다르게 응대합니다.',
       checkpoints:['재고 없음 발견 시 대체조제 가능 여부 먼저 확인'],
       script:'대체조제 가능한 경우: "회사만 다르고 성분과 효능이 똑같은 약이 있는데, 법적으로 대체하는 것으로 조제해서 드리겠습니다."\n대체조제 어려운 경우(특히 비싸고 재고로 남을 약): "고객님, 죄송하지만, 이 약이 지금 준비되어 있지 않습니다. 보통은 없으면 구해서라도 저희가 해드리는데 이 약은 어렵습니다."',
       exceptions:['대체조제가 어려운 경우에는 사유를 설명드린 후 연락처를 받아서 조제 완료 후 고객이 찾아갈 수 있도록 조치를 취합니다.']},
      {id:'p29-4', name:'처방전 특이사항 및 오류 대응', changeLog:[],
       principle:'처방전의 특이사항을 환자에게 확인을 받도록 합니다. 구두나 메모를 하여 처방전 입력이나 조제 시 오류가 없도록 하며, 환자가 그 내용을 정확히 모를 경우, 병원에 문의하여 확인하거나, 고객에게 사실을 알려 다시 처방을 받을 수 있도록 합니다.\n\n조제약이나 용량 및 용법의 오류나, 약물학적으로 병용금기나 연령금기 등의 사항이 있다면, 해당 병의원에 연락하여 수정하도록 합니다.',
       checkpoints:['처방전 특이사항은 환자에게 구두·메모로 확인','병용금기·연령금기 등 약물학적 오류는 해당 병의원에 연락하여 수정'],
       script:'',
       exceptions:[]}
     ]},
    {id:16,title:'조제 업무 매뉴얼',cat:'조제',cat2:'복약설명',cat3:'처방조제',keywords:['조제','검수','복약지도','처방입력','DUR','수납','대체조제'],tags:['조제','복약지도','DUR','검수','처방'],updatedAt:new Date(),views:0,history:[],
     summary:'', steps:[], customerScript:'', warnings:[], checklist:[],
     parts:[
      {id:'p16-1', name:'처방 조제 업무 흐름 및 전체 원칙', changeLog:[],
       principle:'처방 조제 업무 Progress: 접객 → 접수 및 확인 → 입력 및 검토 → 조제 및 검수 → 복약지도 → 계산 → 사후관리.\n\n처방전에 대한 검토는 (1) 처방전을 접수할 때 (2) 조제하기 전 (3) 복약지도 전, 총 3번을 실시하여 문제의 소지가 없도록 합니다.',
       checkpoints:['처방전 검토는 접수 시·조제 전·복약지도 전 총 3회 실시'],
       script:'',
       exceptions:[]},
      {id:'p16-2', name:'처방전 입력 및 검토', changeLog:[],
       principle:'직원이 처방전을 받아 입력하면 약사님이 검토하는 것이 기본이며 정확히 숙지하여 실수가 없도록 합니다. 처방전을 접수하자마자 바로 입력하는 것이 원칙이며, 병의원에 따라 바코드가 되는 경우와 직접 입력해야 되는 두 가지 방법이 있습니다. 신규 고객일 경우 고객 등록을 하고 연락처를 저장해 둡니다(유아나 학생일 경우 보호자의 연락처를 기재).\n\n[입력 시 주의사항] 처방전 발행 날짜, 보험 구분, 동명이인, 용법/용량, 처방일수 등을 필히 확인합니다. 주의가 필요한 부분이 있다면 붉은 색 펜으로 표시를 하여 수월하게 조제할 수 있도록 합니다.\n\n산재 환자의 경우 후유 인지 구분을 하고, 산재처방은 따로 구분하며 관리해야 하며, 산재보험에 대한 정보가 필요한 경우 고객에 문의하거나 처방전을 발행한 병의원의 원무과에 문의하여 입력합니다. 처방전의 보험정보와 건강보험공단 조회 결과가 일치하지 않을 경우, 원무과를 통해 확인하고 수정합니다. 보호환자가 보험으로 처방이 나온 경우 병원 본인부담금을 환불받아야 하는 경우가 있으니, 고객에게 이 사실을 알리고 확인해보라고 전달합니다.\n\n[입력 검토] 처방전 입력을 완료한 후 저장 및 봉투 출력 전에 필히 검토를 하여 오류가 있는지 확인합니다. 연령금기, 임산부금기, 병용금기 등이 표시되면 이 부분을 확인해야 하며, 판단이 어려운 경우 상위 업무 책임자(약국장-부국장-약사)와 상의하여 지시에 따르도록 합니다.\n\n[입력 완료 및 전달] 입력이 완료된 처방전은 약봉투를 출력하고, 처방전은 조제 편리를 위해 조제실에 전달합니다. 전달할 때 특이사항이나 본인부담금을 메모하여 조제가 빨리 이뤄질 수 있도록 합니다.\n\n[세부 확인 항목] 의료기관 확인(새 의료기관 입력방법 숙지, 의료기관명만 바뀌는 경우 다반사), 의사 확인(특히 인근 병원 아닌 경우 반드시 확인), 교부번호 확인(전날·이전 처방이 오는 경우 있음), 약코드 확인(외자사약은 코드 변경 다빈도), 용량 확인(한글명 뒤 용량까지 약이름 전체, 두 용량 혼동 주의), 투약횟수(2회 복용이 자주 나와 혼동 주의), 일수확인, 투약일수확인(DUR 알람 발생 시 약사님께 알림), 비급여·100/100·전액본인부담 등 입력 시 주의, 주민번호 확인(외국인은 오류 가끔 있어 주의, 외국인 주민번호 뒷자리는 6이나 5로 시작), 보험카드 확인(의료보호 환자는 변동 자주 발생하므로 수진자 조회를 조제 시마다 시행 - 현재는 자동).\n\n처음 온 환자는 처방전 접수 시 연락처와 부작용·복용약을 확인합니다. 먹는 약이 있거나 특이사항이 있으면 반드시 메모장에 기록하며, 장기환자는 특이사항을 미리 약사님께 알려 조제 편의를 제공합니다.\n\n신생아 처방 시: 증번호가 있으면 고객수정에서 "OOO애기"로 기타관계 지정 후 DUR에 신생아처방 입력 후 완료. 증번호가 없으면 동일하게 처리하되 처방전을 따로 보관하고, 월말에 소아과에 전화해 피보험자와 증번호를 받아 다시 저장합니다.\n\n매월말일 처방조제 오류검사를 시행합니다(청구관리 처방조제오류조사 전체검사). 환자가 1년간 처방약 영수증을 요구하면 고객관리에서 성명입력 후 본인확인, 매출내역에서 범위지정 후 출력, 도장을 찍어줍니다. 전날 처방전 입력확인(시간외 입력 확인)을 하여 처방전을 파일철합니다.',
       checkpoints:['처방전은 접수 즉시 입력, 신규고객은 등록+연락처 저장','발행날짜·보험구분·동명이인·용법용량·처방일수 확인','입력완료 후 연령금기·임산부금기·병용금기 표시 확인','산재환자는 별도 관리, 보험정보 불일치 시 원무과 확인','처방전 발행기관·의사·교부번호·약코드·용량·투약횟수·주민번호 확인','신생아 처방은 증번호 유무에 따라 별도 절차 진행','매월말일 처방조제 오류검사 전체검사 시행'],
       script:'신규환자 연락처 확인: "OOO님 지금 다른 약 드시거나 약 먹고 부작용난 적 있으세요?" → "조제기록부 작성때문인데 핸드폰이나 전화번호 알 수 있을까요?" (지역번호 포함 확인)',
       exceptions:['처방 입력 오류 발견 시 즉시 약사님에게 알리고 메모 또는 컴퓨터에 저장합니다.','거스름돈을 덜 주거나 더 준 경우도 컴퓨터에 저장하거나 메모하고 고객에게 전화하여 고지, 환불 및 추가납부 방법을 확인합니다(최대한 기분 상하지 않도록 함).']},
      {id:'p16-3', name:'행정업무 및 거래명세서·재고 관련 보조업무', changeLog:[],
       principle:'[전문의약품 거래명세서 입력] PM2000에서 구매재고입고장작성/현황 → 사입입고거래처입력 → 약품수량 합계입력하면 단가는 자동 조정. 총합계가 맞으면 완료. 반품의약품은 마이너스로 동일하게 처리.\n\n포장단위 확인이 가장 주의해야 할 부분입니다: 처방약은 거래 시 포장단위로 출하되나 약국에서는 보험수가단위로 입력합니다. 거래처별로 반드시 확인하며, 거래명세서는 도매상별로 따로 보관, 향정약 및 관리의약품 거래명세서는 따로 보관(타 일반의약품과 같이 있는 경우 복사하여 원본 보관).\n\n[일반약 재고 확인, 주문메모] 재고가 적은 약은 메모하는 습관을 들이고, 유효기간 확인이 필수이며 입고 시 짧은 것은 반품 처리합니다. 재고가 없거나 부족한 약은 도매상품목과 직거래 품목을 구분하여 미리 메모장에 적어 약사님께 재고 소진 예상 날짜를 전달합니다.\n\n[영수증 보관 및 서류정리] 모든 영수증은 보관함에 넣고, 우편물 중 영수증은 영수증철에, 거래명세서나 세금계산서는 국장님 보고 후 정리합니다.\n\n[행정업무] 은행입금, 동전 바꾸기, 편의점택배 보내기, 약국음악관리, 자판기관리(자판기 청소는 조제보조와 돌아가며, 정수기 물 관리는 전산담당), 약사님 책상정리 및 가운 확인.',
       checkpoints:['전문의약품 거래명세서는 PM2000 구매재고입고장작성/현황에서 입력','포장단위(거래)와 보험수가단위(입력) 혼동 주의','향정약 거래명세서는 따로 보관 또는 복사 보관','일반약은 유효기간 확인 필수, 짧은 것은 입고 시 반품'],
       script:'',
       exceptions:[]},
      {id:'p16-4', name:'판매지원 및 투약지원', changeLog:[],
       principle:'[투약지원] 약사님의 복약지도 후 봉투 준비 및 약값 계산을 합니다. 계산이 부득이할 시에는 약사가 대신합니다.\n\n[판매지원] 온/냉장고 물약 채우기(항상 한 종류에 두 개 이상 냉장고에 있도록 함), 앞 물약 판매대 선물용 물약 채우기(2개 박스 수시로 채우기), 의약외품은 약사님께 물어보고 직접 판매. 앞쪽(낮은 곳) 진열장은 매일 아침 물걸레로 닦아 먼지가 없도록 하며, 특히 제품에 먼지가 쌓이지 않도록 각별히 신경 씁니다. 매약대 종이 쓰레기는 수시로 버려 지저분해 보이지 않도록 합니다.',
       checkpoints:['냉장고 물약은 항상 한 종류당 2개 이상 비치','앞쪽 진열장은 매일 아침 물걸레질로 먼지 제거'],
       script:'',
       exceptions:[]},
      {id:'p16-5', name:'조제 및 검수', changeLog:[],
       principle:'[처방전 확인] 조제를 하기 전, 입력된 처방전 내역을 조제실 모니터와 처방전을 비교 확인하며 조제합니다. 처방전에 특이사항이 있으면 붉은 색 표시나 메모가 있음을 유념하여 확인합니다.\n\n[조제 및 주의사항] 처방전 접수 후 바코드를 찍고 처방전은 바로 조제실로 넘깁니다. 시럽라벨을 챙겨 처방전 정리 후 시럽을 챙기고 외용을 챙깁니다(현탁액은 흔들어서). 시럽용기 잡는 방법: 입구가 좁은 경우 용기를 수평으로 세운 채 새끼손가락으로 받치면서 눈높이까지 들어올리고, 입구가 넓은 경우 조제대에 놓고 허리를 구부려 눈높이를 낮춰 따릅니다.\n\n조제 시작 전 유니타스 시스템을 참고하여 메모 및 처방 내역을 확인하고, 복약지도문이 필요한 경우 미리 출력합니다. 접수 번호 순으로 조제하며 처방 일수, 용법, 동일함량 상이 품목에 주의합니다. 특이사항이 있어 차후 내방 시에도 주의가 필요한 경우 컴퓨터 고객 특이사항란에 기록합니다.\n\nPTP, 병포장, 외용제는 개수를 정확히 확인하며 용법 스티커를 출력하여 부착(미리 준비 안 될 경우 검은색 네임펜으로 표기). 조제·검수 중 발생되는 모든 의심 사항에 대해서는 지체없이 확인작업을 하고 동료의 자문과 의견을 구합니다. 고객이 복용 시 혼돈 가능성이 있거나 식사시간에 따라 구분해야 할 경우 약포지에 정확히 기입하고 복약지도 시 충분히 설명합니다.\n\n[조제실 청결] 조제실 바닥 쓰레기는 즉시 청소, 조제대와 뒤편 진열장(높은 부분)은 매일 아침 물걸레로 닦기, 종이쓰레기는 수시로 버리기, 조제기계는 수시로 청소, 믹서기는 2~3일에 한 번 물청소(칼날 제외).\n\n[조제완료] 조제가 완료되면 시간이 있으면 조제대 위를 치우고 약칼을 꽂아놓고(왼쪽 끝에 맞춤) 전체적으로 정리합니다. 고객 이름과 처방내역을 확인하고 약봉투, 복약지도문과 함께 전달합니다.\n\n[대체조제] 대체조제 처방전은 병원으로 팩스를 보냅니다. PM2000에서 처방조제현황을 클릭하여 날짜를 지정하고, 작업형태란에 대체조제현황을 선택하여 내역을 출력합니다.',
       checkpoints:['조제 전 조제실 모니터와 처방전 재확인','시럽은 흔들어서, 용기 잡는 방법(좁은 입구/넓은 입구) 구분','접수번호 순으로 조제, 처방일수·용법·동일함량 상이품목 주의','PTP·병포장·외용제 개수 확인 및 용법스티커 부착','조제완료 후 고객이름·처방내역 재확인 후 전달'],
       script:'',
       exceptions:['처방전이 여러 장이어서 약칼을 치우지 못했을 땐 약칼을 옆으로 치워줍니다.']},
      {id:'p16-6', name:'조제업무지원 및 재고관리(조제보조)', changeLog:[],
       principle:'약포지 끼우기는 조제 직후 약사님이 복약지도하러 나간 후에 합니다. 재고 수량 확인은 기본적으로 의약품재고 관리가 조제보조 담당업무임을 잊지 말아야 합니다. 시럽 조제용 물은 매일 출근 후 남은 물을 버리고 새 물로 채워둡니다.\n\n재고 부족한 약은 채워넣고(다빈도 사용 처방약 부족 시 재고확인 요망), 인근약국 연락처를 확인해두며(약 빌려온 후 수첩입력 후 +,- 장기처리), 부족약은 메모지에 메모 및 주문합니다.\n\n향정약 재고확인은 일주일에 한 번 이상(토요일 오후) 재고조사하며, 저빈도 약은 처방조제 후 그때그때 반드시 확인합니다. 향정약 수량 확인은 약사님과 함께 하며, 메모지에 향정약 목록을 적고 재고량을 확인 후 약사님께 보여줍니다. 마약류 향정수량에 들어가서 실재고와 입력된 재고를 비교 확인을 약사님과 같이 합니다.\n\n조제소모품 확인: 투약병(조은봉투에 주문, 30/60/100/120cc 및 소아과투약용시럽병), 약포지(5봉지 이하로 남으면 약사님께 알림 - 무포/아침/저녁/아침점심저녁/전산유산지), 냉장보관 시럽은 남은 병에 제조일자 적어두고 사용기간 지난 약 폐기. 출근 후에는 전날 퇴근 후 조제가 있을 수 있으므로 확인 후 정리. 전산봉투는 수시로 확인하여 떨어지지 않도록 합니다.\n\n장기조제환자 확인(정: 조제보조, 부: 근무약사): 정기적으로 오는 장기환자의 의약품 재고량을 미리 확인 준비하고, 장기조제가 끝난 후 바로 약을 확인 주문합니다. 반품확인메모장에 반품 입력하여 적용 여부 확인, 교품은 주변 약국과 확인합니다.\n\n4째 목요일은 유효기간 확인하는 날입니다! 전문의약품은 입고 시부터 유효기간 확인이 중요하며 짧을 때는 바로 반품처리합니다. 처방의약품 입고 시 약의 위치는 반드시 정해진 칸으로 정리해야 합니다.',
       checkpoints:['의약품재고 관리는 조제보조 담당업무','향정약 재고확인은 주 1회 이상(토요일 오후), 약사와 함께 확인','약포지 5봉지 이하 시 약사님께 알림','매월 4째 목요일은 전체 유효기간 확인하는 날'],
       script:'',
       exceptions:[]},
      {id:'p16-7', name:'약 주문 및 약 정리', changeLog:[],
       principle:'도매상 확인(담당자 및 주문처 연락처 확인), 제약사주문(각 제약회사 연락처 명함 확인, 명함철 위치 확인), 도매상주문(오전주문은 오후 12시 40분까지). 주문해야 할 약을 오전에 정리해두고, 재고가 있었는데 처방조제를 한 약은 그 수량만큼 주문합니다. 알리미에서 조제현황을 클릭하면 오늘 처방나온 약들을 확인할 수 있습니다.\n\n다량으로 많이 나가는 약은 그때그때 주문하며, 많이 나가지 않는 약은 적정량에 맞추거나 메모해둡니다. 저빈도약은 소포장(30정) 단위로, 30일단위 조제하는 처방약도 소포장으로 주문합니다. 모든 약은 되도록 소포장으로 주문하며 각 도매상 홈페이지를 항상 비교하여 주문합니다.\n\n직거래 의약품은 해당 제약사를 알고 있어야 하며, 직거래 주문 품목은 적어 놓고 한 번에 전화 또는 문자로 주문합니다. 각 도매상의 휴무를 확인해 두어야 하며, 토요일은 퇴근 전 인터넷으로 주문하여 월요일 아침 도착하도록 합니다. 어떤 약을 어떻게 주문하는지 모르면 약사님께 물어보거나 입고장 현황 확인에서 찾아봅니다.\n\n주문한 약이 도착하면 거래명세서와 약품을 확인한 후 거래명세서에 유효기간을 적고 약통에 거래처 표시를 합니다. 약을 정리하다가도 처방전이 들어오면 처방전을 먼저 처리하고 약정리를 합니다.',
       checkpoints:['도매상 오전주문은 오후 12시 40분까지','재고 있었는데 조제한 약은 그 수량만큼 즉시 주문','저빈도약·30일단위 조제약은 소포장으로 주문','약 도착 시 거래명세서와 대조 후 유효기간 기록 및 거래처 표시','처방전 들어오면 약정리보다 처방전 우선 처리'],
       script:'',
       exceptions:[]},
      {id:'p16-8', name:'복약지도, 수납, 배웅 및 뒷정리', changeLog:[],
       principle:'[검수 및 준비] 처방전과 확인하며 처방일수, 용법/용량, 약봉투 및 복약지도문 등을 함께 확인하고, 고객의 이전 내방 내역과 특이사항을 컴퓨터로 확인합니다. 고객에게 전달할 자료(장기 처방 주의사항, 부작용 및 상호작용 등)는 미리 출력합니다.\n\n[복약지도] 특이사항과 약력을 설명드리고, 처방약에 대한 약물의 효능, 용법/용량, 보관, 주의사항에 대해 설명하며 준비한 복약지도문이나 출력문을 전달합니다.\n\n[질문 & 클레임 대처] 고객의 질문에는 성실하고 친절히 설명합니다. 약값(본인부담금) 클레임은 전국 어디나 약값이 똑같음을 전달하고, 처방일수와 처방약이 바뀌면 가격도 달라짐을 설명합니다(재방문 고객은 내방기록으로 가격비교 설명). 이유 없이 생트집을 잡을 경우 맞대응은 금물이며 최대한 말을 들어주면서 해결합니다. 약물기전이나 효능에 대한 자세한 질문은 참고할 사이트를 알려주는 방법도 활용합니다.\n\n[수납] 누구누구 이름으로 부르지 말고 성을 포함한 풀네임을 호명합니다. 말 뒤를 흐리지 않게 주의합니다. 환자분을 호명하면서 봉투 준비작업을 같이 합니다. 수납 중 다른 고객이 문의하면 하던 일을 하면서 바로 응대(상황정리: 가장 빨리 끝나는 것부터 처리, 동시 응대 시 1:1 대응). 신규 고객이거나 연락처가 빠진 경우 등록 또는 비상연락망 이유를 설명하며 연락처를 요청하고, 고객이 거부하면 "번호 거부"라고 메모합니다.\n\n수납은 보통 복약지도 후 진행하지만, 대기 고객이 많거나 빠른 업무처리를 위해 조제 중에 미리 할 수 있습니다.\n\n[현금 결제] 현금을 받을 때와 거스름돈을 줄 때 금액을 정확히 말합니다. 현금영수증 요청 시: 알리미팜 승인선택 클릭 → 결제자료 선택창에서 현금 클릭 → 승인화면 창에서 현금영수증 탭 누른 상태로 번호 입력 → 확인 후 승인.\n\n[카드 결제] 카드를 받으며 결제 안내 후 카드리더기에 리딩, 결제자료 선택창에서 항목 선택 및 체크, 서명 요청 후 영수증 출력되면 카드와 함께 전달. 한도초과 등으로 결제가 안 될 경우 다른 카드를 요청하고, 재시도해도 안 되면 정확한 이유를 전달합니다.\n\n[배웅 및 뒷정리] 통일된 멘트로 밝은 미소로 인사하며 마무리합니다. 짐이 많거나 거동이 불편하면 출입구까지 배웅합니다. 조제실은 청결상태를 유지하며 수시로 청소하고 약포지를 끼워두며 다빈도 전문약 수량을 체크하여 부족 시 채워 넣습니다. 가루약 조제 시 약주걱·분쇄기컵 등을 청소합니다(급할 경우 스펀지와 붓 이용). 상담으로 꺼내놓은 제품은 제자리에 갖다 놓으며 재고량을 확인합니다. 특이사항(주문해야 될 약품, 재고 보정, 고객 문의 사항, 사건 등)을 확인하고 기록 여부를 확인합니다.',
       checkpoints:['고객 호명은 성을 포함한 풀네임으로','약값 클레임은 전국 동일가격임을 설명, 생트집에는 맞대응 금지','현금·카드 결제 시 금액을 정확히 말로 안내','배웅 후 조제실 청결 유지 및 특이사항 기록 확인'],
       script:'복약지도: "OOO 고객님 약 나왔습니다" → 효능·용법용량·보관·주의사항 설명 → "오늘 약제비는 OOOO원 입니다." (일반제품 동시구입 시 "OOO 고객님 처방전 포함하여 OOOO원 입니다")\n수납 호명: "OOO 고객님 OOOO원 입니다."\n수납 미리하기: "OOO님 계산 먼저 도와드릴께요" (거부감 느낄 시 "약이 나오면 다시 말씀드릴께요")\n현금 결제: "OOOO원을 받았습니다" / "거스름돈 OOOO원 입니다"\n카드 결제: "카드 결제해드리겠습니다" → "서명 부탁드립니다" / 결제 안 될 시: "결제가 안되는데 다른 카드가 있으신가요?"\n배웅: "감사합니다. 안녕히 가세요"',

    {id:17,title:'일반 고객 응대 매뉴얼',cat:'일반약',cat2:'매약상담',cat3:'판매응대',keywords:['일반의약품','의약외품','매약','상담','판매'],tags:['일반약','매약','상담','고객응대'],updatedAt:new Date(),views:0,history:[],
     summary:'', steps:[], customerScript:'', warnings:[], checklist:[],
     parts:[
      {id:'p30-1', name:'일반 판매 업무의 주의사항', changeLog:[],
       principle:'매약의 경우, 용도, 고객의 증상과 질환, 연령, 제품 및 건강에 대한 지식의 정도, 금전적인 능력 등을 고려하여 접객 및 상담이 이뤄져야 하므로 일정 수준의 대화가 필요하게 됩니다. 친절하고 전문적인 면을 부각시키고, 상품의 판매보다는 증상과 질환 및 치료에 중점을 두고 상담을 진행합니다.\n\n되도록 2~3개 제품으로 특징과 차이, 가격 등을 비교 설명하도록 하며, 유명상품과 역매품으로 비교 설명하도록 하고, 가격적인 부분은 소비자가 물어보지 않은 한 마지막에 설명합니다.',

       script:'',
       exceptions:[]},
      {id:'p30-2', name:'일반의약품 vs 의약외품 취급 구분', changeLog:[],
       principle:'모든 약(전문의약품 및 일반의약품)에 대해서 직원은 상담 및 판매가 불가능합니다. 고객이 의약품 판매를 문의할 경우 약사님을 호출해야 합니다. 약사님이 조제중이거나 부재 시에는 양해를 구합니다.\n\n의약외품, 건강기능식품, 생활용품 등은 직원도 판매할 수 있습니다. 직원이 판매를 할 때 고객이 전문적인 사항, 의약품과의 병용, 주의사항 등의 질문이 있을 경우는 약사님과 상의하는 것을 원칙으로 합니다. 비교적 설명이 간단한 보호대나 생활용품 등부터 교육을 통해 직원이 직접 상담 및 판매할 수 있도록 합니다.',
       checkpoints:['전문/일반의약품은 직원 상담·판매 불가, 약사 호출 필수','의약외품·건기식·생활용품은 직원도 판매 가능','전문적 질문(병용·주의사항 등)은 약사와 상의 원칙'],
       script:'의약품 문의 시: "잠시만요 약사님을 불러드리겠습니다."\n약사 조제중/부재 시: "잠시만 기다려 주세요. 조제가 끝나면 약사님이 약을 드릴겁니다."',
       exceptions:[]},
      {id:'p30-3', name:'증상 기반 상담 및 제품 추천(약사)', changeLog:[],
       principle:'고객이 증상과 아픈 곳을 말할 경우, 누가 복용할 것인지, 현재 복용중인 다른 약은 없는지, 다른 질환은 없는지 등 기본적으로 확인합니다. 고객의 연령과 증상에 맞춰 소비자가 선택할 수 있도록 제품을 2~3가지 추천합니다.\n\n고객의 문의 사항이 있을 경우, 소비자의 제품 또는 지식의 정도에 따라 제품 설명의 정도를 조절하며 되도록 쉽고 정확하게 설명하도록 합니다. 제품이 정해진 후 포장단위가 다른 제품이 있다면, 용량과 가격을 설명하여 고객이 선택할 수 있도록 합니다(구매하는 의약품이 보관이나 관리의 문제가 없으며 상비약 개념으로 활용할 수 있는 제품이라면 포장 단위가 높은 상품을 추천하여 객단가를 높이도록 합니다).\n\n특정 상품을 지명 구매하는 경우, 먼저 증상과 질환을 확인하고, 잘못된 구매의 경우 더 적합한 상담을 진행합니다. 제품을 추천해달라고 하는 경우, 제품을 먼저 이야기하는 것보단 증상과 효과 등에 초점을 맞추어 상담을 진행하고, 어떤 성분의 제품을 구매할지 정해진 후에 구체적인 제품을 소개합니다.',
       checkpoints:['복용대상·동반약물·동반질환 기본 확인','연령·증상에 맞춰 2~3가지 제품 추천','포장단위 다른 제품은 용량·가격 비교 설명'],
       script:'특정 상품 지명 구매 시: "OOO 증상이 있으신가봐요?" / "OOO가(이) 불편하신가봐요?" → 잘못된 구매 시: "고객님의 증상(질환)에는 OOOO가 더 적합합니다."',
       exceptions:[]},
      {id:'p30-4', name:'상품별 판매 노하우 (쌍화탕·영양제 등)', changeLog:[],
       principle:'쌍화탕 및 물약 판매 시, 고객이 쌍화탕을 달라고 하면 가격대별로 되물어 옵션을 제시합니다. 고객이 가격 차이를 물어보면 이유와 효과를 설명해 주고, 고객의 상태에 맞춰 추천하고 선택할 수 있도록 합니다.\n\n영양제, 당뇨기계 등 제품의 경우, 고객이 어떤 상품을 원하는지 파악해야 하기 때문에 복용하는 사람의 나이, 연령 등의 질문을 하여 최대한 많은 정보를 습득하는 것이 좋습니다. 제품을 추천할 때에는 2~3가지의 제품을 추천하고, 최선의 효과를 얻을 수 있는 방법을 제시합니다. 고객이 원하시는 효과, 경제적인 부분, 브랜드 등을 종합적으로 고려하여 최적의 상품을 구매할 수 있도록 도와드립니다.\n\n주력 제품의 판매 노하우나 정보를 담은 자료집을 만들어 직원들과 공유하도록 하며, 지속적으로 업데이트하도록 합니다.',
       checkpoints:['쌍화탕류는 가격대별로 되물어 선택권 제공','영양제류는 복용자 연령·정보 파악 후 2~3가지 추천'],
       script:'쌍화탕 문의 시: "고객님 쌍화탕이 만원, 구천원, 칠천원, 오천짜리가 있는데, 어떤 걸루 드릴까요?"\n믹스세트(예: 잘크톤) 타서 파는지 문의 시: "원래는 타서 팔지 않지만, 세트 제품이라서 고객님이 직접 섞어서 만드셔야 하는 번거로움이 있어, 편의를 위해 구매 후 저희가 대신 타서 드리고 있습니다."',
       exceptions:['고객이 비싸다고 할 경우, 가격을 할인해주는 것보다 다른 상품을 덤으로 주는 것이 현명한 방법입니다.']},
      {id:'p30-5', name:'의약외품의 판매 (약사 & 직원)', changeLog:[],
       principle:'의약외품은 직원도 상담 및 판매할 수 있으므로 평소에 직원의 역량을 키우고, 제품 정보집을 만들어 놓으면 좋습니다(최소한 직원은 제품이 어디에 진열되어 있는지 숙지하고, 고객의 문의가 있을 경우 안내할 수 있어야 합니다).\n\n타 제품 유형과 판매 방식은 유사하게, 제품의 사용 목적과 대상 등을 확인한 후 2~3가지의 제품을 보여드리고, 되도록 역매품을 구매하도록 유도합니다.',
       checkpoints:['직원은 의약외품 진열 위치를 숙지하고 안내 가능해야 함','사용목적·대상 확인 후 2~3가지 제품 제시, 역매품 유도'],
       script:'',
       exceptions:['직원이 상담 및 판매 시 까다롭거나 어려운 질문을 할 경우, 바로 약사님에게 도움을 요청하여 해결하도록 합니다.']}

    {id:18,title:'고객 문의·불만 응대 매뉴얼',cat:'응급상황',cat2:'클레임대응',cat3:'환불교환',keywords:['환불','교환','클레임','불만','시간외가산','조제료할인'],tags:['불만응대','클레임','환불','교환'],updatedAt:new Date(),views:0,history:[],
     summary:'', steps:[], customerScript:'', warnings:[], checklist:[],
     parts:[
      {id:'p31-1', name:'환불 및 교환', changeLog:[],
       principle:'먼저 구매 내역을 확인합니다(고객이 영수증이 있다면 영수증으로 구매 내역을 확인). 고객에게서 구매일과 시간을 파악하여 PM2000을 통해 약품판매현황에서 해당 내역을 찾은 후 약품판매현황의 승인구분란에서 현금인지 계좌인지 카드 계산인지 확인을 합니다.\n\n제품의 상태를 체크하고 상품에 하자가 없다면 고객이 원하는 대로 환불합니다. 카드인 경우, 고객의 카드를 받아 승인 취소를 합니다: 알리미팜 승인선택 창을 누르기 → 결제자료 선택 창에서 승인관리 누르기 → 승인관리 창에서 날짜 조정 후 해당 카드 결제 내역을 확인 후 승인취소를 누르기 → 승인화면 창이 뜨면 서명 후 → 승인 취소.',
       checkpoints:['영수증 또는 PM2000 약품판매현황으로 구매내역 확인','결제수단(현금/카드) 확인 후 환불 방식 결정','카드 환불은 승인관리에서 승인취소 절차 진행'],
       script:'포장 훼손 시: "고객님, 죄송하지만 포장이 훼손된 경우에는 환불이나 교환이 어렵습니다. 죄송합니다."',
       exceptions:['포장이 찢어지거나 훼손되었다면 환불·교환이 어렵다고 정중히 안내합니다.']},
      {id:'p31-2', name:'시간외 가산', changeLog:[],
       principle:'시간외 가산은 약국의 정당한 권리이지만 고객의 입장에서는 부정적인 오해를 불러일으키기도 하므로 "야간 가산, 추가 요금"이라는 용어보다는 "시간외 가산"이라고 표현합니다.\n\n평일 오후 6시 이후, 토요일 오후 2시 이후부터는 시간외 가산을 적용합니다(장기 조제 환자가 아닌 경우, 시간 외로 계산). 평일 오전 9시 이전도 시간외 정상으로 처리합니다.\n\n예외사항 처리: 팜이천 화면에서 (1) 시간 설정을 "정상"으로 바꾸기 → (2) 정상 금액 확인 → (3) "시간외 가산"으로 바꾸기 → (4) 정상 금액으로 바꾸기.',
       checkpoints:['평일 18시 이후, 토요일 14시 이후, 평일 9시 이전은 시간외 가산 적용','용어는 "야간/추가요금"이 아닌 "시간외 가산"으로 표현'],
       script:'',
       exceptions:['과거 약력에서 똑같은 약을 다시 처방받고 낮에 방문한 고객은 예외 처리할 수 있습니다.']},
      {id:'p31-3', name:'조제료 할인 요구 대응', changeLog:[],
       principle:'원칙적으로 조제료 할인은 없습니다. 고객이 과하다 싶을 정도로 할인을 요구하면 다른 방법으로 대응하여 고객의 마음을 달래는 것이 중요합니다.',
       checkpoints:['조제료는 원칙적으로 할인 불가, 건강보험공단 대리수납 시스템임을 설명'],
       script:'백원 단위 할인 요구 시: "죄송합니다. 고객님, 사실 이 돈은 저희 것이 아니라 전부 건강보험공단을 들어가는 돈입니다. 공단을 대신해서 저희가 대리수납하는 시스템이라 공무원처럼 꼭 수납을 다 해야 합니다. 저희는 조제한 처방전 한 건에 대해 따로 비용을 받거든요." (웃으며)',
       exceptions:['지나치게 툴툴거리는 경우 서비스로 음료수를 하나 드리며 "이게 백 원은 더 될겁니다"라고 웃으며 응대합니다.']},
      {id:'p31-4', name:'날짜 지난 처방전 및 65세 이상 본인부담금', changeLog:[],
       principle:'날짜가 지난 처방전을 가져왔을 경우, 고객에게 사용기간이 지났음을 공지하고 제 날짜 안에 조제하라고 권장합니다. 업무일지에 이전미수금 수납란에 사용기간 내의 날짜로 입력하고, 카드(또는 현금) 수납이라고 적습니다. 달이 바뀌는 경우에는 누락청구를 해야 하므로 메모란에도 기록을 남겨둬야 합니다.\n\n65세 이상 환자의 약제비가 10,000원 이하일 경우 본인부담금이 1,000원이며, 초과 시 20%를 본인부담금으로 내야 합니다. 이 경우 고객의 클레임이 있을 수 있으므로 이유를 정확히 설명하도록 합니다.',
       checkpoints:['날짜 지난 처방전은 사용기간 경과 공지 후 예외적으로 처리, 업무일지·메모란 기록 필수','65세 이상 약제비 1만원 초과 시 20% 본인부담 이유 설명'],
       script:'날짜 지난 처방전: "고객님, 사용 기간이 지나서 원래는 안되는 건데 오늘만 해드릴 테니까, 다음부터는 꼭 제 날짜 안에 조제하세요. 이런 처방전 처리하는 절차가 까다롭거든요."\n65세 이상 본인부담금 초과 시: "고객님, 오늘은 항생제를 써서(또는 비싼 약이 들어가서, 또는 날짜를 많이 받아서) 기본 요금이 넘어간 것 같습니다."',
       exceptions:['환자의 저항이 클 경우, 처방받은 병원에서 처방전을 바꿔야 한다고 설명하도록 합니다.']},
      {id:'p31-5', name:'거스름돈 분쟁 및 장기복용약 대여 요청', changeLog:[],
       principle:'거스름돈을 덜 받았다고 하는 경우, 정확한 기억이 없다면 반드시 CCTV와 구매내역을 확인한 후에 조치를 취합니다(모니터 뒤 수동스위치에서 CCTV 선택 → 검은색 버튼 누르고 암호 입력 → 리모콘 방향키로 메뉴 이동 → 녹화테이블에서 원하는 시각·카메라 번호 검색).\n\n혈압약 등 장기 복용약을 며칠분만 빌려달라고 하는 경우, 고객의 사정을 듣고 방문 및 조제 내역, 메모된 특이사항을 확인합니다. 무조건 안된다고 말하는 것보단 약국의 사정과 빌려줬을 때 발생되는 문제들을 설명하여 고객과 마찰이 생기지 않도록 합니다.',
       checkpoints:['거스름돈 분쟁은 CCTV·구매내역 확인 후 조치','장기복용약 대여 요청은 거절 시 정중한 사유 설명']
       ,script:'장기약 대여 거절 시: "고객님, 죄송합니다. 이 약은 처방에 의해서만 드릴 수 있습니다. 저희도 드릴 수 없어 안타깝습니다. 다시 한 번 죄송합니다." 또는 "고객님 최근에 방송에서 병원, 약국 쪽에 부정적인 것들이 많이 나오고, 특히나 검사, 검열이 많아서 드릴 수가 없습니다. 죄송합니다."',
       exceptions:[]},
      {id:'p31-6', name:'가격 비교 클레임 및 병원·전화 문의', changeLog:[],
       principle:'다른 약국보다 비싸다고 하는 경우는 약국에서 흔히 발생하는 고객의 클레임이며, 잘못 대응할 경우 약국의 이미지와 신뢰도에 타격을 입을 수 있으므로 원칙을 세워 대처하도록 합니다. 상품을 2~3종 추천하여 비교 선택하도록 하며, 고객에게 함량 및 효과 등 가격차이에 대한 설명을 하도록 합니다.\n\n병원을 알려달라는 고객에게는 근처 병원을 친절히 안내하고, 처방전을 가지고 올 수 있도록 안내합니다.\n\n전화로 상품에 대해 문의하는 경우 자상하고 친절하게 설명을 하고, 언제 찾아오실지 확인하고 준비해 놓겠다고 합니다. 가격에 대해 문의를 할 경우, 전화상으로 알려주지 않으며 약국 방문을 유도해야 합니다(단, 확실한 단골의 경우 구매 및 약력을 확인 후 알려드릴 수 있습니다).',
       checkpoints:['가격비교 클레임은 2~3종 비교설명으로 대응','전화 가격문의는 원칙적으로 방문 유도, 단골은 예외 가능'],
       script:'유명상품 가격 클레임 시: "고객님 죄송합니다. 이 품목의 가격이 많이 올랐습니다. 저희도 2천원에 팔았는데, 다 팔고 소진됐습니다. 아직 거기에는 그 제품이 남아 있었나 봅니다."\n병원 안내 후: "다녀오세요 고객님" / "짐을 보관해 드릴 테니 다녀오세요"\n전화 가격문의: "고객님 죄송하지만, 가격은 전화상으로는 말씀드릴 수 없고, 직접 약국에 와서 문의하셔야 합니다." (단골인 경우: "보통은 전화상으로 말씀드리지 않는데, 선생님께서는 단골이시니까 말씀드릴게요")',
       exceptions:[]},
      {id:'p31-7', name:'전문의약품 불법 요구 및 통약 구입 할인', changeLog:[],
       principle:'전문의약품(ETC)을 처방전 없이 그냥 팔라고 하는 경우, 원칙적인 답변을 하고 그래도 우기는 경우 보다 상세히 설명합니다. 처방전을 팩스로 보내어 조제를 요청하는 경우, 처방전 원본이 없으면 약을 가져갈 수 없으나 팩스를 보내주면 약을 미리 조제하여 준비할 수 있다고 답변합니다(확실한 고객의 경우는 처방전 원본 없이 드릴 경우도 있습니다).\n\n통약(대량) 구입 시 할인은, 저마진·노마진 상품은 정가 판매가 원칙입니다. 그 외의 통약 판매 시 고객이 할인을 요구하는 경우, 다른 상품으로 보상할 방안을 찾고, 그것이 어렵다면 5~10% 정도 할인하거나(금액 할인 대신), 할증·덤을 제공하는 것이 유리합니다.',
       checkpoints:['전문의약품은 처방전 없이 판매 절대 불가','통약 대량구입은 정가 원칙, 부득이한 경우 5~10% 할인 또는 덤 제공'],
       script:'전문의약품 무처방 요구 시: "고객님 말씀하신 약은 전문의약품으로 처방전이 있어야 구매가 가능한 약입니다. 처방전 없이는 판매할 수 없습니다. 죄송합니다." 우길 경우: "현재, 약품에 대한 거래 내역이 실시간으로 건강보험공단으로 들어가기 때문에 수량이 불일치하면 금방 확인이 되서 큰 일이 납니다. 죄송합니다."',
       exceptions:[]},
      {id:'p31-8', name:'약국 취급 제품의 이해', changeLog:[],
       principle:'약국 취급 제품에는 전문의약품, 일반의약품, 부외품, 의료기기, 건강기능식품, 화장품 등이 있습니다. 전문의약품들은 처방에 의해 결정되고 그 외의 제품들(일반판매제품)은 약국의 노력에 따라 다양한 제품들이 있습니다.\n\n전문의약품: 약리작용에 있어 진단이 필요하거나, 용법 설정, 부작용 발현 우려 등으로 의사의 처방이 있어야 투약이 가능한 의약품. 대부분 보험이 되는 급여 품목이며, 유통 가격은 거래업체와 관계없이 동일합니다. 일부 비급여 약(발기부전치료제, 비만치료제 등)은 거래처에 따라 유통 가격이 다릅니다.\n\n일반의약품: 환자가 직접 선택할 수 있는 의약품. 의사나 치과의사의 처방 없이 환자에게 효능, 효과, 부작용 등에 대한 정보를 제공하여 환자 스스로 선택하여 복용할 수 있는 약. 법적으로 가격이 정해진 것이 아니며 업체나 거래조건에 따라 달라집니다.\n\n건강기능식품: 일반식품에 비해 건강유지나 증진의 목적 또는 기대효과를 가지는 식품으로 식약청 허가가 필요합니다.\n\n의약외품: 인체에 대한 작용이 경미한 약품. 밴드, 소독약 등.\n\n의료기기: 보호대, 찜질팩, 일부 습윤밴드, 안마기 등.\n\n화장품: 약국을 통한 화장품 유통이 감소하였으나, 기능성화장품 및 피부건강을 위한 화장품들이 약국의 노력에 따라 판매되고 있습니다.',
       checkpoints:['전문의약품: 처방 필수, 급여품목은 가격 동일','일반의약품: 환자 직접 선택 가능, 가격 비고정','건강기능식품/의약외품/의료기기/화장품 구분 숙지'],
       script:'',
       exceptions:[]}
     ]},
    {id:19,title:'진열 관리 매뉴얼',cat:'매장관리',cat2:'진열',cat3:'MD관리',keywords:['진열','POP','골든존','수직배치','수평배치','매대'],tags:['진열관리','MD','매대'],updatedAt:new Date(),views:0,history:[],
     summary:'', steps:[], customerScript:'', warnings:[], checklist:[],
     parts:[
      {id:'p32-1', name:'진열의 기본 원칙', changeLog:[],
       principle:'"보기 좋은 떡이 먹기도 좋다"는 속담처럼 잘 정리되고 직관적으로 상품이 진열되어 있으면 매출이 오르는 것이 당연한 이치입니다. 진열의 대원칙은 상품을 고객에게 가능한 정확하게 보여주는 것과 고객의 라이프스타일을 정확하게 파악하여 상품을 판촉하는 것입니다.\n\n[안전한 진열] 약국은 많은 사람이 모이는 장소로 안전이 최우선입니다. 비안전상품은 진열을 빼고, 무겁고 깨지기 쉬운 상품은 아래쪽으로 진열하며, 고객 접촉으로 상품이 떨어지지 않도록 안전하게 진열합니다.\n\n[보기 쉽고 고르기 쉬운 진열 - 높이] 고객이 보기 편한 진열 위치는 바닥에서 0.3~1.8m의 유효진열범위입니다. Golden Line(가슴높이, 위아래 30cm가 골든존), Silver Zone(0.8~1m), See Zone(1.4~1.6m, 보행 중 눈에 띄는 높이)으로 구분합니다.\n\n[보기 쉽고 고르기 쉬운 진열 - 상품분류] 분류 방법은 기능별, 계절별, 가격별, 채색별, 관련별, 행사별, 소재별 등으로 구분하며, 2~3가지 방법을 함께 이용하는 것이 좋고 상품이 중복 진열되어도 무방합니다. 동종상품은 가능한 옆에 진열(비교진열)하고, 종형/횡형/섬형 배열로 동일그룹을 묶으면 비교와 선택이 용이해집니다.\n\n[꺼내기 쉽고 원위치하기 쉬운 진열] 가장 집기 편한 위치는 허리를 굽히지 않고 손을 뻗어 닿는 지역입니다. 무릎아래보다 어깨위가, 눈위쪽이 더욱 집기 어렵습니다. 주력상품은 집기 쉬운 위치에, 유명상품은 눈에 잘 보이되 집기 어려운 곳에 진열합니다.\n\n[느낌이 좋은 진열] 청결(바닥·집기·도구의 청소상태, 매장에 상품박스 진열은 불쾌감 유발), 선도감(상품포장·POP의 변형·먼지는 매일 확인하여 즉시 교체), 신선한 이미지(월별 이벤트, POP·가격표 색상 변경 등 지속적 관리)가 좋은 느낌을 줍니다.\n\n[설득력 있는 진열] 신상품·할인상품은 특설코너·평대·곤돌라매대를 이용하고, 계절에 맞게 디자인된 판넬보드·POP·팜플렛을 활용합니다.\n\n[수익성을 고려한 진열] 잘 팔리는 상품 옆에 고품질·고마진 상품을 믹스 진열, 충동구매를 촉진하도록 관련상품을 주위에 진열, 용량 많고 가격 높은 상품을 판매하도록 유도, 유명상품으로 고객을 유인하고 역매품으로 이익을 높이며, 회전율을 고려해 위치를 변경합니다.',
       checkpoints:['무겁고 깨지기 쉬운 상품은 하단 진열, 안전 우선','골든존(가슴높이)·실버존(0.8~1m)·씨존(1.4~1.6m) 구분 활용','동종상품 비교진열, 2~3가지 분류방법 혼용','POP·가격표는 매일 확인 후 훼손·변색 시 즉시 교체','잘 팔리는 상품 옆에 고마진 상품 믹스 진열'],
       script:'',
       exceptions:[]},
      {id:'p32-2', name:'효과적인 응용진열 기법', changeLog:[],
       principle:'변화진열: 일반매대의 단조로움을 벗어나 진열판 경사나 높이를 조정하여 통행객 주목율을 높입니다.\n\n돌출진열: 진열용구나 박스를 활용해 일반매대보다 통로측으로 튀어나오게 진열하는 방법으로 주목효과와 구매율이 매우 높으나, 지나친 돌출은 통행을 방해하므로 주의합니다.\n\n섬진열(아일랜드 매대): 매장의 빈 공간에 박스·매대를 활용해 섬처럼 대량진열하는 방법으로 신제품 소개나 행사 시 위력을 발휘합니다.\n\n점블진열: 가볍게 손이 갈 수 있게 일부러 무질서하게 진열하여 할인행사를 연상케 하는 저가 이미지의 진열입니다.\n\n카운터 진열: 대기하는 고객에게 구매유인이나 충동구매를 유도하는 진열방법으로, 인지율 향상이 판매에 도움이 되는 상품을 진열합니다.\n\n그 외 후크진열, 연관진열, 박스진열 등의 방법도 활용합니다.',
       checkpoints:['돌출진열은 통행 방해되지 않을 정도로만 적용','점블진열은 할인행사 이미지를 줄 때 활용','카운터 진열은 충동구매 유도 상품 위주로 구성'],
       script:'',
       exceptions:[]},
      {id:'p32-3', name:'제품 진열 계획 수립', changeLog:[],
       principle:'약국마다 외부적 요인(입지, 유동인구, 고객유형)과 내부적 요인(진열장 크기, 형태, 천장높이)은 다르지만, 기본 원칙과 방법은 동일하며 약국에 맞게 응용합니다.\n\n[상품의 분류 단계] 부문(Department, 손익관리단위, 예: 응급제품) → 품군(Line, 매장구성 단위, 예: 밴드) → 품종(Class, 중요속성별 단위, 예: 방수밴드) → 품목(Item, 진열결정 단위, 예: 대일밴드) → 단품(SKU/UNIT, 발주단위, 예: 대일 2X3 방수밴드).\n\n[진열 기본사항 체크] 품목(무엇을 진열할 것인가), 진열량(얼마만큼), 페이스(어느 면을 보일 것인가), 진열위치(어디에), 진열형태(어떤 형태로)를 고민하며 계획을 수립합니다.\n\n[기초 준비] 상품 확인(전체 상품목록 확인, 주력상품·역매품·구색상품·다빈도상품 분류), 스페이스 확보(Golden Zone, See Zone, 앤드매대, 아일랜드매대 위치 확인), 수납공간 확보(재고 보관관리 공간 확인).\n\n[상품 분류 예시] 편의용품, 눈건강, 뼈건강, 남성건강, 약사상담약, 종합비타민, 구강건강, 혈액순환, 실버건강, 임산부, 여성건강, 응급제품, 성관련, 어린이건강, 이벤트존, 화장품, 피부, 눈코입, 가정상비약, 파스외용제, 계절, 탈모/금연, 해외유수브랜드 등으로 분류합니다.\n\n[진열 Mapping - 외부적 고려사항] 입지환경(주택가/시장/사무실/학교 등에 따라 주요고객 성별·연령 고려), 버스정류장·지하철·터미널 등 유동인구 시설 고려, 인근 병의원 진료과 고려(예: 소아과 인접 시 주요고객은 영유아이지만 판촉대상은 30~40대 어머니).\n\n[진열 Mapping - 내부적 고려사항] 성별·연령(높은 빈도와 객단가를 보이는 성별·연령에 맞는 구성), 고객 동선 고려(아일랜드매대로 동선을 유도하여 노출 증대), 약사·직원의 동선도 함께 고려.',
       checkpoints:['상품분류는 부문→품군→품종→품목→단품 5단계로 체계화','진열계획 시 품목·진열량·페이스·위치·형태 5요소 점검','입지환경(소아과 인접 시 어머니 타겟 등)에 맞춰 진열 조정'],
       script:'',
       exceptions:[]},
      {id:'p32-4', name:'제품 진열의 기본 방법 (수직·수평 배치)', changeLog:[],
       principle:'고객은 Attention(주의)-Interest(관심)-Desire(욕구)-Memory(기억)-Action(행동) 순으로 심리변화를 경험한 후 상품을 구매합니다. 보기 쉽고 집기 쉽고 충동구매할 수 있도록 효과적으로 배치해야 하며, 종업원이 최소한의 행동반경으로 작업할 수 있도록 해야 합니다.\n\n[수직 배치의 원칙] 골든라인(110~140cm)에는 충동구매상품·수익높은상품·인기상품·계절상품·신상품·특별프로모션상품을 진열합니다. 실버라인(80~110cm)에는 연관상품·눈에 띄기 쉬운 상품을 진열합니다. 디스카운트·칠드런 라인(10~80cm)에는 할인판매상품·어린이상품·저가상품을 진열합니다. 대형품은 하단, 소형품은 상단에, 회전이 빠른 것은 하단, 늦은 것은 상단에, 고단가·고수익·고품질·파손되기 쉬운 상품일수록 위쪽에 진열합니다. 곤돌라 매대는 여성고객을 겨냥해 Face-To-Face로 배치합니다.\n\n[수평 배치의 원칙] 규격/용량이 다른 동일품목은 병행진열하며, 고가품/대형품은 우측, 저가품/소형품은 좌측에 배치합니다. 특별 프로모션 품목은 중앙, 고가품은 중앙우측, 저가품은 왼쪽에 배치합니다. 필수품목·마그넷 상품은 양 모서리에 배치하여 비효율적 공간을 활용합니다. 유사 색상의 근접진열은 평범해 보이므로 서로 다른 계통의 색을 배치합니다.\n\n[기타] 한 개의 상품군은 종진열을 원칙으로 하며 상품군의 경계는 확실히 합니다. 진열위치가 나쁜 곳이나 선반 구석에는 밝은 색상의 상품을 진열합니다.',
       checkpoints:['골든라인(110~140cm)에는 충동구매·고수익·신상품 배치','대형품·회전빠른것은 하단, 소형품·파손주의상품은 상단','동일품목 규격차이는 병행진열, 고가품은 우측·저가품은 좌측','유사 색상끼리 근접배치 지양']
       ,script:'',
       exceptions:[]}
     ]},
    {id:20,title:'구매관리 매뉴얼',cat:'재고·발주',cat2:'구매',cat3:'공급자관리',keywords:['구매관리','발주','거래처','도매','직거래','반품'],tags:['구매관리','발주','거래처'],updatedAt:new Date(),views:0,history:[],
     summary:'', steps:[], customerScript:'', warnings:[], checklist:[],
     parts:[
      {id:'p33-1', name:'구매 품목 선정 및 물량 결정', changeLog:[],
       principle:'의약품 및 건강기능식품, 의약외품 등의 상품을 될수록 유리한 가격으로 필요한 시기에 적당한 공급자로부터 구입하기 위한 체계적인 경영을 말합니다. 전문의약품은 정해진 보험수가에 의해 가격이 정해져 있으므로 가격 이외의 부대조건(불용의약품 처리, 비급여의약품의 구매가, 결제조건 등)을 파악하여 구입처를 결정합니다.\n\n[구매 품목 선정] 전문의약품은 인근 병원의 처방 패턴에 따라 결정되며, 저회전율 품목은 약국장님의 선택(환자 편의·단골 확보 차원)으로 결정합니다. 일반의약품·외품·건기식은 고객 소비성향과 약사님 판단에 따라 변동됩니다. 신제품은 광고품이나 새 약효군 대표품목 1개를 샘플구매 후 판매경향을 보며 수익율 높은 제품으로 구매하고, 기성제품은 매일 정해진 시간에 진열상품과 재고목록을 확인하여 주문품목을 선정합니다.\n\n[구매 물량 결정] 일반적으로 한 달 이내 소모할 물량을 주문하는 것이 원칙이나 탄력적으로 운용합니다.\n가격적 측면: 가격 인상 예정이면 미리 대량주문, 인하 예정이면 소량주문. 구매수량에 따라 가격이 변동하면 월별 소모량 파악 후 결정.\n재고적 측면: 품절이 잦은 품목은 안전재고량(보통 10~15일치)을 확보하고 다빈도 품목은 따로 리스트하여 매일 재고조사. 월말에는 도매업체 재고부족 가능성이 있으므로 사용량 기준으로 결정.\n제품적 측면: 부피가 큰 경우 보관제약 고려, 유효기간이 짧은 경우 구매량 조절, 구색품목은 최소량만 구매하고 정기적으로 유효기간·재고량 파악.',
       checkpoints:['전문의약품은 처방패턴 기반, 저회전율은 약국장 판단','신제품은 1개 샘플구매 후 수익률 보고 본주문 결정','품절 잦은 품목은 10~15일치 안전재고 확보','유효기간 짧은 제품은 구매량 조절'],
       script:'',
       exceptions:[]},
      {id:'p33-2', name:'공급자 선정 및 구매 후 관리', changeLog:[],
       principle:'[공급자 선정] 유통업체 선정 시 구매가격, 교품·반품 조건, 결제방법, 시장 인지도, 기존 제품과의 중복, 상품 회전율, 이윤폭, 할증 등을 고려합니다. 직거래만 가능한 품목은 초도 구입물량이 많고 가격 비교가 어려워 구입물량에 따라 구매가가 결정됩니다. 도매나 온라인 구매는 비교하여 최저가 구입이 가능하고 소량구매도 가능하므로 저회전율·구색품목·긴급소량 구매에 활용합니다. 주문시간에 따라 배송시기가 달라지므로 적절한 시간 배송 여부를 파악합니다.\n\n[구매 후 관리] 거래명세서와 구매물품 확인 시 수량·함량·유통기한 등을 주문서와 비교하여 미송·오류 품목을 확인합니다. 구매품목은 PM2000이나 알리미팜에서 구매업체, 구매가, 판매가, 구매수량, 합계금액, 유통기한을 입력하여 재고관리하며 신제품·비급여 품목은 약국 판매가도 함께 기록합니다.',
       checkpoints:['공급자 선정 시 가격 외에 교품·반품조건·결제방법·회전율 함께 고려','입고 시 거래명세서와 실물 대조하여 미송·오류 확인','구매품목은 PM2000/알리미팜에 구매가·판매가·유효기간 입력']
       ,script:'',
       exceptions:[]},
      {id:'p33-3', name:'거래업체의 이해 (도매·직거래·인터넷·전국구)', changeLog:[],
       principle:'거래처와 약국은 협력관계로 상호발전적 관계를 지향합니다. 거래처의 이익도 존중하되, 비협조적이고 비합리적인 거래를 요구하는 거래처는 강하게 항의하고 그래도 안되면 거래를 끊습니다.\n\n[지역 거점 도매] 자체 운송물류로 빠른 배송이 가능하며 매일 정해진 코스로 2~3회 운행하므로 소액 주문도 가능합니다. 주로 가격이 정해진 조제약 위주로 주문하되, 일반약도 저렴한 경우가 있어 전국구 인터넷 쇼핑몰 가격과 비교가 필요합니다.\n\n[회사 직거래] 직거래로만 취급 가능한 품목들이 있어 취급품목을 늘리려면 많은 거래처가 필요합니다. 자체 인터넷 쇼핑몰을 운영하는 업체가 늘고 있으며, 대부분 5만원 이상이면 배송되고 1~3일 소요됩니다. 인터넷 주문은 대부분 선결제, 담당자 전화주문은 후불제입니다.\n\n[인터넷 쇼핑몰] 여러 도매업체가 입점하는 형식으로 비교적 저렴한 가격으로 구입 가능합니다. 보통 2시 이전 주문 시 다음날, 2시 이후는 2일 후 배송이며 금요일 2시 이후 주문은 대부분 화요일 배송됩니다. 부외품 업체는 5만원 이상, 의약품 취급업체는 10만원 이상 주문 시 무료배송이 일반적입니다.\n\n[전국구 도매] 쥴릭(스위스계, 프로페시아·비아그라 등 저렴, 인터넷 주문 후불제), DKSH(스위스계, 신파파마라스틱·갈더마 등, 전화주문 후불제), SM팜(케이메디쿱·센텍보호대 독점품목, 인터넷 선결제, 6개월까지 반품 가능 단 센텍보호대는 예외), 미드팜(조제약 유통, 휴베이스 협력업체).\n\n[지역 부외품] 일주일에 1~2회 전화주문, 금액 무관 주문 가능, 당일~2~3일 내 직접 배달, 월말 계좌이체 결제. 해동메디칼과 장스 두 곳과 거래 중이며 해동메디칼은 가격이 약간 비싸지만 직접 진열까지 해주고 친절하여 비중을 늘려가고 있습니다.\n\n[오더약] 개인을 통해 약을 유통하는 구조로 소모가 적은 약들이 대부분입니다.',
       checkpoints:['거래처는 협력관계 원칙, 비합리적 요구 시 항의 후 거래 중단 고려','인터넷 쇼핑몰은 2시 이전 주문이 배송 하루 이상 단축','전국구 도매(쥴릭/DKSH/SM팜/미드팜)는 각각 독점품목·결제조건 다름'],
       script:'',
       exceptions:['SM팜은 주문 후 6개월까지만 반품 가능하나, 센텍보호대는 6개월 이후에도 반품 가능합니다.']},
      {id:'p33-4', name:'일반판매제품 진열 및 재고 관리', changeLog:[],
       principle:'제품 진열은 매일 오전에 일반판매제품을 진열장에 채워 넣으며, 많이 빠진 제품은 창고·서랍장에서 채우고 재고 부족 시 거래업체별로 주문장에 기록합니다. 근무 중에도 빈 자리는 바로 채우고, 마감 시간에 한 번 더 살핍니다.\n\n적정 재고 관리는 소매업에서 매우 중요합니다. 재고가 없어 손님이 허탕치게 만드는 것은 경쟁업소로 손님을 내모는 것과 같습니다(결품은 죄악). 반대로 과다한 재고는 자금압박의 원인이 되므로, 할인정책에 현혹되어 대량사입의 함정에 빠지지 않아야 합니다.\n\n재고 정리 원칙은 (1) 약품 분류별로 (2) 찾기 쉽게, 눈에 쉽게 보이게 (3) 공간을 최대한 활용(짜투리 공간 활용)하는 것입니다. 박스 보관 시 전면에 큰 글씨로 제품명을 적습니다. 서랍장 보관 시 종류별로 구분하고 필요하면 라벨로 표기합니다.\n\n주문하기는 판매량, 가격, 제품 부피에 따라 결정됩니다. 지역도매·지역부외품은 금액과 크게 관계없이 주문 가능하나, 인터넷·제약회사 주문은 대부분 5~10만원 이상이어야 가능합니다. 알리미팜의 약품관리 메뉴 아래 기간/일수별 사용약품 메뉴에서 거래처별 이전 주문내역을 참조하면 도움이 됩니다.\n\n재고기간 기준: 2~3개월(사용량 많고 부피 큰 제품, 또는 사용량 많고 값비싼 제품 - 예: 판콜, 판피린, 까스활명수, 고함량비타민), 4~6개월(부피는 크지만 사용량 적은, 또는 사용량은 많지만 부피 작은 제품 - 예: 각종 연고류, 10T 단위 포장), 7~12개월(역매품이나 유명품은 신중히 검토하여 할인가로 대량사입 - 예: 역매 진통제, 역매 감기약).\n\n제품 입고 시와 반품 처리 완료 시 PM2000에서 입고장을 작성합니다.',
       checkpoints:['일반판매제품은 매일 오전 진열장 보충, 마감 시 재점검','재고는 분류별·찾기쉽게·공간효율 3원칙으로 정리','인터넷/제약회사 주문은 보통 5~10만원 이상이어야 가능','제품군별 재고보유기간(2~3개월/4~6개월/7~12개월) 차등 적용'],
       script:'',
       exceptions:[]},
      {id:'p33-5', name:'반품 처리 및 재고·유통기한 정기조사', changeLog:[],
       principle:'반품은 거래처의 입장을 고려하여 최소화하도록 노력하지만 경우에 따라 발생합니다. 제품불량으로 인한 반품은 모든 거래처가 바로 처리해야 마땅합니다. 손님 제기 품질불량·부작용은 불량 확인 시 대부분 반품 가능하며, 판단 애매한 경우와 부작용은 거래처와 협의합니다. 판매부진 등 단순반품은 거래처에 따라 가능여부·방식이 다릅니다.\n\n회사 직거래는 기본적으로 반품 가능하나, 결제금액이 일정하게 유지되어 회사 입장에서 중요한 약국으로 인식될 때 더 원활합니다. 담당자가 실적 압박으로 반품을 지연하면 재촉하거나 압박을 가할 필요가 있으며, 지나치게 지연·거부 시 결재도 보류할 수 있습니다.\n\n인터넷의 경우 더샵은 전월 거래실적이 있으면 다음달 반품쿠폰이 2매 발생하며(소멸시효 1개월), 이를 이용하면 무료 반품이 가능합니다.\n\n재고 및 유통기한 조사는 해마다 1,2월과 7,8월에 일반판매 제품에 대해 실시합니다. 포스 상의 재고와 다른 경우 재고량을 수정하고, 유통기한이 8개월 이내로 남은 제품들은 가능한 유통기한 내에 판매되도록 특별 관리합니다. 유통기한이 얼마 남지 않은 제품들은 별도 표기하여 관리합니다.',
       checkpoints:['제품불량 반품은 모든 거래처가 즉시 처리해야 함','반품 지연 시 담당자에게 재촉, 심하면 결재 보류','재고·유통기한 정기조사는 매년 1,2월 및 7,8월 실시','유통기한 8개월 이내 제품은 특별관리 및 별도 표기']
       ,script:'',
       exceptions:['더샵은 거래실적이 있을 때만 반품쿠폰이 발생하며 한 달 내 사용해야 합니다.']}
     ]},
    {id:21,title:'재고관리',cat:'재고·발주',cat2:'재고조사',cat3:'유효기간관리',keywords:['재고관리','안전재고','유효기간','전수조사','향정'],tags:['재고관리','유효기간','안전재고'],updatedAt:new Date(),views:0,history:[],
     summary:'', steps:[], customerScript:'', warnings:[], checklist:[],
     parts:[
      {id:'p34-1', name:'재고관리의 목적과 기본 원칙', changeLog:[],
       principle:'약국에서 조제와 판매에 필요한 의약품, 건기식, 부외품 등의 수량을 관리 및 통제하여 금융비용(이자, 기회비용, 보관비용, 훼손비용 등)을 최소화하고 적정재고수량을 유지하는 것을 말합니다.\n\n정기적인 재고검사를 시행하여 전산(또는 장부)과 실제 재고량을 파악해야 하며, 다빈도 의약품 리스트를 작성하여 안전재고량을 확보합니다. 저회전 제품도 리스트를 작성하여 유통기한을 체크합니다.\n\n의약분업 이후 의료기관의 잦은 처방약 변경과 대체조제의 어려움으로 불용재고가 발생하고, 일반의약품은 경기 침체로 재고 누적의 어려움이 있으므로, 제품 주문 전에 월별 소모량을 파악하여 주문하는 것이 좋습니다.',
       checkpoints:['다빈도 의약품은 안전재고 확보, 저빈도 제품은 유통기한 별도 관리','주문 전 월별 소모량 파악 후 결정'],
       script:'',
       exceptions:[]},
      {id:'p34-2', name:'전문의약품 재고관리 (일/월/년 주기)', changeLog:[],
       principle:'약사님 편의에 따라 다빈도 vs 저빈도, 약효군별, 제약사별, 병의원별, 가나다순 등 2~3가지 방법을 활용하여 관리합니다. 어떤 방법이든 (1) 약품명 라벨링을 정확히 하여 혼동이 없도록 하며 (2) 유통기한이 짧은 제품을 앞쪽으로 진열하며 (3) 재고 부족 의약품 표를 만들어 바로 주문할 수 있는 체계를 만듭니다.\n\n[일 관리] 향정, 관리대상 품목, 고가약은 약국별로 리스트를 작성하여 비교적 한가한 시간에 일정 양식으로 매일 실재고 조사를 실시합니다. 매장 진열상품의 재고조사를 통해 부족 제품은 수납공간 및 창고 재고량과 전산상 재고를 조사합니다. 재고 부족 시 개별주문보다 모아서 한 번에 주문합니다.\n\n[월 관리] 주요 품목(다빈도, 고가약, 관리대상 품목, 향정 등) 재고조사 및 월소모량 파악으로 다음 달 주문수량을 참고합니다. 저빈도 품목도 리스트하여 유효기간을 관리합니다.\n\n[년 관리: 전수조사] 전산 시스템상 재고와 실재고를 조사합니다. 품목별 담당자를 지정하여 수량을 파악하고, 저빈도·다재고 상품의 처리계획을 세웁니다.',
       checkpoints:['일관리: 향정·관리대상·고가약 매일 실재고 조사','월관리: 주요품목 월소모량 파악 후 다음달 주문량 참고','년관리: 전산-실재고 전수조사, 품목별 담당자 지정'],
       script:'',
       exceptions:[]},
      {id:'p34-3', name:'일반의약품·외품 재고관리 및 창고관리', changeLog:[],
       principle:'약이 도착할 때마다 거래명세서상 약국 내 실재고를 기입하고 POS시스템에 입고시키며, 제조사·단가·구매수량·유효기간 등을 입력합니다. 다빈도 일반의약품은 재고의 30% 수준에 도달 시 주문합니다.\n\n[유효기간 관리] 거래명세서 도착 시 각 제품의 유효기간을 거래명세서에 기입하고, 입고장 작성 시 유효기간을 입력합니다. 매월 특정일을 설정하여 유효기간 임박제품을 걸러내고 필요 시 반품처리합니다. 적정재고가 모자라는 제품은 사입을 준비합니다.\n\n[창고 관리] 창고 노트를 따로 관리합니다. 드링크, 소모품, 파스, 의약외품 등으로 (1) 분류별로 (2) 한눈에 재고를 파악할 수 있게 (3) 선입선출 방식으로 정리합니다. 제품을 꺼내거나 들여놓을 때 재고 수량을 교정합니다. 창고는 언제든 제품을 꺼내기 쉽게 정리하고 통로와 청결을 유지합니다.',
       checkpoints:['다빈도 일반의약품은 재고 30% 도달 시 주문','매월 특정일에 유효기간 임박제품 점검 및 반품 처리','창고는 분류별·선입선출 원칙으로 정리'],
       script:'',
       exceptions:[]}
     ]},
    {id:22,title:'고객관리',cat:'고객응대',cat2:'CRM',cat3:'고객정보',keywords:['고객관리','CRM','고객정보','복약지도','대기시간'],tags:['고객관리','CRM','단골관리'],updatedAt:new Date(),views:0,history:[],
     summary:'', steps:[], customerScript:'', warnings:[], checklist:[],
     parts:[
      {id:'p35-1', name:'고객관리의 핵심과 접수대 응대', changeLog:[],
       principle:'고객관리(CRM)의 핵심은 (1) 신규 고객을 어떻게 확보할 것인가 (2) 기존 고객을 어떻게 유지시킬 것인가 (3) 우수고객을 어떻게 만들 것인가, 이 3가지입니다. 새로운 고객을 확보하는 일은 기존 고객을 유지하는 것보다 5배 이상의 노력과 비용이 듭니다. 기본적인 약력관리나 구매이력 관리를 통해 고객을 알아보고 "Care"받고 있다는 만족감을 심어야 합니다.\n\n접수, 조제, 상담 및 복약지도, 수납이 물 흐르듯이 진행되는 것이 핵심입니다. 약국의 첫인상을 결정짓는 접수대는 정돈된 매장과 밝은 인사와 미소가 기본이며, 통일된 인사 방법과 행동이 요구됩니다.',
       checkpoints:['CRM 3대 핵심: 신규고객 확보, 기존고객 유지, 우수고객 육성','신규고객 확보 비용은 기존고객 유지의 5배 이상'],
       script:'접객 인사: "안녕하세요", "어서오세요", "무엇을 도와 드릴까요?"\n처방전 고객: "처방전 접수를 도와 드리겠습니다", "다른 손님이 계시니 조금만 기다려 주시겠습니까~"\n일반약 고객: "어디가 불편하세요?", "어느 분이 드실 건가요?"',
       exceptions:[]},
      {id:'p35-2', name:'대기시간 관리 및 상담·복약지도', changeLog:[],
       principle:'대기 시간을 줄이는 것이 고객 만족도를 높이는 일과 직결됩니다. 고객이 어느 정도 기다려야 하는지 알려드리고 고객용 모니터로 확인하도록 안내합니다. 처방전 고객은 미리 수납을 완료하여 대기시간을 줄이거나, 처방전을 접수하고 몇 시간 후 받으러 오셔도 된다고 유도하며 문자발송을 합니다. 불편하신 고객은 의자로 안내하고, 대기시간이 길어지면 드링크를 제공합니다.\n\n[상담과 복약지도] 고객 응대의 최고 접점으로 경쟁 약국과 차별화할 수 있는 시기입니다. 개인정보 측면에서 상담이나 복약지도는 제3자가 들리지 않도록 조심히 설명합니다. 복약지도 시 약력을 파악하여 참고하고, 누가 복용할 건지, 어떤 목적인지, 현재 복용약은 없는지 파악한 후 고객이 선택할 수 있도록 제안합니다. 판매에 중점을 두기보단 증상이나 질병을 잘 치료할 수 있는지가 상담의 핵심입니다.\n\n[매장을 나설 때까지의 만족] 수납 시 영수증 필요 여부를 확인하고, 현금을 받을 때와 거스름돈을 건넬 때 금액을 정확히 불러주는 것도 필요합니다.',
       checkpoints:['대기시간은 사전 고지 및 고객용 모니터로 안내','상담·복약지도는 제3자가 듣지 않도록 조심히 설명','대기시간 길어질 경우 드링크 제공 등 배려'],
       script:'',
       exceptions:['고객이 질문할 경우 성실하게 응하되, 대기 고객이 있는데 대화가 길어지면 양해를 구하고 대기 고객 업무를 진행한 후 다시 상담합니다.']},
      {id:'p35-3', name:'고객 정보 축적·관리·활용', changeLog:[],
       principle:'효율적인 고객관리의 첫 시작점은 흩어져 있는 고객정보를 통합하는 것이고, 고객정보를 관리할 표준항목을 정하는 것입니다. 개인정보 보호법으로 인해 문제의 소지가 있으므로, 고객의 정보는 최소한으로 기록하고 관리합니다.\n\n[등록/축적] 신규 고객은 연락처를 등록하며, 고객이 거부할 경우 메모에 "연락처 거부"라고 기록합니다. 수납 시 고객의 성별과 연령을 포스에 입력하여 약국 경영의 기초 데이터로 활용합니다. 상담이나 구매이력을 고객정보란에 기입하여 재방문 시 활용합니다.\n\n[관리] 수집한 고객정보를 효율적으로 관리하는가에 따라 매출이 결정됩니다. 무차별적으로 DM이나 문자를 보내면 오히려 고객 불만이 커질 수 있으므로 활용 방법에 맞춰 분류합니다(성별·연령 믹스, 자녀를 둔 여성 별도 정리, 장기처방 환자 리스트 관리).\n\n[활용] 어떤 내용을 누구에게 보낼지 정한 후 분류된 고객정보를 바탕으로 알리미팜을 이용해 발송합니다. 전체발송(약국 이전·인테리어 변화, 국가기관급 건강정보)과 그룹발송(신규환자 감사인사, 장기처방 고객 알림서비스 등)으로 구분합니다.',
       checkpoints:['고객정보는 개인정보보호법에 따라 최소한으로만 기록','연락처 거부 시 메모에 명확히 기록','문자발송은 전체발송과 그룹발송을 구분하여 활용'],
       script:'',
       exceptions:[]}
     ]},
    {id:23,title:'약국 서류 관리',cat:'매장관리',cat2:'서류관리',cat3:'보존기간',keywords:['서류관리','처방전보관','거래명세표','세금계산서','개인정보보호','보존기간'],tags:['서류관리','보존기간','개인정보보호'],updatedAt:new Date(),views:0,history:[],
     summary:'', steps:[], customerScript:'', warnings:[], checklist:[],
     parts:[
      {id:'p36-1', name:'서류별 보존기간 (법정 기준)', changeLog:[],
       principle:'약국을 경영하면서 11종의 서류를 보관해야 합니다. 각각의 서류는 근거 법령이나 보존기간이 다르므로 유의하여 보관해야 합니다.\n\n처방전(건강보험, 의료급여): 국민건강보험법·의료급여법, 3년. 처방전(비급여): 약사법, 2년. 조제기록부: 약사법, 5년. 불량의약품처리에 관한 기록: 약사법, 1년. 개인별 투약기록: 국민건강보험법·의료급여법, 5년. 계산서 부본 또는 본인부담금 수납대장: 국민건강보험법·의료급여법, 5년. 약제 구입에 관한 서류: 국민건강보험법·의료급여법, 5년. 마약구입서 및 마약판매서: 마약류관리에 관한 법률, 2년. 마약류관리대장: 마약류관리에 관한 법률, 2년. 마약류 저장시설 점검부: 마약류관리에 관한 법률, 2년(권고).',
       checkpoints:['처방전(건보·의료급여) 3년, 처방전(비급여) 2년','조제기록부·개인별투약기록·수납대장·약제구입서류 5년','마약류 관련 서류 일괄 2년']
       ,script:'',
       exceptions:[]},
      {id:'p36-2', name:'처방전 및 거래명세표 관리', changeLog:[],
       principle:'[처방전 관리] 처방전은 3년간 보관해야 하며, 폐기 시 반드시 문서파쇄기나 폐기업체를 통해 폐기하여 개인정보유출이 없도록 합니다. 매일 처방접수 순서대로 넘버링하고 철하거나 묶음으로 구분·보관합니다. 전산입력 후 입력오류나 누락은 없었는지 대조작업을 매일 합니다. 시간외 조제, 대체조제, 변경조제 등의 통화내용이나 팩스 송부시간을 처방전에 기재합니다.\n\n향정신성 의약품의 경우 처방전을 복사하여 복사본을 파일링합니다. 오남용의약품의 경우 단일 처방이면 바로 오남용의약품파일에 철하고, 다른 처방과 같이 나왔으면 처방전을 복사하여 복사본을 파일링합니다.\n\n2013년 12월 복지부·안전행정부 공동 발간 개인정보 보호 가이드라인에 따르면, 약국 내 처방전 보관 시 별도의 잠금장치가 된 보관함이나 별도 보관시설을 두어야 합니다(당일 처방전은 예외).\n\n[거래명세표 정리] 도매상이나 제약회사에서 물품을 수령하면 반드시 품목·단위·수량·유효기간 등이 거래명세표와 맞는지 확인 후 장부에 기재합니다. 날짜별로 구분하여 5년간 보관합니다. 향정신성 의약품(빨간 도장 표시) 거래명세표는 입고날짜에 맞춰 순차적으로 정리하며, 오남용 의약품(비아그라, 자이데나, 레비트라, 시알리스 등) 거래명세표도 동일하게 보관합니다.',
       checkpoints:['처방전은 잠금장치 보관함에 보관(당일 처방전 제외)','향정신성·오남용의약품 처방전은 별도 복사본 파일링','거래명세표는 도매상별로 5년간 날짜순 보관'],
       script:'',
       exceptions:[]},
      {id:'p36-3', name:'세금계산서 및 영수증 관리', changeLog:[],
       principle:'세금계산서는 날짜별로 정리하고 세무사 사무실로 분기별로 정리하여 보냅니다. 세금계산서를 누락시키면 매출 계산서의 경우 매출액의 40% 이상에 해당하는 가산세를 물어야 하니 주의합니다. 누락된 세금계산서를 발견하면 세무사 사무실에 알려 수정신고를 바로 합니다(가산세는 하루에 0.03%씩 계산).\n\n사소한 금액이더라도 영수증은 꼭 받아서 비용으로 처리합니다. 카드전표는 매일 대조 확인하며, 각 카드 밴사에서 총액과 카드 전표 총액을 비교하여 확인합니다.',
       checkpoints:['세금계산서 누락 시 가산세 매출액 40% 이상 발생 가능, 발견 즉시 수정신고','카드전표는 매일 밴사 총액과 대조 확인'],
       script:'',
       exceptions:[]},
      {id:'p36-4', name:'개인정보보호 가이드라인 적용', changeLog:[],
       principle:'2013.12.20 개인정보보호 가이드라인 중 약국의 적용법령 및 주요 조치사항입니다.\n\n[일반원칙] 개인정보보호법을 적용하되, 약사법·국민건강보험법 등에 보존기한, 제3자 제공에 관한 내용이 있는 경우 해당 법령을 따릅니다.\n\n[수집·이용] 처방전, 요양급여청구정보, 조제기록부는 동의 없이 수집·이용 가능하나, 홈페이지 회원정보는 반드시 동의가 필요합니다(개인정보보호법 제15조, 국민건강보험법 제47조, 약사법 제30조).\n\n[관리] 위탁 시 문서로 하고 위탁사실을 공개해야 하며, 비밀번호설정·백신설치·암호화 등 안전한 관리를 위한 보호조치를 이행하고 개인정보 처리방침을 수립·공개해야 합니다(개인정보보호법 제26·29·30조).\n\n[제3자 제공] 개인정보보호법에서 지정하는 경우(동의, 법률근거, 급박한 생명·신체의 이익 등) 외에는 제공이나 열람이 불가합니다(개인정보보호법 제18조, 국민건강보험법 제47조).\n\n[열람·정정·삭제] 정보주체의 열람 등 요청이 있을 경우 10일 이내 처리해야 하며, 법에 따라 수집하는 정보는 정정·삭제 요청이 불가합니다. 조제기록부는 환자의 배우자, 직계존비속 등 가족도 열람요청이 가능합니다(약사법 적용, 개인정보보호법 제35·36조, 국민건강보험법 시행규칙 제58조, 약사법 제30조).\n\n[보관 및 파기] 보유목적이 달성되면 파기해야 하며, 보유기간은 처방전 2년(요양급여비용을 청구한 처방전은 3년), 요양급여청구정보 5년, 조제기록부 5년입니다(개인정보보호법 제21조, 국민건강보험법 시행규칙 제58조, 약사법 제30조).\n\n[유출·침해 대응] 정보주체에게 유출사실을 알리고, 1만건 이상 유출 시 행정안전부 또는 전문기관(KISA, NIA)에 신고해야 합니다(개인정보보호법 제34조).\n\n[영상정보처리기기 운영] 공개된 장소에 CCTV 설치 시 안내판 설치 및 영상정보 안전관리가 필요합니다(개인정보보호법 제25조).',
       checkpoints:['처방전·조제기록부는 동의 없이 수집 가능, 홈페이지 회원정보는 동의 필수','정보주체 열람요청은 10일 이내 처리, 조제기록부는 가족도 열람 가능','1만건 이상 정보유출 시 행정안전부/KISA/NIA 신고 의무','CCTV 설치 시 안내판 설치 필수'],
       script:'',
       exceptions:[]}
     ]},
    {id:24,title:'약국 마감 및 결산관리',cat:'매장관리',cat2:'마감',cat3:'결산',keywords:['마감','결산','매출관리','매입관리','지출관리','퇴근'],tags:['마감','결산','매출관리'],updatedAt:new Date(),views:0,history:[],
     summary:'', steps:[], customerScript:'', warnings:[], checklist:[],
     parts:[
      {id:'p37-1', name:'결산관리 (매출·매입·지출)', changeLog:[],
       principle:'수입 및 지출 항목을 정확히 기입하여 새는 돈을 막고 매장 운영 현황을 체크하는 것이 목적입니다. 장부나 엑셀로 꼼꼼히 정리하고, 관련 전표·영수증·명세서는 날짜별로 구분하여 정리합니다. 엑셀로 관리할 경우 Sheet를 4개(매출관리, 매입관리, 지출관리, 결산시트)로 만들어 관리합니다.\n\n[매출관리] 항목을 구체적으로 나눠 기록합니다. 기본적으로 조제와 매약을 나누며(추후 매출분석 시 필요), 조제료·현금매출·카드매출·외상·기타(송금 등)·합계금액으로 구분합니다. 조제료는 100원 단위까지 정확히 확인합니다. 카드는 매출결산전표를 출력하여 맨 위에 놓고 그 아래로 당일 카드전표를 정리하여 묶습니다. 현금은 포스로 실제 금액과 맞는지 확인 후 보관하여 익일 은행입금합니다(주거래은행 출장입금서비스 활용 가능). 익일 수납을 위해 일정 금액의 거스름돈을 남겨둔 후 정산하는 것이 편리합니다. 약국 상황에 맞게 결산 시간을 정합니다(예: 오후 6시 또는 7시).\n\n[매입관리] 의약품을 포함한 판매할 제품을 구입한 금액입니다. 주문일 기준으로 매일 정해진 시간에 결산하며, 상품까지는 어렵더라도 구매처까지는 기록합니다. 상품 도착 시 거래명세서와 함께 제품명·규격·단가·수량·유통기한을 확인합니다.\n\n[지출관리] 판매할 제품을 제외한 고정비용(임대, 관리비), 식대, 비품, 소모품, 유지비용 등입니다. 각 항목을 설정하고 일별로 지출금액을 정리하며, 특이사항은 비고란에 기록합니다.',
       checkpoints:['엑셀 관리 시 매출/매입/지출/결산 4개 시트로 구분','조제료는 100원 단위까지 정확히 확인','매일 결산 시간을 정해 일관되게 운영(예: 오후 6~7시)','익일 수납을 위해 일정 거스름돈을 남기고 정산'],
       script:'',
       exceptions:[]},
      {id:'p37-2', name:'월 결산', changeLog:[],
       principle:'지출이 증가하거나 매출이 감소하였을 경우, 또는 매입이 증가하고 매출은 정체되었을 경우 등 약국 운영에 적신호가 발견되는지 확인해야 합니다. 매월 마지막 영업일에 월 결산을 합니다. 이전 3개월의 기록과 비교하여 어떤 항목이 증감했는지 파악합니다. 축적한 자료를 바탕으로 데이터를 분석하고 원인을 파악하여 해결책을 찾을 수 있는 방법입니다.',
       checkpoints:['매월 마지막 영업일에 월결산 시행','이전 3개월 기록과 비교하여 증감 항목 파악'],
       script:'',

function buildNav() {
  var nav = S.role==='admin' ? ADMIN_NAV : STAFF_NAV;
  var html = nav.map(function(n) {
    if (n.sec) return '<div class="nav-sec">'+n.sec+'</div>';
    var badge = n.badge ? '<span class="nbadge" id="'+n.badge+'"></span>' : '';
    var cls = 'ni' + (S.page===n.id ? ' active' : '');
    var style = n.sub ? ' style="padding-left:32px;font-size:12.5px;opacity:0.85"' : '';
    return '<button class="'+cls+'"'+style+' onclick="go(\''+n.id+'\')" id="nav-'+n.id+'"><span class="ni-icon">'+n.icon+'</span>'+n.lbl+badge+'</button>';
  }).join('');
  document.getElementById('snav').innerHTML = html;
  updBadges();
  buildMobTab();
}

function inboxBadge() {
  var n = (DATA.inbox||[]).filter(function(x){ return x.status==='pending'; }).length;
  return n > 0 ? n : '';
}

function buildMobTab() {
  var el = document.getElementById('mobTabInner');
  if (!el) return;
  var tabs = S.role==='admin'
    ? [
        {id:'dashboard',icon:'&#128202;',lbl:'홈'},
        {id:'manuals',icon:'&#128218;',lbl:'매뉴얼'},
        {id:'favorites',icon:'⭐',lbl:'즐겨'},
        {id:'changes',icon:'&#128226;',lbl:'변경',badge:true},
        {id:'settings',icon:'⚙️',lbl:'설정'}
      ]
    : [
        {id:'staff-home',icon:'&#127968;',lbl:'홈'},
        {id:'manuals',icon:'&#128218;',lbl:'매뉴얼'},
        {id:'favorites',icon:'⭐',lbl:'즐겨'},
        {id:'changes',icon:'&#128226;',lbl:'변경',badge:true},
        {id:'feedback-submit',icon:'&#128221;',lbl:'제보'}
      ];
  el.innerHTML = tabs.map(function(t){
    var unread = 0;
    if (t.badge) {
      if (S.role==='staff'&&S.currentStaff) unread=DATA.changes.filter(function(c){return c.readBy.indexOf(S.currentStaff.id)<0;}).length;
      else unread=DATA.staff.length?DATA.changes.filter(function(c){return c.readBy.length<DATA.staff.length;}).length:0;
    }
    var isActive = S.page===t.id || (t.id==='favorites' && S.page==='favorites');
    return '<button class="mob-tab-btn'+(isActive?' active':'')+'" onclick="go(\''+t.id+'\')">'
      +'<span class="ti">'+t.icon+'</span>'
      +(t.badge&&unread?'<span class="mob-tab-badge">'+unread+'</span>':'')
      +'<span class="tl">'+t.lbl+'</span></button>';
  }).join('');
}

function updBadges() {
  var cb = document.getElementById('chBadge');
  var fb = document.getElementById('fbBadge');
  if (cb) {
    var n;
    if (S.role === 'staff' && S.currentStaff) {
      // 직원 모드: 내가 안 읽은 것만
      var sid = S.currentStaff.id;
      n = DATA.changes.filter(function(c){ return c.readBy.indexOf(sid) < 0; }).length;
    } else {
      // 관리자 모드: 전체 직원 중 누군가 안 읽은 것
      n = DATA.staff.length
        ? DATA.changes.filter(function(c){ return c.readBy.length < DATA.staff.length; }).length
        : 0;
    }
    cb.textContent = n || '';
  }
  if (fb) {
    var n2 = DATA.feedback.filter(function(f){ return f.status==='new'; }).length;
    fb.textContent = n2 || '';
  }
}

  if (prev === 'changes' && page !== 'changes') chFilter = 'all';

  if (page === 'staff-home') S._staffShowAll = false;

  if (prev === 'feedback' && page !== 'feedback') fbFilter = 'all';
  document.getElementById('topTitle').textContent = TITLES[page] || page;

  renderPage(page);
  if (window.innerWidth <= 768) toggleSB(false);
}
