// 빠른 분석 실행 (FAB 패널 / 대시보드 입력창 공용)
async function quickInboxAnalyze(sourceId) {
  var inputEl = document.getElementById(sourceId || 'qiInput');
  var raw = inputEl ? inputEl.value.trim() : '';
  if (!raw) { showToast('\ub0b4\uc6a9\uc744 \uc785\ub825\ud574\uc8fc\uc138\uc694', 'err'); return; }

  var key = S.gemKey || localStorage.getItem('gmKey') || '';
  if (!key) { showToast('Gemini API \ud0a4\ub97c \uc124\uc815\uc5d0\uc11c \uc785\ub825\ud574\uc8fc\uc138\uc694', 'err'); return; }

  // 로딩 표시
  var btnId = sourceId === 'dashInboxInput' ? 'dashInboxBtn' : 'qiBtn';
  var btn = document.getElementById(btnId);
  if (btn) { btn.disabled = true; btn.innerHTML = '\ubd84\uc11d \uc911...'; }

  var staffName = S.currentStaff ? S.currentStaff.name : '';
  var sourceType = '\ube60\ub978\uc785\ub825' + (staffName ? ' (\uc81c\ucd9c: '+staffName+')' : '');

  // 카톡 정리 + 중요 문장 추출
  var lines = cleanKakaoText(raw);
  var extracted = extractImportantSentences(lines);
  var analysisInput = extracted.important.length >= 3 ? extracted.important.join('\n') : raw;

  // 느슨한 매뉴얼 후보 추리기 (누락 방지 우선)
  // 프롬프트 빌드 + AI 호출 (공통 함수)
  var prompt = buildInboxAnalysisPrompt(analysisInput);
  var result = await callGem(prompt);

  if (btn) { btn.disabled = false; btn.innerHTML = '&#10022; AI 분석하기'; }

  var parsed = parseInboxAnalysisResult(result);
  if (!parsed) {
    showToast('AI 분석 실패. API 키를 확인하거나 다시 시도해주세요.', 'err');
    return;
  }


  // 저장 없이 _INBOX_LIVE에 임시 보관
  _INBOX_LIVE = {
    id: Date.now(), sourceType: sourceType,
    sourceText: raw.substring(0, 2000),
    extractedText: analysisInput.substring(0, 1000),
    result: parsed, status: 'result',
    createdAt: new Date(), appliedAt: null,
    applied: [], held: []
  };

  // 입력창 초기화
  if (inputEl) inputEl.value = '';

  // FAB 패널이면 닫기
  if (sourceId === 'qiInput') closeQuickInbox();

  // 바로 결과 탭으로
  INBOX_TAB = 'result';
  go('inbox');
  showToast('&#128229; \ubd84\uc11d \uc644\ub8cc \u2014 \ud56d\ubaa9\ubcc4\ub85c \uac80\ud1a0\ud574\uc8fc\uc138\uc694.', 'ok');

  // 대시보드 미검토 뱃지 갱신
  if (S.page === 'dashboard') renderPage('dashboard');
}

// AI 분류 없이 인식/입력된 텍스트를 그대로 변경사항으로 등록
function chSaveRaw() {
  var ta = document.getElementById('ch-ai-input');
  var raw = ta ? ta.value.trim() : '';
  if (!raw) { showToast('\uB0B4\uC6A9\uC774 \uC5C6\uC2B5\uB2C8\uB2E4', 'err'); return; }

  var tpEl = document.getElementById('ch-tp');
  var tp = tpEl ? tpEl.value : '\uAE30\uD0C0';

  // saveChg와 동일한 단어 단위 매칭 로직
  var related = DATA.manuals.filter(function(m) {
    var words = raw.replace(/[^\uAC00-\uD7A3A-z0-9]/g,' ').split(' ').filter(function(w){return w.length>1;});
    var titleMatch = words.some(function(w){ return m.title.indexOf(w)>=0; });
    var tagMatch   = m.tags.some(function(t){ return raw.indexOf(t)>=0 || words.some(function(w){return t.indexOf(w)>=0;}); });
    var catMatch   = raw.indexOf(m.cat)>=0;
    return titleMatch || tagMatch || catMatch;
  });

  var nid = Date.now();
  var authorName = S.role==='admin' ? '\uAD00\uB9AC\uC790' : (S.currentStaff ? S.currentStaff.name : '\uC9C1\uC6D0');
  var authorId   = S.role==='admin' ? 0 : (S.currentStaff ? S.currentStaff.id : 0);
  var initialReadBy = authorId ? [authorId] : [];

  var newCh = {
    id:nid, title:raw.split('\n').map(function(l){return l.trim();}).filter(Boolean)[0]||'\uBCC0\uACBD\uC0AC\uD56D',
    type:tp, before:'\uAE30\uC874 \uB0B4\uC6A9', after:raw,
    affectedManuals:related.map(function(m){return m.id;}),
    createdAt:new Date(), createdBy:authorName,
    readBy:initialReadBy,
    hasPhoto: !!(CH.aiPhotos&&CH.aiPhotos.length), hasFile:false,
    attachPhotoUrl:'', attachName: ''
  };
  DATA.changes.unshift(newCh);
  DATA.myRead[nid] = true; // \uC790\uC2E0\uC740 \uBC14\uB85C \uD655\uC778 \uC644\uB8CC
  fsSave('changes', newCh);
  closeMod();
  showToast(authorName+'\uB2D8\uC774 \uC778\uC2DD\uB41C \uB0B4\uC6A9\uC744 \uADF8\uB300\uB85C \uB4F1\uB85D\uD588\uC2B5\uB2C8\uB2E4!'+(CH.aiPhotos&&CH.aiPhotos.length?' (\uC0AC\uC9C4 \uC5C5\uB85C\uB4DC \uC911...)':''), 'ok');

  if (CH.aiPhotos && CH.aiPhotos.length) {
    uploadChangePhoto(CH.aiPhotos[0], nid).then(function(url) {
      if (url) {
        newCh.attachPhotoUrl = url;
        fsSave('changes', newCh);
        if (S.page === 'changes') renderPage('changes');
      }
    });
  }

  go(S.role==='admin' ? 'changes' : 'staff-home');
}

// AI 분석 실행 - 결과를 모달 안에서 미리보기 (바로 적용 아님)
async function chAiAnalyze() {
  var ta = document.getElementById('ch-ai-input');
  var raw = ta ? ta.value.trim() : '';
  if (!raw) { showToast('\uB0B4\uC6A9\uC744 \uC785\uB825\uD574\uC8FC\uC138\uC694', 'err'); return; }

  var key = S.gemKey || localStorage.getItem('gmKey') || '';
  if (!key) { showToast('Gemini API \uD0A4\uB97C \uC124\uC815\uC5D0\uC11C \uC785\uB825\uD574\uC8FC\uC138\uC694', 'err'); return; }

  CH.aiText = raw;
  var btn = document.getElementById('chAiBtn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<div class="ai-spin" style="width:14px;height:14px;border-width:2px;display:inline-block;vertical-align:middle;margin-right:6px"></div>\uBD84\uC11D \uC911...'; }

  // 카톡이면 정리, 아니면 그대로
  var lines = CH.aiMode === 'kakao' ? cleanKakaoText(raw) : raw.split('\n').filter(function(l){ return l.trim().length>=3; });
  var extracted = extractImportantSentences(lines);
  var analysisInput = extracted.important.length >= 3 ? extracted.important.join('\n') : raw;

  // 느슨한 매뉴얼 후보 추리기 (누락 방지 우선)
  // 프롬프트 빌드 + AI 호출 (공통 함수)
  var prompt = buildInboxAnalysisPrompt(analysisInput);
  var result = await callGem(prompt);

  if (btn) { btn.disabled = false; btn.innerHTML = '&#10022; AI 분석하기'; }

  var parsed = parseInboxAnalysisResult(result);
  if (!parsed) {
    showToast('AI 분석 실패. API 키를 확인하거나 다시 시도해주세요.', 'err');
    return;
  }


  CH.aiResult = parsed;
  refreshChModal();

  var nmCount = (parsed.newManuals||[]).length;
  var chCount = (parsed.changes||[]).length;
  var anCount = (parsed.announcements||[]).length;
  showToast('&#10022; \uBD84\uC11D \uC644\uB8CC \u2014 \uC2E0\uADDC ' + nmCount + ', \uBCC0\uACBD ' + chCount + ', \uACF5\uC9C0 ' + anCount + '\uAC74 \uBC1C\uACAC', 'ok');
}

// 분석 결과 미리보기 HTML
function chAiPreviewHtml() {
  if (!CH.aiResult) return '';
  var r = CH.aiResult;
  var html = '<div style="margin-top:14px;border-top:1px solid var(--bd);padding-top:14px">';

  function section(title, items, type, color) {
    if (!items.length) return '';
    var s = '<div style="font-size:12px;font-weight:700;color:'+color+';margin-bottom:8px">'+title+' '+items.length+'\uAC74</div>';
    items.forEach(function(item, i) {
      var comp = type !== 'announce' ? compareWithManuals(item.title, item.tags, item.cat) : null;
      var targetManual = item.targetManualId
        ? DATA.manuals.find(function(m){ return m.id===item.targetManualId; })
        : (comp ? comp.manual : null);
      var conflictBadge = (type === 'manual' && comp && comp.score >= 40)
        ? '<div style="background:var(--wn-l);border:1px solid var(--wn);border-radius:var(--rs);padding:7px 10px;margin-bottom:8px;font-size:11px;color:#7D5A00">'
          + '&#9888; \uC720\uC0AC\uD55C \ub9E4\uB274\uC5BC\uC774 \uC788\uc2B5\ub2C8\ub2E4: <strong>' + (targetManual?targetManual.title:'') + '</strong> (\uc720\uc0ac\ub3c4 ' + comp.score + '%)</div>'
        : '';
      var targetBadge = (type === 'change' && targetManual)
        ? '<div style="display:inline-flex;align-items:center;gap:4px;background:var(--pr-l);color:var(--pr);font-size:11px;font-weight:600;padding:3px 8px;border-radius:10px;margin-bottom:8px">&#128218; ' + targetManual.title + '</div>'
        : '';
      var summaryPreview = type === 'manual'
        ? esc(manualPreviewText(item))
        : (item.summary || '');

      s += '<div style="border:1px solid var(--bd);border-radius:var(--rs);padding:10px 12px;margin-bottom:8px">'
        + '<div style="font-size:13px;font-weight:700;margin-bottom:4px">'+(item.title||'\uC81C\uBAA9 \uC5C6\uC74C')+'</div>'
        + targetBadge
        + (summaryPreview?'<div style="font-size:12px;color:var(--t2);margin-bottom:6px;white-space:pre-wrap">'+summaryPreview+'</div>':'')
        + (item.before&&item.after?'<div style="font-size:11px;color:var(--t3);margin-bottom:6px">'
          +'<span style="background:var(--dn-l);padding:2px 6px;border-radius:4px">'+item.before+'</span>'
          +' &rarr; <span style="background:var(--ac-l);padding:2px 6px;border-radius:4px">'+item.after+'</span></div>':'')
        + (item.reason?'<div style="font-size:11px;color:var(--t3);margin-bottom:8px">&#128172; '+item.reason+'</div>':'')
        + conflictBadge
        + '<div style="display:flex;gap:6px;flex-wrap:wrap">'
        + '<button class="btn bp sm" onclick="chAiSaveItem('+i+',\''+type+'\')">&#10003; \uC2B9\uC778 \uBC0F \uC801\uC6A9</button>'
        + '<button class="btn bs sm" onclick="chAiEditItem('+i+',\''+type+'\')">&#9998; \uC218\uC815</button>'
        + '<button class="btn bs sm" onclick="chAiHoldItem('+i+',\''+type+'\')">&#9203; \uBCF4\uB958</button>'
        + '<button class="btn bs sm" style="color:var(--t3)" onclick="chAiIgnoreItem('+i+',\''+type+'\')">&#128683; \uBB34\uC2DC</button>'
        + '</div></div>';
    });
    return s;
  }

  html += section('\uC2E0\uADDC \ub9E4\uB274\uC5BC \ud6c4\ubcf4', r.newManuals||[], 'manual', 'var(--pr)');
  html += section('\ubcc0\uacbd\uc0ac\ud56d \ud6c4\ubcf4', r.changes||[], 'change', 'var(--wn)');
  html += section('\uacf5\uc9c0\uc0ac\ud56d', r.announcements||[], 'announce', 'var(--ac)');

  var held = CH.held || [];
  if (held.length) {
    var typeLabel = { manual:'\uC2E0\uADDC \ub9E4\uB274\uC5BC', change:'\ubcc0\uacbd\uc0ac\ud56d', announce:'\uacf5\uc9c0' };
    html += '<div style="margin-top:8px">'
      + '<div style="font-size:12px;font-weight:700;color:var(--t3);margin-bottom:8px">&#9203; \ubcf4\uB958\ud568 ' + held.length + '\uAC74</div>'
      + held.map(function(h, i) {
          return '<div style="border:1px dashed var(--bd);border-radius:var(--rs);padding:10px 12px;margin-bottom:6px;background:var(--s2)">'
            + '<div style="font-size:12px;font-weight:600;margin-bottom:2px">' + (h.data.title||h.data.content||'') + '</div>'
            + '<div style="font-size:10px;color:var(--t3);margin-bottom:6px">' + typeLabel[h.type] + ' \ubcf4\uB958\ub428</div>'
            + '<button class="btn bs sm" onclick="chAiUnholdItem(' + i + ')">&#8634; \ub2E4\uc2DC \uac80\ud1A0</button>'
            + '</div>';
        }).join('')
      + '</div>';
  }

  if (!(r.newManuals||[]).length && !(r.changes||[]).length && !(r.announcements||[]).length && !held.length) {
    html += '<div style="text-align:center;padding:16px;color:var(--t3);font-size:12px">\uC5C5\uBB34 \uC9C0\uC2DC\uB85C \uBCF4\uC774\uB294 \uB0B4\uC6A9\uC774 \uC5C6\uC2B5\uB2C8\uB2E4.</div>';
  }

  html += '</div>';
  return html;
}

function manualPreviewText(item) {
  if (item.parts && item.parts.length) {
    return item.parts.map(function(p){ return '['+(p.name||'')+'] '+(p.principle||'').substring(0,80); }).join('\n');
  }
  return item.summary || '';
}

function chAiResultArr(type) {
  if (!CH.aiResult) return null;
  if (type==='manual') return CH.aiResult.newManuals;
  if (type==='change') return CH.aiResult.changes;
  if (type==='announce') return CH.aiResult.announcements;
  return null;
}

function chAiIgnoreItem(idx, type) {
  var arr = chAiResultArr(type);
  if (!arr) return;
  arr.splice(idx, 1);
  refreshChModal();
  showToast('\uBB34\uC2DC\ub418\uc5C8\uc2B5\ub2c8\ub2e4', '');
}

function chAiHoldItem(idx, type) {
  var arr = chAiResultArr(type);
  if (!arr) return;
  var item = arr[idx];
  if (!item) return;
  if (!CH.held) CH.held = [];
  CH.held.push({ type: type, data: item });
  arr.splice(idx, 1);
  refreshChModal();
  showToast('\ubcf4\uB958\ud568\uC5d0 \uc800\uc7A5\ub418\uc5C8\uc2B5\ub2c8\ub2e4', '');
}

function chAiUnholdItem(heldIdx) {
  if (!CH.held || !CH.held[heldIdx]) return;
  var h = CH.held[heldIdx];
  var arr = chAiResultArr(h.type);
  if (arr) arr.push(h.data);
  CH.held.splice(heldIdx, 1);
  refreshChModal();
}

function chAiEditItem(idx, type) {
  var arr = chAiResultArr(type);
  if (!arr) return;
  var item = arr[idx];
  if (!item) return;
  var hasParts = type==='manual' && item.parts && item.parts.length;

  openMod('\ub0b4\uc6a9 \uc218\uc815',

function chAiSaveEdit(idx, type) {
  var arr = chAiResultArr(type);
  if (!arr) return;
  var item = arr[idx];
  if (!item) return;

  var title = document.getElementById('chAiEditTitle');
  if (title) item.title = title.value;

  if (type === 'manual' && item.parts && item.parts.length) {
    item.parts.forEach(function(p, pi){
      var nameEl = document.getElementById('chAiEditPartName'+pi);
      var principleEl = document.getElementById('chAiEditPartPrinciple'+pi);
      if (nameEl) p.name = nameEl.value;
      if (principleEl) p.principle = principleEl.value;
    });
  } else {
    var summary = document.getElementById('chAiEditSummary');
    if (summary && type==='manual') item.summary = summary.value;
  }
  var after = document.getElementById('chAiEditAfter');
  if (after && type==='change') item.after = after.value;
  var content = document.getElementById('chAiEditContent');
  if (content && type==='announce') item.content = content.value;

  closeMod();
  openMod('변경사항 추가', buildChBody(), buildChFoot());
  showToast('\uc218\uc815\ub418\uc5C8\uc2B5\ub2c8\ub2e4', 'ok');
}

// 미리보기에서 항목 저장 (변경사항/매뉴얼 즉시 반영)
function chAiSaveItem(idx, type) {
  if (!CH.aiResult) return;
  var item;
  if (type==='manual')   item = (CH.aiResult.newManuals||[])[idx];
  else if (type==='change')   item = (CH.aiResult.changes||[])[idx];
  else if (type==='announce') item = (CH.aiResult.announcements||[])[idx];
  if (!item) return;

  if (type === 'manual') {
    openNewManualConfirmModal(item, function(confirmed) {
      var nm = buildPartManualObject({
        title: confirmed.title||item.title||'\uC2E0\uADDC \uB9E4\uB274\uC5BC',
        cat: confirmed.cat||item.cat||'\uAE30\uD0C0', cat2: item.cat2||'', cat3: item.cat3||'',
        keywords: item.keywords||[], tags: item.tags||[],
        parts: confirmed.parts || item.parts,
        fallbackText: confirmed.summary||item.summary||''
      });
      DATA.manuals.unshift(nm);
      fsSave('manuals', nm);
      showToast('&#10024; \uC2E0\uADDC \uB9E4\uB274\uC5BC \uB4F1\uB85D \uC644\uB8CC!', 'ok');
      if (CH.aiResult && CH.aiResult.newManuals) CH.aiResult.newManuals.splice(idx,1);
      var remaining = (CH.aiResult.newManuals||[]).length + (CH.aiResult.changes||[]).length + (CH.aiResult.announcements||[]).length;
      if (remaining === 0) { go('changes'); }
      else { openMod('변경사항 추가', buildChBody(), buildChFoot()); }
    });
    return;
  }

  if (type === 'change') {
    // 내용 확인 모달
    var typeBadgeCh = {'중요':'<span class="pri pd2">중요</span>','공지':'<span class="pri pe">공지</span>','코판':'<span class="pri pg">코판</span>'}[item.type||'코판'] || '<span class="pri pe">'+esc(item.type||'')+'</span>';
    openMod('&#128226; \ubcc0\uacbd\uc0ac\ud56d \ud655\uc778',
      '<div>'
      + '<div style="background:var(--pr-l);border-radius:var(--rs);padding:8px 12px;margin-bottom:14px;font-size:12px;color:var(--pr);font-weight:600">'
      + '\uc774 \ub0b4\uc6a9\uc73c\ub85c \ubcc0\uacbd\uc0ac\ud56d\uc774 \ub4f1\ub85d\ub429\ub2c8\ub2e4. \ud655\uc778\ud574\uc8fc\uc138\uc694.</div>'
      + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">'
      + typeBadgeCh + '<span style="font-size:14px;font-weight:700">'+esc(item.title||'')+'</span>'
      + '</div>'
      + (item.before||item.after ? '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">'
        + '<div style="background:var(--dn-l);border-radius:var(--rs);padding:8px 10px"><div style="font-size:10px;font-weight:700;color:var(--dn);margin-bottom:4px">\ubcc0\uacbd \uc804</div><div style="font-size:12px">'+esc(item.before||'(\ube44\uc5b4\uc788\uc74c)')+'</div></div>'
        + '<div style="background:var(--ac-l);border-radius:var(--rs);padding:8px 10px"><div style="font-size:10px;font-weight:700;color:var(--ac);margin-bottom:4px">\ubcc0\uacbd \ud6c4</div><div style="font-size:12px">'+esc(item.after||'')+'</div></div>'
        + '</div>' : '')
      + (item.reason ? '<div style="font-size:11px;color:var(--t3)">&#128172; '+esc(item.reason)+'</div>' : '')
      + '</div>',
      '<button class="btn bs" onclick="closeMod();openMod(\'변경사항 추가\', buildChBody(), buildChFoot())">\ucde8\uc18c</button>'
      + '<button class="btn bp" onclick="closeMod();_chAiConfirmChange('+idx+')">\ub4f1\ub85d</button>'
    );
    return;
  }

  if (type === 'announce') {
    openMod('&#128203; \uacf5\uc9c0\uc0ac\ud56d \ud655\uc778',
      '<div>'
      + '<div style="background:var(--ac-l);border-radius:var(--rs);padding:8px 12px;margin-bottom:14px;font-size:12px;color:var(--ac);font-weight:600">'
      + '\uc774 \ub0b4\uc6a9\uc73c\ub85c \uacf5\uc9c0\uc0ac\ud56d\uc774 \ub4f1\ub85d\ub429\ub2c8\ub2e4.</div>'
      + '<div style="font-size:14px;font-weight:700;margin-bottom:8px">'+esc(item.title||'')+'</div>'
      + '<div style="font-size:13px;color:var(--t2);white-space:pre-wrap">'+esc(item.content||'')+'</div>'
      + '</div>',
      '<button class="btn bs" onclick="closeMod();openMod(\'변경사항 추가\', buildChBody(), buildChFoot())">\ucde8\uc18c</button>'
      + '<button class="btn bp" onclick="closeMod();_chAiConfirmAnnounce('+idx+')">\ub4f1\ub85d</button>'
    );
    return;
  }

  // 모두 처리됐으면 모달 닫기
  var remaining = (CH.aiResult.newManuals||[]).length + (CH.aiResult.changes||[]).length + (CH.aiResult.announcements||[]).length;
  if (remaining === 0) {
    closeMod();
    go('changes');
  } else {
    refreshChModal();
  }
}

function _chAiConfirmChange(idx) {
  if (!CH.aiResult) return;
  var item = (CH.aiResult.changes||[])[idx];
  if (!item) return;
  var targetId = item.targetManualId || null;
  if (!targetId) {
    var comp = compareWithManuals(item.title, item.tags, item.cat);
    if (comp.manual && comp.score >= 40) targetId = comp.manual.id;
  }
  var ch = {
    id: Date.now(), title: item.title||'\ubcc0\uacbd\uc0ac\ud56d',
    type: item.type||'\ucf54\ud310', before: item.before||'', after: item.after||'',
    createdBy: '\uad00\ub9ac\uc790', affectedManuals: targetId?[targetId]:[],
    createdAt: new Date(), readBy: []
  };
  DATA.changes.unshift(ch);
  fsSave('changes', ch);
  showToast('&#10024; \ubcc0\uacbd\uc0ac\ud56d\uc774 \ub4f1\ub85d\ub418\uc5c8\uc2b5\ub2c8\ub2e4', 'ok');
  CH.aiResult.changes.splice(idx, 1);
  var remaining = (CH.aiResult.newManuals||[]).length + (CH.aiResult.changes||[]).length + (CH.aiResult.announcements||[]).length;
  if (remaining === 0) { go('changes'); }
  else { openMod('\ubcc0\uacbd\uc0ac\ud56d \ucd94\uac00', buildChBody(), buildChFoot()); }
}

function _chAiConfirmAnnounce(idx) {
  if (!CH.aiResult) return;
  var item = (CH.aiResult.announcements||[])[idx];
  if (!item) return;
  var an = {
    id: Date.now(), title: item.title||'\uacf5\uc9c0', type: '\uacf5\uc9c0',
    before: '', after: item.content||'',
    createdBy: '\uad00\ub9ac\uc790', affectedManuals: [], createdAt: new Date(), readBy: []
  };
  DATA.changes.unshift(an);
  fsSave('changes', an);
  showToast('\uacf5\uc9c0\uc0ac\ud56d\uc774 \ub4f1\ub85d\ub418\uc5c8\uc2b5\ub2c8\ub2e4.', 'ok');
  CH.aiResult.announcements.splice(idx, 1);
  var remaining = (CH.aiResult.newManuals||[]).length + (CH.aiResult.changes||[]).length + (CH.aiResult.announcements||[]).length;
  if (remaining === 0) { go('changes'); }
  else { openMod('\ubcc0\uacbd\uc0ac\ud56d \ucd94\uac00', buildChBody(), buildChFoot()); }
}

async function nmHandleFile(file) {
  if (!file) return;
  if (file.size > 20*1024*1024) { showToast('20MB 이하 파일만 가능합니다','err'); return; }
  NM.fileName = file.name;
  var ext = file.name.split('.').pop().toLowerCase();

  // 드롭존 상태 변경
  var zone = document.getElementById('nmFileZone');
  if (zone) { zone.style.borderColor='var(--ac)'; zone.style.background='var(--ac-l)'; }

  // 결과 영역 표시
  var result = document.getElementById('nmFileResult');
  if (result) {
    result.style.display = '';
    var fnEl = result.querySelector('.fn-name');
    var fiEl = result.querySelector('.fn-info');
    if (fnEl) fnEl.textContent = file.name;
    if (fiEl) fiEl.textContent = Math.round(file.size/1024)+'KB · 읽는 중...';
  }

  // textarea - 파일 탭에는 결과 표시 후 생성됨
  var ta = document.getElementById('newMC');

  // 결과 영역 미리 표시 (textarea 포함)
  var result2 = document.getElementById('nmFileResult');
  if (result2) result2.style.display = '';
  var fnEl2 = result2 ? result2.querySelector('.fn-name') : null;
  var fiEl2 = result2 ? result2.querySelector('.fn-info') : null;
  if (fnEl2) fnEl2.textContent = file.name;
  if (fiEl2) fiEl2.textContent = Math.round(file.size/1024) + 'KB · 읽는 중...';
  // textarea 가져오기 (결과 영역 표시 후)
  ta = document.getElementById('newMC');

  try {
    // -- TXT / CSV / MD / JSON --
    if (['txt','csv','md','json'].indexOf(ext) >= 0) {
      var text = await readAsText(file);
      NM.fileText = text; // 전체 텍스트 반환
      if (ta) ta.value = NM.fileText;
      updateNMFileInfo(file, '텍스트 읽기 완료');
    }
    // -- PDF --
    else if (ext === 'pdf') {
      if (ta) ta.value = '⏳ PDF 분석 중...';
      var text2 = await extractPDFText(file);
      NM.fileText = text2;
      if (ta) ta.value = text2 || 'PDF 텍스트를 추출하지 못했습니다. 내용을 직접 입력해주세요.';
      updateNMFileInfo(file, 'PDF 텍스트 추출 완료');
    }
    // -- DOCX (Word) --
    else if (ext === 'docx' || ext === 'doc') {
      if (ta) ta.value = '⏳ Word 파일 분석 중...';
      var text3 = await extractDOCXText(file);
      NM.fileText = text3;
      if (ta) ta.value = text3;
      updateNMFileInfo(file, 'Word 파일 분석 완료');
    }
    // -- XLSX (Excel) --
    else if (ext === 'xlsx' || ext === 'xls') {
      if (ta) ta.value = '⏳ Excel 파일 분석 중...';
      var text4 = await extractXLSXText(file);
      NM.fileText = text4;
      if (ta) ta.value = text4;
      updateNMFileInfo(file, 'Excel 파일 분석 완료');
    }
    // -- HWP / HWPX (한글) --
    else if (ext === 'hwp' || ext === 'hwpx') {
      if (ta) ta.value = '⏳ 한글 파일 분석 중...';
      var text5 = await extractHWPText(file);
      NM.fileText = text5;
      if (ta) ta.value = text5;
      updateNMFileInfo(file, '한글 파일 분석 완료');
    }
    // -- 이미지 --
    else if (['jpg','jpeg','png','webp','gif'].indexOf(ext) >= 0) {
      NM.tab = 'photo';
      switchNMTab('photo');
      setTimeout(function(){ nmHandlePhoto(file); }, 100);
      return;
    }
    else {
      showToast('지원하지 않는 파일 형식입니다', 'err');
      nmClearFile();
      return;
    }
    showToast('&#10003; '+file.name+' 읽기 완료! ('+NM.fileText.length.toLocaleString()+'\uC790)', 'ok');

    // \uAE34 \uBB38\uC11C\uBA74 \uC77C\uAD04 \uCD94\uCD9C \uBAA8\uB4DC \uC81C\uC548
    if (NM.fileText && NM.fileText.length > 2500) {
      setTimeout(function() {
        if (confirm('\uCD94\uCD9C\ub41C \ub0b4\uc6a9\uc774 ' + NM.fileText.length.toLocaleString() + '\uC790\uB85C \uAE38\uC5b4\uC694.\n\n\uC5EC\ub7EC \uAC1C \ub9e4\ub274\uc5bc\uB85C \uB098\uB220\uC11c \uCD94\uCD9C\uD558\uB294 \uAE30\uB2A5\uC744 \uC0AC\uC6A9\ud558\uC2DC\uACA0\uC2B5\ub2c8\uAE4C?\n(\ud655\uC778: \uC77C\uAD04\uCD94\uCD9C \uBAA8\ub4DC / \uCDE8\uC18C: \ud558\ub098\uC758 \ub9e4\ub274\uc5bc\ub85c \uADF8\ub300\uB85c \uC0DD\uC131)')) {
          var catEl = document.getElementById('newMCat');
          var cat2El = document.getElementById('newMCat2');
          var cat = catEl ? catEl.value : (DATA.cats[0]?DATA.cats[0].name:'\uAE30\uD0c0');
          var cat2 = cat2El ? cat2El.value : '';
          closeMod();
          setTimeout(function(){ openBulkExtractModal(NM.fileText, cat, cat2); }, 200);
        }
      }, 300);
    }
  } catch(e) {
    console.error('file read error:', e);
    if (ta) ta.value = '파일을 읽는 도중 오류가 발생했습니다.\n내용을 직접 입력해주세요.';
    updateNMFileInfo(file, '읽기 실패 — 내용 직접 입력해주세요');
    showToast('파일 읽기 실패. 내용을 직접 붙여넣어주세요.', 'err');
  }
}

// -- 텍스트 읽기 --
function readAsText(file) {
  return new Promise(function(resolve, reject) {
    var r = new FileReader();
    r.onload = function(e){ resolve(e.target.result); };
    r.onerror = reject;
    r.readAsText(file, 'utf-8');
  });
}
function readAsArrayBuffer(file) {
  return new Promise(function(resolve, reject) {
    var r = new FileReader();
    r.onload = function(e){ resolve(e.target.result); };
    r.onerror = reject;
    r.readAsArrayBuffer(file);
  });
}
function readAsDataURL(file) {
  return new Promise(function(resolve, reject) {
    var r = new FileReader();
    r.onload = function(e){ resolve(e.target.result); };
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

// 업로드 전 이미지 리사이즈/압축 (긴 변 기준 maxDim px, JPEG로 재인코딩)
function compressImageDataUrl(dataUrl, maxDim, quality) {
  maxDim = maxDim || 1280;
  quality = quality || 0.75;
  return new Promise(function(resolve) {
    var img = new Image();
    img.onload = function() {
      var w = img.width, h = img.height;
      if (w > maxDim || h > maxDim) {
        if (w >= h) { h = Math.round(h * maxDim / w); w = maxDim; }
        else { w = Math.round(w * maxDim / h); h = maxDim; }
      }
      var canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      try {
        resolve(canvas.toDataURL('image/jpeg', quality));
      } catch(e) {
        resolve(dataUrl); // 실패 시 원본 그대로 사용
      }
    };
    img.onerror = function(){ resolve(dataUrl); };
    img.src = dataUrl;
  });
}

// 변경사항 첨부 사진을 Firebase Storage에 업로드하고 다운로드 URL을 반환.
// Storage 미사용/실패 시 null 반환 (호출부에서 graceful fallback 처리)
async function uploadChangePhoto(dataUrl, changeId) {
  if (!storageRef || !window._fbStorage) return null;
  try {
    var compressed = await compressImageDataUrl(dataUrl, 1280, 0.75);
    var fb = window._fbStorage;
    var path = 'change_photos/' + changeId + '.jpg';
    var fileRef = fb.ref(fb.storage, path);
    await fb.uploadString(fileRef, compressed, 'data_url');
    var url = await fb.getDownloadURL(fileRef);
    return url;
  } catch(e) {
    console.warn('사진 업로드 실패:', e);
    return null;
  }
}

// -- PDF 텍스트 추출 (PDF.js CDN) --
async function extractPDFText(file) {
  try {
    if (!window.pdfjsLib) {
      await loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }
    var ab = await readAsArrayBuffer(file);
    var pdf = await window.pdfjsLib.getDocument({data: ab}).promise;
    var texts = [];
    for (var i=1; i<=Math.min(pdf.numPages,80); i++) {
      var page = await pdf.getPage(i);
      var content = await page.getTextContent();
      texts.push(content.items.map(function(it){ return it.str; }).join(' '));
    }
    return texts.join('\n'); // 전체 텍스트 반환 (잘람 없음)
  } catch(e) {
    throw new Error('PDF 추출 실패: '+e.message);
  }
}

// -- DOCX 텍스트 추출 (mammoth.js CDN) --
async function extractDOCXText(file) {
  try {
    if (!window.mammoth) {
      await loadScript('https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js');
    }
    var ab = await readAsArrayBuffer(file);
    var result = await window.mammoth.extractRawText({arrayBuffer: ab});
    return result.value; // 전체 텍스트 반환
  } catch(e) {
    throw new Error('Word 추출 실패: '+e.message);
  }
}

// -- XLSX 텍스트 추출 (SheetJS CDN) --
async function extractXLSXText(file) {
  try {
    if (!window.XLSX) {
      await loadScript('https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js');
    }
    var ab = await readAsArrayBuffer(file);
    var wb = window.XLSX.read(ab, {type:'array'});
    var lines = [];
    wb.SheetNames.forEach(function(name) {
      var ws = wb.Sheets[name];
      var csv = window.XLSX.utils.sheet_to_csv(ws);
      if (csv.trim()) lines.push('=== 시트: '+name+' ===\n'+csv);
    });
    return lines.join('\n\n');
  } catch(e) {
    throw new Error('Excel 추출 실패: '+e.message);
  }
}

// -- HWP/HWPX 텍스트 추출 --
async function extractHWPText(file) {
  var ext = file.name.split('.').pop().toLowerCase();
  try {
    // HWPX는 ZIP 구조라 일부 텍스트 추출 가능
    if (ext === 'hwpx') {
      // JSZip으로 시도
      if (!window.JSZip) {
        await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js');
      }
      var ab = await readAsArrayBuffer(file);
      var zip = await window.JSZip.loadAsync(ab);
      var texts = [];
      var entries = Object.keys(zip.files);
      for (var i=0; i<entries.length; i++) {
        var name = entries[i];
        if (name.indexOf('Contents/') === 0 && name.indexOf('.xml') > 0) {
          var xml = await zip.files[name].async('string');
          // XML 태그 제거, 텍스트만 추출
          var clean = xml.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
          if (clean.length > 10) texts.push(clean);
        }
      }
      return texts.join('\n') || '\ud55c\uae00(HWPX) \ud14d\uc2a4\ud2b8\ub97c \ucd94\ucd9c\ud588\uc2b5\ub2c8\ub2e4. \ub0b4\uc6a9\uc744 \ud655\uc778\ud558\uace0 \uc218\uc815\ud574\uc8fc\uc138\uc694.';
    }
    // HWP (바이너리) - 직접 파싱 불가, 사용자에게 안내
    return '한글(.hwp) 파일은 바이너리 형식이라 직접 분석이 어렵습니다.\n\n아래 방법 중 하나를 사용해주세요:\n1. 한글에서 내용 복사 후 여기에 붙여넣기\n2. hwpx로 다른 이름으로 저장 후 업로드\n3. 텍스트 탭에서 직접 내용 입력';
  } catch(e) {
    return '한글 파일 분석 실패.\n내용을 직접 복사하여 텍스트 탭에 붙여넣어주세요.';
  }
}

// -- 스크립트 동적 로드 헬퍼 --
function loadScript(src) {
  return new Promise(function(resolve, reject) {
    if (document.querySelector('script[src="'+src+'"]')) { resolve(); return; }
    var s = document.createElement('script');
    s.src = src; s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}

var nmVoiceRec = false, nmVoiceRecognition = null;
function toggleNMVoice() {
  var btn = document.getElementById('nmVBtn');
  var stat = document.getElementById('nmVStat');
  if (!btn) return;
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (nmVoiceRec) {
    nmVoiceRec = false; btn.classList.remove('rec');
    if (nmVoiceRecognition) nmVoiceRecognition.stop();
    return;
  }
  nmVoiceRec = true; btn.classList.add('rec');
  if (stat) stat.innerHTML = '&#128308; 녹음 중... (다시 누르면 중지)';
  if (SR) {
    nmVoiceRecognition = new SR();
    nmVoiceRecognition.lang = 'ko-KR'; nmVoiceRecognition.continuous = false; nmVoiceRecognition.interimResults = true;
    nmVoiceRecognition.onresult = function(e) {
      var txt=''; for(var i=0;i<e.results.length;i++) txt+=e.results[i][0].transcript;
      var ta=document.getElementById('newMC'); if(ta) ta.value=txt;
      if(e.results[e.results.length-1].isFinal){ NM.fileText=txt; var r=document.getElementById('nmVRes'); if(r) r.style.display=''; }
    };
    nmVoiceRecognition.onend = function(){ nmVoiceRec=false; if(btn) btn.classList.remove('rec'); if(stat) stat.innerHTML='&#10003; 녹음 완료'; };
    nmVoiceRecognition.onerror = function(){ nmVoiceRec=false; if(btn) btn.classList.remove('rec'); if(stat) stat.textContent='마이크 권한이 필요합니다'; };
    nmVoiceRecognition.start();
    var resEl=document.getElementById('nmVRes'); if(resEl) resEl.style.display='';
  } else {
    setTimeout(function(){
      nmVoiceRec=false; if(btn) btn.classList.remove('rec');
      if(stat) stat.innerHTML='&#10003; 데모 녹음 완료';
      var ta=document.getElementById('newMC'); if(ta) ta.value='넥스가드 스펙트라 복용 절차 안내 매뉴얼';

  return '<div class="fg"><div class="fl">한줄 요약</div><input class="fi" id="em-s" value="'+esc(m.summary)+'"></div>'

  var parts = m.parts || [];

function buildPartEditorRow(p, i) {
  var pid = p.id || ('p'+Date.now()+i);
  return '<div class="part-edit-row" data-pid="'+pid+'" style="border:1px solid var(--bd);border-radius:var(--rs);padding:12px;margin-bottom:10px;background:var(--s2)">'

    + '<textarea class="fi pe-exceptions" rows="3" placeholder="예외상황1\n예외상황2">'+(p.exceptions||[]).join('\n')+'</textarea>'
    + '</div>';
}

function addManualPart() {
  var c = document.getElementById('em-parts');
  var div = document.createElement('div');
  div.innerHTML = buildPartEditorRow({}, c.children.length);
  c.appendChild(div.firstChild);
}

function addStep() {
  var c=document.getElementById('em-steps');
  var n=c.children.length+1;
  var d=document.createElement('div');d.className='sei';
  d.innerHTML='<span style="font-size:11px;color:var(--t3);width:16px">'+n+'</span>'
    +'<input placeholder="단계 입력..."><button onclick="this.parentElement.remove()">&#10005;</button>';
  c.appendChild(d);d.querySelector('input').focus();
}

function saveM(id) {
  var m=DATA.manuals.find(function(x){return x.id===id;});if(!m)return;
  var steps=[].slice.call(document.getElementById('em-steps').querySelectorAll('input')).map(function(i){return i.value;}).filter(Boolean);
  m.title=document.getElementById('em-t').value||m.title;
  m.cat=document.getElementById('em-c').value;
  m.cat2=document.getElementById('em-c2').value;
  m.tags=document.getElementById('em-tg').value.split(',').map(function(t){return t.trim();}).filter(Boolean);
  m.summary=document.getElementById('em-s').value;
  m.steps=steps;
  m.customerScript=document.getElementById('em-cs').value;
  m.warnings=document.getElementById('em-w').value.split('\n').filter(Boolean);
  m.checklist=document.getElementById('em-chk').value.split('\n').filter(Boolean);
  m.assignee = document.getElementById('em-assignee') ? document.getElementById('em-assignee').value.trim() : (m.assignee||'');
  m.nextReview = document.getElementById('em-nextreview') ? document.getElementById('em-nextreview').value : (m.nextReview||'');
  m.updatedAt=new Date();
  closeMod();showToast('매뉴얼이 저장되었습니다!','ok');go('manuals');
}

function deleteM(id) {
  if(!confirm('이 매뉴얼을 삭제하시겠습니까?'))return;
  DATA.manuals=DATA.manuals.filter(function(m){return m.id!==id;});
  closeMod();showToast('삭제되었습니다','ok');go('manuals');
}

// 파일 처리
function handleFileSelect(input) {
  var file = input.files[0];
  if (!file) return;
  if (file.size > 20*1024*1024) { showToast('20MB 이하 파일만 가능합니다','err'); return; }
  CH.fileName = file.name;
  var ext = file.name.split('.').pop().toLowerCase();
  var prev = document.getElementById('filePreview');

  // 텍스트 파일이면 내용 읽기
  if (['txt','csv'].indexOf(ext) >= 0) {
    var reader = new FileReader();
    reader.onload = function(e) {
      CH.fileData = e.target.result;
      var a = document.getElementById('ch-a');
      if (a && !a.value) a.value = CH.fileData.substring(0, 500);
      showFileAttached(prev, file.name, file.size);
    };
    reader.readAsText(file, 'utf-8');
  } else if (file.type.startsWith('image/')) {
    // 이미지 파일이면 사진처럼 처리
    var reader2 = new FileReader();
    reader2.onload = function(e) {
      CH.fileData = e.target.result;
      CH.photoData = e.target.result;
      if (prev) prev.innerHTML = '<img src="'+e.target.result+'" style="max-width:100%;max-height:180px;border-radius:var(--rs);margin-top:10px;border:1px solid var(--bd)">';
      showFileAttached(null, file.name, file.size);
      if (S.gemKey) analyzePhotoWithAI(e.target.result);
    };
    reader2.readAsDataURL(file);
  } else {
    CH.fileData = '[FILE:'+file.name+']';
    showFileAttached(prev, file.name, file.size);
  }
}

var chVoiceRecording = false;
var chRecognition = null;

function toggleChVoice() {
  var btn = document.getElementById('vBtn');
  var stat = document.getElementById('vStat2');
  if (!btn) return;

  // Web Speech API 지원 확인
  var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (chVoiceRecording) {
    // 중지
    chVoiceRecording = false;
    btn.classList.remove('rec');
    if (chRecognition) chRecognition.stop();
    return;
  }

  chVoiceRecording = true;
  btn.classList.add('rec');
  if (stat) stat.innerHTML = '&#128308; 녹음 중... (다시 누르면 중지)';

  if (SpeechRecognition) {
    // 실제 Web Speech API 사용
    chRecognition = new SpeechRecognition();
    chRecognition.lang = 'ko-KR';
    chRecognition.continuous = false;
    chRecognition.interimResults = true;
    chRecognition.onresult = function(e) {
      var txt = '';
      for (var i=0; i<e.results.length; i++) txt += e.results[i][0].transcript;
      var t = document.getElementById('vTxt2');
      if (t) t.value = txt;
      if (e.results[e.results.length-1].isFinal) {
        CH.voiceTxt = txt;
        var res = document.getElementById('vRes2');
        if (res) res.style.display = '';
        var ex = document.getElementById('chVoiceExtra');
        if (ex) ex.style.display = '';
      }
    };
    chRecognition.onerror = function(e) {
      chVoiceRecording = false;
      if (btn) btn.classList.remove('rec');
      if (stat) stat.textContent = '마이크 권한을 허용해주세요 (또는 아래 예시 버튼 이용)';
    };
    chRecognition.onend = function() {
      chVoiceRecording = false;
      if (btn) btn.classList.remove('rec');
      if (stat) stat.innerHTML = '&#10003; 녹음 완료';
    };
    chRecognition.start();
  } else {
    // 미지원 브라우저 &#8594; 2.5초 후 데모 텍스트
    setTimeout(function() {
      if (!document.getElementById('vBtn')) return;
      chVoiceRecording = false;
      btn.classList.remove('rec');
      if (stat) stat.innerHTML = '&#10003; 녹음 완료 (데모)';
      var txt = VSAMPLES2[Math.floor(Math.random()*VSAMPLES2.length)];
      CH.voiceTxt = txt;
      var res = document.getElementById('vRes2');
      var t = document.getElementById('vTxt2');
      if (res) res.style.display = '';
      if (t) t.value = txt;
      var ex = document.getElementById('chVoiceExtra');
      if (ex) ex.style.display = '';
    }, 2500);
  }
}

function analyzeChg() {
  var after = '';

function saveChg() {
  var bef = '', aft = '', tp = '';
  var tpEl = document.getElementById('ch-tp');
  tp = tpEl ? tpEl.value : '기타';

  if (CH.tab === 'text') {
    var bEl = document.getElementById('ch-b');
    var aEl = document.getElementById('ch-a');
    bef = bEl ? bEl.value.trim() : '';
    aft = aEl ? aEl.value.trim() : '';
  } else if (CH.tab === 'photo') {
    var aEl2 = document.getElementById('ch-a');
    aft = aEl2 ? aEl2.value.trim() : '';
    bef = '기존 사진 확인 필요';
    if (CH.photoData && !aft) { showToast('사진 설명을 입력해주세요', 'err'); return; }
    if (CH.photoData) aft = '[사진 첨부] ' + aft;
  } else if (CH.tab === 'file') {
    var aEl3 = document.getElementById('ch-a');
    aft = aEl3 ? aEl3.value.trim() : '';
    if (CH.fileName) aft = (aft ? aft + '\n' : '') + '[첨부 파일: '+CH.fileName+']';
    bef = '기존 파일 확인 필요';
  } else if (CH.tab === 'voice') {
    var vEl = document.getElementById('vTxt2');
    aft = vEl ? vEl.value.trim() : CH.voiceTxt;
    var bvEl = document.getElementById('ch-b-v');
    bef = bvEl ? bvEl.value.trim() : '';
  }

  if (!aft) { showToast('변경 후 내용을 입력해주세요', 'err'); return; }
  bef = bef || '기존 내용';

  var related = DATA.manuals.filter(function(m) {
    return m.tags.some(function(t){ return aft.indexOf(t)>=0; }) || aft.indexOf(m.title.substring(0,4))>=0;
  });
  var nid = Date.now();
  var newCh = {
    id:nid, title:aft.replace(/\[.*?\]/g,'').trim().substring(0,30)+(aft.length>30?'...':''),
    type:tp, before:bef, after:aft,
    affectedManuals:related.map(function(m){return m.id;}),
    createdAt:new Date(), readBy:[],
    hasPhoto: !!CH.photoData,
    hasFile: !!CH.fileName,
    attachName: CH.photoName || CH.fileName || ''
  };
  DATA.changes.unshift(newCh);
  fsSave('changes', newCh);
  DATA.myRead[nid] = false;
  closeMod();
  showToast('변경사항이 등록되었습니다!', 'ok');
  go('changes');
}

// 우선순위 순서대로: 3.1 Flash-Lite &#8594; 3.5 Flash &#8594; 3 Flash &#8594; 2.5 Flash
var GMODELS = [
  'gemini-3.1-flash-lite',   // 1순위
  'gemini-2.5-flash-lite',   // 2순위
  'gemini-3-flash-preview',  // 3순위
  'gemini-2.5-flash',        // 4순위
  'gemini-3.5-flash'         // 5순위
];

// 전역 라운드로빈 인덱스 - 매 호출마다 순서대로 돌아가며 사용
var G_RR_IDX = 0;

// 사진에서 텍스트를 추출하는 공통 OCR 함수.
// GMODELS 라운드로빈을 그대로 사용하고, AI가 메타 설명("~받아적은 내용입니다" 등)만
// 반환하는 경우를 감지해 다음 모델로 자동 재시도한다.
async function callGemOCR(b64, mime) {
  var key = S.gemKey || localStorage.getItem('gmKey') || '';
  if (!key) return null;

  var prompt = '\uC774 \uC774\uBBF8\uC9C0\uC5D0 \uC788\uB294 \uBAA8\uB4E0 \uD14D\uC2A4\uD2B8\uB97C \uADF8\uB300\uB85C \uADF8\uB300\uB85C \uBC1B\uC544\uC368\uC8FC\uC138\uC694. '
    + '\uC57D\uADAD\uACFC \uC124\uBA85, \uC11C\uB860 \uC5C6\uC774 \uC774\uBBF8\uC9C0 \uC548\uC758 \uACFC\uC2DC \uADF8\uB300\uB85C\uB9CC \uCD9C\uB825\uD558\uC138\uC694. '
    + '\uC774\uBBF8\uC9C0\uC5D0 \uD14D\uC2A4\uD2B8\uAC00 \uC804\uD600 \uC5C6\uC73C\uBA74 "\uD14D\uC2A4\uD2B8 \uC5C6\uC74C"\uC774\uB77C\uACE0\uB9CC \uC4F0\uC138\uC694.';

  var maxRetries = GMODELS.length;
  for (var i = 0; i < maxRetries; i++) {
    var model = GMODELS[G_RR_IDX % GMODELS.length];
    G_RR_IDX = (G_RR_IDX + 1) % GMODELS.length;
    try {
      var res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/'+model+':generateContent?key='+key, {
        method:'POST', headers:{'Content-Type':'application/json','x-goog-api-key':key},
        body:JSON.stringify({contents:[{parts:[
          {inline_data:{mime_type:mime,data:b64}},
          {text:prompt}
        ]}],generationConfig:{temperature:0.1,maxOutputTokens:9000}})
      });
      if (res.status===429||res.status===503||res.status===404) continue;
      var data = await res.json();
      var cand = data && data.candidates && data.candidates[0];
      console.log('[callGemOCR]', model, 'finishReason:', cand && cand.finishReason);
      var txt = cand && cand.content ? cand.content.parts[0].text : '';
      if (!txt) continue;
      txt = txt.trim();
      // AI가 텍스트 대신 메타 설명만 반환한 경우 감지 → 다음 모델로 재시도
      var metaPatterns = ['\uBC1B\uC544\uC801\uC740 \uB0B4\uC6A9', '\uC815\uD655\uD558\uAC8C \uBC1B\uC544', '\uC774\uBBF8\uC9C0\uC5D0 \uC801\uD78C', '\uC81C\uACF5\uD574\uC8FC\uC2E0 \uC774\uBBF8\uC9C0\uC5D0'];
      var looksLikeMeta = metaPatterns.some(function(p){ return txt.indexOf(p) >= 0; }) && txt.length < 80;
      if (looksLikeMeta) continue;
      return txt;
    } catch(e) { continue; }
  }
  return null;
}

// AQ 키 자동 감지 및 저장
function autoSaveAQKey(key) {
  if (key && key.startsWith('AQ') && key !== S.gemKey) {
    S.gemKey = key;
    localStorage.setItem('gmKey', key);
  }
}

// 초기화 시 저장된 키 자동 로드
(function loadSavedKey() {
  var saved = localStorage.getItem('gmKey') || '';
  if (saved) { S.gemKey = saved; }
})();

async function callGem(prompt, forceModel) {
  var key = S.gemKey || localStorage.getItem('gmKey') || '';
  if (!key) {
    showToast('Gemini API 키가 없습니다. 설정에서 입력해주세요.', 'err');
    return null;
  }
  autoSaveAQKey(key);

  // 라운드로빈: 호출마다 다음 모델로 순환
  var startIdx = G_RR_IDX;
  G_RR_IDX = (G_RR_IDX + 1) % GMODELS.length;
  var model = forceModel || GMODELS[startIdx];

  var tried = 0;
  var idx = startIdx;

  while (tried < GMODELS.length) {
    model = forceModel || GMODELS[idx];
    try {
      var res = await fetch(
        'https://generativelanguage.googleapis.com/v1beta/models/' + model + ':generateContent?key=' + key,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-goog-api-key': key },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: { temperature: 0.4, maxOutputTokens: 8000 }
          })
        }
      );

      if (res.status === 429 || res.status === 503) {
        // 한도 초과 또는 과부하 &#8594; 다음 모델로 즉시 전환
        console.warn('[Gemini] ' + model + ' 한도 초과(' + res.status + '), 다음 모델로 전환');
        idx = (idx + 1) % GMODELS.length;
        G_RR_IDX = idx; // 전역 인덱스도 업데이트해서 다음 호출도 피함
        tried++;
        continue;
      }

      if (res.status === 400 || res.status === 404) {
        // 모델 미지원 &#8594; 다음 모델 시도
        console.warn('[Gemini] ' + model + ' 지원안함(' + res.status + '), 다음 모델');
        idx = (idx + 1) % GMODELS.length;
        tried++;
        continue;
      }

      var data = await res.json();
      var txt = data &&
        data.candidates &&
        data.candidates[0] &&
        data.candidates[0].content &&
        data.candidates[0].content.parts &&
        data.candidates[0].content.parts[0]
          ? data.candidates[0].content.parts[0].text
          : null;

      if (txt) {
        // 성공한 모델을 콘솔에 기록 + 뱃지 업데이트
        console.log('[Gemini] 사용 모델: ' + model);
        var badge = document.getElementById('modelBadge');
        if (badge) {
          badge.style.display = '';
          // 모델명 짧게 표시: gemini-3.1-flash-lite &#8594; 3.1FL
          var short = model.replace('gemini-','').replace('-flash-lite','FL').replace('-flash','-F').replace('-preview','');
          badge.innerHTML = '&#129302; ' + short;
        }
        return txt;
      }

      // 응답은 있으나 내용이 없음 &#8594; 다음 모델
      idx = (idx + 1) % GMODELS.length;
      tried++;

    } catch(e) {
      console.warn('[Gemini] ' + model + ' 오류:', e.message);
      idx = (idx + 1) % GMODELS.length;
      tried++;
    }
  }

  console.error('[Gemini] 모든 모델 실패');
  return null;
}

async function genManual() {
  var ta = document.getElementById('newMC');
  var content = ta ? ta.value.trim() : '';
  var cat  = document.getElementById('newMCat')  ? document.getElementById('newMCat').value  : '\uc870\uc81c';
  var cat2 = document.getElementById('newMCat2') ? document.getElementById('newMCat2').value : '\uae30\ud0c0';
  if (!content) { showToast('\ub0b4\uc6a9\uc744 \uc785\ub825\ud574\uc8fc\uc138\uc694', 'err'); return; }

  // 긴 문서 감지 (2000자 이상 OR 줄바꿈 20개 이상)
  var isLong = content.length > 2000 || (content.match(/\n/g)||[]).length > 20;

  if (isLong) {
    // 긴 문서 모드: 항목 추출 먼저 물어보기
    openBulkExtractModal(content, cat, cat2);
    return;
  }

  // 단일 매뉴얼 생성 (기존 방식)
  await genSingleManual(content, cat, cat2, true);
}

// ============================================================
// 매뉴얼 생성 - 2단계 파이프라인 (분석 → 구조화)
// ============================================================
async function genSingleManual(rawContent, cat, cat2, closeOnDone) {
  var bodyEl  = document.getElementById('mBody');
  var footEl  = document.getElementById('mFoot');

  // ── 진행 UI ──
  function setStep(step, msg, sub) {
    if (!bodyEl) return;
    var steps = [
      {label:'내용 분석', done: step > 1, cur: step===1},
      {label:'핵심 추출', done: step > 2, cur: step===2},
      {label:'매뉴얼 구조화', done: step > 3, cur: step===3},
      {label:'품질 검토', done: step > 4, cur: step===4}
    ];
    bodyEl.innerHTML = '<div class="ai-proc"><div class="ai-spin"></div>'
      + '<div style="font-size:15px;font-weight:700;color:var(--pr);margin-bottom:4px">' + msg + '</div>'
      + '<div style="font-size:12px;color:var(--t3);margin-bottom:16px">' + (sub||'') + '</div>'
      + '<div style="display:flex;flex-direction:column;gap:6px">'
      + steps.map(function(s){
          return '<div style="display:flex;align-items:center;gap:8px;font-size:12px;color:'
            + (s.done?'var(--ac)':s.cur?'var(--pr)':'var(--t3)') + '">'
            + (s.done?'<span style="color:var(--ac)">&#10003;</span>'
              :s.cur?'<span style="animation:pulse2 1s infinite;display:inline-block">&#9656;</span>'
              :'<span>&#9702;</span>')
            + s.label + '</div>';
        }).join('')
      + '</div></div>';
    if (footEl) footEl.innerHTML = '';
  }

  setStep(1, 'AI가 내용을 분석하고 있습니다...', '약국 업무 맥락 파악 중');

  // 내용 길이에 따라 분할 처리
  var maxChunk = 6000;
  var fullContent = rawContent;

  // ── STEP 1: 내용 분석 & 핵심 추출 ──
  var analysisPrompt =
    '당신은 15년 경력의 약국 운영 전문가입니다.\n'
    + '아래 내용을 약국 직원 교육용으로 분석해주세요.\n\n'
    + '분석 기준:\n'
    + '1. 이 내용의 핵심 업무가 무엇인지\n'
    + '2. 실제 현장에서 중요한 포인트\n'
    + '3. 자주 발생하는 실수나 주의사항\n'
    + '4. 고객에게 실제로 말해야 하는 멘트\n'
    + '5. 단계별로 해야 할 행동\n\n'
    + '카테고리: ' + cat + ' > ' + cat2 + '\n\n'
    + '=== 원문 내용 ===\n'
    + fullContent.substring(0, maxChunk) + '\n'
    + (fullContent.length > maxChunk ? '\n[내용이 길어 앞부분만 분석]\n' : '')
    + '=== 끝 ===\n\n'
    + '분석 결과를 다음 JSON으로만 반환 (백틱 없이):\n'
    + '{"coreTask":"(핵심 업무 한 줄)","keyPoints":["중요포인트1","중요포인트2","중요포인트3"],'
    + '"customerMoments":["고객 응대 상황1","상황2"],'
    + '"commonMistakes":["흔한 실수1","실수2"],'
    + '"requiredKnowledge":["알아야 할 지식1","지식2"]}';

  var analysis = null;
  var analysisResult = await callGem(analysisPrompt);
  if (analysisResult) {
    try {
      analysis = JSON.parse(analysisResult.replace(/```json|```/g,'').trim());
    } catch(e) { console.warn('분석 파싱 실패:', e); }
  }

  setStep(2, '핵심 내용을 추출하고 있습니다...', '중요 포인트 및 절차 정리 중');

  // ── STEP 2: 풍부한 매뉴얼 구조화 ──
  // 분석 결과를 컨텍스트로 활용
  var analysisContext = analysis
    ? '## 사전 분석 결과\n'
      + '핵심 업무: ' + (analysis.coreTask||'') + '\n'
      + '중요 포인트: ' + (analysis.keyPoints||[]).join(', ') + '\n'
      + '고객 응대 상황: ' + (analysis.customerMoments||[]).join(', ') + '\n'
      + '흔한 실수: ' + (analysis.commonMistakes||[]).join(', ') + '\n\n'
    : '';

  setStep(3, '매뉴얼 구조를 완성하고 있습니다...', '단계별 절차 및 응대 멘트 작성 중');

  var structurePrompt =
    '당신은 약국 업무 매뉴얼 전문 작성자입니다.\n'
    + '아래 내용을 바탕으로 약국 직원이 즉시 사용할 수 있는 완전한 매뉴얼을 작성하세요. 매뉴얼은 1~3개의 파트(소항목)로 구성하세요.\n\n'
    + analysisContext
    + '## 원문\n'
    + fullContent.substring(0, 5000) + '\n\n'
    + '## 작성 규칙\n'
    + '- parts: 내용의 복잡도에 따라 1~3개로 나눕니다. 각 파트는 다음 필드를 가집니다.\n'
    + '  - name: 파트 주제를 짧게 요약한 이름 (예: "처방전 접수 절차")\n'
    + '  - principle: 원칙과 절차를 설명하는 문단. 실제 행동 순서를 구체적으로 서술 (동사+목적어 형태)\n'
    + '  - checkpoints: 핵심 규칙을 짧은 문장 목록으로 5~8개\n'
    + '  - script: 고객에게 실제로 할 말 (따옴표 포함, 2~3가지 상황). 없으면 빈 문자열\n'
    + '  - exceptions: 법적 문제, 고객 불만, 의료 사고로 이어질 수 있는 예외상황 목록\n'
    + '- keywords: 직원이 검색할 법한 단어 (증상, 상황, 제품명 포함)\n\n'
    + '카테고리: ' + cat + ' > ' + cat2 + '\n\n'
    + 'JSON만 반환 (백틱 없이):\n'
    + '{\n'
    + '  "title": "(20자 이내 핵심 제목)",\n'
    + '  "parts": [{"name":"","principle":"","checkpoints":[],"script":"","exceptions":[]}],\n'
    + '  "tags": ["태그1", "태그2", "태그3"],\n'
    + '  "cat3": "(세부분류)",\n'
    + '  "keywords": ["검색어1", "검색어2", "증상키워드"]\n'
    + '}';

  var structured = null;
  var structResult = await callGem(structurePrompt);
  if (structResult) {
    try {
      structured = JSON.parse(structResult.replace(/```json|```/g,'').trim());
    } catch(e) {
      // JSON 파싱 실패 시 정규식으로 부분 추출
      try {
        var m = structResult.match(/\{[\s\S]*\}/);
        if (m) structured = JSON.parse(m[0]);
      } catch(e2) { console.warn('구조화 파싱 실패:', e2); }
    }
  }

  setStep(4, '최종 검토 중...', '매뉴얼 완성도 확인');

  // ── 기본값 보강 (AI 실패 시에도 최소 품질 보장) ──
  var fallbackParts = [{
    name: (analysis && analysis.coreTask) ? analysis.coreTask.substring(0,30) : '기본 내용',
    principle: (analysis && analysis.keyPoints && analysis.keyPoints.length)
      ? analysis.keyPoints.map(function(p,i){ return (i+1)+'. '+p; }).join('\n')
      : (rawContent || '').substring(0, 500),
    checkpoints: (analysis && analysis.keyPoints) || [],
    script: (analysis && analysis.customerMoments && analysis.customerMoments.length)
      ? analysis.customerMoments.join(' / ') : '',
    exceptions: (analysis && analysis.commonMistakes) || []
  }];

  var nm = buildPartManualObject({
    id: Date.now(),
    title: (structured && structured.title) || (analysis && analysis.coreTask && analysis.coreTask.substring(0,20)) || rawContent.split('\n')[0].substring(0,20) || '새 매뉴얼',
    cat: cat, cat2: cat2,
    cat3: (structured && structured.cat3) || cat2,
    keywords: (structured && structured.keywords) || (analysis && analysis.requiredKnowledge) || [],
    tags: (structured && structured.tags) || ['신규'],
    parts: (structured && structured.parts && structured.parts.length) ? structured.parts : fallbackParts
  });

  // ── 품질 점수 계산 ──
  var qualityScore = 0;
  var firstPart = nm.parts[0] || {};
  if (nm.parts.length >= 1 && firstPart.principle && firstPart.principle.length > 30) qualityScore += 25;
  if (firstPart.script && firstPart.script.length > 10) qualityScore += 25;
  if (firstPart.exceptions && firstPart.exceptions.length >= 1) qualityScore += 25;
  if (firstPart.checkpoints && firstPart.checkpoints.length >= 3) qualityScore += 25;
  var qualityLabel = qualityScore >= 75 ? '&#10024; 우수' : qualityScore >= 50 ? '&#128077; 양호' : '&#128161; 기본';

  DATA.manuals.unshift(nm);
  fsSave('manuals', nm);

  if (closeOnDone) {
    // 결과 미리보기 표시 후 닫기
    if (bodyEl) {
      bodyEl.innerHTML = '<div style="padding:4px 0">'
        + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">'
        + '<span style="font-size:28px">&#10024;</span>'
        + '<div><div style="font-size:15px;font-weight:700">매뉴얼 생성 완료! ' + qualityLabel + '</div>'
        + '<div style="font-size:12px;color:var(--t3)">품질 점수: ' + qualityScore + '/100</div></div>'
        + '</div>'
        + '<div style="background:var(--s2);border-radius:var(--rs);padding:12px;margin-bottom:10px">'
        + '<div style="font-size:12px;font-weight:700;color:var(--t2);margin-bottom:4px">제목</div>'
        + '<div style="font-size:14px;font-weight:700">' + nm.title + '</div>'
        + '</div>'
        + '<div style="background:var(--pr-l);border-radius:var(--rs);padding:12px;margin-bottom:10px">'
        + '<div style="font-size:12px;font-weight:700;color:var(--pr);margin-bottom:4px">&#9889; 핵심 요약</div>'
        + '<div style="font-size:13px">' + esc((nm.parts[0]&&nm.parts[0].principle||'').substring(0,150)) + '</div>'
        + '</div>'
        + '<div style="font-size:12px;color:var(--t2);margin-bottom:6px">파트: ' + nm.parts.length + '개 &nbsp;|&nbsp; 체크포인트: ' + nm.parts.reduce(function(s,p){return s+(p.checkpoints?p.checkpoints.length:0);},0) + '개 &nbsp;|&nbsp; 예외상황: ' + nm.parts.reduce(function(s,p){return s+(p.exceptions?p.exceptions.length:0);},0) + '개</div>'
        + (qualityScore < 75
          ? '<div style="background:var(--wn-l);border:1px solid var(--wn);border-radius:var(--rs);padding:10px;font-size:12px;color:#7D5A00">&#128161; 내용이 더 풍부할수록 품질이 높아집니다. 수정 후 보완하실 수 있습니다.</div>'
          : '')
        + '</div>';
    }
    if (footEl) footEl.innerHTML =
      '<button class="btn bs" onclick="closeMod();openMDetail(' + nm.id + ')">&#128269; 미리보기</button>'
      + '<button class="btn bp" onclick="closeMod();go(\'manuals\')">&#128218; 목록으로</button>';
  }
  return nm;
}

// 글자수 카운터 + 품질 힌트
function updateNMCharCount() {
  var ta = document.getElementById('newMC');
  if (!ta) return;
  var len = ta.value.length;
  var countEl = document.getElementById('nmCharCount');
  var hintEl  = document.getElementById('nmQualityHint');
  if (countEl) {
    countEl.textContent = len.toLocaleString() + '\uc790';
    countEl.style.color = len >= 500 ? 'var(--ac)' : len >= 200 ? 'var(--pr)' : 'var(--t3)';
  }
  if (hintEl) {
    if (len === 0) { hintEl.innerHTML = ''; return; }
    var pct = Math.min(100, Math.round(len / 500 * 100));
    var color = pct >= 100 ? 'var(--ac)' : pct >= 40 ? 'var(--pr)' : 'var(--wn)';

function previewBulkSplit() {
  var prev = document.getElementById('bulkPreview');
  if (!prev) return;

  if (_bulkMode === 'auto' || chunks.length === 0) {

  }
  prev.style.display = '';

    + '<div style="max-height:200px;overflow-y:auto;border:1px solid var(--bd);border-radius:var(--rs);padding:8px">'
    + chunks.slice(0,10).map(function(c, i) {

          + '<span style="font-weight:700;color:var(--pr);margin-right:8px">' + (i+1) + '</span>'
          + c.substring(0, 60) + (c.length > 60 ? '...' : '')
          + '</div>';

    + '</div>';
}

function splitByMode(text, mode) {
  if (mode === 'line') {
    // 빈 줄 기준 분할
    return text.split(/\n\s*\n/).map(function(s){ return s.trim(); }).filter(function(s){ return s.length > 20; });
  }
  if (mode === 'heading') {
    // 번호(1. 2.) 또는 ## 제목 기준 분할
    var chunks = [];
    var lines = text.split('\n');
    var cur = [];
    var headingRe = /^(#{1,3}\s|[0-9]+[\.）\)]\s|[가-힣]\.\s|\*{2})/;
    lines.forEach(function(line) {
      if (headingRe.test(line.trim()) && cur.length > 0) {
        var joined = cur.join('\n').trim();
        if (joined.length > 20) chunks.push(joined);
        cur = [line];
      } else {
        cur.push(line);
      }
    });
    if (cur.length > 0) { var last = cur.join('\n').trim(); if (last.length > 20) chunks.push(last); }
    return chunks.length > 1 ? chunks : splitByMode(text, 'line');
  }
  if (mode === 'single') {
    return [text];
  }
  return []; // auto: AI가 처리
}

async function startBulkProcess() {
  var mode = _bulkMode || 'auto';
  var text = BULK.rawText || '';
  var cat  = BULK.cat  || '\uc870\uc81c';
  var cat2 = BULK.cat2 || '\uae30\ud0c0';

  if (mode === 'single') {
    closeMod();
    openNewMModal();
    setTimeout(function(){
      var ta = document.getElementById('newMC');
      if (ta) ta.value = text;
      NM.fileText = text;
    }, 100);
    return;
  }

  if (mode === 'auto') {
    // AI에게 항목 목록 먼저 추출 요청
    await bulkAutoExtract(text, cat, cat2);
    return;
  }

  // line / heading 모드: 분할 후 순차 생성
  var chunks = splitByMode(text, mode);
  if (!chunks.length) { showToast('\ubd84\ud560\ud560 \ub0b4\uc6a9\uc774 \uc5c6\uc2b5\ub2c8\ub2e4', 'err'); return; }
  await runBulkGeneration(chunks, cat, cat2);
}

// 청크 분할 (오버랩 포함)
function chunkText(text, size, overlap) {
  size = size || 5000;
  overlap = overlap || 500;
  var chunks = [];
  for (var i = 0; i < text.length; i += size - overlap) {
    chunks.push({ text: text.slice(i, i + size), offset: i });
    if (i + size >= text.length) break;
  }
  return chunks;
}

    /^(\d+[\.\)】\]]\s*.{2,40})/,              // 1. 2. 3.
    /^([가-힣]{2,15}\s*(매뉴얼|규정|절차|안내|방법|관리|처리|가이드))/,
    /^(제\d+[조항절]\s*.{2,30})/,              // 제1조 제2항
    /^([A-Z][A-Z\s]{1,20}:)/,                   // TITLE:
  ];
  var seen = {};
  lines.forEach(function(line, i) {
    var trimmed = line.replace(/\*/g,'').trim();
    if (!trimmed || trimmed.length < 3 || trimmed.length > 60) return;
    patterns.forEach(function(pat) {
      var m = trimmed.match(pat);
      if (m) {
        var title = m[1] ? m[1].trim() : m[0].trim();
        if (!seen[title]) {
          seen[title] = true;
          var charOffset = lines.slice(0, i).join('\n').length;
          candidates.push({ title: title, lineNum: i + 1, offset: charOffset, source: 'scan' });
        }
      }
    });
  });
  return candidates;
}

async function bulkAutoExtract(text, cat, cat2) {
  BULK = { items: [], cat: cat, cat2: cat2, rawText: text, processing: false, done: 0, total: 0 };
  var bodyEl = document.getElementById('bulkBody');
  var footEl = document.getElementById('mFoot');

  // ── STEP 1: 전체 읽기 + 빠른 정규식 스캔 (즉시) ──
  var totalChars = text.length;
  var fastCandidates = fastScanTitles(text);
  var chunks = chunkText(text, 5000, 500);

  if (bodyEl) bodyEl.innerHTML = '<div class="ai-proc"><div class="ai-spin"></div>'
    + '<div style="font-size:15px;font-weight:700;color:var(--pr);margin-bottom:6px">'
    + '\uc804\uccb4 ' + totalChars.toLocaleString() + '\uc790 \uc77d\uc74c &mdash; AI \ubcf5\uc218 \uccad\ud06c \uc2a4\uce94 \uc911...</div>'
    + '<div style="font-size:12px;color:var(--t3);margin-bottom:14px">\ube60\ub978 \uc2a4\uce94\uc73c\ub85c ' + fastCandidates.length + '\uac1c \ud6c4\ubcf4 \ubc1c\uacac &mdash; AI \uc815\ubc00 \ubd84\uc11d \uc911...</div>'
    + '<div class="pbar"><div class="pfill" id="bulkScanBar" style="width:0%;transition:width .3s"></div></div>'
    + '<div id="bulkScanLog" style="margin-top:10px;max-height:120px;overflow-y:auto;font-size:11px;color:var(--t3)"></div>'
    + '</div>';

  // ── STEP 2: 청크별 AI 목차 스캔 (병렬) ──
  var aiCandidates = [];
  var scanPromises = chunks.map(function(chunk, ci) {
    var prompt = '\ub2e4\uc74c \uc57d\uad6d \ubb38\uc11c \uc870\uac01\uc5d0\uc11c \ub9e4\ub274\uc5bc\ub85c \ub9cc\ub4e4 \uc218 \uc788\ub294 \ud56d\ubaa9 \uc81c\ubaa9\ub9cc JSON \ubc30\uc5f4\ub85c \ubc18\ud658.\n'
      + '\ubc31\ud2f1 \uc5c6\uc774, \ucd5c\ub300 10\uac1c: [{"title":"\ud56d\ubaa9\uba85","keywords":"\ud0a4\uc6cc\ub4dc1,\ud0a4\uc6cc\ub4dc2","startHint":"\uccab \ubb38\uc7a5 \uc77c\ubd80"}]\n'
      + '\ud56d\ubaa9\uc774 \uc5c6\uc73c\uba74 []\n\uc870\uac01(' + (ci+1) + '/' + chunks.length + '):\n'
      + chunk.text.substring(0, 4000);
    return callGem(prompt).then(function(res) {
      // 진행바 업데이트
      var pct = Math.round((ci + 1) / chunks.length * 100);
      var bar = document.getElementById('bulkScanBar');
      if (bar) bar.style.width = pct + '%';
      var log = document.getElementById('bulkScanLog');
      if (log) log.innerHTML += '\u2714 \uccad\ud06c ' + (ci+1) + '/' + chunks.length + ' \uc644\ub8cc<br>';
      if (!res) return [];
      try {
        var clean = res.replace(/```json|```/g,'').trim();
        var m = clean.match(/\[[\s\S]*\]/);
        var arr = m ? JSON.parse(m[0]) : [];
        return arr.map(function(item) {
          return {
            title: item.title || '',
            keywords: item.keywords || '',
            startHint: item.startHint || '',
            chunkOffset: chunk.offset,
            source: 'ai'
          };
        });
      } catch(e) { return []; }
    }).catch(function() { return []; });
  });

  // 병렬 실행 (최대 3개씩)
  var batchSize = 3;
  for (var b = 0; b < scanPromises.length; b += batchSize) {
    var batch = scanPromises.slice(b, b + batchSize);
    var batchResults = await Promise.all(batch);
    batchResults.forEach(function(arr) { aiCandidates = aiCandidates.concat(arr); });
  }

  // ── STEP 3: 중복 제거 + 정규식 후보와 합치기 ──
  var allCandidates = [];
  var titleSet = {};

  // AI 후보 먼저
  aiCandidates.forEach(function(c) {
    var key = c.title.replace(/\s/g,'').substring(0,10);
    if (c.title && !titleSet[key]) {
      titleSet[key] = true;
      allCandidates.push(c);
    }
  });

  // 정규식 후보 중 AI가 못잡은 것 추가
  fastCandidates.forEach(function(c) {
    var key = c.title.replace(/\s/g,'').substring(0,10);
    if (!titleSet[key]) {
      titleSet[key] = true;
      allCandidates.push(c);
    }
  });

  // 매뉴얼에 적합한 길이/형태로 필터
  allCandidates = allCandidates.filter(function(c) {
    return c.title && c.title.length >= 3 && c.title.length <= 50;
  });

  if (!allCandidates.length) {
    showToast('\ud56d\ubaa9\uc744 \ucc3e\uc9c0 \ubabb\ud588\uc2b5\ub2c8\ub2e4 \u2014 \uc904\ubc14\uafb5 \ubd84\ud560\ub85c \uc9c4\ud589\ud569\ub2c8\ub2e4', '');
    await runBulkGeneration(splitByMode(text, 'line'), cat, cat2);
    return;
  }

  // ── STEP 4: 결과 표시 ──
  BULK.items = allCandidates;
  BULK.fullText = text;

  if (bodyEl) {
    bodyEl.innerHTML = '<div style="margin-bottom:12px">'
      + '<div style="font-size:14px;font-weight:700;margin-bottom:4px">'
      + '&#128202; ' + allCandidates.length + '\uac1c \ud56d\ubaa9 \ubc1c\uacac'
      + '<span style="font-size:11px;font-weight:400;color:var(--t3);margin-left:8px">'
      + '\uc804\uccb4 ' + totalChars.toLocaleString() + '\uc790 &middot; ' + chunks.length + '\uac1c \uccad\ud06c \uc2a4\uce94 \uc644\ub8cc</span>'
      + '</div>'
      + '<div style="display:flex;gap:6px;margin-bottom:10px">'
      + '<button class="btn bs sm" onclick="bulkCheckAll(true)">\uc804\uccb4 \uc120\ud0dd</button>'
      + '<button class="btn bs sm" onclick="bulkCheckAll(false)">\uc804\uccb4 \ud574\uc81c</button>'
      + '<button class="btn bs sm" onclick="bulkRescan()">\ud074\ub9ac\ud55c \uad6c\uac04 \uc7ac\uc2a4\uce94</button>'
      + '</div></div>'
      + '<div style="max-height:280px;overflow-y:auto;border:1px solid var(--bd);border-radius:var(--rs)">'
      + allCandidates.map(function(item, i) {
          var badge = item.source === 'ai'
            ? '<span class="ai-badge" style="font-size:9px">AI</span>'
            : '<span style="font-size:9px;background:var(--s2);padding:1px 5px;border-radius:4px;color:var(--t3)">\uc2a4\uce94</span>';
          return '<div style="display:flex;align-items:flex-start;gap:8px;padding:9px 12px;border-bottom:1px solid var(--bd)">'
            + '<input type="checkbox" id="bitem' + i + '" checked style="margin-top:3px;flex-shrink:0;width:15px;height:15px;cursor:pointer">'
            + '<label for="bitem' + i + '" style="cursor:pointer;flex:1;min-width:0">'
            + '<div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">'
            + '<span style="font-size:13px;font-weight:600">' + (i+1) + '. ' + item.title + '</span>'
            + badge
            + '</div>'
            + (item.keywords ? '<div style="font-size:10px;color:var(--t3);margin-top:2px">' + item.keywords + '</div>' : '')
            + (item.startHint ? '<div style="font-size:10px;color:var(--t2);margin-top:1px">' + item.startHint.substring(0,50) + '...</div>' : '')
            + '</label></div>';
        }).join('')
      + '</div>'
      + '<div style="margin-top:10px;font-size:12px;color:var(--t2)">&#128172; \uccb4\ud06c\ud55c \ud56d\ubaa9\ub9cc \uc815\ubc00 \ub9e4\ub274\uc5bc\ub85c \uc0dd\uc131\ud569\ub2c8\ub2e4</div>';

    if (footEl) footEl.innerHTML =
      '<button class="btn bs" onclick="closeMod()">\ucde8\uc18c</button>'
      + '<button class="btn bp" onclick="confirmBulkGenerate()">'
      + '&#10024; \uc120\ud0dd\ud55c \ud56d\ubaa9 \ub9e4\ub274\uc5bc \uc0dd\uc131</button>';
  }
}

function bulkCheckAll(check) {
  (BULK.items || []).forEach(function(_, i) {
    var cb = document.getElementById('bitem' + i);

async function confirmBulkGenerate() {
  var selected = (BULK.items || []).filter(function(_, i) {
    var cb = document.getElementById('bitem' + i);
    return cb && cb.checked;
  });
  if (!selected.length) { showToast('\uc0dd\uc131\ud560 \ud56d\ubaa9\uc744 \uc120\ud0dd\ud574\uc8fc\uc138\uc694', 'err'); return; }

  var fullText = BULK.fullText || '';
  // 각 후보의 관련 구간 추출 (startHint + chunkOffset 활용)
  var chunks = selected.map(function(item) {
    // 1) startHint로 위치 찾기
    var hintPos = -1;
    if (item.startHint) {
      hintPos = fullText.indexOf(item.startHint.substring(0, 30));
    }
    // 2) chunkOffset 활용
    var basePos = hintPos >= 0 ? hintPos : (item.chunkOffset || 0);
    // 3) 해당 위치 전후 4000자 추출
    var from = Math.max(0, basePos - 200);
    var to   = Math.min(fullText.length, from + 4500);
    return fullText.substring(from, to);
  });

  await runBulkGeneration(
    chunks,
    BULK.cat,
    BULK.cat2,
    selected.map(function(item) { return item.title; })
  );
}

// 누락 구간 재스캔
async function bulkRescan() {
  var text = BULK.fullText || '';
  if (!text) return;
  // 기존 후보가 커버 못한 구간 찾기
  var covered = (BULK.items || []).map(function(item) { return item.chunkOffset || 0; });
  var chunks = chunkText(text, 5000, 500);
  var uncovered = chunks.filter(function(chunk) {
    return !covered.some(function(off) { return Math.abs(off - chunk.offset) < 3000; });
  });
  if (!uncovered.length) { showToast('\ub204\ub77d \uad6c\uac04\uc774 \uc5c6\uc2b5\ub2c8\ub2e4!', 'ok'); return; }
  showToast('\ub204\ub77d \uc758\uc2ec \uad6c\uac04 ' + uncovered.length + '\uac1c \uc7ac\uc2a4\uce94 \uc911...', '');
  var extra = [];
  for (var i = 0; i < uncovered.length; i++) {
    var prompt = '\ub2e4\uc74c \ud14d\uc2a4\ud2b8\uc5d0\uc11c \ub9e4\ub274\uc5bc \ud56d\ubaa9 \uc81c\ubaa9\ub9cc JSON\uc73c\ub85c: [{"title":"...","startHint":"..."}]\n' + uncovered[i].text.substring(0, 3000);
    var res = await callGem(prompt);
    if (res) {
      try {
        var m = res.replace(/```json|```/g,'').match(/\[[\s\S]*\]/);
        if (m) {
          JSON.parse(m[0]).forEach(function(item) {
            extra.push({ title: item.title, startHint: item.startHint || '', chunkOffset: uncovered[i].offset, source: 'ai' });
          });
        }
      } catch(e) {}
    }
  }
  if (extra.length) {
    var titleSet = {};
    (BULK.items || []).forEach(function(c) { titleSet[c.title.substring(0,10)] = true; });
    extra.forEach(function(c) {
      var key = c.title.substring(0,10);
      if (!titleSet[key]) { BULK.items.push(c); titleSet[key] = true; }
    });
    showToast('\ub204\ub77d \ud56d\ubaa9 ' + extra.length + '\uac1c \ucd94\uac00!', 'ok');
    bulkAutoExtract(text, BULK.cat, BULK.cat2);  // 결과 화면 재렌더
  } else {
    showToast('\ucd94\uac00 \ub204\ub77d \uc5c6\uc74c!', 'ok');
  }
}



async function runBulkGeneration(chunks, cat, cat2, titles) {
  BULK.processing = true;
  BULK.done = 0;
  BULK.total = chunks.length;

  var bodyEl = document.getElementById('bulkBody');
  var footEl = document.getElementById('mFoot');
  if (footEl) footEl.innerHTML = '';

  var created = [];
  var failed  = [];

  for (var i = 0; i < chunks.length; i++) {
    // 진행상황 UI 업데이트
    if (bodyEl) {
      bodyEl.innerHTML = '<div class="ai-proc">'
        + '<div class="ai-spin"></div>'
        + '<div style="font-size:15px;font-weight:700;color:var(--pr);margin-bottom:8px">'
        + '\ub9e4\ub274\uc5bc \uc0dd\uc131 \uc911... (' + (i+1) + ' / ' + chunks.length + ')</div>'
        + '<div class="pbar" style="margin-bottom:12px"><div class="pfill" style="width:' + Math.round((i/chunks.length)*100) + '%"></div></div>'
        + '<div style="max-height:180px;overflow-y:auto">'
        + created.map(function(m) {
            return '<div style="padding:5px 0;font-size:12px;color:var(--ac);display:flex;align-items:center;gap:6px">'
              + '&#10003; ' + m.title + '</div>';
          }).join('')
        + (failed.length ? failed.map(function(f) {
            return '<div style="padding:5px 0;font-size:12px;color:var(--dn)">&#10005; \uc2e4\ud328: ' + f + '</div>';
          }).join('') : '')
        + '<div style="padding:5px 0;font-size:12px;color:var(--pr);animation:pulse2 1s infinite">'
        + '&#8943; ' + ((titles && titles[i]) || ('\ud56d\ubaa9 ' + (i+1))) + ' \uc0dd\uc131 \uc911...</div>'
        + '</div></div>';
    }

    try {
      var hint = titles && titles[i] ? '\n\ub9e4\ub274\uc5bc \uc81c\ubaa9 \ud78c\ud2b8: ' + titles[i] : '';
      var nm = await genSingleManual(chunks[i] + hint, cat, cat2, false);
      if (nm) {
        if (titles && titles[i]) nm.title = titles[i]; // 제목 힌트 우선
        created.push(nm);
      }
    } catch(e) {
      failed.push((titles && titles[i]) || ('\ud56d\ubaa9 ' + (i+1)));
    }

    // API 부하 방지 대기
    if (i < chunks.length - 1) await new Promise(function(r){ setTimeout(r, 800); });
  }

  // 완료 화면
  if (bodyEl) {
    bodyEl.innerHTML = '<div style="text-align:center;padding:20px 0">'
      + '<div style="font-size:40px;margin-bottom:12px">&#127881;</div>'
      + '<div style="font-size:16px;font-weight:700;margin-bottom:6px">\uc77c\uad04 \uc0dd\uc131 \uc644\ub8cc!</div>'
      + '<div style="font-size:13px;color:var(--t2);margin-bottom:16px">'
      + '<span style="color:var(--ac);font-weight:700">' + created.length + '\uac1c \uc131\uacf5</span>'
      + (failed.length ? ' &nbsp;|&nbsp; <span style="color:var(--dn)">' + failed.length + '\uac1c \uc2e4\ud328</span>' : '')
      + '</div>'
      + created.map(function(m) {
          return '<div style="text-align:left;padding:6px 12px;background:var(--ac-l);border-radius:var(--rs);margin-bottom:4px;font-size:12px;color:var(--ac)">'
            + '&#10003; ' + m.title + '</div>';
        }).join('')
      + '</div>';
    if (footEl) footEl.innerHTML = '<button class="btn bp" onclick="closeMod();go(\'manuals\')">'
      + '&#128218; \ub9e4\ub274\uc5bc \ubaa9\ub85d\uc5d0\uc11c \ud655\uc778</button>';
  }
}

// 싱크 상태 UI
function setSyncStatus(status) {
  // status: 'loading' | 'ok' | 'err' | 'offline'
  var el = document.getElementById('syncDot');
  if (!el) return;
  var cfg = {
    loading: {bg:'var(--wn)',  title:'Firebase 동기화 중...'},
    ok:      {bg:'var(--ac)',  title:'Firebase 실시간 동기화 중'},
    err:     {bg:'var(--dn)',  title:'Firebase 연결 실패 - 로컬 모드'},
    offline: {bg:'var(--t3)', title:'오프라인 모드'}
  };
  var c = cfg[status] || cfg.offline;
  el.style.background = c.bg;
  el.title = c.title;
  el.style.animation = status === 'loading' ? 'pulse2 1s infinite' : 'none';
}

// Firestore 날짜 직렬화 / 역직렬화
function toFS(obj) {
  // Date &#8594; ISO string, 순환참조 제거
  return JSON.parse(JSON.stringify(obj, function(k, v) {
    if (v instanceof Date) return { __t: v.toISOString() };
    return v;
  }));
}
function fromFS(obj) {
  // ISO string &#8594; Date 복원
  return JSON.parse(JSON.stringify(obj), function(k, v) {
    if (v && v.__t) return new Date(v.__t);
    return v;
  });
}

// ============================================================
// FIREBASE INIT
// ============================================================
async function initFirebase() {
  setSyncStatus('loading');
  showSyncBanner('loading');
  try {
    var { initializeApp, getApps, getApp } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    var { getFirestore, doc, collection, setDoc, getDoc, getDocs, onSnapshot, deleteDoc, writeBatch, query, orderBy }
      = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    var { getStorage, ref, uploadString, getDownloadURL, deleteObject }
      = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js');

    // 재연결 시 중복 초기화 방지
    var app = getApps().some(function(a){ return a.name === 'pharmacy-manual'; })
      ? getApp('pharmacy-manual')
      : initializeApp(FB_CFG, 'pharmacy-manual');
    db = getFirestore(app);
    FB_OK = true;
    try {
      storageRef = getStorage(app);
      window._fbStorage = { storage: storageRef, ref: ref, uploadString: uploadString, getDownloadURL: getDownloadURL, deleteObject: deleteObject };
    } catch(e) { console.warn('Firebase Storage 초기화 실패:', e); }

    // 전역에 Firestore 함수 저장
    window._fs = { doc, collection, setDoc, getDoc, getDocs, onSnapshot, deleteDoc, writeBatch, query, orderBy };

    // 기존 실시간 리스너가 있으면 해제 후 재등록 (재연결 시 중복 구독 방지)
    Object.keys(FB_UNSUB).forEach(function(k) {
      try { if (typeof FB_UNSUB[k] === 'function') FB_UNSUB[k](); } catch(e) {}
    });
    FB_UNSUB = {};

    // 초기 데이터 로드 + 실시간 리스너 등록
    await loadAllFromFirestore();
    await flushPendingWrites();
    if (localStorage.getItem('expiryTeamCode')) { loadPinnedExpiry(); }
    setSyncStatus('ok');
    showSyncBanner('ok');
  } catch(e) {
    console.error('Firebase init error:', e);
    FB_OK = false;
    setSyncStatus('err');
    showSyncBanner('offline');
    // 오프라인 모드 - 앱은 계속 정상 작동
    renderPage(S.page);
    buildNav();
  }
}

// ============================================================
// 전체 데이터 로드 (최초 1회)
// ============================================================
async function loadAllFromFirestore() {
  var fs = window._fs;
  var COLS = ['manuals','changes','feedback','quizzes','staff','cats','inbox'];
  var loaded = {};

  await Promise.all(COLS.map(async function(col) {
    try {
      var snap = await fs.getDocs(fs.collection(db, 'pharmacy_'+col));
      var items = [];
      snap.forEach(function(d) { items.push(fromFS(d.data())); });
      if (items.length > 0) loaded[col] = items;
    } catch(e) { console.warn('load error:', col, e); }
  }));

  var firstTime = Object.keys(loaded).length === 0;

  if (!firstTime) {
    // ── 매뉴얼: Firebase에 없는 항목은 HTML 기본값에서 병합 ──
    var fbManualIds = (loaded.manuals||[]).map(function(m){ return m.id; });
    var localOnly = DATA.manuals.filter(function(m){ return fbManualIds.indexOf(m.id) < 0; });

    if (loaded.manuals)  { DATA.manuals  = loaded.manuals.concat(localOnly); }
    if (loaded.changes)  { DATA.changes  = loaded.changes; }
    if (loaded.feedback) { DATA.feedback = loaded.feedback; }
    if (loaded.quizzes)  { DATA.quizzes  = loaded.quizzes; }
    if (loaded.staff)    { DATA.staff    = loaded.staff; }
    if (loaded.cats && loaded.cats.length) {
      // 손상된 카테고리(name 없음) 걸러내기
      var validCats = loaded.cats.filter(function(c){ return c && c.name; });
      if (validCats.length > 0) {
        DATA.cats = validCats;
      } else {
        console.warn('Firebase\uc758 cats\uac00 \ubaa8\ub450 \uc190\uc0c1\ub428 \u2192 \uae30\ubcf8\uac12 \uc720\uc9c0 \ud6c4 \uc7ac\uc5c5\ub85c\ub4dc');
      }
    }
    if (!DATA.cats || !DATA.cats.length) {
      // cats가 비어있으면(또는 끝까지 비정상) HTML 기본값으로 복구 + Firebase 재업로드
      DATA.cats = DEFAULT_CATS.slice();
      console.warn('cats\uac00 \ube44\uc5b4\uc788\uc5b4 \uae30\ubcf8\uac12\uc73c\ub85c \ubcf5\uc6d0\ud569\ub2c8\ub2e4');
      for (var ci = 0; ci < DATA.cats.length; ci++) {
        try { await fs.setDoc(fs.doc(db, 'pharmacy_cats', String(DATA.cats[ci].id)), toFS(DATA.cats[ci])); } catch(e) {}
      }
      showToast('&#9888; \uce74\ud14c\uace0\ub9ac\uac00 \ube44\uc5b4\uc788\uc5b4 \uae30\ubcf8\uac12\uc73c\ub85c \ubcf5\uc6d0\ud588\uc2b5\ub2c8\ub2e4', 'ok');
    }
    if (loaded.inbox)    { DATA.inbox    = loaded.inbox; }

    // Firebase에 없는 매뉴얼을 Firebase에 업로드
    if (localOnly.length > 0) {
      console.log('Firebase에 없는 매뉴얼 ' + localOnly.length + '개 업로드 중...');
      for (var i = 0; i < localOnly.length; i++) {
        try {
          await fs.setDoc(fs.doc(db, 'pharmacy_manuals', String(localOnly[i].id)), toFS(localOnly[i]));
        } catch(e) { console.warn('업로드 실패:', localOnly[i].title); }
      }
      showToast('&#10024; 매뉴얼 ' + localOnly.length + '개가 Firebase에 동기화되었습니다!', 'ok');
    }
  } else {
    // 최초 실행: HTML의 전체 데이터 업로드
    await uploadDefaultData();
  }

  registerListeners();
  renderPage(S.page);

// 실시간 리스너 (onSnapshot)
// ============================================================
function registerListeners() {
  var fs = window._fs;
  var colMap = {
    manuals:  function(items){ DATA.manuals  = items; },
    changes:  function(items){ DATA.changes  = items; },
    feedback: function(items){ DATA.feedback = items; },
    quizzes:  function(items){ DATA.quizzes  = items; },
    staff:    function(items){ DATA.staff    = items; },
    cats:     function(items){
      // cats가 비어서 오면(네트워크 일시 오류, 빈 스냅샷 등) 기존 값을 유지 - 화면이 텅 비는 것 방지
      var validCats = items.filter(function(c){ return c && c.name; });
      if (validCats.length > 0) {
        DATA.cats = validCats;
      } else if (!DATA.cats || !DATA.cats.length) {
        DATA.cats = DEFAULT_CATS.slice();
        console.warn('cats \uc2e4\uc2dc\uac04 \uc5c5\ub370\uc774\ud2b8\uac00 \ube44\uc5b4\uc788\uc5b4 \uae30\ubcf8\uac12\uc73c\ub85c \ubcf5\uc6d0 + Firestore \uc7ac\uc5c5\ub85c\ub4dc');
        var fs2 = window._fs;
        if (fs2 && db) {
          DATA.cats.forEach(function(c){
            try { fs2.setDoc(fs2.doc(db, 'pharmacy_cats', String(c.id)), toFS(c)); } catch(e){}
          });
        }
      } else {
        console.warn('cats \uc2e4\uc2dc\uac04 \uc5c5\ub370\uc774\ud2b8\uac00 \ube44\uc5b4\uc788\uc5b4 \uae30\uc874 \uac12 \uc720\uc9c0');
      }
    },
    inbox:    function(items){ DATA.inbox    = items; }   // inbox 추가
  };

  Object.keys(colMap).forEach(function(col) {
    if (FB_UNSUB[col]) FB_UNSUB[col](); // 기존 리스너 해제
    FB_UNSUB[col] = fs.onSnapshot(
      fs.collection(db, 'pharmacy_'+col),
      function(snap) {
        var items = [];
        snap.forEach(function(d) { items.push(fromFS(d.data())); });
        items.sort(function(a,b){
          var ta = a.createdAt||a.updatedAt||0;
          var tb = b.createdAt||b.updatedAt||0;
          return new Date(tb) - new Date(ta);
        });
        colMap[col](items);
        // 버그14 fix: LocalStorage 백업
        try { localStorage.setItem('lb_'+col, JSON.stringify(toFS(items))); } catch(e){}
        // 버그3 fix: myRead를 readBy 기반으로 동기화
        if (col === 'changes' && S.currentStaff) {
          var sid = S.currentStaff.id;
          items.forEach(function(c){ DATA.myRead[c.id] = c.readBy.indexOf(sid)>=0; });
        }
        renderPage(S.page);
        buildNav();
        setSyncStatus('ok');
      },
      function(err) {
        console.warn('snapshot error:', col, err);
        setSyncStatus('err');
        // 버그4 fix: 오류 시 10초 후 자동 재연결 시도
        setTimeout(function(){
          if(FB_OK && db) registerListeners();
        }, 10000);
      }
    );
  });
}
