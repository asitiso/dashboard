// FIRESTORE CRUD 헬퍼
// ============================================================
async function fsSave(col, item) {
  if (!FB_OK || !db) {
    // 버그14 fix: 오프라인 시 LocalStorage에 임시 저장
    try {
      var lbKey = 'lb_pending_'+col;
      var pending = JSON.parse(localStorage.getItem(lbKey)||'[]');
      var exists = pending.findIndex(function(x){return x.id===item.id;});
      if(exists>=0) pending[exists]=toFS(item); else pending.push(toFS(item));
      localStorage.setItem(lbKey, JSON.stringify(pending));
    } catch(e){}
    return;
  }
  try {
    var fs = window._fs;
    await fs.setDoc(fs.doc(db, 'pharmacy_'+col, String(item.id)), toFS(item));
    // 저장 성공 시 pending 제거
    localStorage.removeItem('lb_pending_'+col);
  } catch(e) {
    console.error('fsSave error:', col, e);
    setSyncStatus('err');
    // 실패 시 pending에 저장
    try {
      var lbKey2 = 'lb_pending_'+col;
      var p2 = JSON.parse(localStorage.getItem(lbKey2)||'[]');
      var ei = p2.findIndex(function(x){return x.id===item.id;});
      if(ei>=0) p2[ei]=toFS(item); else p2.push(toFS(item));
      localStorage.setItem(lbKey2, JSON.stringify(p2));
    } catch(e2){}
  }
}

async function fsDelete(col, id) {
  if (!FB_OK || !db) return;
  try {
    var fs = window._fs;
    await fs.deleteDoc(fs.doc(db, 'pharmacy_'+col, String(id)));
  } catch(e) { console.error('fsDelete error:', col, e); }
}

// 오프라인 중 쌓인 pending 데이터를 Firebase 재연결 후 일괄 업로드
async function flushPendingWrites() {
  if (!FB_OK || !db) return;
  var fs = window._fs;
  var COLS = ['manuals','changes','feedback','quizzes','staff','cats','inbox'];
  var totalFlushed = 0;

  for (var i = 0; i < COLS.length; i++) {
    var col = COLS[i];
    var lbKey = 'lb_pending_' + col;
    var pendingRaw = localStorage.getItem(lbKey);
    if (!pendingRaw) continue;

    var pending;
    try { pending = JSON.parse(pendingRaw); } catch(e) { continue; }
    if (!pending || !pending.length) { localStorage.removeItem(lbKey); continue; }

    var failed = [];
    for (var j = 0; j < pending.length; j++) {
      try {
        await fs.setDoc(fs.doc(db, 'pharmacy_'+col, String(pending[j].id)), pending[j]);
        totalFlushed++;
      } catch(e) {
        console.warn('flush \uc2e4\ud328:', col, pending[j].id, e);
        failed.push(pending[j]);
      }
    }

    // 실패한 것만 다시 pending에 남김
    if (failed.length) localStorage.setItem(lbKey, JSON.stringify(failed));
    else localStorage.removeItem(lbKey);
  }

  if (totalFlushed > 0) {
    showToast('&#128229; \uc624\ud504\ub77c\uc778 \uc911 \uc800\uc7a5\ub41c \ub370\uc774\ud130 ' + totalFlushed + '\uac74\uc774 \ub3d9\uae30\ud654\ub418\uc5c8\uc2b5\ub2c8\ub2e4!', 'ok');
  }
}

function applyManualCreatePart(idx) {
  var ctx = window._applyManualCtx;
  var nameEl = document.getElementById('applyNewPartName'+idx);
  var newName = nameEl ? nameEl.value.trim() : '';
  if (!newName) { showToast('\ud30c\ud2b8 \uc774\ub984\uc744 \uc785\ub825\ud574\uc8fc\uc138\uc694', 'err'); return; }
  // 새 파트를 ctx.parts 배열에 추가
  if (!ctx.parts) ctx.parts = [];
  ctx.parts.push({ id: Date.now(), name: newName, principle: '', checkpoints: [], script: '', exceptions: [], changeLog: [] });
  // 이 항목의 partIndex를 새 파트로 설정
  ctx.items[idx].partIndex = ctx.parts.length;
  ctx.items[idx]._newPartMode = false;
  renderApplyManualModal();
  showToast('"' + newName + '" \ud30c\ud2b8\uac00 \ucd94\uac00\ub418\uc5c8\uc2b5\ub2c8\ub2e4.', 'ok');
}

function applyManualSetAction(idx, action) {
  window._applyManualCtx.items[idx]._action = action;
  renderApplyManualModal();
}

function confirmApplyManualItems() {
  var ctx = window._applyManualCtx;
  if (!ctx) return;
  var target = DATA.manuals.find(function(m){ return m.id===ctx.manualId; });
  var c = DATA.changes.find(function(x){ return x.id===ctx.changeId; });
  if (!target || !c) return;

  backupManualVersion(target);

  // ctx.parts에 새로 추가된 파트가 있으면 target.parts에도 반영
  if (ctx.parts.length > target.parts.length) {
    var newParts = ctx.parts.slice(target.parts.length);
    newParts.forEach(function(p){ target.parts.push(p); });
  }

  ctx.items.forEach(function(it){
    if (it._action === 'ignore') return;
    var part = ctx.parts[(it.partIndex||1)-1] || ctx.parts[0];
    if (!part) return;
    var sentence = (it._editVal || '').trim();
    if (!sentence) return;

    if (it._action === 'replace' && it.conflictingText) {
      if ((part.principle||'').indexOf(it.conflictingText) >= 0) {
        part.principle = (part.principle||'').replace(it.conflictingText, sentence);
      } else {
        part.principle = ((part.principle||'').trim() ? part.principle.trim()+'\n' : '') + sentence;
      }
    } else {
      part.principle = ((part.principle||'').trim() ? part.principle.trim()+'\n' : '') + sentence;
    }

    if (!part.changeLog) part.changeLog = [];
    part.changeLog.push({
      at: new Date().toISOString(),
      action: it._action,
      sentence: sentence,
      conflictingText: it.conflictingText||null,
      changeId: c.id,
      changeTitle: c.title
    });
  });

  target.updatedAt = new Date().toISOString();
  fsSave('manuals', target);
  closeMod();
  window._applyManualCtx = null;
  showToast('\u2713 \ub9e4\ub274\uc5bc\uc5d0 \uc801\uc6a9\ub418\uc5c8\uc2b5\ub2c8\ub2e4', 'ok');
  renderPage(S.page);
}

// 자연어 증상 문장 → 핵심 키워드 추출
function extractSymptomKeywords(q) {
  var found = [];
  Object.keys(SYNONYMS).forEach(function(k) {
    if (q.indexOf(k) >= 0) found.push(SYNONYMS[k]);
  });
  return found;
}

var JAMO = {
  'ㄱ':'[가-깃]', 'ㄲ':'[깄-밧]', 'ㄴ':'[밨-삫]',
  'ㄷ':'[사-옷]', 'ㄸ':'[옸-펻]', 'ㄹ':'[펼-힣]',
  'ㅁ':'[마-바]', 'ㅂ':'[바-빋]', 'ㅃ':'[빌-삫]',
  'ㅅ':'[사-싧]', 'ㅇ':'[아-짃]', 'ㅈ':'[자-찧]',
  'ㅊ':'[이-췣]', 'ㅋ':'[카-탋]', 'ㅌ':'[탌-퍻]',
  'ㅍ':'[퍼-헛]', 'ㅎ':'[헜-힣]'
};

function fuzzyMatch(text, q) {
  if (!text || !q) return false;
  var t = String(text).toLowerCase();
  var lq = String(q).toLowerCase();
  if (t.indexOf(lq) >= 0) return true;
  // 동의어 검색
  var syn = SYNONYMS[q] || SYNONYMS[lq];
  if (syn && t.indexOf(String(syn).toLowerCase()) >= 0) return true;
  // 초성 검색
  if (/^[ㄱ-ㅎ]+$/.test(q)) {
    var pattern = Array.from(q).map(function(c){ return JAMO[c] || c; }).join('.*');
    try { if (new RegExp(pattern).test(text)) return true; } catch(e) {}
  }
  // 오타 허용: 70% 이상 일치하는 부분 문자열
  if (lq.length >= 2) {
    var sub = lq.substring(0, Math.ceil(lq.length * 0.7));
    if (sub.length >= 2 && t.indexOf(sub) >= 0) return true;
  }
  return false;
}

// 스코어 기반 정렬 검색
// 변경사항(공지/변경 이력) 검색
function searchChanges(q) {
  if (!q) return [];
  var scored = (DATA.changes||[]).map(function(c) {
    var score = 0;
    if (fuzzyMatch(c.title, q)) score += 10;
    if (fuzzyMatch(c.type, q)) score += 5;
    if (fuzzyMatch(c.before, q)) score += 3;
    if (fuzzyMatch(c.after, q)) score += 4;
    if (fuzzyMatch(c.createdBy, q)) score += 2;
    return { c: c, score: score };
  }).filter(function(x){ return x.score > 0; });
  scored.sort(function(a,b){ return b.score - a.score; });
  return scored.map(function(x){ return x.c; });
}

function searchManuals(q) {
  if (!q) return DATA.manuals;
  var lq = q.toLowerCase();
  var symptomKws = extractSymptomKeywords(q); // 자연어 증상 문장 보조 키워드
  var scored = DATA.manuals.map(function(m) {
    var score = 0;
    if (fuzzyMatch(m.title, q)) score += 10;
    if ((m.keywords||[]).some(function(k){ return fuzzyMatch(k, q); })) score += 8;
    if (m.tags.some(function(t){ return fuzzyMatch(t, q); })) score += 7;
    if (fuzzyMatch(m.cat3, q)) score += 6;
    if (fuzzyMatch(m.cat2, q)) score += 5;
    if (fuzzyMatch(m.cat, q)) score += 4;
    if (fuzzyMatch(m.summary, q)) score += 3;
    if ((m.warnings||[]).some(function(w){ return fuzzyMatch(w, q); })) score += 2;
    if ((m.steps||[]).some(function(s){ return fuzzyMatch(s, q); })) score += 2;
    if (fuzzyMatch(m.customerScript, q)) score += 1;
    // 자연어 증상 문장 보조 매칭 (예: "아이가 열나요" → "소아","해열제")
    symptomKws.forEach(function(kw) {
      if (fuzzyMatch(m.title, kw) || fuzzyMatch(m.summary, kw) || (m.tags||[]).some(function(t){return fuzzyMatch(t,kw);}) || (m.keywords||[]).some(function(k){return fuzzyMatch(k,kw);})) {
        score += 3;
      }
    });
    return { m: m, score: score };
  }).filter(function(x){ return x.score > 0; });
  scored.sort(function(a,b){ return b.score - a.score; });
  return scored.map(function(x){ return x.m; });
}

    return '=== \ub9e4\ub274\uc5bc ' + (i+1) + ': ' + m.title + ' ===\n' + manualMergeText(m);
  }).join('\n\n');

  var prompt = '\uc544\ub798 ' + targets.length + '\uac1c\uc758 \uc57d\uad6d \uc5c5\ubb34 \ub9e4\ub274\uc5bc\uc740 \ub0b4\uc6a9\uc774 \uacb9\uce69\ub2c8\ub2e4. \uc911\ubcf5\uc744 \uc81c\uac70\ud558\uace0 \ud558\ub098\uc758 \uc644\uc131\ub3c4 \ub192\uc740 \ub9e4\ub274\uc5bc\ub85c \ud569\uccd0\uc8fc\uc138\uc694. \uacb0\uacfc\ub294 \ud30c\ud2b8(\uc18c\ud56d\ubaa9) \ub2e8\uc704\ub85c \uad6c\uc131\ud558\uc138\uc694.\n\n'
    + manualsText + '\n\n'
    + 'JSON\ub9cc \ubc18\ud658(\ubc31\ud2f1\uc5c6\uc774): {"title":"","parts":[{"name":"","principle":"","checkpoints":[],"script":"","exceptions":[]}],"tags":[]}';

  var result = await callGem(prompt);
  var merged = null;
  if (result) {
    try {
      var clean = result.replace(/```json|```/g,'').trim();
      var m = clean.match(/\{[\s\S]*\}/);
      if (m) merged = JSON.parse(m[0]);
    } catch(e) {}
  }

  if (!merged) { showToast('\ubcd1\ud569 \uc2e4\ud328. \ub2e4\uc2dc \uc2dc\ub3c4\ud574\uc8fc\uc138\uc694.', 'err'); return; }

  var first = targets[0];
  var nm = buildPartManualObject({
    title: merged.title || first.title,
    cat: first.cat, cat2: first.cat2 || '', cat3: first.cat3 || '',
    keywords: Array.from(new Set(targets.reduce(function(acc,m){ return acc.concat(m.keywords||[]); }, []).concat(merged.tags||[]))),
    tags: Array.from(new Set(targets.reduce(function(acc,m){ return acc.concat(m.tags||[]); }, []).concat(merged.tags||[]))),
    parts: merged.parts
  });
  nm.views = targets.reduce(function(s,m){ return s+(m.views||0); }, 0);
  nm.history = targets.reduce(function(h,m){ return h.concat(m.history||[]); }, []);

  DATA.manuals.unshift(nm);
  fsSave('manuals', nm);

  // 참조 이전 후 기존 매뉴얼 삭제
  var oldIds = targets.map(function(m){ return m.id; });
  for (var i = 0; i < oldIds.length; i++) {
    reassignManualRefs(oldIds[i], nm.id);
  }
  DATA.manuals = DATA.manuals.filter(function(m){ return oldIds.indexOf(m.id) < 0; });
  for (var j = 0; j < oldIds.length; j++) {
    try { await fsDelete('manuals', oldIds[j]); } catch(e) {}
  }

  showToast('&#10024; ' + targets.length + '\uac1c \ub9e4\ub274\uc5bc\uc774 \ud558\ub098\ub85c \ubcd1\ud569\ub418\uc5c8\uc2b5\ub2c8\ub2e4!', 'ok');
  MANUAL_SELECT_MODE = false;
  MANUAL_SELECTED = [];
  renderPage('manuals');
  buildNav();
}

async function deleteSelectedManuals() {
  if (!MANUAL_SELECTED.length) { showToast('\uc0ad\uc81c\ud560 \ub9e4\ub274\uc5bc\uc744 \uc120\ud0dd\ud574\uc8fc\uc138\uc694', 'err'); return; }
  var count = MANUAL_SELECTED.length;
  if (!confirm('\uc120\ud0dd\ud55c \ub9e4\ub274\uc5bc ' + count + '\uac1c\ub97c \uc0ad\uc81c\ud558\uc2dc\uaca0\uc2b5\ub2c8\uae4c?\n\uc774 \uc791\uc5c5\uc740 \ub418\ub3cc\ub9b4 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4.')) return;
  if (count >= 5) {
    if (!confirm(count + '\uac1c\ub294 \uc801\uc9c0 \uc54a\uc740 \uc218\uc785\ub2c8\ub2e4. \uc815\ub9d0 \uc9c4\ud589\ud558\uc2dc\uaca0\uc2b5\ub2c8\uae4c?')) return;
  }

  var ids = MANUAL_SELECTED.slice();
  for (var i = 0; i < ids.length; i++) {
    try { await fsDelete('manuals', ids[i]); } catch(e) {}
  }
  DATA.manuals = DATA.manuals.filter(function(m){ return ids.indexOf(m.id) < 0; });

  showToast('&#10003; ' + ids.length + '\uac1c\uc758 \ub9e4\ub274\uc5bc\uc774 \uc0ad\uc81c\ub418\uc5c8\uc2b5\ub2c8\ub2e4', 'ok');
  MANUAL_SELECT_MODE = false;
  MANUAL_SELECTED = [];
  renderPage('manuals');
  buildNav();
}

(function registerSW() {
  if (!('serviceWorker' in navigator)) return;
  var swCode = [
    'var CACHE="pharm-v1";',
    'self.addEventListener("install",function(e){self.skipWaiting();});',
    'self.addEventListener("activate",function(e){e.waitUntil(caches.keys().then(function(keys){return Promise.all(keys.filter(function(k){return k!==CACHE;}).map(function(k){return caches.delete(k);}));}));});',
    'self.addEventListener("fetch",function(e){if(e.request.method!=="GET")return;e.respondWith(fetch(e.request).catch(function(){return caches.match(e.request);}));});'
  ].join('');
  var blob = new Blob([swCode],{type:'application/javascript'});
  var url = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).then(function(){
    console.log('[PWA] Service Worker 등록 완료');
  }).catch(function(){});
})();
